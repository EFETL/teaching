<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國小 互動學習</title>
<style>
  :root{ --main:#d97642; --main-dark:#b85c2e; --accent:#5b9279; --bg:#fdf6ef; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:#3a332e; background:var(--bg); line-height:1.7; padding:0 0 60px; }
  header{ background:linear-gradient(135deg,#d97642,#e89a5c); color:#fff; padding:30px 20px 26px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.15); }
  header h1{ font-size:30px; margin-bottom:8px; }
  header p{ font-size:18px; opacity:.95; }
  .back{ display:inline-block; margin:16px auto 0; color:var(--main-dark); background:#fff; border:2px solid #f0d9c7; border-radius:20px; padding:6px 16px; font-size:16px; text-decoration:none; }
  .back:hover{ background:#fff3ea; }
  .wrap{ max-width:880px; margin:0 auto; padding:22px 16px; }
  .intro{ background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:22px; box-shadow:0 1px 6px rgba(0,0,0,.07); font-size:18px; }
  .intro b{ color:var(--main-dark); }
  .unit{ background:#fff; border-radius:14px; margin-bottom:20px; overflow:hidden; box-shadow:0 1px 8px rgba(0,0,0,.08); }
  .unit-head{ background:var(--accent); color:#fff; font-size:20px; font-weight:bold; padding:12px 20px; }
  .links{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:18px 20px; }
  .links a{ display:flex; flex-direction:column; gap:6px; text-decoration:none; border:2px solid #ecdfd3; border-radius:12px; padding:18px 16px; color:#3a332e; transition:all .12s; }
  .links a:hover{ border-color:var(--main); background:#fff7f1; transform:translateY(-2px); }
  .links a .t{ font-size:19px; font-weight:bold; color:var(--main-dark); }
  .links a .d{ font-size:15px; color:#8a7d72; }
  .links a .ic{ font-size:24px; }
  footer{ text-align:center; color:#a89a8d; font-size:15px; margin-top:30px; }
  @media (max-width:560px){ .links{ grid-template-columns:1fr; } header h1{ font-size:24px; } }
</style>
</head>
<body>
<header>
  <h1>🎒 國小 互動學習</h1>
  <p>teaching.efetl.com / 國小</p>
  <a class="back" href="../">← 回主選單</a>
</header>
<div class="wrap">
  <div class="intro">點選下方項目即可在線上<b>作答練習</b>；每題都能<b>點開解析</b>，也支援<b>列印</b>（列印時自動隱藏解析、附頁碼）。</div>

  <div class="unit">
    <div class="unit-head">國語　一年級下學期（康軒版）</div>
    <div class="links">
      <a href="chinese-1b-mock-15.html">
        <span class="ic">📝</span>
        <span class="t">第 6～12 課　15 回模擬卷</span>
        <span class="d">每回五大題：國字注音・改錯字・造句・課文理解・照樣寫句子</span>
      </a>
      <a href="chinese-1b-exam.html">
        <span class="ic">⭐</span>
        <span class="t">第 6～12 課　單回互動測驗</span>
        <span class="d">五大題完整一回，適合課堂或回家練習</span>
      </a>
    </div>
  </div>

  <div class="unit">
    <div class="unit-head">數學　一年級下學期</div>
    <div class="links">
      <a href="math-1b-mock.html">
        <span class="ic">📐</span>
        <span class="t">單元 6～9　10 回模擬卷</span>
        <span class="d">幾月幾日・錢幣・二位數加減・做紀錄；可切換卷別、點開解析、列印附頁碼</span>
      </a>
    </div>
  </div>

  <footer>國小 互動學習 ‧ teaching.efetl.com</footer>
</div>
</body>
</html>
