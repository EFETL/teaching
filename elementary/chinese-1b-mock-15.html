<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國小國語 1下 第6～12課 模擬卷（15 回）</title>
<style>
  :root{
    --primary:#d97642;--primary-dark:#b85c2e;--accent:#5b9279;
    --accent-light:#e7f0ea;--bg:#fdf8f3;--card:#fff;--line:#ecdfd3;
    --text:#3a332e;--muted:#8a7d72;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.9;font-size:18px;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 20px 90px;}

  header.hero{background:linear-gradient(135deg,var(--primary),#e89a5c);color:#fff;
    border-radius:20px;padding:24px 28px;box-shadow:0 6px 18px rgba(217,118,66,.25);}
  header.hero h1{margin:0 0 6px;font-size:24px;letter-spacing:1px;}
  header.hero .sub{font-size:14px;opacity:.95;}

  /* 卷別選單 */
  .picker{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 6px;}
  .picker button{border:1px solid var(--line);background:#fff;cursor:pointer;
    font-family:inherit;font-size:15px;padding:7px 13px;border-radius:10px;color:var(--text);transition:.12s;}
  .picker button:hover{border-color:var(--primary);}
  .picker button.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700;}

  .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0;}
  .toolbar button{border:none;cursor:pointer;font-size:15px;font-family:inherit;
    padding:10px 18px;border-radius:30px;font-weight:600;transition:.15s;}
  .btn-print{background:var(--primary);color:#fff;}
  .btn-print:hover{background:var(--primary-dark);}
  .btn-toggle{background:var(--accent);color:#fff;}
  .hint{font-size:14px;color:var(--muted);margin:4px 0 0;}

  .paper-head{margin:18px 0 4px;display:flex;align-items:baseline;gap:12px;}
  .paper-head h2{margin:0;font-size:22px;color:var(--primary-dark);}
  .paper-head .tag{font-size:13px;color:var(--muted);}

  .info-bar{display:flex;gap:24px;flex-wrap:wrap;border:1px dashed var(--line);
    border-radius:12px;padding:12px 18px;margin:14px 0;font-size:16px;color:var(--muted);}
  .info-bar span{flex:1;min-width:140px;}

  .section{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 24px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,.03);}
  .section>h3{margin:0 0 6px;font-size:20px;color:var(--primary-dark);display:flex;align-items:center;gap:10px;}
  .section>h3 .num{background:var(--primary);color:#fff;border-radius:8px;font-size:15px;padding:2px 10px;flex:none;}
  .section .lead{font-size:14px;color:var(--muted);margin:0 0 14px;}

  .q{padding:11px 0;border-top:1px dashed var(--line);}
  .q:first-of-type{border-top:none;}
  .q-text{font-size:18px;}
  .q-text .qn{color:var(--primary);font-weight:700;margin-right:6px;}
  .zhuyin{color:var(--accent);font-weight:700;background:var(--accent-light);
    padding:1px 7px;border-radius:6px;font-size:16px;letter-spacing:1px;}
  ruby{margin:0 1px;}
  ruby rt{font-size:.5em;color:var(--accent);font-weight:600;letter-spacing:0;line-height:1;}
  .sec-one .q-text{line-height:2.7;font-size:19px;}
  .blank{display:inline-block;min-width:42px;border-bottom:2px solid var(--primary);
    margin:0 3px;vertical-align:bottom;height:1.2em;}
  .blank-lg{display:block;min-width:100%;border-bottom:2px solid var(--line);height:1.6em;margin-top:12px;}

  .options{margin:8px 0 2px;display:flex;flex-direction:column;gap:4px;}
  .options label{font-size:17px;}
  .options .ch{display:inline-block;width:1.7em;color:var(--primary);font-weight:700;}

  .fix-line{font-size:22px;letter-spacing:2px;line-height:2.9;border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;background:#fffdfb;}
  .fix-line ruby rt{font-size:.46em;}
  .fix-correct{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:16px;}
  .fix-correct .pair{background:var(--accent-light);border-radius:8px;padding:3px 12px;}
  .fix-correct .wrong{color:#c0392b;text-decoration:line-through;}
  .fix-correct .right{color:var(--accent);font-weight:700;}

  .pattern-box{margin:6px 0 14px;padding:12px 16px;background:var(--accent-light);border-radius:12px;}
  .pattern-box .ptitle{font-weight:700;color:var(--accent);font-size:16px;margin-bottom:8px;}
  .demo{display:inline-flex;align-items:center;gap:10px;font-size:20px;background:#fff;
    border:1.5px dashed var(--accent);border-radius:10px;padding:6px 14px;}
  .demo .arrow{color:var(--primary);font-weight:700;}
  .demo b{color:var(--primary);}
  .pat-q{font-size:19px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pat-q .arrow{color:var(--primary);font-weight:700;}
  .pat-q b{color:var(--text);}

  .reveal{margin-top:10px;border:none;cursor:pointer;font-family:inherit;background:var(--accent-light);
    color:var(--accent);padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;}
  .reveal::before{content:"▸ ";}
  .reveal.open::before{content:"▾ ";}
  .explain{display:none;margin-top:10px;padding:11px 16px;background:#fbf4ec;
    border-left:4px solid var(--primary);border-radius:0 10px 10px 0;font-size:16px;color:#4a4038;}
  .explain.show{display:block;}
  .explain b{color:var(--primary-dark);}
  .explain .ans{font-size:18px;}

  footer.foot{text-align:center;color:var(--muted);font-size:13px;margin-top:30px;}

  @media print{
    @page{margin:1.6cm 1.4cm 1.8cm;}
    body{background:#fff;font-size:15px;line-height:1.7;}
    .wrap{max-width:none;padding:0;}
    .picker,.toolbar,.hint,.reveal,.explain,footer.foot{display:none !important;}
    header.hero{background:none;color:#000;box-shadow:none;border:none;
      border-bottom:2px solid #000;border-radius:0;padding:0 0 6px;margin-bottom:6px;}
    header.hero .sub{opacity:1;}
    .paper-head h2{color:#000;}
    .section{border:none;box-shadow:none;border-radius:0;padding:6px 0;margin:8px 0;break-inside:avoid;}
    .section>h3{color:#000;border-bottom:1px solid #000;padding-bottom:3px;}
    .section>h3 .num{background:#000;color:#fff;}
    .q{break-inside:avoid;}
    .zhuyin{background:none;color:#000;border:1px solid #aaa;}
    .fix-line,.pattern-box{background:none;}
    .print-pagenum{position:fixed;bottom:0;right:0;font-size:12px;color:#000;}
    .print-pagenum::after{counter-increment:page;content:"— " counter(page) " —";}
  }
  .print-pagenum{display:none;}
  @media print{.print-pagenum{display:block;}}
</style>
</head>

<div class="wrap">
  <header class="hero">
    <h1>國小國語 一年級下學期　第 6～12 課　模擬卷</h1>
    <div class="sub">康軒版　•　全班適用（中等難度）　•　共 15 回，每回五大題（國字注音 10 ・改錯字 10 ・造句 3 ・課文理解 20 ・照樣寫句子 5）</div>
  </header>

  <div class="picker" id="picker"></div>

  <div class="toolbar">

  </div>
  <p class="hint">操作：上方選卷別 → 點題目下「查看解析」看單題答案。列印時只印出目前這一卷、自動隱藏解析，每頁右下角有頁碼。</p>

  <div class="paper-head">

    <span class="tag">康軒國語 1下　第6～12課</span>

  <div id="paper-content"></div>

  <footer class="foot">國小國語 1下　第 6～12 課　15 回模擬卷　•　康軒版　•　全班適用</footer>
</div>

let cur = 0;

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const blanks = n => '<span class="blank"></span>'.repeat(Number(n)||1);
const ABC = ['(A)','(B)','(C)'];

function tokHTML(t){
  if(t.c!==undefined) return '<ruby>'+esc(t.c)+'<rt>'+esc(t.z||'')+'</rt></ruby>';
  if(t.blank!==undefined) return '（<span class="zhuyin">'+esc(t.blank)+'</span>）'+blanks(t.blanks);
  return esc(t.t||'');
}
function reveal(html){
  return '<button class="reveal" onclick="tg(this)">查看解析</button>'+
         '<div class="explain">'+html+'</div>';
}

function secOne(items){
  let h='<section class="section sec-one"><h3><span class="num">一</span> 國字與注音（每題 5 分，共 10 題）</h3>'+
        '<p class="lead">請依照（　）裡的注音，在空格中寫出正確的國字。國字上方的注音可幫助你讀句子。</p>';
  items.forEach((it,i)=>{
    h+='<div class="q"><div class="q-text"><span class="qn">'+(i+1)+'.</span>'+
       it.tokens.map(tokHTML).join('')+'</div>'+
       reveal('<span class="ans">答案：<b>'+esc(it.ans)+'</b></span>　'+esc(it.ex))+'</div>';
  });
  return h+'</section>';
}
function secTwo(items){
  let h='<section class="section"><h3><span class="num">二</span> 改錯字（每題 10 分，共 10 題）</h3>'+
        '<p class="lead">下面每一句話都是 <b>20 個字</b>，句子裡藏著 <b>3 個錯字</b>。請把錯字圈出來，並在旁邊寫出正確的字。</p>';
  items.forEach((it,i)=>{
    const pairs=it.errs.map(e=>'<span class="pair"><span class="wrong">'+esc(e[0])+'</span>→<span class="right">'+esc(e[1])+'</span></span>').join('');
    h+='<div class="q"><div class="q-text"><span class="qn">'+(i+1)+'.</span></div>'+
       '<div class="fix-line">'+(it.toks?it.toks.map(t=>t.c!==undefined?'<ruby>'+esc(t.c)+'<rt>'+esc(t.z)+'</rt></ruby>':esc(t.t)).join(''):esc(it.s))+'</div>'+
       reveal('<div class="fix-correct">'+pairs+'</div>'+esc(it.ex))+'</div>';
  });
  return h+'</section>';
}

}

  // 模式二
  h+='<div class="pattern-box"><div class="ptitle">模式二　疊詞 ＋ 心情</div>'+
     '<div class="demo">我們<ruby>說<rt>ㄕㄨㄛ</rt></ruby>說<ruby>笑<rt>ㄒㄧㄠˋ</rt></ruby>笑，好歡喜。</div></div>';
  five.mode2.forEach((it,i)=>{
    h+='<div class="q"><div class="pat-q"><span class="qn">'+(i+4)+'.</span>'+
       esc(it.pre)+blanks(it.blanks)+esc(it.post)+'</div>'+
       reveal('參考答案：'+esc(it.pre)+'<b>'+esc(it.ans)+'</b>'+esc(it.post)+'（第十課句型「疊詞＋心情」）')+'</div>';
  });
  return h+'</section>';
}

function infoBar(){
  return '<div class="info-bar"><span>班級：______　座號：______</span>'+
         '<span>姓名：________________</span><span>分數：__________</span></div>';
}
function render(){
  const p=PAPERS[cur];
  document.getElementById('paper-title').textContent='第 '+p.n+' 卷';
  document.getElementById('paper-content').innerHTML=
     infoBar()+secOne(p.one)+secTwo(p.two)+secThree(p.three)+secFour(p.four)+secFive(p.five);
  document.querySelectorAll('#picker button').forEach((b,i)=>b.classList.toggle('active',i===cur));
}
function pick(i){cur=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function tg(btn){const ex=btn.nextElementSibling;ex.classList.toggle('show');
  btn.classList.toggle('open');btn.textContent=btn.classList.contains('open')?'收合解析':'查看解析';}
function toggleAll(){
  const bs=document.querySelectorAll('.reveal');
  const anyClosed=[...bs].some(b=>!b.classList.contains('open'));
  bs.forEach(b=>{const ex=b.nextElementSibling;
    if(anyClosed){ex.classList.add('show');b.classList.add('open');b.textContent='收合解析';}
    else{ex.classList.remove('show');b.classList.remove('open');b.textContent='查看解析';}});
}
// build picker
const pk=document.getElementById('picker');
PAPERS.forEach((p,i)=>{const b=document.createElement('button');b.textContent='卷'+p.n;
  b.onclick=()=>pick(i);pk.appendChild(b);});
render();
</script>
</body>
