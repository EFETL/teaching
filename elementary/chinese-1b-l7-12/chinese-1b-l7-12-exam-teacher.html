<style>
  :root{--primary:#e08a3c;--primary-dark:#c06a22;--accent:#4f9d8a;--accent-light:#e6f1ee;
    --bg:#fdf8f2;--card:#fff;--line:#eaddcf;--text:#3a332e;--muted:#8a7d72;--ok:#2e7d5b;--no:#c0392b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.85;font-size:18px;}
  .wrap{max-width:880px;margin:0 auto;padding:22px 20px 90px;}
  header.hero{background:linear-gradient(135deg,var(--primary),#eaa861);color:#fff;
    border-radius:20px;padding:22px 26px;box-shadow:0 6px 18px rgba(224,138,60,.25);}
  header.hero h1{margin:0 0 6px;font-size:18px;letter-spacing:1px;}
  header.hero .sub{font-size:16px;opacity:.95;line-height:1.7;}
  .teacher-badge{display:inline-block;background:#fff;color:var(--primary-dark);font-weight:700;
    border-radius:20px;padding:2px 12px;font-size:16px;margin-top:8px;}
  .picker{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 6px;}
  .picker button{border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit;
    font-size:16px;padding:7px 14px;border-radius:10px;color:var(--text);transition:.12s;}
  .picker button:hover{border-color:var(--primary);}
  .picker button.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700;}
  .back-menu{display:inline-flex;align-items:center;gap:5px;text-decoration:none;border:1px solid var(--accent);
    background:var(--accent-light);color:var(--accent);font-size:16px;font-weight:700;padding:7px 14px;
    border-radius:10px;margin-right:4px;transition:.12s;}
  .back-menu:hover{background:var(--accent);color:#fff;}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0;}
  .toolbar button{border:none;cursor:pointer;font-size:16px;font-family:inherit;padding:10px 18px;
    border-radius:30px;font-weight:600;transition:.15s;}
  .btn-print{background:var(--primary);color:#fff;}
  .btn-print:hover{background:var(--primary-dark);}
  .btn-toggle{background:var(--accent);color:#fff;}
  .hint{font-size:16px;color:var(--muted);margin:4px 0 0;}
  .paper-head{margin:16px 0 4px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .paper-head h2{margin:0;font-size:18px;color:var(--primary-dark);}
  .paper-head .tag{font-size:16px;color:var(--muted);}
  .info-bar{display:flex;gap:18px;flex-wrap:wrap;border:1px dashed var(--line);border-radius:12px;
    padding:10px 18px;margin:14px 0;font-size:16px;color:#5a5048;}
  .info-bar span{flex:1;min-width:120px;}
  .section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 22px;
    margin:18px 0;box-shadow:0 2px 8px rgba(0,0,0,.03);}
  .section>h3{margin:0 0 6px;font-size:18px;color:var(--primary-dark);display:flex;align-items:center;gap:10px;}
  .section>h3 .num{background:var(--primary);color:#fff;border-radius:8px;font-size:16px;padding:2px 10px;flex:none;}
  .section>h3 .pts{font-size:16px;color:var(--muted);font-weight:400;margin-left:auto;}
  .section .lead{font-size:16px;color:var(--muted);margin:0 0 12px;}
  .q{padding:9px 0;border-top:1px dashed var(--line);}
  .q:first-of-type{border-top:none;}
  .q-text{font-size:18px;}
  .q-text .qn{color:var(--primary);font-weight:700;margin-right:6px;}
  .zhuyin{color:var(--accent);font-weight:700;background:var(--accent-light);padding:1px 8px;
    border-radius:6px;font-size:16px;letter-spacing:2px;}
  ruby{margin:0 1px;}ruby rt{font-size:.5em;color:var(--accent);font-weight:600;letter-spacing:0;line-height:1;}
  .blank{display:inline-block;min-width:46px;border-bottom:2px solid var(--primary);margin:0 4px;
    vertical-align:bottom;height:1.2em;}
  .blank-sm{min-width:70px;}.blank-zhu{min-width:120px;}
  .blank-lg{display:block;width:100%;border-bottom:2px dashed var(--line);height:1.7em;margin-top:10px;}
  .arrow{color:var(--primary);font-weight:700;margin:0 4px;}
  .opts{margin:6px 0 2px;display:flex;flex-direction:column;gap:3px;}
  .opts label{font-size:17px;}
  .opts .ch{display:inline-block;width:1.6em;color:var(--primary);font-weight:700;}
  .judge-box{display:inline-block;border:1px solid var(--line);border-radius:6px;min-width:2.4em;
    text-align:center;padding:0 6px;margin-left:8px;}
  .choices{color:var(--muted);font-size:16px;margin-left:6px;}
  .reading{background:#fffdf8;border:1px solid var(--line);border-radius:12px;padding:14px 18px;
    margin:6px 0 12px;font-size:18px;line-height:2.7;}
  .reading .rtitle{font-weight:700;color:var(--primary-dark);font-size:17px;margin-bottom:6px;line-height:1.6;}
  .reveal{margin-top:8px;border:none;cursor:pointer;font-family:inherit;background:var(--accent-light);
    color:var(--accent);padding:5px 14px;border-radius:20px;font-size:16px;font-weight:600;}
  .reveal::before{content:"▸ ";}.reveal.open::before{content:"▾ ";}
  .explain{display:none;margin-top:8px;padding:9px 15px;background:#fbf4ea;border-left:4px solid var(--primary);
    border-radius:0 10px 10px 0;font-size:16px;color:#4a4038;}
  .explain.show{display:block;}
  .explain b{color:var(--primary-dark);}.explain .ans{font-size:17px;}
  .ok{color:var(--ok);font-weight:700;}.no{color:var(--no);font-weight:700;}
  footer.foot{text-align:center;color:var(--muted);font-size:16px;margin-top:28px;}
  .print-pagenum{display:none;}
  @media print{
    @page{margin:1.4cm 1.2cm 1.5cm;}
    body{background:#fff;font-size:16px;line-height:1.5;}
    .wrap{max-width:none;padding:0;}
    .picker,.toolbar,.hint,.reveal,footer.foot,.teacher-badge{display:none !important;}
    body:not(.teacher) .explain{display:none !important;}
    body.teacher .explain{display:block !important;margin-top:2px;padding:2px 9px;background:#eee;
      border-left:3px solid #555;border-radius:0;color:#000;font-size:16px;line-height:1.45;break-inside:avoid;}
    body.teacher .explain .ans{font-size:16px;}
    body.teacher .ok{color:#000;}body.teacher .no{color:#000;}
    header.hero{background:none;color:#000;box-shadow:none;border:none;border-bottom:2px solid #000;
      border-radius:0;padding:0 0 5px;margin-bottom:5px;}
    header.hero h1{font-size:18px;}
    header.hero .sub{opacity:1;font-size:16px;}
    .info-bar{padding:6px 12px;margin:8px 0;font-size:16px;border-style:solid;}
    .paper-head{margin:8px 0 2px;}.paper-head h2{color:#000;font-size:17px;}.paper-head .tag{font-size:16px;}
    .section{border:none;box-shadow:none;border-radius:0;padding:2px 0;margin:7px 0;}
    .section>h3{color:#000;border-bottom:1px solid #000;padding-bottom:2px;font-size:16px;margin-bottom:3px;break-after:avoid;}
    .section>h3 .num{background:#000;color:#fff;}
    .section .lead{font-size:16px;margin-bottom:4px;}
    .q{break-inside:avoid;padding:2px 0;border-top:none;}
    .q-text{font-size:16px;line-height:1.55;}
    .compact .qlist{column-count:2;column-gap:26px;}
    .opts{flex-direction:row;flex-wrap:wrap;gap:3px 16px;margin:3px 0;}
    .opts label{font-size:16px;}
    .blank-lg{height:1.5em;margin-top:6px;}
    .zhuyin{background:none;color:#000;border:1px solid #999;padding:0 4px;}
    .reading{background:none;border:1px solid #000;line-height:2.1;font-size:16px;padding:6px 10px;margin:4px 0 8px;}
    .reading .rtitle{font-size:16px;}
    ruby rt{color:#000;}

  }
</style>

    reveal('答案：<b>'+esc(it.ans)+'</b>　'+esc(it.ex||''))+'</div>';});return h+'</div></section>';}

function da8(items){let h=head('八','造句','每題3分／6分')+'<p class="lead">請用指定的句型，各寫出一個通順的句子。</p>';
  items.forEach((it,i)=>{h+='<div class="q"><div class="q-text"><span class="qn">'+(i+1)+'.</span>用「<b>'+esc(it.pattern)+'</b>」造句。</div><div class="blank-lg"></div>'+
    reveal(esc(it.ex))+'</div>';});return h+'</section>';}

function da9(d){let h=head('九','閱讀測驗','每題2分／10分')+'<p class="lead">請先讀短文，再回答下面的問題。</p>';
  h+='<div class="reading"><div class="rtitle">'+esc(d.title)+'</div>'+d.toks.map(tokHTML).join('')+'</div><div class="qlist">';
  d.qs.forEach((it,i)=>{const o=it.opts.map((x,j)=>'<label><span class="ch">'+CIR[j]+'</span>'+esc(x)+'</label>').join('');
    h+='<div class="q"><div class="q-text"><span class="qn">'+(i+1)+'.</span>（　）'+esc(it.q)+'</div><div class="opts">'+o+'</div>'+
    reveal('<span class="ans">答案：<b>'+CIR[it.ans]+'</b></span>　'+esc(it.ex))+'</div>';});return h+'</div></section>';}

function infoBar(){return '<div class="info-bar"><span>班級：________</span><span>座號：______</span><span>姓名：____________</span><span>分數：________</span></div>';}
function render(){const p=PAPERS[cur];document.getElementById('paper-title').textContent='第 '+p.n+' 卷';
  document.getElementById('paper-content').innerHTML=infoBar()+da1(p.da1)+da2(p.da2)+da3(p.da3)+da4(p.da4)+da5(p.da5)+da6(p.da6)+da7(p.da7)+da8(p.da8)+da9(p.da9);
  document.querySelectorAll('#picker button').forEach((b,i)=>b.classList.toggle('active',i===cur));
  if(TEACHER)document.querySelectorAll('.reveal').forEach(b=>{b.nextElementSibling.classList.add('show');b.classList.add('open');b.textContent='收合解析';});}
function pick(i){cur=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function tg(b){b.nextElementSibling.classList.toggle('show');b.classList.toggle('open');b.textContent=b.classList.contains('open')?'收合解析':'查看解析';}
function toggleAll(){const bs=document.querySelectorAll('.reveal');const any=[...bs].some(b=>!b.classList.contains('open'));
  bs.forEach(b=>{const ex=b.nextElementSibling;if(any){ex.classList.add('show');b.classList.add('open');b.textContent='收合解析';}else{ex.classList.remove('show');b.classList.remove('open');b.textContent='查看解析';}});}
const pk=document.getElementById('picker');PAPERS.forEach((p,i)=>{const b=document.createElement('button');b.textContent='卷'+p.n;b.onclick=()=>pick(i);pk.appendChild(b);});
render();
</script>
</body></html>
