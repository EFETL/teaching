<!DOCTYPE html><html lang="zh-TW"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國文 互動學習｜全民補習班</title>
<style>
 :root{ --main:#b6322a; --main2:#e74c3c; --accent:#e6a800; --gold:#7b5600; --bg:#f6efe9; --line:#e7d6cf; }
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:#241a17;background:var(--bg);line-height:1.7;padding:0 0 60px;}
 header{background:linear-gradient(135deg,#a72b23,#e05a48);color:#fff;padding:30px 20px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.18);}
 header .crumb{font-size:14px;opacity:.9;margin-bottom:6px;}
 header h1{font-size:29px;margin-bottom:6px;}
 header p{font-size:17px;opacity:.95;}
 .backs{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
 .backs a{display:inline-block;color:#b6322a;background:#fff;border:2px solid #f0cfc8;border-radius:20px;padding:6px 16px;font-size:15px;text-decoration:none;}
 .backs a:hover{background:#fff3f0;}
 .wrap{max-width:900px;margin:0 auto;padding:22px 16px;}
 .intro{background:#fff;border-radius:12px;padding:16px 22px;margin-bottom:22px;box-shadow:0 1px 6px rgba(0,0,0,.07);font-size:16px;}
 .intro b{color:var(--main);}
 .range{font-size:13px;color:#7a5b4f;background:#fbf3ec;border:1px dashed #e0c4b4;border-radius:10px;padding:8px 12px;margin:0 0 18px;}
 /* 縮圖字卡 */
 .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
 .tcard{display:block;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;text-decoration:none;color:#241a17;box-shadow:0 2px 10px rgba(120,40,30,.08);transition:transform .15s,box-shadow .15s;}
 .tcard:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(120,40,30,.18);}
 .tcard .thumb{display:block;width:100%;height:170px;background:#fff;}
 .tcard .cap{padding:14px 16px;}
 .tcard .cap h3{font-size:21px;color:var(--main);margin-bottom:4px;}
 .tcard .cap p{font-size:14px;color:#6b5249;}
 .tcard .cap .go{display:inline-block;margin-top:10px;background:var(--main);color:#fff;border-radius:18px;padding:5px 14px;font-size:14px;}
 /* 10 回 grid */
 .rounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
 .rcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 6px rgba(120,40,30,.07);}
 .rcard h3{color:var(--main);font-size:19px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
 .rcard h3 .b{background:var(--main);color:#fff;border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;}
 .rcard h3 .bdg{font-size:11px;font-weight:500;background:#fbeee9;color:var(--main);border:1px solid #f0cfc8;border-radius:10px;padding:1px 7px;margin-left:auto;}
 .rcard a.lk{display:inline-block;margin:3px 5px 3px 0;font-size:14px;text-decoration:none;border-radius:18px;padding:6px 12px;}
 .lk-int{background:var(--main);color:#fff;}
 .lk-pdf{background:#fbeee9;color:var(--main);border:1px solid #f0cfc8;}
 footer{text-align:center;color:#a98a7d;font-size:14px;margin-top:34px;}
 @media (max-width:560px){header h1{font-size:23px;}}
</style></head><body>
