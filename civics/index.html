<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公民科 互動學習</title>
<style>
  :root { --main:#2c5f8a; --accent:#e6a800; --subject:#1abc9c; --bg:#eef3f9; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:#1a1a1a; background:var(--bg); line-height:1.7; padding:0 0 60px; }
  header { background:linear-gradient(135deg,#2c5f8a,#3d7cb0); color:#fff; padding:30px 20px 26px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.18); }
  header h1 { font-size:30px; margin-bottom:8px; }
  header p { font-size:18px; opacity:.95; }
  .back { display:inline-block; margin:16px auto 0; color:#2c5f8a; background:#fff; border:2px solid #cdddef; border-radius:20px; padding:6px 16px; font-size:16px; text-decoration:none; }
  .back:hover { background:#eef6ff; }
  .wrap { max-width:960px; margin:0 auto; padding:28px 16px; }
  .intro { background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:28px; box-shadow:0 1px 6px rgba(0,0,0,.07); font-size:18px; }
  .intro b { color:var(--main); }

  /* ── 縮圖卡片格 ─────────────────── */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:24px; }

  .book-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 14px rgba(0,0,0,.10); transition:transform .18s,box-shadow .18s; }
  .book-card:hover { transform:translateY(-5px); box-shadow:0 8px 28px rgba(0,0,0,.16); }
  .book-card.coming { opacity:.88; }
  .book-card.coming:hover { transform:none; box-shadow:0 2px 14px rgba(0,0,0,.10); }

  .thumb-link { display:block; text-decoration:none; }
  .thumb { width:100%; aspect-ratio:3/2; overflow:hidden; display:block; }
  .thumb svg { width:100%; height:100%; display:block; }

  .card-body { padding:16px 20px 22px; }
  .card-body h3 { font-size:20px; font-weight:bold; color:#1a1a1a; margin-bottom:6px; }
  .card-body p { font-size:15px; color:#556; margin-bottom:14px; min-height:2.2em; }

  .btn-enter { display:inline-block; background:var(--main); color:#fff; text-decoration:none; padding:9px 22px; border-radius:22px; font-size:16px; font-weight:bold; transition:background .15s; }
  .btn-enter:hover { background:#3d7cb0; }
  .btn-wait { display:inline-block; background:#ccc; color:#888; border:none; padding:9px 22px; border-radius:22px; font-size:16px; font-weight:bold; cursor:not-allowed; font-family:inherit; }

  footer { text-align:center; color:#789; font-size:15px; margin-top:36px; }
  @media (max-width:560px){ header h1{ font-size:24px; } .card-grid{ grid-template-columns:1fr; } }
</style>
</head>

  <h1>⚖️ 公民科 互動學習</h1>
  <p>teaching.efetl.com / 公民</p>
  <a class="back" href="../">← 回主選單</a>
</header>

  <div class="card-grid">
