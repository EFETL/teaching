<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公民下學期 複習考卷 | 互動練習</title>
<style>
:root{--red:#8b2326;--red2:#b03034;--cream:#f5f0e8;--card:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--cream);color:#1a1a1a;padding-bottom:60px;line-height:1.7;}
header{background:var(--red);color:#fff;padding:26px 18px 20px;text-align:center;}
header h1{font-size:26px;font-weight:bold;}
header p{font-size:16px;opacity:.9;margin-top:4px;}
.back{display:inline-block;margin-top:12px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 16px;font-size:14px;text-decoration:none;}
.back:hover{background:rgba(255,255,255,.3);}
.wrap{max-width:860px;margin:0 auto;padding:24px 14px;}
.scope-box{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:24px;font-size:15px;color:#444;box-shadow:0 1px 5px rgba(0,0,0,.07);border-left:4px solid var(--red);}
.scope-box b{color:var(--red);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.card{background:var(--card);border-radius:16px;padding:22px 18px 18px;box-shadow:0 2px 10px rgba(0,0,0,.09);display:flex;flex-direction:column;gap:12px;}
.card-head{display:flex;align-items:center;gap:10px;}
.badge{width:38px;height:38px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:bold;flex-shrink:0;}
.card-title{font-size:19px;font-weight:bold;letter-spacing:.03em;}
.tag{background:#fde8e8;color:var(--red);border-radius:20px;font-size:12px;padding:2px 9px;display:inline-block;margin-top:2px;}
.card-sub{font-size:13px;color:#667;min-height:36px;}
.play-btn{display:block;background:var(--red);color:#fff;text-align:center;border-radius:24px;padding:10px 0;font-size:16px;font-weight:bold;text-decoration:none;transition:background .12s;}
.play-btn:hover{background:var(--red2);}
footer{text-align:center;color:#999;font-size:14px;margin-top:30px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1>⚖️ 公民下學期 複習考卷</h1>
  <p>翰林版 | 七年級 | 三份平行考卷，每份 40 題</p>
  <a class="back" href="./index.html">← 回公民科選單</a>
</header>
<div class="wrap">
  <div class="scope-box">
    <b>命題範圍：</b>社會地位與流動、社會不公平議題（族群・性別・貧富・城鄉）、社會福利制度（保險・救助・津貼・服務・住宅・就業・醫療）
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-head">
        <div class="badge">1</div>
        <div>
          <div class="card-title">第 01 回</div>
          <span class="tag">40 題・含題組</span>
        </div>
      </div>
      <div class="card-sub">社會地位、社會流動、社會安全制度背景</div>
      <a class="play-btn" href="civics-s2-r1.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="badge">2</div>
        <div>
          <div class="card-title">第 02 回</div>
          <span class="tag">40 題・含題組</span>
        </div>
      </div>
      <div class="card-sub">族群・性別・貧富差距・城鄉差距不公平</div>
      <a class="play-btn" href="civics-s2-r2.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="badge">3</div>
        <div>
          <div class="card-title">第 03 回</div>
          <span class="tag">40 題・含題組</span>
        </div>
      </div>
      <div class="card-sub">社會福利各類措施辨別與特性</div>
      <a class="play-btn" href="civics-s2-r3.html">▶ 互動練習</a>
    </div>
  </div>
  <footer>全民補習班線上教學 | teaching.efetl.com</footer>
</div>
</body>
</html>
