<style>

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "關於生物分類階層由大到小的排列，下列何者正確？", "opts": ["種→屬→科→目→綱→門→界", "界→綱→門→目→科→種→屬", "門→界→綱→目→屬→科→種", "界→門→綱→目→科→屬→種"], "ans": 3, "exp": "分類階層由大到小為界→門→綱→目→科→屬→種，種是最基本單位；越下層親緣越近、種類越少。(課本對應：cls 分類階層)"}, {"tid": "cls", "q": "關於林奈二名法，下列敘述何者正確？", "opts": ["同一屬名的生物彼此親緣關係最遠", "學名由科名加屬名組成，用中文書寫即可", "學名由屬名加種小名組成，以拉丁文斜體書寫且屬名首字母大寫", "學名第一個字是種小名，第二個字才是屬名"], "ans": 2, "exp": "二名法的學名＝屬名＋種小名，拉丁文斜體、屬名首字母大寫；同屬生物親緣較近。(課本對應：cls 二名法)"}, {"tid": "cls", "q": "下列名字中有「魚」字的生物，何者真正屬於魚類？", "opts": ["鯊魚", "鯨魚", "鱷魚", "章魚"], "ans": 0, "exp": "鯊魚屬軟骨魚，是真正的魚類；鯨魚是哺乳類、章魚是軟體動物、鱷魚是爬蟲類。分類依構造與親緣而非名稱。(課本對應：cls 名稱陷阱)"}, {"tid": "plant", "q": "關於蘚苔植物的特徵，下列敘述何者正確？", "opts": ["有花有果實，種子被果實包住", "無維管束、無真正根莖葉，受精需以水為媒介，是最早登陸的植物", "以種子繁殖，靠毬果生殖", "具有維管束與真正的根莖葉，故能長得高大"], "ans": 1, "exp": "蘚苔（如地錢、土馬騌）無維管束、僅有假根，受精需水，是最早登陸的植物；有維管束是蕨類以上，種子是裸子被子。(課本對應：plant 蘚苔)"}, {"tid": "plant", "q": "蕨類植物在演化上的重要地位是？", "opts": ["最早出現的會行光合作用的生物", "最早演化出種子，可不靠水受精", "最早具有花和果實的植物", "最早演化出維管束，有真正根莖葉但仍以孢子繁殖"], "ans": 3, "exp": "蕨類（如腎蕨、山蘇）最早演化出維管束、有真正根莖葉，但無種子、以孢子繁殖且受精仍需水。(課本對應：plant 蕨類)"}, {"tid": "plant", "q": "裸子植物與被子植物最主要的差異是？", "opts": ["裸子植物無維管束，被子植物有維管束", "裸子植物胚珠裸露、無花無果實，被子植物有花且果實包住種子", "裸子植物以孢子繁殖，被子植物以種子繁殖", "裸子植物有花有果實，被子植物沒有"], "ans": 1, "exp": "裸子植物（松、杉）胚珠裸露、無真正的花與果實、以毬果生殖；被子植物有花、種子由子房發育的果實包住。兩者都有維管束與種子。(課本對應：plant 裸子/被子)"}, {"tid": "plant", "q": "下列關於單子葉植物特徵的組合，何者完全正確？", "opts": ["子葉2片、軸根、網狀脈、花瓣4或5", "子葉2片、鬚根、平行脈、花瓣5", "子葉1片、軸根、網狀脈、花瓣4", "子葉1片、鬚根、平行脈、花瓣3或3的倍數"], "ans": 3, "exp": "單子葉（玉米、稻、百合）子葉1片、鬚根、平行脈、花瓣3或其倍數、維管束散生；雙子葉則子葉2、軸根、網狀脈、花瓣4或5及其倍數。(課本對應：plant 單/雙子葉)"}, {"tid": "plant", "q": "仙人掌雖然生長在乾旱沙漠且有針狀葉，仍被歸為被子植物的主要依據是？", "opts": ["它的莖肥大可儲水", "它會開花並結出包住種子的果實", "它的葉退化成針狀以耐旱", "它生長在沙漠這種特殊環境"], "ans": 1, "exp": "植物分類依構造特徵，仙人掌會開花結果、種子有果實保護，故為被子植物；肥莖與針葉只是耐旱適應，不能作分類依據。(課本對應：plant 被子判定)"}, {"tid": "inv", "q": "水螅、水母、海葵與珊瑚共同具有的特徵是？", "opts": ["體表有管足、僅生活於海洋", "具外骨骼、會蛻皮", "身體分許多相似環節並具剛毛", "具刺絲胞可捕食、輻射對稱、有口無肛門"], "ans": 3, "exp": "它們都屬刺絲胞動物，具刺絲胞捕食、輻射對稱、有口無肛門，可行出芽生殖；分節剛毛是環節、外骨骼蛻皮是節肢、管足是棘皮。(課本對應：inv 刺絲胞)"}, {"tid": "inv", "q": "渦蟲、絛蟲、吸蟲共同屬於哪一動物門，且具有什麼特徵？", "opts": ["棘皮動物，體表具棘與管足", "環節動物，身體分節並具剛毛", "軟體動物，身體柔軟不分節", "扁形動物，身體背腹扁平、有口無肛門"], "ans": 3, "exp": "渦蟲、絛蟲、吸蟲為扁形動物，身體背腹扁平、有口無肛門，渦蟲可再生、絛蟲與吸蟲營寄生。(課本對應：inv 扁形)"}, {"tid": "inv", "q": "文蛤、蝸牛、章魚、烏賊共同屬於哪一類動物？", "opts": ["刺絲胞動物，具刺絲胞捕食", "環節動物，身體分許多相似環節", "節肢動物，具外骨骼會蛻皮", "軟體動物，身體柔軟不分節、多具外套膜"], "ans": 3, "exp": "文蛤、蝸牛、章魚、烏賊都是軟體動物，身體柔軟不分節、多具外套膜，有的有殼有的無殼。(課本對應：inv 軟體)"}, {"tid": "inv", "q": "關於節肢動物，下列敘述何者正確？", "opts": ["僅生活於海洋，體表有管足", "具外骨骼、身體與附肢分節、會蛻皮，是種類數量最多的動物門", "有口無肛門，可行出芽生殖", "身體柔軟不分節，是種類最多的動物"], "ans": 1, "exp": "節肢動物（昆蟲、蜘蛛、蝦蟹、蜈蚣）具外骨骼、身體與附肢分節、會蛻皮，是動物界種類最多的門。(課本對應：inv 節肢)"}, {"tid": "inv", "q": "海星、海膽、海參的共同特徵是？", "opts": ["具外骨骼、身體分節、會蛻皮", "身體柔軟不分節、具外套膜", "具管足、體表多有棘、僅生活於海洋", "具刺絲胞、輻射對稱、有口無肛門"], "ans": 2, "exp": "海星、海膽、海參屬棘皮動物，具管足、體表多棘、成體五輻對稱，且僅生活於海洋。(課本對應：inv 棘皮)"}, {"tid": "inv", "q": "下列關於無脊椎動物身體是否分節的比較，何者正確？", "opts": ["蚯蚓與章魚的身體都分節", "蚯蚓的身體不分節，章魚的身體分節", "蚯蚓與章魚的身體都不分節", "蚯蚓的身體分節，章魚的身體不分節"], "ans": 3, "exp": "蚯蚓是環節動物，身體分許多相似環節；章魚是軟體動物，身體柔軟不分節。(課本對應：inv 環節/軟體比較)"}, {"tid": "vert", "q": "爬蟲類比兩生類更能適應陸地生活，下列何者是關鍵原因？", "opts": ["幼體用鰓呼吸，成體用肺與皮膚呼吸", "為內溫動物，可維持恆定體溫", "體內受精且卵具殼，體表有鱗片或骨板可減少水分散失", "體外受精且卵無殼，皮膚裸露濕潤"], "ans": 2, "exp": "爬蟲類體內受精、卵具殼，可不必回水中生殖，體表鱗片或骨板減少水分散失、用肺呼吸，故較兩生類適應陸地；兩生類卵無殼、皮膚裸露需保濕。(課本對應：vert 爬蟲適應)"}, {"tid": "vert", "q": "關於軟骨魚（如鯊魚、魟魚）與硬骨魚的比較，下列何者正確？", "opts": ["軟骨魚為內溫動物，硬骨魚為外溫動物", "軟骨魚有鰓裂、無鰓蓋、無鰾；硬骨魚有鰓蓋與鰾", "兩者都無鰓蓋但都有鰾", "軟骨魚有鰓蓋與鰾；硬骨魚無"], "ans": 1, "exp": "軟骨魚骨骼為軟骨、有鰓裂、無鰓蓋也無鰾；硬骨魚則有鰓蓋與鰾。兩者皆為外溫的魚類。(課本對應：vert 軟骨/硬骨魚)"}, {"tid": "vert", "q": "鴨嘴獸與針鼴雖然會下蛋，仍被歸為哺乳類的主要依據是？", "opts": ["為外溫動物", "體表覆蓋鱗片", "以卵生方式繁殖", "具有乳腺能分泌乳汁哺育幼體"], "ans": 3, "exp": "鴨嘴獸、針鼴雖卵生，但具乳腺哺乳、有毛髮、為內溫動物，故屬哺乳類；卵生並非哺乳類的判定依據。(課本對應：vert 哺乳特例)"}, {"tid": "vert", "q": "下列哪一組動物全部都屬於哺乳類？", "opts": ["蝙蝠、企鵝、青蛙", "鯨、鱷魚、海豚", "海豚、蝙蝠、鯨", "企鵝、海豚、鯨"], "ans": 2, "exp": "海豚、蝙蝠、鯨皆為胎生哺乳、用肺呼吸的哺乳類；企鵝是鳥類、青蛙是兩生類、鱷魚是爬蟲類。(課本對應：vert 易混淆動物)"}, {"tid": "vert", "q": "下列關於鳥類飛行適應的敘述，何者「錯誤」？", "opts": ["具氣囊輔助呼吸，可進行雙重呼吸", "骨骼中空而輕", "瞬膜的主要功能是提供飛行升力", "前肢特化為翼"], "ans": 2, "exp": "瞬膜是保護眼睛的構造，與飛行升力無關，故為錯誤敘述；前肢成翼、骨骼中空、氣囊雙重呼吸才是飛行適應。(課本對應：vert 鳥類飛行)"}, {"tid": "vert", "q": "依親緣關係判斷，下列哪兩種動物的關係最接近？", "opts": ["鱷魚與烏龜（皆為爬蟲類）", "青蛙與鯊魚", "烏龜與麻雀", "鱷魚與青蛙"], "ans": 0, "exp": "鱷魚與烏龜同屬爬蟲類，親緣最近；青蛙是兩生、麻雀是鳥、鯊魚是魚，分屬不同類群關係較遠。(課本對應：vert 親緣關係)"}, {"tid": "pop", "q": "關於「族群」與「群集」的定義，下列何者正確？", "opts": ["族群是群集加上非生物環境", "族群包含不同種生物，群集只含同種生物", "族群是同一時間、同一區域內同種生物所有個體；群集是同一區域內所有不同族群的總合", "群集只是單一物種的所有個體"], "ans": 2, "exp": "族群＝同一時間、同一區域的同種個體；群集＝同一區域內所有不同種族群的總合；再加非生物環境才是生態系。(課本對應：pop 族群/群集)"}, {"tid": "pop", "q": "某地某種生物族群數量穩定（呈動態平衡），表示下列哪一關係成立？", "opts": ["出生＋遷入＞死亡＋遷出", "只看出生數等於死亡數即可，與遷移無關", "出生＋遷入＜死亡＋遷出", "出生＋遷入＝死亡＋遷出"], "ans": 3, "exp": "族群數量取決於出生、死亡、遷入、遷出；當出生＋遷入＝死亡＋遷出時數量穩定（動態平衡），大於則增加、小於則減少。(課本對應：pop 數量變化)"}, {"tid": "pop", "q": "關於環境負荷量（容納量）與族群成長，下列敘述何者正確？", "opts": ["達負荷量後族群數量會持續快速上升", "負荷量是族群成長初期的最低數量", "負荷量是環境能長期維持的某族群最大數量，族群常在其上下波動，呈S型成長", "族群可無限制呈指數成長而不受環境限制"], "ans": 2, "exp": "環境負荷量是環境能長期維持的最大族群數量；S型成長曲線初期緩慢、中期快速、達負荷量後趨平並上下波動。(課本對應：pop 負荷量)"}, {"tid": "pop", "q": "研究人員想估計某湖中鯽魚數量，先捕捉並標記80尾放回，待充分混合後再捕捉100尾，其中有20尾帶標記。依標識再捕法，該湖鯽魚總數約為多少尾？", "opts": ["500", "400", "200", "160"], "ans": 1, "exp": "標識再捕法：總數＝標記數×再捕總數÷再捕中標記數＝80×100÷20＝400尾。此法適用能自由活動並與族群混合的動物。(課本對應：pop 標識再捕)"}, {"tid": "pop", "q": "某研究員在草地上隨機取3個面積相同的樣區調查某種草，株數分別為27、32、31株，每樣區面積1平方公尺，整片草地共15平方公尺。以樣區法估計，總株數約為？", "opts": ["300", "90", "270", "450"], "ans": 3, "exp": "平均每樣區株數＝(27+32+31)/3＝30株；總數＝30×(總面積15÷樣區面積1)＝450株。植物固著，適用樣區法。(課本對應：pop 樣區法)"}, {"tid": "pop", "q": "下列哪一種情況「不適合」用標識再捕法估算族群數量？", "opts": ["樹林裡的麻雀", "湖中的吳郭魚", "紅樹林中的水筆仔植株", "草原上的野兔"], "ans": 2, "exp": "標識再捕法適用能自由活動並與族群混合的動物；水筆仔是固著植物，應改用樣區法。(課本對應：pop 估算法適用對象)"}, {"tid": "pop", "q": "火山爆發後形成的裸地，其群集演替（消長）的先驅生物通常是？", "opts": ["灌木叢", "高大的喬木", "落葉闊葉樹", "地衣與苔蘚"], "ans": 3, "exp": "初級演替常由地衣、苔蘚等先驅生物開始，再依序發展為草本→灌木→喬木森林。(課本對應：pop 群集演替)"}, {"tid": "inter", "q": "小丑魚住在海葵的觸手間躲避敵害，同時幫海葵驅趕掠食者並引來食物，雙方皆受益。這屬於哪一種交互作用？", "opts": ["掠食", "互利共生", "片利共生", "寄生"], "ans": 1, "exp": "雙方皆受益（＋／＋）為互利共生；片利共生是一方得利另一方無影響、寄生是一害一利、掠食是捕食者得利被食者受害。(課本對應：inter 互利共生)"}, {"tid": "inter", "q": "鮣魚以吸盤附著在鯊魚身上獲得搭便車與食物殘渣，對鯊魚則無明顯影響。這屬於哪一種交互作用？", "opts": ["片利共生", "寄生", "互利共生", "競爭"], "ans": 0, "exp": "一方受益、另一方無明顯影響（＋／0）為片利共生，如鯊魚與鮣魚、鯨與藤壺。(課本對應：inter 片利共生)"}, {"tid": "inter", "q": "菟絲子纏繞在宿主植物上，吸取宿主養分而使宿主受害。這屬於哪一種交互作用？", "opts": ["寄生", "片利共生", "互利共生", "掠食"], "ans": 0, "exp": "寄生者受益、宿主受害（＋／−）為寄生，如菟絲子與宿主、跳蚤與宿主。(課本對應：inter 寄生)"}, {"tid": "inter", "q": "將兩種草履蟲養在同一容器中，因爭奪相同的食物與空間，使雙方的生長曲線都下降。這屬於哪一種交互作用？", "opts": ["掠食", "競爭", "片利共生", "互利共生"], "ans": 1, "exp": "爭奪相同有限資源使雙方皆受影響（−／−）為競爭；混養生長曲線雙雙下降即是競爭的典型現象。(課本對應：inter 競爭)"}, {"tid": "inter", "q": "農民釋放瓢蟲來捕食危害作物的蚜蟲，以減少農藥使用。這種防治方式稱為？", "opts": ["以化學農藥防治", "以優養化方式防治", "互利共生防治", "生物防治，利用天敵控制有害生物"], "ans": 3, "exp": "利用天敵（掠食、寄生或競爭）控制有害生物稱生物防治，如瓢蟲治蚜蟲、蓋斑鬥魚吃孑孓；不可用互利共生來防治。(課本對應：inter 生物防治)"}, {"tid": "energy", "q": "關於大多數生態系的能量來源與生產者，下列敘述何者正確？", "opts": ["所有生態系都必須靠陽光，無例外", "消費者透過捕食把熱能轉成光能供生產者使用", "太陽是最終能量來源，生產者行光合作用把光能轉成化學能", "分解者是生態系最終的能量來源"], "ans": 2, "exp": "太陽是大多數生態系的最終能量來源，生產者行光合作用把光能轉成化學能；深海熱泉的硫化菌則以化學能為來源是例外。(課本對應：energy 能量來源)"}, {"tid": "energy", "q": "在能量塔（能量金字塔）中，能量由低營養階層傳到高一階時，下列敘述何者正確？", "opts": ["可用能量約只剩10%，其餘約90%以呼吸作用與熱能散失", "能量會增加為原來的10倍", "能量可由高階回流到低階，形成循環", "能量完全傳遞給上一階，毫無損失"], "ans": 0, "exp": "每升高一個營養階層，可用能量約只剩10%，約90%以呼吸作用與熱能散失，故能量塔底寬頂窄、階層通常不超過4~5階。(課本對應：energy 10%法則)"}, {"tid": "energy", "q": "若生產者固定的能量為5000大卡，依10%法則，傳到第四級消費者時，可利用的能量約為多少大卡？", "opts": ["5", "50", "500", "0.5"], "ans": 3, "exp": "每升一階×1/10，生產者→第四級消費者共升4階：5000×0.1×0.1×0.1×0.1＝0.5大卡。(課本對應：energy 能量塔計算)"}, {"tid": "energy", "q": "關於食物鏈與食物網，下列敘述何者正確？", "opts": ["食物網中能量可循環使用，不會散失", "食物鏈中能量由消費者流向生產者", "食物鏈的箭頭由捕食者指向被食者", "食物鏈是能量單向流動的攝食序列，食物網是多條食物鏈交織而成"], "ans": 3, "exp": "食物鏈是能量單向流動的攝食序列，箭頭由被食者指向捕食者；食物網是多條食物鏈交織。能量單向流動、逐級遞減、不能循環。(課本對應：energy 食物鏈網)"}, {"tid": "energy", "q": "圖中為某草原生態系的食物網（如圖）。下列敘述何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 330\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"330\" fill=\"#ffffff\"/><defs><marker id=\"fa\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 z\" fill=\"#444\"/></marker></defs><line x1=\"63\" y1=\"255\" x2=\"69\" y2=\"204\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"80\" y1=\"272\" x2=\"151\" y2=\"259\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"80\" y1=\"275\" x2=\"266\" y2=\"278\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"84\" y1=\"164\" x2=\"136\" y2=\"94\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"92\" y1=\"178\" x2=\"231\" y2=\"167\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"165\" y1=\"88\" x2=\"237\" y2=\"149\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"271\" y1=\"178\" x2=\"341\" y2=\"235\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"309\" y1=\"271\" x2=\"338\" y2=\"259\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"302\" y1=\"262\" x2=\"398\" y2=\"127\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"192\" y1=\"244\" x2=\"392\" y2=\"121\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"367\" y1=\"231\" x2=\"404\" y2=\"131\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><circle cx=\"60\" cy=\"275\" r=\"19\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"60\" y=\"280\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">草</text><circle cx=\"72\" cy=\"180\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"72\" y=\"185\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蝗蟲</text><circle cx=\"175\" cy=\"255\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"175\" y=\"260\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">兔</text><circle cx=\"290\" cy=\"278\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"290\" y=\"283\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">鼠</text><circle cx=\"150\" cy=\"75\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"150\" y=\"80\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蜘蛛</text><circle cx=\"255\" cy=\"165\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"255\" y=\"170\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">青蛙</text><circle cx=\"360\" cy=\"250\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"360\" y=\"255\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蛇</text><circle cx=\"412\" cy=\"108\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"412\" y=\"113\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">鷹</text><text x=\"230\" y=\"20\" font-size=\"13\" text-anchor=\"middle\" fill=\"#666\">（箭頭由被食者指向捕食者）</text></svg></div>", "opts": ["能量在此食物網中可循環流動", "草是消費者，蝗蟲是生產者", "鷹位於最低營養階層，可用能量最多", "箭頭由被食者指向捕食者，蛇與鷹都可能以鼠為食"], "ans": 3, "exp": "食物網中箭頭由被食者指向捕食者，草是生產者、蝗蟲等為消費者；鷹位於高階能量最少，能量單向流動不循環。(課本對應：energy 食物網判讀)"}, {"tid": "energy", "q": "深海熱泉附近沒有陽光，當地生態系的生產者主要依靠什麼來製造養分？", "opts": ["綠色植物行光合作用", "硫化菌利用硫化氫的化學能（化學自營）", "消費者捕食所得的能量", "分解者分解遺體釋出的熱能"], "ans": 1, "exp": "深海熱泉無陽光，由硫化菌（化學自營）以硫化氫的化學能製造養分，是不需陽光的特例。(課本對應：energy 化學自營)"}, {"tid": "cycle", "q": "關於碳循環中大氣二氧化碳的增減，下列敘述何者正確？", "opts": ["呼吸作用可減少大氣CO2", "分解作用只固碳不放碳", "光合作用可減少大氣CO2，呼吸、分解與燃燒會增加大氣CO2", "燃燒化石燃料不會影響碳循環"], "ans": 2, "exp": "減少大氣CO2靠光合作用（與溶於海水）；呼吸、分解、燃燒則釋出CO2。過度燃燒化石燃料使CO2上升、造成全球暖化。(課本對應：cycle 碳循環)"}, {"tid": "cycle", "q": "下表為某水域食物鏈中四種生物體內DDT的濃度（如表）。依生物放大作用，最高級消費者最可能是哪一種生物？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT濃度(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁", "丙", "甲", "乙"], "ans": 1, "exp": "難分解脂溶性毒物沿食物鏈逐級累積，營養階層越高濃度越高。由低到高為丁0.04→乙0.2→甲2.0→丙20，故丙是最高級消費者、丁是生產者。(課本對應：cycle 生物放大)"}, {"tid": "cycle", "q": "關於生物放大作用（生物濃縮），下列敘述何者正確？", "opts": ["水溶性、易分解的物質最容易被放大", "毒物在生產者體內濃度最高", "營養階層越高，毒物濃度越低", "難分解、脂溶性毒物沿食物鏈累積，營養階層越高體內濃度越高"], "ans": 3, "exp": "DDT、甲基汞、戴奧辛等難分解、脂溶性毒物會沿食物鏈逐級累積，高階生物濃度最高，如甲基汞累積導致水俁病。(課本對應：cycle 生物放大)"}, {"tid": "cycle", "q": "大量含氮、磷的家庭汙水或肥料流入湖泊後造成優養化，下列哪一項是其後果的正確描述？", "opts": ["湖水變得更清澈乾淨", "會使大氣中二氧化碳減少", "藻類大量繁殖遮光、夜間呼吸與分解耗氧，使水中溶氧大減導致魚蝦死亡", "水中溶氧大幅增加，魚蝦更易存活"], "ans": 2, "exp": "優養化是氮磷營養鹽過多使藻類大量繁殖（藻華），遮光使水下藻死亡、夜間呼吸與分解耗氧，溶氧大減導致魚蝦死亡、水質惡化。(課本對應：cycle 優養化)"}, {"tid": "eco", "q": "關於生物圈，下列敘述何者正確？", "opts": ["生物圈佔地球的比例非常大，幾乎涵蓋整個地球內部", "生物圈中生物分布極為平均，且範圍永不變動", "生物圈是地球上所有生物及其生存環境的總和，範圍約海平面上下各約1萬公尺，會隨生物發現或滅絕而改變", "生物圈範圍上下各約1萬公里，且月球也屬於生物圈"], "ans": 2, "exp": "生物圈是所有生物與其環境的總和，範圍約海平面上下各約1萬公尺、佔地球比例極小，會隨生物發現或滅絕而改變；上下各1萬公里、月球屬生物圈等皆錯。(課本對應：eco 生物圈)"}, {"tid": "eco", "q": "陸域生態系的分布主要受哪兩項環境因子影響？年雨量由少到多的排列為何？", "opts": ["溫度與雨量；沙漠＜草原＜森林", "雨量與海拔；沙漠＜森林＜草原", "陽光與土壤；森林＜草原＜沙漠", "溫度與鹽度；草原＜沙漠＜森林"], "ans": 0, "exp": "陸域生態系主要受溫度與雨量影響，年雨量由少到多為沙漠＜草原＜森林，森林與草原常以年雨量約750mm為分界。(課本對應：eco 陸域生態系)"}, {"tid": "eco", "q": "關於河口（半淡鹹水）生態系的敘述，下列何者正確？", "opts": ["為完全淡水環境，鹽度終年穩定不變", "海淡水交會、鹽度與水位變化大，常見紅樹林、招潮蟹與彈塗魚，以碎屑食物鏈為主", "位於大洋區無光帶，靠化學合成維生", "終年水位固定，無紅樹林生長"], "ans": 1, "exp": "河口是海淡水交會處，鹽度與水位變化大，有紅樹林（水筆仔、海茄苳）、招潮蟹、彈塗魚，以有機碎屑食物鏈為主。(課本對應：eco 河口)"}, {"tid": "eco", "q": "海洋依水深與光照可分區，下列哪一區是大陸棚上方、陽光可達、珊瑚礁與生物豐富的區域？", "opts": ["大洋區的無光帶", "潮間帶", "淺海區", "深海熱泉區"], "ans": 2, "exp": "淺海區位於大陸棚上方、陽光可達，珊瑚礁多、生物豐富，人工魚礁也多置於此；大洋區以水深約200公尺分透光與無光帶。(課本對應：eco 海洋分區)"}, {"tid": "conserv", "q": "關於生物多樣性的三個層次，下列配對何者正確？", "opts": ["遺傳多樣性指同種內的基因變異，物種多樣性指物種豐富度，生態系多樣性指棲地類型多樣", "物種多樣性指同一物種內的性狀差異", "遺傳多樣性指棲地多樣，生態系多樣性指基因變異", "三個層次都只描述物種數目的多寡"], "ans": 0, "exp": "生物多樣性三層次為遺傳（基因）多樣性、物種多樣性、生態系多樣性；多樣性越高，生態系越穩定、抵抗干擾能力越強。(課本對應：conserv 三層次)"}, {"tid": "conserv", "q": "下列哪一種生物是台灣的「外來入侵種」？", "opts": ["櫻花鉤吻鮭", "石虎", "黑面琵鷺", "福壽螺"], "ans": 3, "exp": "福壽螺是台灣常見外來入侵種；石虎、櫻花鉤吻鮭、黑面琵鷺都是本土（原生）種。引進外來種不會增加本地多樣性，反而常使本土種減少。(課本對應：conserv 外來種)"}, {"tid": "conserv", "q": "下列保育公約或組織的功能配對，何者正確？", "opts": ["華盛頓公約（CITES）管制瀕危野生動植物的國際貿易", "拉姆薩公約專為減少溫室氣體排放而訂", "IUCN紅皮書的功能是管制臭氧層破壞物質", "蒙特婁議定書管制瀕危動植物貿易"], "ans": 0, "exp": "CITES（華盛頓公約）管制瀕危野生動植物國際貿易；蒙特婁議定書保護臭氧層、拉姆薩公約保育溼地、IUCN紅皮書評估物種滅絕風險。(課本對應：conserv 保育公約)"}, {"tid": "conserv", "q": "環保「5R」原則中，下列何者正確？", "opts": ["Reduce、Remove、Replace、Refill、Return", "Recycle、Reset、Restart、Reload、Rewind", "Refuse拒用、Reduce減量、Reuse重複使用、Repair修復、Recycle回收", "Run、Read、Relax、Repeat、Recycle"], "ans": 2, "exp": "永續行動的5R為Refuse拒用、Reduce減量、Reuse重複使用、Repair修復、Recycle回收，可減少資源消耗與廢棄物。(課本對應：conserv 5R)"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
</html>
