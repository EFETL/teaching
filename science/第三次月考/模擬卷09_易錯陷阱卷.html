<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f2744;--gold:#e8a000;--teal:#0a7ea4;--green:#15803d;--red:#b91c1c;--bg:#f0f4f9;--border:#dde3ed}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}
header h1{font-size:1.4rem;font-weight:800}

.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}
#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}

#ptbar{height:5px;background:rgba(255,255,255,.2);width:160px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}
.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.q-hd h2{font-size:.92rem;font-weight:700;color:var(--navy)}
.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}
</style>

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "下列關於生物分類階層的敘述，何者「錯誤」？", "opts": ["越下層的階層所包含的生物種類越少", "同屬的生物親緣關係比同科但不同屬者更接近", "階層由大到小為界→門→綱→目→科→屬→種，越上層親緣越近、特徵越相似", "種是分類最基本的單位"], "ans": 2, "exp": "越「下層」（屬、種）親緣越近、特徵越相似、種類越少；說「越上層親緣越近」是顛倒，故錯誤。(cls 課本對應：分類階層)"}, {"tid": "cls", "q": "關於二名法（學名）的敘述，下列何者「正確」？", "opts": ["學名以中文俗名為準，各國寫法不同", "學名只寫一個字，就是該生物的種小名", "學名依生物的棲息地命名，同棲地者學名相同", "學名由屬名加種小名組成，以拉丁文書寫並用斜體，屬名首字母大寫"], "ans": 3, "exp": "林奈二名法：屬名＋種小名、拉丁文斜體、屬名首字大寫；學名依親緣而非棲地、且全球統一。(cls 課本對應：二名法)"}, {"tid": "cls", "q": "下列名字有「魚」的生物中，何者「真的」屬於魚類？", "opts": ["鯨魚", "魟魚", "章魚", "鱷魚"], "ans": 1, "exp": "魟魚是軟骨魚、真正的魚類；鱷魚屬爬蟲、章魚屬軟體、鯨魚屬哺乳，都不是魚。(cls 課本對應：名實不符)"}, {"tid": "plant", "q": "四大類植物由簡單到複雜，正確的排列為何？", "opts": ["裸子→被子→蕨類→蘚苔", "蘚苔→蕨類→裸子→被子", "被子→裸子→蕨類→蘚苔", "蕨類→蘚苔→被子→裸子"], "ans": 1, "exp": "演化由簡到繁：蘚苔（無維管束）→蕨類（有維管束無種子）→裸子（有種子無果實）→被子（有果實）。(plant 課本對應：植物四大類)"}, {"tid": "plant", "q": "關於蘚苔植物與蕨類植物的比較，下列何者「不正確」？", "opts": ["蘚苔無維管束，蕨類最早演化出維管束", "兩者受精都需要以水為媒介", "蕨類以孢子繁殖，孢子囊堆常長在葉背", "蘚苔具有真正的根、莖、葉，蕨類則只有假根"], "ans": 3, "exp": "顛倒了：蘚苔僅有假根、無真正根莖葉；蕨類才有真正根莖葉，故此敘述不正確。(plant 課本對應：蘚苔與蕨類)"}, {"tid": "plant", "q": "下列關於裸子植物的敘述，何者「錯誤」？", "opts": ["多為針葉樹，如松、杉、銀杏", "胚珠裸露、無花無果實，以毬果生殖", "有花粉管，故受精不需要水", "有果實包住種子，靠果實保護種子"], "ans": 3, "exp": "裸子植物胚珠裸露、無果實；「有果實包住種子」是被子植物的特徵，故錯誤。(plant 課本對應：裸子植物)"}, {"tid": "plant", "q": "仙人掌雖然莖肥厚、葉退化成針狀，但它被歸類為被子植物，主要依據為何？", "opts": ["它的莖能儲水，故為裸子植物", "它會開花結果，種子由子房發育的果實所包覆", "它有針狀葉，與裸子植物針葉樹相同", "它生長在乾旱沙漠，故屬被子植物"], "ans": 1, "exp": "分類依構造特徵（有花有果實）而非棲地或外形；仙人掌會開花結果，屬被子植物。(plant 課本對應：被子植物判定)"}, {"tid": "plant", "q": "下列關於單子葉與雙子葉植物的比較，何者「正確」？", "opts": ["雙子葉植物的維管束散生，單子葉環狀排列", "單子葉為鬚根、平行脈；雙子葉為軸根、網狀脈", "單子葉有兩片子葉，雙子葉只有一片", "單子葉葉脈為網狀，雙子葉為平行脈"], "ans": 1, "exp": "單子葉：子葉1、鬚根、平行脈、維管束散生；雙子葉：子葉2、軸根、網狀脈、維管束環狀。其餘三項皆顛倒。(plant 課本對應：單雙子葉)"}, {"tid": "plant", "q": "某資料表為台灣四大類植物物種百分比（如表）。下列敘述何者「錯誤」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類別</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蘚苔</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蕨類</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">裸子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">被子</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">百分比</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">26.1%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">10.9%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">1.5%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">61.5%</td></tr></table>", "opts": ["不會開花的植物約占 61.5%", "受精需要以水為媒介的植物約占 37.0%", "沒有維管束的植物約占 26.1%", "能結出果實的植物約占 61.5%"], "ans": 0, "exp": "不開花者＝蘚苔+蕨類+裸子＝38.5%，非61.5%；61.5%是會開花結果的被子植物。(plant 課本對應：植物百分比資料表)"}, {"tid": "inv", "q": "下列關於刺絲胞動物（腔腸動物）的敘述，何者「錯誤」？", "opts": ["有口無肛門，可行出芽生殖", "許多成體營固著生活，如珊瑚、海葵", "身體背腹扁平、左右對稱，並具有肛門排遺", "具刺絲胞用以捕食，身體呈輻射對稱"], "ans": 2, "exp": "刺絲胞動物為輻射對稱、有口無肛門；背腹扁平是扁形動物的特徵，故錯誤。(inv 課本對應：刺絲胞動物)"}, {"tid": "inv", "q": "在動物界中，種類與數量最多的一門是哪一門？", "opts": ["環節動物", "節肢動物", "棘皮動物", "軟體動物"], "ans": 1, "exp": "節肢動物（昆蟲、蜘蛛、蝦蟹等）具外骨骼、身體分節、會蛻皮，是種類數量最多的動物門。(inv 課本對應：節肢動物)"}, {"tid": "inv", "q": "下列關於軟體動物的敘述，何者「不正確」？", "opts": ["身體分成許多相似的環節，並具有剛毛", "有的具殼（如文蛤、蝸牛），有的無殼（如章魚）", "鸚鵡螺、烏賊、海兔都屬於軟體動物", "身體柔軟、不分節，多具外套膜"], "ans": 0, "exp": "軟體動物身體柔軟、不分節；分成許多相似環節且有剛毛是環節動物（如蚯蚓），故錯誤。(inv 課本對應：軟體動物)"}, {"tid": "inv", "q": "關於棘皮動物的敘述，下列何者「正確」？", "opts": ["具管足、體表多有棘，成體輻射對稱，且僅生活於海洋", "以刺絲胞捕食，有口無肛門", "具外骨骼會蛻皮，是陸海皆有的大族群", "身體柔軟、具外套膜並分泌貝殼"], "ans": 0, "exp": "棘皮動物（海星、海膽、海參）具管足、成體五輻對稱、僅生活於海洋；外骨骼蛻皮是節肢、刺絲胞是刺絲胞動物。(inv 課本對應：棘皮動物)"}, {"tid": "inv", "q": "小明想找一種「身體分節」的無脊椎動物，下列何者「不符合」此條件？", "opts": ["文蛤", "蚯蚓", "螃蟹", "蜈蚣"], "ans": 0, "exp": "文蛤屬軟體動物、身體柔軟不分節；蜈蚣、螃蟹（節肢）與蚯蚓（環節）都有分節。(inv 課本對應：身體分節比較)"}, {"tid": "inv", "q": "珊瑚過去曾被誤認為植物，最主要的原因是？", "opts": ["珊瑚以孢子繁殖，與蕨類相似", "珊瑚蟲成體營固著生活、不會移動，外形像枝狀", "珊瑚會行光合作用自製養分", "珊瑚體內具有葉綠體可固碳"], "ans": 1, "exp": "珊瑚（刺絲胞動物）固著不動、外形似植物而曾被誤認；牠是動物，靠刺絲胞捕食，不行光合。(inv 課本對應：珊瑚)"}, {"tid": "vert", "q": "下列關於軟骨魚（如鯊魚、魟魚）的敘述，何者「正確」？", "opts": ["骨骼為軟骨，有鰓裂而無鰓蓋，也沒有鰾", "具有鰓蓋與鰾，與鯉魚相同", "屬於哺乳類，因體型大且游泳能力強", "用肺呼吸，需浮出水面換氣"], "ans": 0, "exp": "軟骨魚骨骼為軟骨、有鰓裂無鰓蓋、無鰾；硬骨魚才有鰓蓋與鰾。鯊魟仍是魚、用鰓呼吸。(vert 課本對應：軟骨魚)"}, {"tid": "vert", "q": "鴨嘴獸是常被誤判的動物，下列敘述何者「正確」？", "opts": ["牠是爬蟲類，因為會生蛋", "牠是兩生類，幼體用鰓、成體用肺", "牠是哺乳類，但以卵生方式繁殖，並有乳腺哺乳幼獸", "牠是鳥類，因為有像鴨子的嘴喙"], "ans": 2, "exp": "鴨嘴獸（與針鼴）是哺乳類但卵生、有乳腺哺乳、無乳頭；分類依乳腺哺乳等特徵，不因卵生改判。(vert 課本對應：單孔類)"}, {"tid": "vert", "q": "關於企鵝的分類，下列何者「正確」？", "opts": ["企鵝是鳥類，體表有羽毛、屬內溫動物、以硬殼卵繁殖", "企鵝是兩生類，因為水陸兩棲", "企鵝是魚類，因為善於游泳且生活在水中", "企鵝是哺乳類，因為生活在寒冷地區會哺乳"], "ans": 0, "exp": "企鵝有羽毛、內溫、產硬殼卵，是不會飛的鳥類；分類依構造特徵而非會不會飛或棲地。(vert 課本對應：鳥類)"}, {"tid": "vert", "q": "下列關於爬蟲類比兩生類「更適應陸地生活」的原因，何者「錯誤」？", "opts": ["爬蟲類行體內受精、卵具殼，生殖不必回到水中", "爬蟲類幼體用鰓呼吸，必須回到水中才能完成發育", "爬蟲類用肺呼吸", "爬蟲類體表有鱗片或骨板，可減少水分散失"], "ans": 1, "exp": "爬蟲類一生用肺呼吸、不需回水；幼體用鰓、需回水的是兩生類，故此敘述錯誤。(vert 課本對應：爬蟲與兩生比較)"}, {"tid": "vert", "q": "下列四種動物，何者與其他三者「分類類群不同」？", "opts": ["蝙蝠", "海豚", "鯨", "企鵝"], "ans": 3, "exp": "海豚、蝙蝠、鯨都是哺乳類；企鵝是鳥類，類群不同。(vert 課本對應：哺乳與鳥區辨)"}, {"tid": "vert", "q": "下列哪一組脊椎動物的「親緣關係最接近」？", "opts": ["麻雀與鯉魚", "鱷魚與烏龜", "青蛙與蛇", "蝙蝠與山椒魚"], "ans": 1, "exp": "鱷與龜同屬爬蟲類，親緣最近；其餘各組分屬不同類群（兩生/爬蟲、鳥/魚、哺乳/兩生）較疏。(vert 課本對應：親緣關係)"}, {"tid": "pop", "q": "下列關於「族群」與「群集」的敘述，何者「正確」？", "opts": ["族群是同一時間、同一區域內同種生物的所有個體；群集是同區域內所有不同族群的總合", "群集只包含一個物種的所有個體", "族群還包含陽光、空氣、水等非生物環境", "族群是不同種生物的總合，群集是同種生物的個體"], "ans": 0, "exp": "族群＝同時、同地、同種的所有個體；群集＝同區域內所有族群（不同種）的總合；加上非生物環境才是生態系。(pop 課本對應：族群與群集)"}, {"tid": "pop", "q": "某池塘的吳郭魚族群，下列何種情況會使其數量「增加」？", "opts": ["遷出數遠大於遷入數且出生數為零", "死亡數加遷出數大於出生數加遷入數", "出生數加遷入數等於死亡數加遷出數", "出生數加遷入數大於死亡數加遷出數"], "ans": 3, "exp": "族群數量由出生、死亡、遷入、遷出決定；當「出生+遷入」大於「死亡+遷出」時數量增加。(pop 課本對應：族群數量變化)"}, {"tid": "pop", "q": "研究者用標識再捕法估計某湖中鯽魚數量：先捕捉並標記 40 隻放回，數日後再捕 90 隻，其中有標記者 6 隻。該湖鯽魚總數約為多少？", "opts": ["2160 隻", "540 隻", "600 隻", "240 隻"], "ans": 2, "exp": "總數＝標記數×再捕總數÷再捕中標記數＝40×90÷6＝600。(pop 課本對應：標識再捕法計算)"}, {"tid": "pop", "q": "下列哪一種生物「不適合」使用標識再捕法估計族群數量？", "opts": ["樹林間飛行的麻雀", "草原上活動的野兔", "水庫中自由游動的鯉魚", "潮間帶岩石上固著的藤壺"], "ans": 3, "exp": "標識再捕法適用能自由活動並與族群混合者；藤壺固著不動，不會均勻混合，應改用樣區法。(pop 課本對應：捉放法適用對象)"}, {"tid": "pop", "q": "研究者在某草地隨機取 4 個 1 平方公尺樣區，數得蒲公英分別為 12、16、14、18 株。若草地總面積為 500 平方公尺，估計總數約為多少株？", "opts": ["6000 株", "7500 株", "3000 株", "1500 株"], "ans": 1, "exp": "平均每樣區＝(12+16+14+18)/4＝15 株，×(500÷1)＝7500 株。樣區法適用固著或移動慢者。(pop 課本對應：樣區法計算)"}, {"tid": "pop", "q": "關於族群數量隨時間變化的 S 型成長曲線，下列敘述何者「錯誤」？", "opts": ["達環境負荷量後，數量會在負荷量上下波動而趨於穩定", "族群數量達環境負荷量後仍會持續快速指數增加，永遠不會停止", "中期數量呈快速（指數）增長", "成長初期數量增加緩慢"], "ans": 1, "exp": "達環境負荷量後數量趨平並上下波動，而非永遠快速增加，故錯誤。(pop 課本對應：S型成長曲線)"}, {"tid": "pop", "q": "火山熔岩冷卻後的裸地上，群集演替（消長）最可能的先後順序為何？", "opts": ["地衣、苔蘚→草本植物→灌木→喬木森林", "草本→地衣→喬木→灌木", "喬木森林→灌木→草本→地衣", "灌木→喬木→草本→地衣"], "ans": 0, "exp": "初級演替先驅常是地衣、苔蘚，逐步發展為草本、灌木，最終形成喬木森林。(pop 課本對應：群集演替)"}, {"tid": "inter", "q": "下列各組生物的交互作用配對，何者「錯誤」？", "opts": ["鯊魚與鮣魚——片利共生", "豆科植物與根瘤菌——互利共生", "小丑魚與海葵——片利共生", "菟絲子與宿主植物——寄生"], "ans": 2, "exp": "小丑魚與海葵雙方皆受益，屬互利共生（＋/＋），非片利共生，故配對錯誤。(inter 課本對應：互利與片利共生)"}, {"tid": "inter", "q": "關於「片利共生」的敘述與例子，下列何者「正確」？", "opts": ["雙方皆受害，如混養時互相競爭的兩種魚", "一方得利、另一方無明顯影響，如大樹與附生其上的鳥巢蕨", "雙方皆得利，如菌根菌與樹根", "一方得利、另一方受害，如跳蚤與狗"], "ans": 1, "exp": "片利共生為＋/0：鳥巢蕨附生大樹得到棲所，大樹無明顯影響。其餘為互利、寄生、競爭。(inter 課本對應：片利共生)"}, {"tid": "inter", "q": "下列何者「不屬於」生物防治的方法？", "opts": ["釋放平腹小蜂寄生荔枝椿象卵", "大量噴灑廣效性化學農藥撲殺所有昆蟲", "放養蓋斑鬥魚吃孑孓以控制病媒蚊", "利用瓢蟲捕食蚜蟲"], "ans": 1, "exp": "生物防治是利用天敵（掠食、寄生、競爭）控制有害生物以減少農藥；噴灑農藥屬化學防治，非生物防治。(inter 課本對應：生物防治)"}, {"tid": "inter", "q": "表為甲、乙兩種草履蟲分別單獨培養與混合培養時的數量變化（如表）。由表可推論兩者的交互作用為何？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">培養方式</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲(單養)</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙(單養)</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲(混養)</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙(混養)</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">最終數量</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">320</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">260</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">150</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">90</td></tr></table>", "opts": ["互利共生——混養時兩者數量都上升", "掠食——一方吃掉另一方", "競爭——兩者爭奪相同有限資源，混養時數量均下降", "片利共生——一方得利、另一方不受影響"], "ans": 2, "exp": "混養時甲、乙數量都比單養時下降，表示雙方皆受害（−/−），為競爭。(inter 課本對應：競爭)"}, {"tid": "inter", "q": "下列關於生物防治引入外來天敵的敘述，何者「正確」？", "opts": ["可用互利共生的生物來防治有害生物", "引入任何外來天敵都絕對安全，能增加本地多樣性", "引入外來天敵需謹慎評估，否則天敵本身可能變成外來入侵種", "引入外來種一定能使本地生態系更穩定"], "ans": 2, "exp": "外來天敵若失控可能成為入侵種，須謹慎；防治用天敵（掠食/寄生/競爭）而非互利共生；引進外來種不會增加本地多樣性。(inter 課本對應：生物防治與外來種)"}, {"tid": "energy", "q": "關於生態系中的能量來源，下列何者「錯誤」？", "opts": ["能量沿食物鏈單向流動、逐級遞減", "多數生態系最終能量來源是太陽，生產者行光合把光能轉為化學能", "深海熱泉生態系由化學自營的硫化菌以化學能為基礎", "所有生態系的能量都必須來自太陽光"], "ans": 3, "exp": "深海熱泉以硫化菌的化學能為基礎、不需陽光，所以「所有生態系都靠太陽」是錯的。(energy 課本對應：能量來源)"}, {"tid": "energy", "q": "圖為某生態系的能量塔（如圖）。下列敘述何者「正確」？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["每升高一個營養階層，可用能量約只剩前一階的 10%", "能量塔上窄下寬是因為高階生物體型較大", "能量沿食物鏈逐級增加，故頂端能量最多", "散失的能量主要以光能形式回到太陽"], "ans": 0, "exp": "每升一階可用能量約剩10%，其餘約90%以呼吸與熱能散失；能量逐級遞減、不是增加。(energy 課本對應：能量塔10%法則)"}, {"tid": "energy", "q": "某食物鏈中生產者固定的能量為 800000 大卡，依 10% 法則計算，第三級消費者（第四營養階層）約可得到多少能量？", "opts": ["80000 大卡", "8000 大卡", "80 大卡", "800 大卡"], "ans": 3, "exp": "每升一階×1/10，第四階＝800000×0.1×0.1×0.1＝800 大卡。(energy 課本對應：能量塔計算)"}, {"tid": "energy", "q": "在生態系中，下列關於「能量」與「物質」的敘述，何者「正確」？", "opts": ["能量與物質都單向流動、都不循環", "能量與物質都會在生態系中不斷循環", "物質單向流動不循環，能量則循環", "能量單向流動、最終以熱散失而不循環；碳、氮、水等物質則可循環再利用"], "ans": 3, "exp": "能量沿食物鏈單向流動、逐級遞減、最終以熱散失，不循環；物質（碳氮水）才會循環。(energy 課本對應：能量不循環物質循環)"}, {"tid": "energy", "q": "下列關於食物鏈各角色的敘述，何者「錯誤」？", "opts": ["次級以上消費者多為肉食者", "清除者（如禿鷹、蚯蚓）能行光合作用自製養分，屬於生產者", "初級消費者以生產者為食，多為植食者", "生產者能自行製造養分，如綠色植物、藻類"], "ans": 1, "exp": "清除者（食腐動物）以遺體為食、不行光合，屬消費者；能自製養分的才是生產者，故錯誤。(energy 課本對應：生態系角色)"}, {"tid": "cycle", "q": "下列關於碳循環的敘述，何者「正確」？", "opts": ["只有光合作用能將大氣中的二氧化碳固定下來，減少大氣 CO₂", "燃燒化石燃料不會影響碳循環", "生產者行呼吸作用也能減少大氣中的 CO₂", "分解者只會固定碳，不會釋放 CO₂"], "ans": 0, "exp": "減少大氣CO₂只有光合（固碳）；呼吸、分解、燃燒都釋出CO₂。生產者行呼吸同樣放碳，故只有第一項對。(cycle 課本對應：碳循環)"}, {"tid": "cycle", "q": "圖為碳循環示意圖（如圖）。下列何者「不會」增加大氣中的二氧化碳？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 420 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"420\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ca\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 z\" fill=\"#444\"/></marker></defs><rect x=\"140\" y=\"20\" width=\"140\" height=\"42\" rx=\"6\" fill=\"#eaf4fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210.0\" y=\"46.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">大氣中 CO₂</text><rect x=\"30\" y=\"180\" width=\"110\" height=\"42\" rx=\"6\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"85.0\" y=\"206.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">生產者</text><rect x=\"160\" y=\"210\" width=\"110\" height=\"42\" rx=\"6\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"215.0\" y=\"236.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">消費者</text><rect x=\"290\" y=\"150\" width=\"110\" height=\"42\" rx=\"6\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"345.0\" y=\"176.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">分解者</text><rect x=\"290\" y=\"40\" width=\"110\" height=\"42\" rx=\"6\" fill=\"#f3eee0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"345.0\" y=\"66.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">化石燃料</text><line x1=\"150\" y1=\"62\" x2=\"95\" y2=\"180\" stroke=\"#15803d\" stroke-width=\"1.7\" marker-end=\"url(#ca)\"/><text x=\"96.5\" y=\"121.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#15803d\">光合(固碳)</text><line x1=\"225\" y1=\"210\" x2=\"210\" y2=\"62\" stroke=\"#b91c1c\" stroke-width=\"1.7\" marker-end=\"url(#ca)\"/><text x=\"241.5\" y=\"136.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#b91c1c\">呼吸</text><line x1=\"345\" y1=\"150\" x2=\"260\" y2=\"62\" stroke=\"#b91c1c\" stroke-width=\"1.7\" marker-end=\"url(#ca)\"/><text x=\"328.5\" y=\"104.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#b91c1c\">分解</text><line x1=\"345\" y1=\"40\" x2=\"260\" y2=\"40\" stroke=\"#b91c1c\" stroke-width=\"1.7\" marker-end=\"url(#ca)\"/><text x=\"302.5\" y=\"34.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#b91c1c\">燃燒</text><line x1=\"140\" y1=\"205\" x2=\"160\" y2=\"225\" stroke=\"#444\" stroke-width=\"1.7\" marker-end=\"url(#ca)\"/><text x=\"150.0\" y=\"233.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#444\">攝食</text></svg></div>", "opts": ["動物行呼吸作用", "分解者分解遺體", "燃燒煤、石油等化石燃料", "綠色植物行光合作用"], "ans": 3, "exp": "光合作用吸收CO₂（固碳），會減少大氣CO₂；呼吸、分解、燃燒都會釋出CO₂。(cycle 課本對應：碳循環箭頭)"}, {"tid": "cycle", "q": "表為某食物鏈中四種生物體內 DDT 的濃度（如表）。下列推論何者「錯誤」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.5</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.3</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">25</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.05</td></tr></table>", "opts": ["DDT 濃度由低到高為 丁→乙→甲→丙", "丙位於最高營養階層、體內 DDT 累積最多", "丁體內 DDT 濃度最低，最可能是生產者", "丁的營養階層最高，所以是生產者"], "ans": 3, "exp": "生物放大作用下濃度越高營養階層越高；丁濃度最低應為生產者（最低階），說丁「階層最高」與事實矛盾，故錯誤。(cycle 課本對應：生物放大)"}, {"tid": "cycle", "q": "下列關於水域優養化的敘述，何者「錯誤」？", "opts": ["起因是氮、磷等營養鹽過多，使藻類大量繁殖", "藻類死亡後被分解者分解，夜間呼吸與分解大量耗氧", "藻華遮蔽陽光，使水下藻類死亡", "優養化使水中溶氧大量增加，魚蝦因此繁盛"], "ans": 3, "exp": "優養化最終使水中溶氧大減、魚蝦死亡、水質發臭，並非溶氧增加，故錯誤。(cycle 課本對應：優養化)"}, {"tid": "eco", "q": "下列關於生物圈的敘述，何者「正確」？", "opts": ["生物在生物圈中分布極為平均", "月球表面也屬於地球生物圈的一部分", "生物圈範圍會隨生物的發現或滅絕而改變，並非永久固定", "生物圈的厚度約為海平面上下各 1 萬公里"], "ans": 2, "exp": "生物圈是所有生物及其環境的總和，範圍約海平面上下各約1萬公尺（合計約2萬公尺），會隨生物發現/滅絕變動、分布不均、不含月球。(eco 課本對應：生物圈)"}, {"tid": "eco", "q": "陸域生態系主要受溫度與雨量影響。依年雨量由少到多排列，下列何者「正確」？", "opts": ["沙漠＜森林＜草原", "草原＜沙漠＜森林", "森林＜草原＜沙漠", "沙漠＜草原＜森林"], "ans": 3, "exp": "年雨量：沙漠最少、草原居中、森林最多；森林與草原常以年雨量約750mm為分界。(eco 課本對應：陸域生態系)"}, {"tid": "eco", "q": "關於海洋由岸向海的分區，下列敘述何者「錯誤」？", "opts": ["由岸向海可分為潮間帶、淺海區（大陸棚）、大洋區", "淺海區陽光可達，珊瑚礁多、生物豐富", "大洋區以水深約 200 公尺分為透光區與無光區", "大洋區因陽光充足、生產者最多，是海洋生物量最豐富之處"], "ans": 3, "exp": "大洋區深、無光區廣，生物量不及陽光可達、養分豐富的淺海區；故說「大洋區生物量最豐富」錯誤。(eco 課本對應：海洋分區)"}, {"tid": "eco", "q": "下列關於河口生態系的敘述，何者「不正確」？", "opts": ["常見紅樹林、招潮蟹、彈塗魚等耐鹽生物", "河口鹽度與水位變化小，環境穩定，生物種類稀少", "以有機碎屑食物鏈為主", "海水與淡水在此交會，鹽度與水位變化大"], "ans": 1, "exp": "河口鹽度與水位變化「大」、環境多變，但養分豐富、生物量高；說「變化小、生物稀少」不正確。(eco 課本對應：河口生態系)"}, {"tid": "conserv", "q": "下列關於保育公約或組織的配對，何者「錯誤」？", "opts": ["拉姆薩公約以保育溼地為主", "IUCN（國際自然保育聯盟）負責評估物種滅絕風險並編製紅色名錄", "CITES（華盛頓公約）管制瀕危野生動植物的國際貿易", "紅皮書（紅色名錄）是由華盛頓公約所編製"], "ans": 3, "exp": "紅色名錄由IUCN編製，並非華盛頓公約；CITES是管制國際貿易，兩者不可混淆，故配對錯誤。(conserv 課本對應：保育公約)"}, {"tid": "conserv", "q": "下列關於外來入侵種的敘述，何者「正確」？", "opts": ["引進越多外來種，本地生物多樣性一定越高", "隨意放生外來種有助於維護生態平衡", "引進外來種通常不會增加本地的生物多樣性，反而常使本土種減少", "福壽螺、布袋蓮、綠鬣蜥都是台灣的原生保育類"], "ans": 2, "exp": "外來入侵種會排擠本土種、降低多樣性，引進外來種不會增加本地多樣性；福壽螺等為入侵種；不可隨意放生。(conserv 課本對應：外來種)"}, {"tid": "conserv", "q": "IUCN 紅色名錄的受脅等級由高（最危急）到低，下列排序何者「正確」？", "opts": ["易危(VU)＞極危(CR)＞瀕危(EN)＞無危(LC)", "無危(LC)＞易危(VU)＞瀕危(EN)＞極危(CR)", "瀕危(EN)＞極危(CR)＞無危(LC)＞易危(VU)", "極危(CR)＞瀕危(EN)＞易危(VU)＞無危(LC)"], "ans": 3, "exp": "受脅程度由高到低：滅絕＞野外滅絕＞極危(CR)＞瀕危(EN)＞易危(VU)＞接近受脅(NT)＞無危(LC)。(conserv 課本對應：紅色名錄等級)"}, {"tid": "conserv", "q": "下列哪一種生物是台灣的「原生（本土）種」，而「非」外來入侵種？", "opts": ["石虎", "紅火蟻", "小花蔓澤蘭", "琵琶鼠魚（野翼甲鯰）"], "ans": 0, "exp": "石虎是台灣原生保育類；琵琶鼠魚、小花蔓澤蘭、紅火蟻皆為外來入侵種。(conserv 課本對應：原生種與外來種辨別)"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
