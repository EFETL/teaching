<style>

header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}

.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}

#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}

.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}

.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}

.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}
</style>

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "關於生物分類階層「界、門、綱、目、科、屬、種」的敘述，下列何者正確？", "opts": ["越往「界」的方向，生物彼此的特徵越相似", "「種」是最大的分類單位，包含的生物最多", "越往「種」的方向，所包含的生物種類越少、親緣關係越近", "同一「目」的生物一定比同一「科」的生物親緣更近"], "ans": 2, "exp": "分類階層由大到小為界→門→綱→目→科→屬→種，越下層種類越少、共同特徵越多、親緣越近，種是最基本（最小）單位；同科比同目更近。（cls，課本對應：分類階層）"}, {"tid": "cls", "q": "小華用二名法寫某種生物的學名，下列關於二名法的敘述何者正確？", "opts": ["學名由屬名加種小名組成，以斜體拉丁文書寫，屬名首字母大寫", "屬名要小寫、種小名首字母大寫", "同屬的兩種生物親緣關係較遠", "學名只用一個拉丁文單字表示，越長代表越高等"], "ans": 0, "exp": "林奈二名法：學名＝屬名＋種小名，拉丁文斜體，屬名首字母大寫、種小名小寫；同屬生物親緣較近。（cls，課本對應：二名法）"}, {"tid": "cls", "q": "下列名字中有「魚」字的生物，何者『真的』屬於魚類？", "opts": ["鯨魚", "彈塗魚", "鱷魚", "章魚"], "ans": 1, "exp": "彈塗魚是真正的魚類；章魚是軟體動物、鱷魚是爬蟲類、鯨魚是哺乳類。分類依構造與親緣，不是依名字或棲地。（cls，課本對應：名實不符的「魚」）"}, {"tid": "plant", "q": "地錢與土馬騌都屬於蘚苔植物，下列關於蘚苔植物的敘述何者正確？", "opts": ["具有維管束，能長成高大的喬木", "沒有維管束、沒有真正的根莖葉，是最早登陸的植物", "以種子繁殖，受精不需要水", "葉背具有孢子囊堆，幼葉會捲曲"], "ans": 1, "exp": "蘚苔無維管束、無真正根莖葉（僅假根）、矮小、受精需水，是最早登陸的植物；有孢子囊堆與捲曲幼葉的是蕨類。（plant，課本對應：蘚苔植物）"}, {"tid": "plant", "q": "關於蕨類植物（如腎蕨、筆筒樹）的特徵，下列何者正確？", "opts": ["完全沒有維管束，只能矮小生長", "有花有果實，果實包住種子", "最早演化出維管束、有真正根莖葉，以孢子繁殖", "以種子繁殖，種子裸露在毬果上"], "ans": 2, "exp": "蕨類最早演化出維管束、有真正根莖葉、以孢子繁殖、受精仍需水；裸子才有毬果與種子，被子才有花果。（plant，課本對應：蕨類植物）"}, {"tid": "plant", "q": "銀杏與蘇鐵都是裸子植物，下列敘述何者正確？", "opts": ["有花有果實，種子包在果實內", "沒有維管束，受精必須以水為媒介", "有種子但無花、無果實，胚珠裸露，受精時不需要水", "以孢子繁殖，葉背有孢子囊堆"], "ans": 2, "exp": "裸子植物有維管束與種子但無花無果實、胚珠裸露，靠花粉管所以受精不需水；有果實是被子植物、用孢子的是蕨類。（plant，課本對應：裸子植物）"}, {"tid": "plant", "q": "竹子是單子葉植物，下列哪一組特徵符合單子葉植物？", "opts": ["鬚根、葉為平行脈、花瓣為3或3的倍數", "子葉兩片、維管束環狀排列", "有毬果、種子裸露", "軸根、葉為網狀脈、花瓣為4或5"], "ans": 0, "exp": "單子葉：子葉1、鬚根、平行脈、花瓣3或3倍數、維管束散生；軸根與網狀脈是雙子葉特徵。（plant，課本對應：單／雙子葉）"}, {"tid": "plant", "q": "仙人掌生長於乾旱沙漠，肥厚的莖、葉退化成針狀，下列關於它分類的判斷何者正確？", "opts": ["因為莖肥厚儲水，所以是蕨類植物", "因為葉呈針狀，所以是裸子植物（針葉樹）", "它會開花結果，屬於被子植物", "因為生於沙漠不需水，所以是蘚苔植物"], "ans": 2, "exp": "分類依「有無花」而非外形：仙人掌會開花結果，是被子植物，肥莖針葉只是耐旱適應。（plant，課本對應：被子植物判定）"}, {"tid": "inv", "q": "海葵與珊瑚都屬於刺絲胞動物，下列關於刺絲胞動物的敘述何者正確？", "opts": ["身體分成許多相似的環節，具有剛毛", "具刺絲胞可捕食、輻射對稱、有口無肛門，許多成體固著生活", "具管足、體表有棘，只生活於海洋", "具外骨骼、附肢分節、會蛻皮"], "ans": 1, "exp": "刺絲胞動物（水螅、水母、海葵、珊瑚）以刺絲胞捕食、輻射對稱、有口無肛門、常固著；分節有剛毛是環節，外骨骼蛻皮是節肢，管足是棘皮。（inv，課本對應：刺絲胞動物）"}, {"tid": "inv", "q": "烏賊與海兔的身體柔軟、不分節，牠們屬於下列哪一類動物？", "opts": ["節肢動物", "棘皮動物", "環節動物", "軟體動物"], "ans": 3, "exp": "軟體動物身體柔軟不分節、有的有殼有的無殼，如文蛤、蝸牛、章魚、烏賊、海兔、鸚鵡螺；烏賊與海兔均屬之。（inv，課本對應：軟體動物）"}, {"tid": "inv", "q": "沙蠶與水蛭的身體由許多相似的環節構成，並具有剛毛，牠們屬於下列哪一類動物？", "opts": ["刺絲胞動物", "扁形動物", "軟體動物", "環節動物"], "ans": 3, "exp": "環節動物身體分成許多相似環節、具剛毛，如蚯蚓、沙蠶、水蛭；軟體不分節、扁形背腹扁平、刺絲胞輻射對稱。（inv，課本對應：環節動物）"}, {"tid": "inv", "q": "在動物界中，種類與數量最多的一門，其共同特徵為何？", "opts": ["具外骨骼、身體與附肢分節、會蛻皮", "具管足、輻射對稱、只生活於海洋", "背腹扁平、有口無肛門", "身體柔軟不分節、具外套膜"], "ans": 0, "exp": "節肢動物（昆蟲、蜘蛛、蝦蟹、藤壺、鱟）種類數量最多，具外骨骼、分節、會蛻皮；其餘為軟體、扁形、棘皮的特徵。（inv，課本對應：節肢動物）"}, {"tid": "inv", "q": "海參與陽燧足的成體呈輻射對稱、具管足、體表有棘，且只生活在海洋中，牠們屬於下列哪一類？", "opts": ["軟體動物", "環節動物", "刺絲胞動物", "棘皮動物"], "ans": 3, "exp": "棘皮動物（海星、海膽、海參、海百合、陽燧足）具管足、體表有棘、成體五輻對稱、僅生活於海洋。（inv，課本對應：棘皮動物）"}, {"tid": "inv", "q": "下列關於無脊椎動物特徵的比較，何者錯誤？", "opts": ["海星屬於棘皮動物，具管足", "藤壺屬於節肢動物，具外骨骼", "軟體動物的身體都分成許多明顯的環節", "渦蟲屬於扁形動物，身體背腹扁平、有口無肛門"], "ans": 2, "exp": "軟體動物身體柔軟「不」分節，此敘述錯誤；分節是環節與節肢動物的特徵。渦蟲、藤壺、海星的分類皆正確。（inv，課本對應：無脊椎動物比較）"}, {"tid": "vert", "q": "關於爬蟲類比兩生類「更能適應陸地生活」的原因，下列何者正確？", "opts": ["體表裸露濕潤，需要時時保持潮濕", "幼體用鰓呼吸，必須回到水中生殖", "以皮膚輔助呼吸，且卵無殼必須產在水中", "體內受精且卵具殼、體表有鱗片或骨板減少水分散失、用肺呼吸"], "ans": 3, "exp": "爬蟲類體內受精、卵具殼不必回水中生殖，鱗片或骨板防止失水、用肺呼吸，故較適應陸地；卵無殼、皮膚呼吸、體表裸露是兩生類特徵。（vert，課本對應：爬蟲類適應陸地）"}, {"tid": "vert", "q": "藍腹鷳是台灣特有的鳥類，下列關於鳥類的敘述何者正確？", "opts": ["用鰓呼吸，行體外受精", "為外溫動物，體表有鱗片", "為內溫（恆溫）動物，體表覆羽毛，用肺並有氣囊輔助呼吸", "以乳腺分泌乳汁哺育幼雛"], "ans": 2, "exp": "鳥類（含藍腹鷳）內溫、羽毛、體內受精、卵生硬殼、肺加氣囊呼吸；鱗片與外溫是爬蟲、用鰓是魚、哺乳是哺乳類。（vert，課本對應：鳥類）"}, {"tid": "vert", "q": "鯊魚與魟魚屬於軟骨魚，下列關於牠們的敘述何者正確？", "opts": ["骨骼為硬骨，有鰓蓋與鰾", "體表覆有羽毛，為恆溫動物", "骨骼為軟骨，具鰓裂但無鰓蓋，也沒有鰾", "用肺呼吸，行體內受精"], "ans": 2, "exp": "軟骨魚（鯊、魟）骨骼為軟骨、有鰓裂無鰓蓋、無鰾；硬骨魚才有鰓蓋與鰾。魚類用鰓呼吸、外溫。（vert，課本對應：軟骨魚）"}, {"tid": "vert", "q": "鴨嘴獸與針鼴雖然是哺乳類，卻有與其他哺乳類不同的特殊之處，下列何者正確？", "opts": ["牠們是外溫動物，需要曬太陽才能活動", "牠們體表覆羽毛，屬於鳥類", "牠們是卵生，但仍有乳腺可分泌乳汁哺育幼獸", "牠們用鰓呼吸，行體外受精"], "ans": 2, "exp": "鴨嘴獸、針鼴是少數卵生的哺乳類，無乳頭但有乳腺哺乳、無臍帶；仍以肺呼吸、為內溫動物。（vert，課本對應：特殊哺乳類）"}, {"tid": "vert", "q": "下列哪一組動物彼此的親緣關係最接近？", "opts": ["企鵝與海豚", "蝙蝠與麻雀", "青蛙與鯊魚", "龜與鱷（皆為爬蟲類）"], "ans": 3, "exp": "同類群親緣最近：龜與鱷同屬爬蟲類最近；企鵝是鳥、海豚是哺乳；蝙蝠是哺乳、麻雀是鳥；青蛙是兩生、鯊是魚。（vert，課本對應：脊椎動物親緣）"}, {"tid": "vert", "q": "下列關於脊椎動物特徵的敘述，何者錯誤？", "opts": ["哺乳類多為胎生，並以乳腺哺乳", "鳥類前肢特化為翼，骨骼中空有助飛行", "蛇是爬蟲類，行體內受精、卵具殼", "兩生類的卵具有堅硬的卵殼，可直接產在乾燥陸地上"], "ans": 3, "exp": "兩生類的卵「無殼」、需產在水中，此敘述錯誤；卵具殼是爬蟲類與鳥類。其餘哺乳、鳥、蛇敘述皆正確。（vert，課本對應：脊椎動物比較）"}, {"tid": "pop", "q": "關於「族群」與「群集」的定義，下列何者正確？", "opts": ["族群是同一時間、同一區域、同種生物的所有個體；群集是同一區域內所有不同族群的總合", "群集是只包含一個物種的所有個體", "群集還必須包含陽光、水、土壤等非生物環境", "族群是同一區域內所有不同種生物的總合"], "ans": 0, "exp": "族群＝同時、同地、同種的全部個體；群集＝同一區域內所有不同族群（不同種）的總合；再加非生物環境才是生態系。（pop，課本對應：族群與群集）"}, {"tid": "pop", "q": "某保護區放養的梅花鹿族群，下列哪一種情況會使其數量「增加」？", "opts": ["出生數加遷入數，等於死亡數加遷出數", "出生數加上遷入數，大於死亡數加上遷出數", "死亡數加上遷出數，大於出生數加上遷入數", "遷出數遠大於遷入數，且死亡多於出生"], "ans": 1, "exp": "族群數量由出生、死亡、遷入、遷出決定：出生＋遷入＞死亡＋遷出時數量增加；相等時穩定（動態平衡）。（pop，課本對應：族群數量變化）"}, {"tid": "pop", "q": "研究人員在台江溼地以標識再捕法估算某種招潮蟹活動族群：第一次標記並放回80隻，一段時間後再捕得100隻，其中有標記者20隻。估計此族群總數約為多少隻？", "opts": ["320隻", "200隻", "400隻", "500隻"], "ans": 2, "exp": "標識再捕法：總數＝標記數×再捕總數÷再捕中標記數＝80×100÷20＝400。（pop，課本對應：標識再捕法）"}, {"tid": "pop", "q": "生態調查時，下列哪一種對象「不適合」用標識再捕法（捉放法）估算族群數量？", "opts": ["在溼地飛行覓食的水鳥", "會自由游動的吳郭魚", "在森林間活動的台灣獼猴", "潮間帶岩石上固著不動的藤壺"], "ans": 3, "exp": "標識再捕法適用能自由活動並與族群混合者；固著或不移動的藤壺、植物應改用樣區法估算。（pop，課本對應：估算法適用對象）"}, {"tid": "pop", "q": "在一片紅樹林中以樣區法調查水筆仔，每個樣區面積相同，3個樣區的株數分別為40、35、45株，若此林地共可分為25個相同樣區，估計水筆仔總數約為多少株？", "opts": ["1200株", "600株", "1000株", "400株"], "ans": 2, "exp": "樣區法：平均每樣區＝(40+35+45)/3＝40，總數＝40×25＝1000株。固著的水筆仔適用樣區法。（pop，課本對應：樣區法）"}, {"tid": "pop", "q": "族群在環境中常呈現「S 型成長曲線」（如圖），下列敘述何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">時間</text><text x=\"52\" y=\"46\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">族群數量</text><line x1=\"60\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#0a7ea4\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/><text x=\"430\" y=\"74\" font-size=\"12\" text-anchor=\"end\" fill=\"#0a7ea4\">環境負荷量 K</text><path d=\"M60.0,248.1 L63.7,248.0 L67.4,247.8 L71.1,247.6 L74.8,247.3 L78.5,247.1 L82.2,246.8 L85.9,246.5 L89.6,246.2 L93.3,245.9 L97.0,245.5 L100.7,245.1 L104.4,244.6 L108.1,244.1 L111.8,243.6 L115.5,243.0 L119.2,242.4 L122.9,241.7 L126.6,241.0 L130.3,240.2 L134.0,239.3 L137.7,238.4 L141.4,237.3 L145.1,236.2 L148.8,235.1 L152.5,233.8 L156.2,232.4 L159.9,231.0 L163.6,229.4 L167.3,227.7 L171.0,225.9 L174.7,224.0 L178.4,221.9 L182.1,219.7 L185.8,217.4 L189.5,215.0 L193.2,212.4 L196.9,209.7 L200.6,206.9 L204.3,203.9 L208.0,200.9 L211.7,197.7 L215.4,194.3 L219.1,190.9 L222.8,187.4 L226.5,183.8 L230.2,180.1 L233.9,176.4 L237.6,172.6 L241.3,168.8 L245.0,165.0 L248.7,161.2 L252.4,157.4 L256.1,153.6 L259.8,149.9 L263.5,146.2 L267.2,142.6 L270.9,139.1 L274.6,135.7 L278.3,132.3 L282.0,129.1 L285.7,126.1 L289.4,123.1 L293.1,120.3 L296.8,117.6 L300.5,115.0 L304.2,112.6 L307.9,110.3 L311.6,108.1 L315.3,106.0 L319.0,104.1 L322.7,102.3 L326.4,100.6 L330.1,99.0 L333.8,97.6 L337.5,96.2 L341.2,94.9 L344.9,93.8 L348.6,92.7 L352.3,91.6 L356.0,90.7 L359.7,89.8 L363.4,89.0 L367.1,88.3 L370.8,87.6 L374.5,87.0 L378.2,86.4 L381.9,85.9 L385.6,85.4 L389.3,84.9 L393.0,84.5 L396.7,84.1 L400.4,83.8 L404.1,83.5 L407.8,83.2 L411.5,82.9 L415.2,82.7 L418.9,82.4 L422.6,82.2 L426.3,82.0 L430.0,81.9\" fill=\"none\" stroke=\"#111\" stroke-width=\"2.2\"/><line x1=\"155\" y1=\"250\" x2=\"155\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"270\" y1=\"250\" x2=\"270\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">甲</text><text x=\"212\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["乙段族群快速增長，丙段達環境負荷量後數量趨於平穩", "甲段族群數量已超過負荷量並急速崩潰", "S 型曲線顯示族群可永遠以指數方式增加", "環境負荷量是指族群能無限制持續成長的數量"], "ans": 0, "exp": "S 型曲線：甲緩慢期、乙快速增長期、丙達負荷量趨平並上下波動；負荷量是環境能長期維持的最大數量，族群不會無限成長。（pop，課本對應：負荷量與S型曲線）"}, {"tid": "pop", "q": "森林發生火災後的裸地上，群集隨時間發生演替，下列演替順序何者正確？", "opts": ["草本植物 → 地衣 → 喬木 → 灌木", "喬木森林 → 灌木 → 草本 → 地衣", "地衣、苔蘚 → 草本植物 → 灌木 → 喬木森林", "灌木 → 喬木森林 → 草本 → 地衣"], "ans": 2, "exp": "裸地演替先驅常是地衣、苔蘚，接著草本→灌木→喬木森林；群集隨時間改變稱為演替（消長）。（pop，課本對應：群集演替）"}, {"tid": "inter", "q": "豆科植物根部的根瘤菌與豆科植物之間，屬於下列哪一種交互作用？", "opts": ["片利共生（一方受益、一方無影響）", "互利共生（雙方皆受益）", "掠食（捕食者得利、被食者受害）", "寄生（一方受益、一方受害）"], "ans": 1, "exp": "根瘤菌固氮供豆科植物利用、植物提供菌養分與棲所，雙方皆受益為互利共生；其他如地衣、菌根、小丑魚與海葵亦屬互利。（inter，課本對應：互利共生）"}, {"tid": "inter", "q": "鯨魚游動時，藤壺附著在牠身上而被帶往各處覓食，藤壺得利、鯨魚幾乎不受影響，這屬於下列哪一種交互作用？", "opts": ["競爭", "寄生", "互利共生", "片利共生"], "ans": 3, "exp": "片利共生為一方受益、另一方無明顯影響（＋／0），如鯨與藤壺、鯊與鮣魚、大樹與鳥巢蕨；雙方皆受益才是互利。（inter，課本對應：片利共生）"}, {"tid": "inter", "q": "菟絲子纏附在宿主植物上，伸入組織吸取養分，使宿主生長變差，這屬於下列哪一種交互作用？", "opts": ["片利共生", "掠食", "互利共生", "寄生（寄生者得利、宿主受害）"], "ans": 3, "exp": "寄生為寄生者受益、宿主受害（＋／−），如菟絲子、跳蚤、絛蟲；雙方皆受益是互利、一方無影響是片利。（inter，課本對應：寄生）"}, {"tid": "inter", "q": "農夫在荔枝園釋放平腹小蜂來控制荔枝椿象的數量，藉以減少農藥使用，這種做法稱為什麼？利用的是哪類交互作用？", "opts": ["生物放大，利用掠食來控制害蟲", "生物防治，利用互利共生來控制害蟲", "優養化，利用競爭來控制害蟲", "生物防治，利用寄生（天敵）來控制害蟲"], "ans": 3, "exp": "生物防治是利用天敵（掠食、寄生或競爭）控制有害生物以減少農藥；平腹小蜂寄生荔枝椿象卵屬之，不可用互利共生防治。（inter，課本對應：生物防治）"}, {"tid": "inter", "q": "將兩種以相同浮游生物為食的魚混養於同一水缸，結果兩種魚的生長曲線都比單養時下降，這代表牠們之間發生了什麼交互作用？", "opts": ["互利共生", "片利共生", "寄生", "競爭（爭奪相同有限資源，雙方皆受影響）"], "ans": 3, "exp": "兩種生物爭奪相同有限資源、雙雙受抑制（−／−）為競爭；混養時兩條生長曲線同時下降即競爭的典型現象。（inter，課本對應：競爭）"}, {"tid": "energy", "q": "在大多數生態系中，能量的最終來源與「生產者」的角色，下列敘述何者正確？", "opts": ["太陽是最終能量來源，生產者行光合作用把光能轉成化學能", "消費者是生態系最主要的能量製造者", "分解者是最終能量來源，能自行製造養分", "所有生態系都完全不依賴太陽，全靠化學能"], "ans": 0, "exp": "太陽是大多數生態系最終能量來源，生產者（植物、藻、藍綠菌）行光合作用把光能轉成化學能；深海熱泉的硫化菌則為化學自營例外。（energy，課本對應：能量來源與生產者）"}, {"tid": "energy", "q": "深海熱泉附近沒有陽光，卻仍有生物群聚生存，其生態系的能量主要來自下列何者？", "opts": ["硫化菌利用硫化氫的化學能行化學合成", "海面植物行光合作用後沉降的氧氣", "海水本身儲存的熱能直接被動物吸收", "太陽光直接穿透海水到達深海"], "ans": 0, "exp": "深海熱泉以硫化菌（化學自營）利用硫化氫的化學能合成有機物，不需陽光，是少見的非光合生產者支撐的生態系。（energy，課本對應：化學合成）"}, {"tid": "energy", "q": "分解者（如細菌、真菌）在生態系中扮演的角色，下列敘述何者正確？", "opts": ["直接利用陽光行光合作用製造養分", "分解動植物遺體與排泄物，使物質回歸環境再被利用", "屬於生產者，是食物鏈的起點", "能使能量在生態系中不斷循環使用"], "ans": 1, "exp": "分解者分解遺體與排泄物，使碳、氮等物質回歸環境再循環；它不行光合、不是生產者，且能量無法循環只能單向流動。（energy，課本對應：分解者）"}, {"tid": "energy", "q": "在「浮游藻 → 磷蝦 → 鯡魚 → 海豹」這條食物鏈中，下列敘述何者正確？", "opts": ["能量可由海豹再傳回浮游藻，形成循環", "能量沿食物鏈單向流動且逐級遞減，海豹可得到的能量最少", "每升高一個營養階層，可用能量約增加為十倍", "海豹獲得的能量最多，因為牠體型最大"], "ans": 1, "exp": "能量單向流動、逐級遞減，每升一階約只剩10%，故最高階海豹可用能量最少；能量不能循環、不會逐級增加。（energy，課本對應：能量流動）"}, {"tid": "energy", "q": "在某能量塔中（如圖），若生產者（甲）固定的能量為8000大卡，依10%法則估算，最高階的三級消費者（丁）約可獲得多少能量？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["0.8大卡", "800大卡", "80大卡", "8大卡"], "ans": 3, "exp": "每升一階×1/10，生產者→三級消費者共升三階：8000×0.1×0.1×0.1＝8大卡。（energy，課本對應：能量塔10%法則）"}, {"tid": "energy", "q": "能量塔（能量金字塔）通常呈現「底寬頂窄」，且營養階層多不超過4～5階，主要原因為何？", "opts": ["能量會在各階層間循環，所以越往上越多", "越高階的生物體型越小，所以需要的能量越少", "高階消費者能自行光合作用補充能量", "每升高一個營養階層，約90%的能量以呼吸作用與熱能散失，只剩約10%可傳遞"], "ans": 3, "exp": "每升一階僅約10%能量可傳遞、約90%以呼吸與熱散失，故能量塔底寬頂窄、營養階層通常不超過4～5階。（energy，課本對應：能量塔）"}, {"tid": "cycle", "q": "關於碳循環中大氣二氧化碳的增減，下列敘述何者正確？", "opts": ["光合作用能減少大氣中的二氧化碳，呼吸、分解與燃燒則會增加", "燃燒化石燃料對碳循環沒有影響", "呼吸作用能減少大氣中的二氧化碳", "分解作用只會固定碳、不會釋放二氧化碳"], "ans": 0, "exp": "固碳（減CO₂）只有光合作用（及溶於海水）；呼吸、分解、燃燒都會釋放CO₂。其餘三項皆為常見錯誤觀念。（cycle，課本對應：碳循環）"}, {"tid": "cycle", "q": "DDT 等難分解、脂溶性毒物會沿食物鏈累積（生物放大作用），下列敘述何者正確？", "opts": ["生產者體內的毒物濃度通常最高", "營養階層越高的生物，體內毒物濃度通常越低", "毒物會被生物快速分解，不會累積", "營養階層越高的生物，體內毒物濃度通常越高"], "ans": 3, "exp": "DDT、甲基汞等難分解脂溶性毒物沿食物鏈逐級累積，營養階層越高濃度越高；生產者濃度最低、最高階最高。（cycle，課本對應：生物放大）"}, {"tid": "cycle", "q": "下表為某河口生態系四種生物體內的甲基汞濃度（如表）。依生物放大作用判斷，何者最可能是該食物鏈中營養階層最高的生物？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">甲基汞(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.05</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.8</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">3.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">45</td></tr></table>", "opts": ["丙", "甲", "丁", "乙"], "ans": 2, "exp": "生物放大作用下，營養階層越高濃度越高；丁濃度45ppm最高，故為最高階消費者，甲(0.05)濃度最低為生產者。（cycle，課本對應：由濃度反推食物鏈）"}, {"tid": "cycle", "q": "夏天某養殖池因施肥過量，大量藻類繁生後池水發臭、魚蝦死亡，這種現象稱為優養化。下列關於其過程的敘述何者正確？", "opts": ["優養化是因為水中氮磷不足造成的", "藻類大量繁殖能讓水質變得更清澈乾淨", "水中溶氧因藻類大量增加而持續上升，對魚蝦有利", "氮、磷等營養鹽過多使藻類大量繁殖，遮光與分解耗氧使水中溶氧大減"], "ans": 3, "exp": "優養化是氮、磷營養鹽過多→藻類大量繁殖（藻華）→遮光使下層藻死亡、夜間呼吸與分解耗氧→溶氧大減→魚蝦死亡水質惡化。（cycle，課本對應：優養化）"}, {"tid": "eco", "q": "關於「生物圈」的敘述，下列何者正確？", "opts": ["佔地球體積的絕大部分，分布非常平均", "包含月球表面，因為太空人曾登陸月球", "指地球上所有生物及其生存環境的總和，範圍約在海平面上下各約1萬公尺", "範圍固定不變，永遠不會因生物的發現或滅絕而改變"], "ans": 2, "exp": "生物圈是所有生物及其環境的總和，範圍約海平面上下各約1萬公尺（合計約2萬公尺）、佔地球比例極小、會隨生物發現或滅絕而改變；月球不屬生物圈。（eco，課本對應：生物圈）"}, {"tid": "eco", "q": "陸域生態系的分布主要受溫度與雨量影響，下列關於年雨量與生態系類型的敘述何者正確？", "opts": ["年雨量由少到多大致為：沙漠＜草原＜森林", "雨量越多越容易形成沙漠", "凍原是因高溫多雨而形成的生態系", "年雨量由少到多大致為：森林＜草原＜沙漠"], "ans": 0, "exp": "陸域生態系主受溫度與雨量影響，年雨量沙漠＜草原＜森林，森林與草原常以年雨量約750mm為界；凍原是高緯/高海拔低溫所致。（eco，課本對應：陸域生態系）"}, {"tid": "eco", "q": "台江地區的河口生態系是海水與淡水交會處，下列關於河口生態系的敘述何者正確？", "opts": ["只有淡水生物，沒有任何耐鹽生物", "鹽度與水位變化大，常見紅樹林、招潮蟹與彈塗魚，以碎屑食物鏈為主", "鹽度與水位終年穩定不變，與外海完全相同", "完全沒有植物生長，是生物多樣性最低的水域"], "ans": 1, "exp": "河口海淡水交會、鹽度與水位變化大，紅樹林（水筆仔、海茄苳）耐鹽、有支持根/呼吸根，招潮蟹、彈塗魚棲息，以有機碎屑食物鏈為主。（eco，課本對應：河口生態系）"}, {"tid": "eco", "q": "海洋可依水深與光照由岸向海分為潮間帶、淺海區（大陸棚）與大洋區，下列關於各分區的敘述何者正確？", "opts": ["人工魚礁多放置於完全無光的深海大洋區", "潮間帶位於最深處，終年照不到陽光", "大洋區陽光可完全穿透到海底", "淺海區（大陸棚）陽光可達、生物種類多，常見珊瑚礁；大洋區以水深約200公尺分透光區與無光區"], "ans": 3, "exp": "海洋由岸到海分潮間帶→淺海區（大陸棚，光可達、生物多、珊瑚礁）→大洋區（以約200公尺分透光/無光區）；人工魚礁多置於淺海區。（eco，課本對應：海洋分區）"}, {"tid": "conserv", "q": "生物多樣性分為三個層次，下列關於「遺傳（基因）多樣性」的敘述何者正確？", "opts": ["指不同國家擁有的保護區數量", "指一地區物種種類的豐富度", "指一區域內棲地或生態系類型的多樣", "指同一物種內個體間基因或性狀的變異，例如同種綠豆有不同品系"], "ans": 3, "exp": "遺傳多樣性是同一物種內基因/性狀的變異（如同種綠豆品系、人類膚色）；物種多樣性指種類豐富度、生態系多樣性指棲地類型多寡。（conserv，課本對應：多樣性三層次）"}, {"tid": "conserv", "q": "下列哪一種生物是台灣的「本土（原生）種」，而非外來入侵種？", "opts": ["小花蔓澤蘭", "綠鬣蜥", "藍腹鷳", "福壽螺"], "ans": 2, "exp": "藍腹鷳是台灣特有原生鳥類；福壽螺、綠鬣蜥、小花蔓澤蘭皆為台灣常見的外來入侵種。（conserv，課本對應：本土種與外來入侵種）"}, {"tid": "conserv", "q": "關於各項國際保育公約或組織的職責配對，下列何者正確？", "opts": ["華盛頓公約（CITES）—保護臭氧層", "蒙特婁議定書—管制瀕危野生動植物的國際貿易", "京都議定書—編製物種紅皮書（紅色名錄）", "拉姆薩公約—保育溼地（候鳥與水鳥棲地，如黑面琵鷺）"], "ans": 3, "exp": "拉姆薩公約保育溼地；CITES（華盛頓公約）管制瀕危物種國際貿易、蒙特婁議定書保護臭氧層、京都議定書減溫室氣體、紅皮書由IUCN編製，其餘三項配對皆錯。（conserv，課本對應：保育公約）"}, {"tid": "conserv", "q": "台江國家公園是重要的溼地，每年吸引大量黑面琵鷺度冬。下列哪一項做法最符合「永續」與生物多樣性保育的精神？", "opts": ["維護溼地棲地完整、推動生態旅遊並落實5R減少資源浪費", "捕捉黑面琵鷺販售以增加收入", "大量引進外來物種以增加當地的生物種類", "填平溼地開發為遊樂設施以增加遊客"], "ans": 0, "exp": "保育應維護棲地、生態旅遊與5R（拒用、減量、重複使用、修復、回收）；引進外來種不會增加本地多樣性反使本土種減少，填溼地與捕捉保育鳥皆破壞生態。（conserv，課本對應：永續與保育行動）"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
