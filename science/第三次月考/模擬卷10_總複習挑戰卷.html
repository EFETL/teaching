<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}
header h1{font-size:1.4rem;font-weight:800}
header p{margin-top:5px;font-size:.82rem;opacity:.88}
.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}
#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}

#ptbar{height:5px;background:rgba(255,255,255,.2);width:160px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}

.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}

.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}
</style>

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "關於分類階層「界、門、綱、目、科、屬、種」，下列敘述何者正確？", "opts": ["越下層的生物彼此外形差異越大", "同科的兩生物一定也同綱與同門", "階層越往上（界）所含生物種類越少", "同屬的兩生物分類階層上彼此較疏遠"], "ans": 1, "exp": "分類由大到小為界門綱目科屬種，下層必包含於上層，故同科者必同綱、同門。同屬親緣最近、越下層種類越少、特徵越相似。（課本對應：分類基礎 cls）"}, {"tid": "cls", "q": "四種生物學名如表，依二名法判斷，何者敘述正確？（如表）<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">代號</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">學名</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">甲</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">Panthera tigris</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">乙</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">Panthera leo</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">丙</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">Felis catus</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">丁</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">Canis lupus</td></tr></table>", "opts": ["甲與乙同屬，親緣關係最接近", "學名屬名應小寫、種小名大寫", "丙與丁因種小名相同故為同一物種", "四者皆同屬，僅種小名不同"], "ans": 0, "exp": "甲乙屬名同為Panthera，親緣最近。屬名首字大寫、種小名小寫；種小名相同不代表同種；丙丁屬名不同。（課本對應：二名法 cls）"}, {"tid": "cls", "q": "小明用二分檢索表分辨生物，下列何者是檢索表分類所依據的最佳特徵？", "opts": ["生物的體型大小與顏色", "生物對人類是否有益", "生物的構造特徵與親緣關係", "生物所棲息的地理位置"], "ans": 2, "exp": "分類依構造特徵與親緣關係逐層二分，不依棲地、外形或對人利害。（課本對應：檢索表 cls）"}, {"tid": "plant", "q": "依台灣四大類植物物種百分比（蘚苔26.1%、蕨類10.9%、裸子1.5%、被子61.5%），下列推算何者正確？（如表）<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類別</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蘚苔</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蕨類</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">裸子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">被子</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">百分比(%)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">26.1</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">10.9</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">1.5</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">61.5</td></tr></table>", "opts": ["不開花的植物約占62.0%", "具維管束者約占26.1%", "受精需以水為媒介者約占37.0%", "能形成果實者約占63.0%"], "ans": 2, "exp": "受精需水為蘚苔+蕨=37.0%；能結果者僅被子61.5%；不開花為蘚苔+蕨+裸子=38.5%；有維管束為蕨+裸+被=73.9%。（課本對應：植物界 plant）"}, {"tid": "plant", "q": "將蘚苔、蕨類、裸子、被子四類植物依「演化由簡到繁」排序，下列何者正確？", "opts": ["蕨類→蘚苔→被子→裸子", "蘚苔→蕨類→裸子→被子", "被子→裸子→蕨類→蘚苔", "裸子→被子→蕨類→蘚苔"], "ans": 1, "exp": "演化由簡到繁為蘚苔（無維管束）→蕨類（最早維管束、孢子）→裸子（種子裸露、毬果）→被子（有花有果）。（課本對應：植物界 plant）"}, {"tid": "plant", "q": "關於蕨類與裸子植物的比較，下列何者正確？", "opts": ["蕨類以孢子繁殖、裸子以種子繁殖，兩者皆有維管束", "蕨類有花粉管受精不需水、裸子受精需水", "兩者皆以種子繁殖，但裸子受精仍需水", "兩者皆無維管束，靠假根吸水"], "ans": 0, "exp": "蕨類有維管束但無種子、靠孢子且受精需水；裸子有維管束與種子、有花粉管故受精不需水。（課本對應：植物界 plant）"}, {"tid": "plant", "q": "觀察一植物：莖肥大儲水、葉退化為針狀、會開花並結出包住種子的果實。關於此植物（仙人掌類）的分類，何者正確？", "opts": ["屬蕨類植物，因外形似乾旱適應", "屬裸子植物，因葉為針狀如松杉", "屬蘚苔植物，因生於乾旱無維管束", "屬被子植物，因有花有果實"], "ans": 3, "exp": "分類依「有花有果」判定，仙人掌有花結果為被子植物；針葉肥莖只是乾旱適應，與松杉的裸子身分無關。（課本對應：植物界 plant）"}, {"tid": "plant", "q": "取得一片葉子，葉脈為平行脈、根為鬚根、花瓣數為3的倍數。下列關於此植物的判斷何者正確？", "opts": ["為蕨類植物，以孢子繁殖無種子", "為裸子植物，胚珠裸露無果實", "為單子葉植物，種子有1片子葉、維管束散生", "為雙子葉植物，種子有2片子葉、軸根"], "ans": 2, "exp": "平行脈、鬚根、花瓣3倍數、維管束散生、子葉1片為單子葉（如玉米、稻）；雙子葉為網狀脈、軸根、子葉2、維管束環狀。（課本對應：被子植物 plant）"}, {"tid": "inv", "q": "下列無脊椎動物，何者具有刺絲胞、輻射對稱、有口無肛門且常固著生活？", "opts": ["蚯蚓", "渦蟲", "海星", "珊瑚"], "ans": 3, "exp": "珊瑚為刺絲胞動物，具刺絲胞、輻射對稱、有口無肛門、可出芽生殖且固著。渦蟲為扁形、蚯蚓為環節、海星為棘皮。（課本對應：無脊椎動物 inv）"}, {"tid": "inv", "q": "關於各無脊椎動物門「身體是否分節」的比較，下列何者正確？", "opts": ["軟體與節肢動物皆分節，環節不分節", "棘皮動物身體分許多相似環節", "刺絲胞動物身體明顯分節，故能蛻皮", "環節與節肢動物身體分節，軟體動物不分節"], "ans": 3, "exp": "環節（蚯蚓）與節肢（蝦蟹昆蟲）身體分節；軟體動物（章魚、文蛤）柔軟不分節；刺絲胞與棘皮為輻射對稱不分節。（課本對應：無脊椎動物 inv）"}, {"tid": "inv", "q": "某動物具外骨骼、附肢分節、會週期性蛻皮，且是動物界中種類數量最多的一門。此動物最可能是下列何者？", "opts": ["海葵", "蝸牛", "海參", "藤壺"], "ans": 3, "exp": "具外骨骼、分節附肢、會蛻皮、種類最多者為節肢動物，藤壺屬之。海葵為刺絲胞、蝸牛為軟體、海參為棘皮。（課本對應：節肢動物 inv）"}, {"tid": "inv", "q": "下列四種動物：文蛤、烏賊、鸚鵡螺、海兔，牠們共同的分類門及特徵為何？", "opts": ["皆為棘皮動物，具管足生活於海洋", "皆為刺絲胞動物，具刺絲胞捕食", "皆為節肢動物，具外骨骼會蛻皮", "皆為軟體動物，身體柔軟不分節、多具外套膜"], "ans": 3, "exp": "文蛤、烏賊、鸚鵡螺、海兔皆為軟體動物，身體柔軟不分節、多具外套膜，有的有殼有的無殼。（課本對應：軟體動物 inv）"}, {"tid": "inv", "q": "關於棘皮動物的敘述，下列何者「錯誤」？", "opts": ["體表常具棘刺，如海膽、海星", "成體多呈五輻射對稱", "可生活於淡水與陸地等多種環境", "具有管足可移動與攝食"], "ans": 2, "exp": "棘皮動物（海星、海膽、海參）僅生活於海洋，不見於淡水與陸地；具管足、成體五輻射對稱、體表多棘。（課本對應：棘皮動物 inv）"}, {"tid": "inv", "q": "渦蟲與絛蟲同屬扁形動物，下列何者為其共同特徵？", "opts": ["身體背腹扁平、有口無肛門", "身體分許多相似環節、有剛毛", "具刺絲胞、可行出芽生殖", "具外骨骼、附肢分節會蛻皮"], "ans": 0, "exp": "扁形動物身體背腹扁平、有口無肛門。分節有剛毛為環節；外骨骼蛻皮為節肢；刺絲胞出芽為刺絲胞動物。（課本對應：扁形動物 inv）"}, {"tid": "vert", "q": "關於「爬蟲類比兩生類更能適應陸地生活」的關鍵原因，下列何者正確？", "opts": ["以乳腺哺乳、胎生不需在水中產卵", "體內受精、卵具殼、體表鱗片可減少水分散失", "體溫恆定、具羽毛保暖故能離開水域", "幼體用鰓呼吸、成體用肺呼吸故不必回水"], "ans": 1, "exp": "爬蟲類體內受精、卵具殼故不必回水生殖，體表鱗片/骨板減少水分散失、用肺呼吸，較兩生類適應陸地。恆溫羽毛是鳥類、哺乳哺乳。（課本對應：脊椎動物 vert）"}, {"tid": "vert", "q": "鴨嘴獸具有乳腺可分泌乳汁哺育幼體，卻又會產卵。依分類其應歸為哪一類？", "opts": ["兩生類，因生殖需近水環境", "鳥類，因卵生且有硬殼卵", "哺乳類，因具乳腺哺乳為哺乳類特徵", "爬蟲類，因卵生且體表特殊"], "ans": 2, "exp": "分類依乳腺哺乳此關鍵特徵，鴨嘴獸雖卵生仍為哺乳類（無乳頭、無臍帶）；卵生不等於鳥或爬蟲。（課本對應：脊椎動物 vert）"}, {"tid": "vert", "q": "用脊椎動物的特徵逐步檢索：某動物體溫不恆定（外溫）、體內受精、體表具鱗片或骨板。牠最可能是下列何者？", "opts": ["鯊魚", "青蛙", "麻雀", "蜥蜴"], "ans": 3, "exp": "外溫＋體內受精＋鱗片/骨板為爬蟲類，蜥蜴屬之。青蛙為兩生（體外受精、皮膚裸露）、麻雀內溫、鯊魚為魚類。（課本對應：脊椎動物 vert）"}, {"tid": "vert", "q": "關於軟骨魚（如鯊魚、魟魚）與硬骨魚的比較，下列何者正確？", "opts": ["軟骨魚為內溫動物、體內受精", "軟骨魚有鰓裂、無鰓蓋、無鰾", "軟骨魚有鰓蓋與鰾故能調節浮力", "軟骨魚體表無鱗、以肺呼吸"], "ans": 1, "exp": "軟骨魚骨骼為軟骨、有鰓裂、無鰓蓋、無鰾；硬骨魚有鰓蓋與鰾。魚類皆外溫、以鰓呼吸。（課本對應：脊椎動物 vert）"}, {"tid": "vert", "q": "企鵝、蝙蝠、鯨、海豚四種動物，下列關於分類的敘述何者正確？", "opts": ["四者皆為哺乳類，因都會游泳或飛行", "鯨與海豚是魚類，因生活於水中", "企鵝是鳥類，其餘三者皆為哺乳類", "企鵝與蝙蝠同為鳥類，因都會飛"], "ans": 2, "exp": "企鵝有羽毛為鳥類；蝙蝠、鯨、海豚以乳腺哺乳為哺乳類，分類依特徵與親緣不依會飛或棲地。（課本對應：脊椎動物 vert）"}, {"tid": "vert", "q": "鳥類能飛行與其下列哪一項構造或特徵「無直接關係」？", "opts": ["瞬膜保護眼睛", "前肢特化為翼", "具氣囊輔助呼吸（雙重呼吸）", "骨骼中空輕盈"], "ans": 0, "exp": "瞬膜功能為保護與濕潤眼睛，與飛行無直接關係；中空骨、氣囊、特化為翼皆為飛行適應。（課本對應：脊椎動物 vert）"}, {"tid": "pop", "q": "研究者在某湖以標識再捕法估算鯽魚族群：第一次捕捉標記80尾後放回，第二次共捕到90尾，其中有6尾帶標記。此湖鯽魚族群總數約為多少尾？", "opts": ["540", "960", "1200", "720"], "ans": 2, "exp": "族群總數＝標記數×再捕總數÷再捕中標記數＝80×90÷6＝1200尾。鯽魚會自由活動並混合，適用標識再捕法。（課本對應：族群估算 pop）"}, {"tid": "pop", "q": "在1000平方公尺草地隨機取三個各5平方公尺樣區，分別數得某種草本35、40、45株。以樣區法估算，全區此種草本約有多少株？", "opts": ["1200", "120", "4000", "8000"], "ans": 3, "exp": "平均每樣區＝(35+40+45)÷3＝40株，總數＝40×(1000÷5)＝40×200＝8000株。固著的草本適用樣區法。（課本對應：族群估算 pop）"}, {"tid": "pop", "q": "下列四種情形，何者「不適合」用標識再捕法估算族群數量？", "opts": ["在草原自由活動的野兔", "林間飛行的某種野鳥", "紅樹林海岸固著生長的水筆仔", "湖中能自由游動的鯉魚"], "ans": 2, "exp": "標識再捕法適用能自由活動並與族群混合者；固著不移動的水筆仔應用樣區法。野兔、鯉魚、野鳥皆適用標識再捕。（課本對應：族群估算 pop）"}, {"tid": "pop", "q": "族群數量呈S型成長曲線（如圖），關於各階段的敘述何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">時間</text><text x=\"52\" y=\"46\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">族群數量</text><line x1=\"60\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#0a7ea4\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/> \">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["乙段族群已達負荷量故停止增長", "甲段因資源充足故為指數快速增長期", "負荷量是指環境能短期容納的最小族群數", "丙段族群數量在環境負荷量上下波動而趨於穩定"], "ans": 3, "exp": "S型曲線甲為緩慢期、乙為快速增長期、丙達負荷量後在其上下波動趨於穩定。負荷量是長期可維持的最大數量。（課本對應：族群成長 pop）"}, {"tid": "pop", "q": "某族群一年內：出生150、死亡80、遷入40、遷出30。此族群當年數量變化為何？", "opts": ["維持不變（出生等於死亡）", "增加80（出生＋遷入大於死亡＋遷出）", "減少20（死亡大於出生）", "減少80（遷出大於遷入）"], "ans": 1, "exp": "增加量＝(出生＋遷入)−(死亡＋遷出)＝(150＋40)−(80＋30)＝190−110＝＋80，故增加。（課本對應：族群數量變化 pop）"}, {"tid": "pop", "q": "關於「族群」與「群集」的定義，下列何者正確？", "opts": ["族群是不同種生物個體的集合", "群集是同一區域內所有不同種族群的總合", "族群還包含陽光、空氣等非生物環境", "群集只包含一種生物的所有個體"], "ans": 1, "exp": "族群為同時同區同種個體的總和；群集為同區所有不同種族群的總合；再加非生物環境才是生態系。（課本對應：族群與群集 pop）"}, {"tid": "pop", "q": "森林火災後的裸地上，群集演替（消長）的先後順序，下列何者正確？", "opts": ["喬木森林→灌木→草本→地衣", "草本→地衣→喬木→灌木", "灌木→喬木→草本→地衣", "地衣、苔蘚→草本→灌木→喬木森林"], "ans": 3, "exp": "初級演替先驅常為地衣、苔蘚，再依序為草本、灌木、最後形成喬木森林。（課本對應：群集演替 pop）"}, {"tid": "inter", "q": "小丑魚躲入海葵觸手間避敵、並引來食物，海葵也因小丑魚趕走天敵而受益。此種交互作用為何？", "opts": ["掠食（＋／−）", "片利共生（＋／0）", "寄生（＋／−）", "互利共生（＋／＋）"], "ans": 3, "exp": "雙方皆受益為互利共生。片利為一方得利另一方無影響；寄生與掠食皆有一方受害。（課本對應：交互作用 inter）"}, {"tid": "inter", "q": "鯨魚背上附著藤壺，藤壺藉鯨魚移動取得食物與棲所，鯨魚則無明顯影響。此關係為何？", "opts": ["寄生（＋／−）", "競爭（−／−）", "片利共生（＋／0）", "互利共生（＋／＋）"], "ans": 2, "exp": "藤壺受益、鯨魚無明顯得失為片利共生。鯊魚與鮣魚、大樹與鳥巢蕨同屬此類。（課本對應：交互作用 inter）"}, {"tid": "inter", "q": "以＋、−、0表示交互作用對某生物的影響。若兩生物間，甲受到的影響為＋、乙受到的影響為−，則甲乙間關係最可能為何？", "opts": ["甲乙為競爭，雙方皆受害", "甲乙無交互作用，互不影響", "甲為寄生者或掠食者，乙為宿主或被食者", "甲乙為互利共生，雙方皆得利"], "ans": 2, "exp": "一方＋一方−表一方得利、一方受害，為寄生或掠食（甲得利、乙受害）。互利為＋／＋、競爭為−／−。（課本對應：符號判讀 inter）"}, {"tid": "inter", "q": "下列生物防治的做法，何者「不正確」或「不適合」？", "opts": ["放養蓋斑鬥魚捕食孑孓以減少病媒蚊", "利用互利共生關係的生物來消滅害蟲", "以瓢蟲防治蚜蟲", "以平腹小蜂寄生荔枝椿象卵"], "ans": 1, "exp": "生物防治利用天敵（掠食、寄生、競爭）控制有害生物，不能用互利共生；瓢蟲、蓋斑鬥魚、平腹小蜂皆為正確例子。（課本對應：生物防治 inter）"}, {"tid": "inter", "q": "在同一水缸中混養兩種習性與食性相近的魚，一段時間後兩者生長曲線「雙雙下降」。此現象最可能反映何種交互作用？", "opts": ["競爭（爭奪相同有限資源，雙方皆受影響）", "掠食（一方吃另一方）", "互利共生（雙方皆得利）", "片利共生（一方得利、一方無影響）"], "ans": 0, "exp": "兩者爭奪相同有限資源致雙雙下降為競爭（−／−）。互利會雙升、掠食一方上升一方下降。（課本對應：競爭 inter）"}, {"tid": "energy", "q": "在某生態系中，生產者固定的能量為80000大卡。依10%法則，第三級消費者約可獲得多少大卡的能量？", "opts": ["8", "8000", "80", "800"], "ans": 2, "exp": "每升一營養階層能量約剩10%，生產者→初級→次級→三級共升三階：80000×0.1×0.1×0.1＝80大卡。（課本對應：能量塔 energy）"}, {"tid": "energy", "q": "在能量塔（能量金字塔）中，每升高一個營養階層能量約只剩前一階的10%，主要原因為何？", "opts": ["高階消費者數量少故能量自然減少", "能量會在各階層間循環利用故逐漸集中", "約90%的能量被生物以呼吸作用及熱能散失，無法傳遞", "下層生物把能量儲存起來不傳給上層"], "ans": 2, "exp": "能量單向流動，每階約90%以呼吸作用與熱能散失，僅約10%傳至上一階，故能量塔底寬頂窄、階層不超過4~5階。（課本對應：能量流動 energy）"}, {"tid": "energy", "q": "關於「能量」與「物質」在生態系中的流動方式，下列何者正確？", "opts": ["物質單向流動不能循環、能量則可循環", "能量單向流動逐級遞減、最終以熱散失；物質可循環", "能量與物質皆為單向流動且無法循環", "能量與物質皆可在生物與環境間循環不滅"], "ans": 1, "exp": "能量單向流動、逐級遞減、最終以熱散失，不能循環；碳、氮、水等物質才能循環。（課本對應：能量流動 energy）"}, {"tid": "energy", "q": "深海熱泉生態系不見陽光，其生態系最基礎的能量來源為何？", "opts": ["海水中藻類的光合作用", "上層落下的有機碎屑提供光能", "熱泉噴出的高溫直接轉為食物", "硫化菌利用硫化氫的化學能（化學自營）"], "ans": 3, "exp": "深海無光，生產者為硫化菌（化學自營），以硫化氫的化學能合成有機物，是此生態系能量基礎，不需陽光。（課本對應：能量來源 energy）"}, {"tid": "energy", "q": "在食物網（如圖）中，關於各生物角色與能量的敘述，下列何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 330\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"330\" fill=\"#ffffff\"/><defs><marker id=\"fa\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 z\" fill=\"#444\"/></marker></defs><line x1=\"63\" y1=\"255\" x2=\"69\" y2=\"204\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"80\" y1=\"272\" x2=\"151\" y2=\"259\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"80\" y1=\"275\" x2=\"266\" y2=\"278\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"84\" y1=\"164\" x2=\"136\" y2=\"94\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"92\" y1=\"178\" x2=\"231\" y2=\"167\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"165\" y1=\"88\" x2=\"237\" y2=\"149\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"271\" y1=\"178\" x2=\"341\" y2=\"235\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"309\" y1=\"271\" x2=\"338\" y2=\"259\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"302\" y1=\"262\" x2=\"398\" y2=\"127\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"192\" y1=\"244\" x2=\"392\" y2=\"121\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><line x1=\"367\" y1=\"231\" x2=\"404\" y2=\"131\" stroke=\"#444\" stroke-width=\"1.4\" marker-end=\"url(#fa)\"/><circle cx=\"60\" cy=\"275\" r=\"19\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"60\" y=\"280\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">草</text><circle cx=\"72\" cy=\"180\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"72\" y=\"185\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蝗蟲</text><circle cx=\"175\" cy=\"255\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"175\" y=\"260\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">兔</text><circle cx=\"290\" cy=\"278\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"290\" y=\"283\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">鼠</text><circle cx=\"150\" cy=\"75\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"150\" y=\"80\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蜘蛛</text><circle cx=\"255\" cy=\"165\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"255\" y=\"170\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">青蛙</text><circle cx=\"360\" cy=\"250\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"360\" y=\"255\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">蛇</text><circle cx=\"412\" cy=\"108\" r=\"19\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"412\" y=\"113\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">鷹</text><text x=\"230\" y=\"20\" font-size=\"13\" text-anchor=\"middle\" fill=\"#666\">（箭頭由被食者指向捕食者）</text></svg></div>", "opts": ["蛇與蝗蟹同為生產者，皆能行光合作用", "草為生產者，能量沿箭頭由被食者流向捕食者且逐級遞減", "箭頭方向代表能量由捕食者流向被食者", "鷹位於最底層營養階，可用能量最多"], "ans": 1, "exp": "草為生產者，箭頭由被食者指向捕食者代表能量流向，且逐級遞減；鷹為高階能量最少，蛇等為消費者不行光合。（課本對應：食物網 energy）"}, {"tid": "energy", "q": "關於分解者在生態系中的角色，下列何者正確？", "opts": ["只把能量循環回生產者，使能量不減少", "分解遺體與排泄物，使物質回歸環境供再利用", "只捕食活的動物，屬高階消費者", "行光合作用把光能轉為化學能，屬生產者"], "ans": 1, "exp": "分解者（細菌、真菌）分解遺體與排泄物使物質回歸環境循環。生產者行光合、消費者攝食活體；能量不能循環。（課本對應：分解者 energy）"}, {"tid": "cycle", "q": "關於碳循環中各作用對大氣CO₂的影響，下列何者正確？", "opts": ["分解者只固碳不放碳，故能減少CO₂", "呼吸作用是唯一能減少大氣CO₂的途徑", "燃燒化石燃料不影響碳循環", "光合作用減少大氣CO₂；呼吸、分解、燃燒增加大氣CO₂"], "ans": 3, "exp": "固碳（減CO₂）唯有光合作用；呼吸、分解、燃燒皆釋碳增加CO₂。分解者會放碳、燃燒會大量增加CO₂。（課本對應：碳循環 cycle）"}, {"tid": "cycle", "q": "四種生物體內某難分解脂溶性毒物濃度如表，依生物放大作用判斷，何者為食物鏈中最高級消費者與生產者？（如表）<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">毒物濃度(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丙為最高級消費者，丁為生產者", "甲為最高級消費者，丙為生產者", "乙為最高級消費者，甲為生產者", "丁為最高級消費者，丙為生產者"], "ans": 0, "exp": "毒物沿食物鏈逐級濃縮，營養階層越高濃度越高。濃度由低到高丁0.04→乙0.2→甲2.0→丙20，故丙最高級、丁為生產者。（課本對應：生物放大 cycle）"}, {"tid": "cycle", "q": "關於水域「優養化」的發生過程與結果，下列何者正確？", "opts": ["優養化是因水溫過低造成藻類死亡", "氮、磷過多致藻類大量繁殖，遮光與分解耗氧使溶氧大減、魚蝦死亡", "水中營養鹽過多會使溶氧增加，魚蝦更繁盛", "優養化只發生於海洋，淡水不會發生"], "ans": 1, "exp": "優養化為氮磷過多→藻類水華→遮光使水下藻死、夜間呼吸與分解耗氧→溶氧大減→魚蝦死、水質惡化。淡水海水皆可能發生。（課本對應：優養化 cycle）"}, {"tid": "cycle", "q": "關於甲基汞與生物放大作用，下列敘述何者「錯誤」？", "opts": ["甲基汞易分解，故不會沿食物鏈累積", "甲基汞累積過量會造成水俁病", "營養階層越高的生物體內甲基汞濃度越高", "減少攝食受汙染魚的內臟與脂肪可降低毒物攝入"], "ans": 0, "exp": "甲基汞難分解、脂溶性，會沿食物鏈逐級累積、高階最濃；累積過量致水俁病。「易分解不累積」敘述錯誤。（課本對應：生物放大 cycle）"}, {"tid": "eco", "q": "關於「生物圈」的敘述，下列何者正確？", "opts": ["月球表面也屬於地球生物圈的一部分", "範圍約海平面上下各約1萬公里，永不變動", "範圍約海平面上下各約1萬公尺，且會隨生物的發現或滅絕而改變", "生物在生物圈中分布極為平均"], "ans": 2, "exp": "生物圈為所有生物及其環境總和，範圍約海平面上下各約1萬公尺（合計約2萬公尺），會隨生物發現或滅絕而改變、分布不均、不含月球。（課本對應：生物圈 eco）"}, {"tid": "eco", "q": "陸域生態系主要受溫度與雨量影響。依年雨量由少到多排序，下列何者正確？", "opts": ["沙漠＜草原＜森林", "森林＜草原＜沙漠", "草原＜沙漠＜森林", "森林＜沙漠＜草原"], "ans": 0, "exp": "年雨量由少到多為沙漠＜草原＜森林，森林與草原常以年雨量約750mm為分界。（課本對應：陸域生態系 eco）"}, {"tid": "eco", "q": "海洋由岸到海可分為潮間帶、淺海區（大陸棚）、大洋區。下列關於各區的敘述何者正確？", "opts": ["無光區生物完全不依賴上層落下的有機碎屑", "潮間帶終年完全淹沒於海水中", "淺海區（大陸棚）陽光無法到達故無生產者", "大洋區以水深約200公尺分為透光區與無光區"], "ans": 3, "exp": "海洋由岸到海分潮間帶→淺海區（大陸棚）→大洋區，大洋區以約200公尺分透光/無光區。潮間帶受潮汐升降、淺海光可達、無光區靠上層碎屑或化學合成。（課本對應：水域生態系 eco）"}, {"tid": "eco", "q": "河口生態系（如紅樹林）的環境特徵與適應，下列何者正確？", "opts": ["以浮游植物光合食物鏈為唯一能量來源，無碎屑食物鏈", "水筆仔屬裸子植物，以毬果生殖", "為穩定淡水環境，鹽度終年不變", "海淡水交會、鹽度與水位變化大，紅樹林具支持根與耐鹽呼吸根"], "ans": 3, "exp": "河口海淡水交會、鹽度水位變化大，紅樹林有支持根、呼吸根、胎生苗適應；以碎屑食物鏈為主；水筆仔為被子植物。（課本對應：河口生態系 eco）"}, {"tid": "conserv", "q": "關於生物多樣性三層次，下列配對何者正確？", "opts": ["同種綠豆有不同品系→遺傳（基因）多樣性", "一地區物種種類豐富→生態系多樣性", "人類有不同膚色→生態系多樣性", "一區域有溼地、闊葉林、草原並存→物種多樣性"], "ans": 0, "exp": "同種內基因/性狀變異（綠豆品系、人膚色）為遺傳多樣性；物種種類豐富為物種多樣性；多種棲地並存為生態系多樣性。（課本對應：生物多樣性 conserv）"}, {"tid": "conserv", "q": "下列關於保育公約或議定書的配對，何者正確？", "opts": ["IUCN紅皮書—管制瀕危野生動植物的國際貿易", "華盛頓公約（CITES）—保護臭氧層", "京都議定書—保育溼地與候鳥", "拉姆薩公約—保育溼地；蒙特婁議定書—保護臭氧層（管制CFC）"], "ans": 3, "exp": "拉姆薩保溼地、蒙特婁管CFC保臭氧層、CITES管瀕危物種貿易、IUCN紅皮書評滅絕風險、京都/巴黎減溫室氣體。（課本對應：保育公約 conserv）"}, {"tid": "conserv", "q": "IUCN紅皮書（紅色名錄）依物種滅絕風險分級。下列由風險「高到低」排序何者正確？", "opts": ["易危(VU)＞極危(CR)＞瀕危(EN)＞無危(LC)", "極危(CR)＞瀕危(EN)＞易危(VU)＞無危(LC)", "無危(LC)＞易危(VU)＞瀕危(EN)＞極危(CR)", "瀕危(EN)＞極危(CR)＞無危(LC)＞易危(VU)"], "ans": 1, "exp": "IUCN風險由高到低：EX>EW>CR極危>EN瀕危>VU易危>NT>LC無危。故CR>EN>VU>LC正確。（課本對應：IUCN紅皮書 conserv）"}, {"tid": "conserv", "q": "下列四種生物，何者「不是」台灣的外來入侵種？", "opts": ["櫻花鉤吻鮭", "小花蔓澤蘭", "綠鬣蜥", "福壽螺"], "ans": 0, "exp": "櫻花鉤吻鮭為台灣本土（原生）保育類；福壽螺、小花蔓澤蘭、綠鬣蜥皆為外來入侵種。引進外來種不會增加本地多樣性。（課本對應：外來入侵種 conserv）"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
