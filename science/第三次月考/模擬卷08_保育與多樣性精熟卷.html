<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "生物分類的階層由大到小排列，下列何者正確？", "opts": ["界 → 綱 → 門 → 科 → 目 → 屬 → 種", "界 → 門 → 綱 → 目 → 科 → 屬 → 種", "種 → 屬 → 科 → 目 → 綱 → 門 → 界", "門 → 界 → 綱 → 目 → 科 → 種 → 屬"], "ans": 1, "exp": "cls：分類階層由大到小為界、門、綱、目、科、屬、種，種是最基本單位；越下層親緣越近、種類越少。其餘排序錯誤。(課本對應)"}, {"tid": "cls", "q": "關於林奈的「二名法」，下列敘述何者正確？", "opts": ["學名由綱名加目名組成", "學名一律用中文書寫且不分大小寫", "同屬的兩種生物親緣關係通常較遠", "學名由屬名加種小名組成，以拉丁文斜體書寫、屬名首字母大寫"], "ans": 3, "exp": "cls：二名法學名＝屬名＋種小名，拉丁文斜體、屬名首字大寫；同屬生物親緣較近。學名非綱目組成、非中文、同屬非較遠。(課本對應)"}, {"tid": "plant", "q": "下列哪一類植物「最早演化出維管束」，有真正的根莖葉、但以孢子繁殖、無種子？", "opts": ["被子植物", "蘚苔植物", "裸子植物", "蕨類植物"], "ans": 3, "exp": "plant：蕨類最早演化出維管束、有真正根莖葉、以孢子繁殖、無種子。蘚苔無維管束，裸子與被子以種子繁殖。(課本對應)"}, {"tid": "plant", "q": "關於蘚苔植物（如地錢、土馬騌）的敘述，下列何者正確？", "opts": ["會開花並結出包住種子的果實", "具發達維管束且植株高大", "以毬果繁殖且受精不需水", "無維管束、植株矮小、受精時需以水為媒介，是最早登陸的植物"], "ans": 3, "exp": "plant：蘚苔無維管束、矮小、生陰濕處、受精需水，是最早登陸的植物。發達維管束是蕨類以上，毬果是裸子，開花結果是被子。(課本對應)"}, {"tid": "plant", "q": "裸子植物與被子植物最主要的差異在於下列何者？", "opts": ["裸子植物無維管束，被子植物才有維管束", "裸子植物有花有果，被子植物無花無果", "裸子植物胚珠裸露、無花無果實，被子植物有花且種子被果實包住", "兩者都以孢子繁殖、無種子"], "ans": 2, "exp": "plant：裸子胚珠裸露、無真正花與果實、以毬果生殖；被子有花、種子由子房發育成的果實包住。兩者皆有種子與維管束。(課本對應)"}, {"tid": "plant", "q": "下列關於單子葉與雙子葉植物的比較，何者正確？", "opts": ["兩者花瓣數目都固定為 7 片", "單子葉葉脈多為平行脈、根多為鬚根；雙子葉葉脈多為網狀脈、根多為軸根", "單子葉子葉有兩片、雙子葉子葉有一片", "單子葉葉脈為網狀脈、雙子葉為平行脈"], "ans": 1, "exp": "plant：單子葉—子葉1、鬚根、平行脈、花瓣3或3倍數；雙子葉—子葉2、軸根、網狀脈、花瓣4/5倍數。選項把特徵對調或寫錯。(課本對應)"}, {"tid": "inv", "q": "水螅、水母、海葵與珊瑚都具有可捕食獵物的特化構造，並有口無肛門。牠們屬於下列哪一類動物？", "opts": ["棘皮動物", "環節動物", "刺絲胞動物", "軟體動物"], "ans": 2, "exp": "inv：水螅、水母、海葵、珊瑚具刺絲胞捕食、輻射對稱、有口無肛門，屬刺絲胞動物。軟體柔軟不分節、環節分節、棘皮具管足，皆不符。(課本對應)"}, {"tid": "inv", "q": "昆蟲、蝦蟹、蜘蛛與蜈蚣共同具有的特徵是下列何者？牠們也是動物界中種類最多的一門。", "opts": ["具外骨骼、身體與附肢分節、會蛻皮", "體表具管足、輻射對稱", "身體背腹扁平、有口無肛門", "身體柔軟不分節、具外套膜"], "ans": 0, "exp": "inv：節肢動物具外骨骼、身體與附肢分節、會蛻皮，種類最多。柔軟不分節是軟體，管足是棘皮，背腹扁平是扁形動物。(課本對應)"}, {"tid": "inv", "q": "海星、海膽、海參都僅生活於海洋，並具有特殊的運動構造，下列何者為其共同特徵？", "opts": ["具刺絲胞捕食、可行出芽生殖", "身體分成許多相似的環節、具剛毛", "具外套膜、許多種類有殼", "具管足、體表多有棘、成體多為五輻對稱"], "ans": 3, "exp": "inv：棘皮動物具管足、體表有棘、成體五輻對稱、僅生活於海洋。刺絲胞是腔腸，環節有剛毛，外套膜是軟體，皆非棘皮特徵。(課本對應)"}, {"tid": "inv", "q": "文蛤、蝸牛、章魚與烏賊雖然外形差異很大，但都屬於同一類動物。下列何者為牠們的共同特徵？", "opts": ["體表具管足且為輻射對稱", "身體柔軟、不分節，多具外套膜，有的有殼有的無殼", "身體分成許多相似環節並具剛毛", "具外骨骼且身體分節、會蛻皮"], "ans": 1, "exp": "inv：軟體動物身體柔軟不分節、多具外套膜，章魚烏賊無殼、文蛤蝸牛有殼。外骨骼分節是節肢，管足是棘皮，環節剛毛是環節動物。(課本對應)"}, {"tid": "vert", "q": "關於爬蟲類「比兩生類更能適應陸地生活」的原因，下列敘述何者正確？", "opts": ["成體必須以鰓呼吸", "體表裸露濕潤、無法防止水分散失", "體內受精且卵具殼、體表有鱗片或骨板可減少水分散失，用肺呼吸", "卵無殼且必須產在水中孵化"], "ans": 2, "exp": "vert：爬蟲類體內受精、卵具殼、不必回水中生殖，體表鱗片/骨板防水、用肺呼吸，故更適應陸地。卵無殼、鰓呼吸、體表裸露皆為兩生類特徵。(課本對應)"}, {"tid": "vert", "q": "下列哪一種動物雖名為「魚」或常被誤認，實際上卻是哺乳類？", "opts": ["海豚", "彈塗魚", "鯊魚", "魟魚"], "ans": 0, "exp": "vert：海豚用肺呼吸、胎生哺乳，是哺乳類。鯊魚、魟魚是軟骨魚，彈塗魚是硬骨魚，三者都是真正的魚。(課本對應)"}, {"tid": "vert", "q": "關於鳥類能適應飛行的構造特徵，下列敘述何者「錯誤」？", "opts": ["瞬膜是飛行的主要動力來源", "具氣囊輔助呼吸，可進行雙重呼吸", "前肢特化為翼、體表覆有羽毛", "骨骼中空而輕、有助於減輕體重"], "ans": 0, "exp": "vert：瞬膜是保護眼睛的構造，與飛行動力無直接關係，故為錯誤敘述。骨骼中空、氣囊雙重呼吸、前肢成翼與羽毛才是飛行適應。(課本對應)"}, {"tid": "vert", "q": "鴨嘴獸與針鼴是相當特別的動物，牠們有乳腺可哺乳，卻以卵生方式繁殖。牠們被歸為哪一類？", "opts": ["哺乳類", "鳥類", "爬蟲類", "兩生類"], "ans": 0, "exp": "vert：鴨嘴獸、針鼴雖卵生，但具乳腺哺乳，是哺乳類（特例）。鳥類有羽毛、爬蟲類無乳腺、兩生類卵無殼且需回水，皆不符。(課本對應)"}, {"tid": "vert", "q": "軟骨魚（如鯊魚、魟魚）與一般硬骨魚相比，下列敘述何者正確？", "opts": ["軟骨魚骨骼為軟骨、有鰓裂無鰓蓋、無鰾", "軟骨魚有鰓蓋且具鰾", "軟骨魚以肺呼吸", "軟骨魚的體溫為恆溫（內溫）"], "ans": 0, "exp": "vert：軟骨魚骨骼為軟骨、有鰓裂、無鰓蓋也無鰾。鰓蓋與鰾是硬骨魚特徵，魚類以鰓呼吸、為外溫動物。(課本對應)"}, {"tid": "pop", "q": "關於「族群」與「群集」的定義，下列敘述何者正確？", "opts": ["族群是同一時間、同一區域內同種生物的所有個體；群集是同一區域內所有不同族群的總合", "群集只計算一種生物的數量", "族群是不同種生物的總合；群集是同種生物的所有個體", "族群已包含非生物環境"], "ans": 0, "exp": "pop：族群＝同時間同區域同種所有個體；群集＝同區域所有不同種族群的總合。加上非生物環境才是生態系，選項把定義對調或混入環境。(課本對應)"}, {"tid": "pop", "q": "研究人員想估算某湖中能自由游動的鯽魚數量，第一次捕捉並標記 80 尾後放回，第二次捕到 100 尾，其中有標記的 20 尾。依標識再捕法，此湖鯽魚總數約為多少尾？", "opts": ["160", "2000", "500", "400"], "ans": 3, "exp": "pop：標識再捕法總數＝標記數×再捕總數÷再捕中標記數＝80×100÷20＝400 尾。其餘為錯誤運算（如未除、除錯數）。(課本對應)"}, {"tid": "pop", "q": "想估算一片草地上某種固著生長的車前草數量，下列哪一種估算法最適合？", "opts": ["直接全面捕捉法", "標識再捕法", "樣區法（樣方法）", "捉放法"], "ans": 2, "exp": "pop：固著或移動慢的植物適用樣區法。標識再捕（捉放）法適用能自由活動並與族群混合的動物，對固著植物不適用。(課本對應)"}, {"tid": "pop", "q": "某研究在面積相同的 3 個樣區中分別數得某植物 28、32、30 株，全區共可分成 20 個這樣大小的樣區。依樣區法估算，全區該植物約有多少株？", "opts": ["300", "90", "1800", "600"], "ans": 3, "exp": "pop：平均每樣區＝(28+32+30)/3＝30 株，總數＝30×20＝600 株。其餘為忘記乘總樣區數或運算錯誤。(課本對應)"}, {"tid": "pop", "q": "關於「環境負荷量（容納量）」與 S 型成長曲線的敘述，下列何者正確？（如圖）<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">時間</text><text x=\"52\" y=\"46\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">族群數量</text><line x1=\"60\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#0a7ea4\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/><text x=\"430\" y=\"74\" font-size=\"12\" text-anchor=\"end\" fill=\"#0a7ea4\">環境負荷量 K</text><path d=\"M60.0,248.1 L63.7,248.0 L67.4,247.8 L71.1,247.6 L74.8,247.3 L78.5,247.1 L82.2,246.8 L85.9,246.5 L89.6,246.2 L93.3,245.9 L97.0,245.5 L100.7,245.1 L104.4,244.6 L108.1,244.1 L111.8,243.6 L115.5,243.0 L119.2,242.4 L122.9,241.7 L126.6,241.0 L130.3,240.2 L134.0,239.3 L137.7,238.4 L141.4,237.3 L145.1,236.2 L148.8,235.1 L152.5,233.8 L156.2,232.4 L159.9,231.0 L163.6,229.4 L167.3,227.7 L171.0,225.9 L174.7,224.0 L178.4,221.9 L182.1,219.7 L185.8,217.4 L189.5,215.0 L193.2,212.4 L196.9,209.7 L200.6,206.9 L204.3,203.9 L208.0,200.9 L211.7,197.7 L215.4,194.3 L219.1,190.9 L222.8,187.4 L226.5,183.8 L230.2,180.1 L233.9,176.4 L237.6,172.6 L241.3,168.8 L245.0,165.0 L248.7,161.2 L252.4,157.4 L256.1,153.6 L259.8,149.9 L263.5,146.2 L267.2,142.6 L270.9,139.1 L274.6,135.7 L278.3,132.3 L282.0,129.1 L285.7,126.1 L289.4,123.1 L293.1,120.3 L296.8,117.6 L300.5,115.0 L304.2,112.6 L307.9,110.3 L311.6,108.1 L315.3,106.0 L319.0,104.1 L322.7,102.3 L326.4,100.6 L330.1,99.0 L333.8,97.6 L337.5,96.2 L341.2,94.9 L344.9,93.8 L348.6,92.7 L352.3,91.6 L356.0,90.7 L359.7,89.8 L363.4,89.0 L367.1,88.3 L370.8,87.6 L374.5,87.0 L378.2,86.4 L381.9,85.9 L385.6,85.4 L389.3,84.9 L393.0,84.5 L396.7,84.1 L400.4,83.8 L404.1,83.5 L407.8,83.2 L411.5,82.9 L415.2,82.7 L418.9,82.4 L422.6,82.2 L426.3,82.0 L430.0,81.9\" fill=\"none\" stroke=\"#111\" stroke-width=\"2.2\"/><line x1=\"155\" y1=\"250\" x2=\"155\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"270\" y1=\"250\" x2=\"270\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">甲</text><text x=\"212\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["族群數量達到負荷量後成長趨於平緩，並在負荷量上下波動", "族群數量一旦達負荷量便立刻全部死亡", "族群數量會無限制地持續指數成長", "負荷量是環境所能維持的某族群最小數量"], "ans": 0, "exp": "pop：負荷量是環境能長期維持的最大數量，S 型曲線達負荷量後趨平並上下波動。族群不會無限成長，負荷量非最小值，也不會立即全滅。(課本對應)"}, {"tid": "inter", "q": "豆科植物的根部與根瘤菌共同生活，根瘤菌可固定氮供植物利用、植物則提供根瘤菌養分與棲所，此種雙方皆受益的關係屬於？", "opts": ["互利共生", "寄生", "片利共生", "掠食"], "ans": 0, "exp": "inter：雙方皆得利（＋／＋）為互利共生。片利是一益一無影響，寄生是一益一害，掠食是捕食者得利、被食者死亡，皆不符合。(課本對應)"}, {"tid": "inter", "q": "鮣魚以吸盤附著在鯊魚腹部，藉鯊魚移動取得搬運與殘食碎屑，對鯊魚卻幾乎沒有影響。這種關係屬於？", "opts": ["競爭", "片利共生", "寄生", "互利共生"], "ans": 1, "exp": "inter：一方（鮣魚）受益、另一方（鯊魚）無明顯影響（＋／0）為片利共生。互利雙方皆益，寄生宿主受害，競爭雙方皆受影響。(課本對應)"}, {"tid": "inter", "q": "菟絲子纏繞在其他植物上，以特化構造插入宿主吸取養分，使宿主生長受抑制。這種關係屬於？", "opts": ["片利共生", "互利共生", "掠食", "寄生"], "ans": 3, "exp": "inter：菟絲子得利、宿主受害（＋／−）為寄生。互利雙方皆益，片利一方無影響，掠食通常指捕食者直接吃掉被食者個體。(課本對應)"}, {"tid": "inter", "q": "在同一塊田中混種甲、乙兩種需要相同陽光與養分的植物後，兩者的生長量都比單獨種植時下降。甲、乙之間最可能的關係是？", "opts": ["互利共生", "掠食", "競爭", "片利共生"], "ans": 2, "exp": "inter：兩者爭奪相同有限資源、雙方皆受抑制（−／−）為競爭。互利、片利皆有受益方，掠食是一方吃另一方，混養同降是典型競爭。(課本對應)"}, {"tid": "inter", "q": "關於「掠食（捕食）」關係，下列敘述何者正確？", "opts": ["掠食關係對被食者有利、對捕食者有害", "捕食者數量與獵物數量永遠完全相等", "捕食者數量與獵物數量常呈交錯的週期性波動", "捕食者與獵物雙方都受益"], "ans": 2, "exp": "inter：山貓-雪鞋兔模式中，獵物多→捕食者增，捕食者多→獵物減，兩者數量交錯週期波動。掠食是捕食者得利、被食者受害（＋／−）。(課本對應)"}, {"tid": "inter", "q": "農民釋放瓢蟲來吃蚜蟲、放養蓋斑鬥魚吃孑孓以控制病媒蚊，這類利用天敵控制有害生物的方法稱為？", "opts": ["生物防治", "優養化", "互利共生", "群集演替"], "ans": 0, "exp": "inter：利用天敵（掠食/寄生）控制有害生物為生物防治，可減少農藥。互利共生不會用來防治，優養化是水質問題，演替是群集隨時間變化。(課本對應)"}, {"tid": "inter", "q": "關於生物防治，下列敘述何者「錯誤」？", "opts": ["只要是互利共生的生物都能拿來進行生物防治", "平腹小蜂可用來防治荔枝椿象", "引入外來天敵前須謹慎評估，以免變成外來入侵種", "生物防治可減少化學農藥的使用"], "ans": 0, "exp": "inter：生物防治利用掠食/寄生/競爭等天敵，互利共生對雙方皆有利、無法抑制害蟲，故「互利共生都能防治」錯誤。其餘三者皆正確。(課本對應)"}, {"tid": "energy", "q": "在大多數生態系中，能量最終的來源是下列何者？", "opts": ["土壤中的礦物質", "分解者的呼吸作用", "岩石風化釋放的熱", "太陽（陽光）"], "ans": 3, "exp": "energy：太陽是大多數生態系最終能量來源，生產者行光合作用把光能轉成化學能。深海熱泉的硫化菌是少數例外，礦物、分解、風化皆非主要來源。(課本對應)"}, {"tid": "energy", "q": "關於能量塔（能量金字塔），下列敘述何者正確？", "opts": ["最高階消費者擁有的可用能量最多", "每升高一階能量會增加為原來的 10 倍", "每升高一個營養階層，可用能量約只剩前一階的 10%", "能量可在各營養階層間循環使用"], "ans": 2, "exp": "energy：能量沿食物鏈單向流動，每升一階約只剩 10%，其餘約 90% 以呼吸與熱散失。能量不循環，底寬頂窄，最高階能量最少。(課本對應)"}, {"tid": "energy", "q": "某食物鏈中生產者固定的能量為 60000 大卡，依能量塔每升一階約只剩 10% 估算，第三級消費者可獲得的能量約為多少大卡？（如圖）<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["6000", "600", "6", "60"], "ans": 3, "exp": "energy：生產者→初級→次級→三級共升 3 階，每階×1/10，60000×0.1³＝60 大卡。其餘為少算或多算階數的結果。(課本對應)"}, {"tid": "energy", "q": "下列關於生態系中各角色的敘述，何者正確？", "opts": ["消費者能行光合作用自製養分", "分解者不參與物質循環", "分解者（細菌、真菌）能分解遺體與排泄物，使物質回歸環境", "生產者必須攝食其他生物才能獲得能量"], "ans": 2, "exp": "energy：分解者分解遺體與排泄物、使物質回歸環境，是物質循環關鍵。生產者自製養分、消費者攝食他物、分解者參與循環，其餘選項錯誤。(課本對應)"}, {"tid": "cycle", "q": "在碳循環中，下列哪一作用能「減少」大氣中的二氧化碳？", "opts": ["燃燒化石燃料", "分解作用", "光合作用", "呼吸作用"], "ans": 2, "exp": "cycle：光合作用固定 CO₂ 是減少大氣 CO₂ 的主要途徑（另有溶於海水）。呼吸、燃燒、分解都會釋放 CO₂ 而使其增加。(課本對應)"}, {"tid": "cycle", "q": "關於水域的「優養化」現象，下列敘述何者正確？", "opts": ["氮、磷等營養鹽過多使藻類大量繁殖，最終造成水中溶氧大減、魚蝦死亡", "營養鹽過多會使水中溶氧持續增加", "優養化能提升水質、有利養殖", "優養化是因水溫過低結冰造成"], "ans": 0, "exp": "cycle：優養化是氮磷過多→藻類爆增（藻華）→遮光與分解耗氧→溶氧大減→魚蝦死亡、水質惡化。它使溶氧減少、水質變差，與結冰無關。(課本對應)"}, {"tid": "cycle", "q": "附表為某水域食物鏈中四種生物體內難分解毒物（DDT）的濃度（如表）。依生物放大作用判斷，下列何者最可能是「最高級消費者」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁", "甲", "乙", "丙"], "ans": 3, "exp": "cycle：生物放大使毒物濃度隨營養階層升高而增加。濃度由低到高：丁0.04→乙0.2→甲2.0→丙20，故丙濃度最高為最高級消費者、丁為生產者。(課本對應)"}, {"tid": "eco", "q": "關於「生物圈」的敘述，下列何者正確？", "opts": ["生物圈範圍永遠固定不變，不會隨生物滅絕而改變", "生物圈是地球上所有生物及其生存環境的總和，範圍約海平面上下各約 1 萬公尺", "生物在生物圈中分布得相當平均", "月球表面也屬於地球生物圈的一部分"], "ans": 1, "exp": "eco：生物圈是所有生物與其環境的總和，範圍約海平面上下各約 1 萬公尺。它會隨生物發現或滅絕而改變、分布不均、不含月球，且佔地球比例極小。(課本對應)"}, {"tid": "eco", "q": "陸域生態系的類型主要受哪兩個環境因素影響而不同？", "opts": ["水的鹽度與酸鹼值", "土壤顏色與風速", "溫度與雨量", "海拔與磁場強度"], "ans": 2, "exp": "eco：陸域生態系主要受溫度（緯度/海拔）與年雨量影響，決定為森林、草原或沙漠等。鹽度主要影響水域，土壤顏色、磁場非主因。(課本對應)"}, {"tid": "eco", "q": "下列陸域生態系依「年雨量由少到多」排列，何者正確？", "opts": ["草原 ＜ 沙漠 ＜ 森林", "沙漠 ＜ 草原 ＜ 森林", "森林 ＜ 草原 ＜ 沙漠", "沙漠 ＜ 森林 ＜ 草原"], "ans": 1, "exp": "eco：年雨量由少到多為沙漠＜草原＜森林，森林與草原常以年雨量約 750 mm 為分界。其餘排序皆與此關係不符。(課本對應)"}, {"tid": "eco", "q": "附表為甲、乙、丙三地的年平均溫與年雨量（如表）。若僅依雨量多寡判斷其主要植被，下列推論何者最合理？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">地點</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">年均溫(℃)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">22</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">24</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">年雨量(mm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2200</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">900</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">260</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">主要植被</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">？</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">？</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">？</td></tr></table>", "opts": ["甲雨量最多最可能為森林，丙雨量最少最可能為沙漠", "甲雨量最多最可能為沙漠", "丙雨量最少最可能為熱帶雨林", "三地植被必然完全相同"], "ans": 0, "exp": "eco：雨量越多越偏森林、越少越偏沙漠。甲 2200mm 最可能森林（雨林），丙 260mm 最可能沙漠，乙 900mm 偏草原。其餘推論與雨量規律相反。(課本對應)"}, {"tid": "eco", "q": "關於河口生態系的敘述，下列何者正確？", "opts": ["海水與淡水交會處，鹽度與水位變化大，常見紅樹林與招潮蟹", "以珊瑚礁為主要生產者", "水位終年穩定不受潮汐影響", "完全為淡水環境，鹽度終年為零"], "ans": 0, "exp": "eco：河口是海淡水交會處，鹽度與水位變化大，有紅樹林、招潮蟹、彈塗魚，以有機碎屑食物鏈為主。它非純淡水、受潮汐影響、非珊瑚礁系統。(課本對應)"}, {"tid": "eco", "q": "海洋依水深與光照可分為不同區域，下列敘述何者正確？（如圖）<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 470 280\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"470\" height=\"280\" fill=\"#ffffff\"/><rect x=\"60\" y=\"70\" width=\"370\" height=\"170\" fill=\"#eaf4fb\" stroke=\"none\"/><polygon points=\"60,120 150,150 250,168 250,225 430,235 430,240 60,240\" fill=\"#efe6d6\" stroke=\"#9a8a6a\" stroke-width=\"1.4\"/><line x1=\"60\" y1=\"70\" x2=\"430\" y2=\"70\" stroke=\"#3b82c4\" stroke-width=\"1.6\"/><line x1=\"250\" y1=\"150\" x2=\"430\" y2=\"150\" stroke=\"#0a7ea4\" stroke-width=\"1.2\" stroke-dasharray=\"6 4\"/><text x=\"426\" y=\"145\" font-size=\"11\" text-anchor=\"end\" fill=\"#0a7ea4\">水深約 200m</text><line x1=\"150\" y1=\"70\" x2=\"150\" y2=\"150\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"250\" y1=\"70\" x2=\"250\" y2=\"225\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">潮間帶</text><text x=\"200\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">淺海區</text><text x=\"200\" y=\"98\" font-size=\"10\" text-anchor=\"middle\" fill=\"#666\">(大陸棚)</text><text x=\"345\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">大洋區</text><text x=\"345\" y=\"115\" font-size=\"11\" text-anchor=\"middle\" fill=\"#0a7ea4\">透光區</text><text x=\"345\" y=\"195\" font-size=\"11\" text-anchor=\"middle\" fill=\"#444\">無光區</text><text x=\"44\" y=\"68\" font-size=\"10\" text-anchor=\"end\" fill=\"#3b82c4\">海面</text><circle cx=\"95\" cy=\"35\" r=\"13\" fill=\"#fde68a\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"110\" y1=\"35\" x2=\"117\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"46\" x2=\"111\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"50\" x2=\"95\" y2=\"57\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"46\" x2=\"79\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"80\" y1=\"35\" x2=\"73\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"24\" x2=\"79\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"20\" x2=\"95\" y2=\"13\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"24\" x2=\"111\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/></svg></div>", "opts": ["淺海區（大陸棚）因陽光無法到達而幾乎沒有生物", "潮間帶永遠完全被海水淹沒、不受潮汐影響", "深海無光區的生物完全靠光合作用維生", "大洋區常以水深約 200 公尺為界，分為上層的透光區與下層的無光區"], "ans": 3, "exp": "eco：大洋區以約 200m 分透光區與無光區。潮間帶受潮汐而時露時淹，淺海區光可達、生物多，深海無光區靠上層落下的碎屑或化學合成，非光合。(課本對應)"}, {"tid": "conserv", "q": "生物多樣性包含三個層次，下列關於三層次的敘述何者正確？", "opts": ["遺傳多樣性指同一物種內個體間的基因或性狀差異", "遺傳多樣性指一地區內所有物種的種類豐富度", "生態系多樣性指某一物種能適應的棲地數量", "物種多樣性指同一物種內不同族群的數量"], "ans": 0, "exp": "conserv：遺傳（基因）多樣性是同種內的基因/性狀變異，如同種綠豆有不同品系、人類膚色不同。物種多樣性是種類豐富度，生態系多樣性是棲地/生態系類型多寡，選項把三者定義混淆。(課本對應)"}, {"tid": "conserv", "q": "同一品種的玫瑰，因雜交與突變而開出紅、粉、黃、白等不同花色，這主要展現了生物多樣性的哪一個層次？", "opts": ["物種多樣性", "生態系多樣性", "遺傳（基因）多樣性", "群集多樣性"], "ans": 2, "exp": "conserv：同一物種內出現不同性狀（花色）是同種基因變異，屬遺傳多樣性。不同種類才是物種多樣性，不同棲地才是生態系多樣性。(課本對應)"}, {"tid": "conserv", "q": "關於 IUCN（國際自然保育聯盟）所編製的紅皮書（紅色名錄），下列敘述何者正確？", "opts": ["它規定各國管制氟氯碳化物以保護臭氧層", "它即為華盛頓公約的別名", "它是專門管制瀕危野生動植物國際貿易的公約", "它依滅絕風險將物種分級，用以評估物種的存續狀況"], "ans": 3, "exp": "conserv：IUCN 紅色名錄評估物種滅絕風險並分級（EX、EW、CR、EN、VU…）。管制國際貿易的是 CITES（華盛頓公約），保護臭氧層的是蒙特婁議定書，紅色名錄並非華盛頓公約。(課本對應)"}, {"tid": "conserv", "q": "IUCN 紅色名錄將物種的受脅程度由高到低分級，下列排序何者正確？", "opts": ["極危(CR)＞野外滅絕(EW)＞瀕危(EN)＞易危(VU)", "野外滅絕(EW)＞極危(CR)＞瀕危(EN)＞易危(VU)", "瀕危(EN)＞極危(CR)＞易危(VU)＞無危(LC)", "易危(VU)＞瀕危(EN)＞極危(CR)＞野外滅絕(EW)"], "ans": 1, "exp": "conserv：受脅程度由高到低為 EX＞EW＞CR＞EN＞VU＞NT＞LC。野外滅絕比極危更嚴重，易危則低於瀕危，其餘選項順序錯誤。(課本對應)"}, {"tid": "conserv", "q": "某保育人士想保護黑面琵鷺等水鳥所依賴的溼地棲地，下列哪一個國際公約與此目的最直接相關？", "opts": ["京都議定書", "拉姆薩公約", "蒙特婁議定書", "華盛頓公約（CITES）"], "ans": 1, "exp": "conserv：拉姆薩公約專門保育溼地，是候鳥/水鳥重要棲地。華盛頓公約管國際貿易，蒙特婁管臭氧層，京都議定書減溫室氣體，皆非保護溼地。(課本對應)"}, {"tid": "conserv", "q": "下列保育公約（或議定書）與其主要目的的配對，何者正確？", "opts": ["拉姆薩公約—管制瀕危野生動植物的國際貿易", "華盛頓公約—保育溼地與候鳥棲地", "京都議定書—編製物種紅皮書評估滅絕風險", "蒙特婁議定書—管制氟氯碳化物以保護臭氧層"], "ans": 3, "exp": "conserv：蒙特婁議定書管制 CFC 保護臭氧層。華盛頓公約管國際貿易（非溼地），拉姆薩公約保育溼地（非貿易），紅皮書由 IUCN 編製（非京都議定書）。(課本對應)"}, {"tid": "conserv", "q": "1992 年在巴西里約地球高峰會簽署、以「保育生物多樣性、永續利用、公平分享遺傳資源惠益」為三大目標的國際公約是？", "opts": ["拉姆薩公約", "蒙特婁議定書", "生物多樣性公約（CBD）", "巴黎協定"], "ans": 2, "exp": "conserv：生物多樣性公約（CBD）於 1992 年里約地球高峰會簽署，三大目標為保育、永續利用與惠益公平分享。蒙特婁管臭氧層、巴黎協定減碳、拉姆薩護溼地。(課本對應)"}, {"tid": "conserv", "q": "巴黎協定與京都議定書共同關注的主要環境議題是下列何者？", "opts": ["減少溫室氣體排放以因應氣候變遷", "禁止使用破壞臭氧層的氟氯碳化物", "管制瀕危物種的跨國買賣", "保護重要溼地與其水鳥族群"], "ans": 0, "exp": "conserv：京都議定書與巴黎協定都針對減少 CO₂ 等溫室氣體排放、因應全球暖化。管國際貿易是 CITES，臭氧層是蒙特婁，溼地是拉姆薩。(課本對應)"}, {"tid": "conserv", "q": "下列哪一種生物是台灣常見的外來入侵種，會危害本土生態？", "opts": ["櫻花鉤吻鮭", "石虎", "黑面琵鷺", "綠鬣蜥"], "ans": 3, "exp": "conserv：綠鬣蜥為入侵台灣的外來種。櫻花鉤吻鮭、黑面琵鷺（候鳥）、石虎皆為台灣原生/本土物種，不可誤判為外來種。(課本對應)"}, {"tid": "conserv", "q": "下列四種生物中，哪一種「不是」台灣常見的外來入侵種？", "opts": ["小花蔓澤蘭", "美國螯蝦", "台灣山椒魚", "福壽螺"], "ans": 2, "exp": "conserv：台灣山椒魚是冰河孑遺的本土特有種。福壽螺、小花蔓澤蘭、美國螯蝦皆為入侵台灣的外來種，威脅本土生態。(課本對應)"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
