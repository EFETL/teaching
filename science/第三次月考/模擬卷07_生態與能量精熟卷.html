.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}

.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}

.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}

.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}

.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "關於分類階層「界→門→綱→目→科→屬→種」的敘述，下列何者正確？", "opts": ["越下層的階層，所含生物種類越多", "同一目的生物一定同屬", "種是最大的分類單位", "越下層的階層，所含生物親緣越近、種類越少"], "ans": 3, "exp": "分類階層由大到小，越往下層親緣越近、共同特徵越多、種類越少；種是最基本（最小）單位，同目不一定同屬。(cls 課本對應)"}, {"tid": "cls", "q": "某生物的學名寫作 Panthera tigris，下列關於二名法的敘述何者正確？", "opts": ["tigris 是屬名、Panthera 是種小名", "Panthera 是屬名、tigris 是種小名，屬名首字母大寫", "學名第二個字首字母要大寫", "學名應以中文書寫且不必斜體"], "ans": 1, "exp": "林奈二名法：學名＝屬名（首字母大寫）＋種小名（小寫），全用拉丁文斜體；同屬生物親緣較近。(cls 課本對應)"}, {"tid": "cls", "q": "下列名字含「魚」的生物中，哪一種「真的」是魚類？", "opts": ["鱷魚", "彈塗魚", "章魚", "鯨魚"], "ans": 1, "exp": "彈塗魚是硬骨魚（真魚）；鯨魚是哺乳類、章魚是軟體動物、鱷魚是爬蟲類。分類依構造與親緣，不看名字。(cls 課本對應)"}, {"tid": "plant", "q": "被認為「最早登陸」、且體內無維管束、僅具假根的植物是下列何者？", "opts": ["被子植物（如玉米）", "蘚苔植物（如地錢、土馬騌）", "裸子植物（如松、杉）", "蕨類植物（如腎蕨）"], "ans": 1, "exp": "蘚苔無維管束、無真正根莖葉（僅假根）、矮小生於陰濕處、受精需水，是最早登陸的植物。蕨類才最早演化出維管束。(plant 課本對應)"}, {"tid": "plant", "q": "下列關於蕨類植物的敘述，何者「錯誤」？", "opts": ["以種子繁殖，且受精不需以水為媒介", "最早演化出維管束，有真正的根莖葉", "以孢子繁殖，孢子囊堆常生於葉背", "幼葉常呈捲曲狀"], "ans": 0, "exp": "蕨類無種子、以孢子繁殖、受精仍需水，故該敘述錯誤；蕨類最早有維管束、有真正根莖葉、幼葉捲曲。(plant 課本對應)"}, {"tid": "plant", "q": "松、杉、蘇鐵等裸子植物與被子植物最主要的差異是什麼？", "opts": ["裸子植物無維管束也無種子", "裸子植物有花有果實包住種子", "裸子植物受精一定需要水", "裸子植物胚珠裸露、無花無果實，以毬果生殖"], "ans": 3, "exp": "裸子植物有維管束與種子，但無花無果實、胚珠裸露、以毬果生殖，有花粉管故受精不需水；被子植物才有花有果實。(plant 課本對應)"}, {"tid": "plant", "q": "觀察一株植物：葉脈呈網狀、根為軸根（明顯主根）、花瓣5片。它最可能是？", "opts": ["蕨類植物（如山蘇）", "裸子植物（如紅檜）", "雙子葉植物（如玫瑰、向日葵）", "單子葉植物（如玉米、竹）"], "ans": 2, "exp": "網狀脈、軸根、花瓣4或5的倍數、維管束環狀＝雙子葉；單子葉為平行脈、鬚根、花瓣3的倍數。(plant 課本對應)"}, {"tid": "inv", "q": "水螅、水母、海葵、珊瑚共同具有的特徵是下列何者？", "opts": ["身體分許多相似環節並具剛毛", "體表有棘、具管足", "具外骨骼、會蛻皮", "具刺絲胞可捕食，有口無肛門，可行出芽生殖"], "ans": 3, "exp": "刺絲胞動物以刺絲胞捕食、輻射對稱、有口無肛門、可出芽生殖，許多成體固著；珊瑚曾因固著被誤認植物。(inv 課本對應)"}, {"tid": "inv", "q": "動物界中「種類數量最多」、具外骨骼且會蛻皮、身體與附肢分節的是哪一門？", "opts": ["節肢動物（昆蟲、蝦蟹、蜘蛛）", "軟體動物（蝸牛、章魚）", "棘皮動物（海星、海膽）", "環節動物（蚯蚓、沙蠶）"], "ans": 0, "exp": "節肢動物具外骨骼、身體與附肢分節、會蛻皮，是種類數量最多的動物門；軟體不分節、棘皮具管足。(inv 課本對應)"}, {"tid": "inv", "q": "海星、海膽、海參、陽燧足同屬棘皮動物，下列敘述何者正確？", "opts": ["身體背腹扁平、有口無肛門", "具管足、體表多有棘，且僅生活於海洋", "身體柔軟不分節、多具外套膜", "具刺絲胞、可行出芽生殖"], "ans": 1, "exp": "棘皮動物具管足、體表有棘、成體五輻對稱、僅生活於海洋；外套膜是軟體、刺絲胞是腔腸、背腹扁平是扁形。(inv 課本對應)"}, {"tid": "vert", "q": "爬蟲類比兩生類「更能適應陸地生活」，關鍵原因是下列何者？", "opts": ["必須回到水中產卵繁殖", "體表裸露濕潤、需靠皮膚輔助呼吸", "幼體用鰓呼吸、成體用肺呼吸", "體內受精且卵具殼、體表有鱗片或骨板可減少水分散失"], "ans": 3, "exp": "爬蟲類體內受精、卵具殼，不必回水中生殖，體表鱗片/骨板減少失水、用肺呼吸，故較適應陸地；裸露濕潤皮膚是兩生類特徵。(vert 課本對應)"}, {"tid": "vert", "q": "鴨嘴獸與針鼴雖然會生蛋，卻被歸為哺乳類，主要依據是什麼？", "opts": ["用鰓呼吸", "體溫隨環境改變（外溫動物）", "體表覆有羽毛", "具乳腺能分泌乳汁哺育幼體"], "ans": 3, "exp": "鴨嘴獸、針鼴雖卵生，但有乳腺哺乳（無乳頭、無臍帶），且為內溫、有毛髮，故仍屬哺乳類。(vert 課本對應)"}, {"tid": "vert", "q": "下列四種動物，哪一組親緣關係最接近？", "opts": ["青蛙與蠑螈和蛇", "企鵝與海豚", "蝙蝠與麻雀", "龜與鱷（同為爬蟲類）"], "ans": 3, "exp": "龜、鱷同屬爬蟲類，親緣最近；企鵝是鳥、海豚是哺乳，蝙蝠是哺乳、麻雀是鳥，蛇是爬蟲而青蛙蠑螈是兩生。(vert 課本對應)"}, {"tid": "pop", "q": "關於「族群」與「群集」的定義，下列何者正確？", "opts": ["群集只計算一種生物", "族群已包含非生物環境", "族群是不同種生物的總合，群集是同種生物的個體", "族群是同時間同區域同種生物的所有個體；群集是同區域內所有不同族群的總合"], "ans": 3, "exp": "族群＝同時間、同區域、同種的所有個體；群集＝同區域內所有不同族群（不同種）的總合；再加非生物環境才是生態系。(pop 課本對應)"}, {"tid": "pop", "q": "研究者在某湖以標識再捕法估計鯽魚數量：先標記並放回40尾，第二次共捕得50尾，其中標記的有5尾。估計全湖鯽魚約多少尾？", "opts": ["400 尾", "1000 尾", "250 尾", "450 尾"], "ans": 0, "exp": "族群總數＝標記數×再捕總數÷再捕中標記數＝40×50÷5＝400 尾。(pop 課本對應)"}, {"tid": "pop", "q": "某草地用樣區法估計蒲公英數量：取3個面積相同的樣區，分別數得22、26、30株，平均每樣區26株；該草地總面積為樣區的25倍。估計全區約有幾株？", "opts": ["325 株", "78 株", "26 株", "650 株"], "ans": 3, "exp": "樣區法總數＝平均每樣區數×(總面積÷樣區面積)＝26×25＝650 株。(pop 課本對應)"}, {"tid": "pop", "q": "下列哪一種生物最「不適合」用標識再捕法估算數量？", "opts": ["湖中能自由游動的吳郭魚", "樹林裡活動的野鳥", "紅樹林中固著生長的水筆仔", "草原上的野兔"], "ans": 2, "exp": "標識再捕法適用能自由活動並與族群混合的動物；固著或不移動的植物（如水筆仔）應改用樣區法。(pop 課本對應)"}, {"tid": "pop", "q": "一族群在某環境中數量隨時間呈S型成長曲線（如圖）。關於曲線的判讀，何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">時間</text><text x=\"52\" y=\"46\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">族群數量</text><line x1=\"60\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#0a7ea4\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/><text x=\"430\" y=\"74\" font-size=\"12\" text-anchor=\"end\" fill=\"#0a7ea4\">環境負荷量 K</text><path d=\"M60.0,248.1 L63.7,248.0 L67.4,247.8 L71.1,247.6 L74.8,247.3 L78.5,247.1 L82.2,246.8 L85.9,246.5 L89.6,246.2 L93.3,245.9 L97.0,245.5 L100.7,245.1 L104.4,244.6 L108.1,244.1 L111.8,243.6 L115.5,243.0 L119.2,242.4 L122.9,241.7 L126.6,241.0 L130.3,240.2 L134.0,239.3 L137.7,238.4 L141.4,237.3 L145.1,236.2 L148.8,235.1 L152.5,233.8 L156.2,232.4 L159.9,231.0 L163.6,229.4 L167.3,227.7 L171.0,225.9 L174.7,224.0 L178.4,221.9 L182.1,219.7 L185.8,217.4 L189.5,215.0 L193.2,212.4 L196.9,209.7 L200.6,206.9 L204.3,203.9 L208.0,200.9 L211.7,197.7 L215.4,194.3 L219.1,190.9 L222.8,187.4 L226.5,183.8 L230.2,180.1 L233.9,176.4 L237.6,172.6 L241.3,168.8 L245.0,165.0 L248.7,161.2 L252.4,157.4 L256.1,153.6 L259.8,149.9 L263.5,146.2 L267.2,142.6 L270.9,139.1 L274.6,135.7 L278.3,132.3 L282.0,129.1 L285.7,126.1 L289.4,123.1 L293.1,120.3 L296.8,117.6 L300.5,115.0 L304.2,112.6 L307.9,110.3 L311.6,108.1 L315.3,106.0 L319.0,104.1 L322.7,102.3 L326.4,100.6 L330.1,99.0 L333.8,97.6 L337.5,96.2 L341.2,94.9 L344.9,93.8 L348.6,92.7 L352.3,91.6 L356.0,90.7 L359.7,89.8 L363.4,89.0 L367.1,88.3 L370.8,87.6 L374.5,87.0 L378.2,86.4 L381.9,85.9 L385.6,85.4 L389.3,84.9 L393.0,84.5 L396.7,84.1 L400.4,83.8 L404.1,83.5 L407.8,83.2 L411.5,82.9 L415.2,82.7 L418.9,82.4 L422.6,82.2 L426.3,82.0 L430.0,81.9\" fill=\"none\" stroke=\"#111\" stroke-width=\"2.2\"/><line x1=\"155\" y1=\"250\" x2=\"155\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"270\" y1=\"250\" x2=\"270\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">甲</text><text x=\"212\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["負荷量是環境能維持的族群最小數量", "甲段為快速增長期", "乙段族群已停止生長", "丙段達環境負荷量、數量趨於平緩並在負荷量上下波動"], "ans": 3, "exp": "S型曲線：甲緩慢期、乙快速增長期、丙達負荷量趨平並上下波動；負荷量是環境能長期維持的最大數量。(pop 課本對應)"}, {"tid": "pop", "q": "某族群在一段時間內：出生數＋遷入數小於死亡數＋遷出數，則此族群數量會如何變化？", "opts": ["增加", "減少", "維持完全不變", "先增加後一定滅絕"], "ans": 1, "exp": "族群數量取決於出生、死亡、遷入、遷出；當（出生＋遷入）＜（死亡＋遷出）時數量減少，相等時穩定（動態平衡）。(pop 課本對應)"}, {"tid": "pop", "q": "森林火災後的裸地上，群集隨時間發生演替（消長）。下列演替順序何者正確？", "opts": ["喬木森林→灌木→草本→地衣", "草本→喬木→灌木→地衣", "地衣、苔蘚→草本→灌木→喬木森林", "灌木→地衣→喬木→草本"], "ans": 2, "exp": "初級演替先驅常為地衣、苔蘚，之後依序為草本、灌木，最後形成喬木森林。(pop 課本對應)"}, {"tid": "pop", "q": "下列關於生物組成層次「個體→族群→群集→生態系→生物圈」的敘述，何者正確？", "opts": ["生物圈是比生態系更小的層次", "個體比族群層次更大", "生態系＝群集加上非生物環境（陽光、空氣、水、土壤、溫度等）", "群集只由單一物種組成"], "ans": 2, "exp": "層次由小到大為個體→族群→群集→生態系→生物圈；生態系是群集（所有族群）加非生物環境。(pop 課本對應)"}, {"tid": "inter", "q": "小丑魚與海葵彼此互利、豆科植物與根瘤菌也彼此得利，這種「雙方皆受益（＋／＋）」的關係稱為？", "opts": ["競爭", "互利共生", "片利共生", "寄生"], "ans": 1, "exp": "雙方皆受益為互利共生（＋／＋），如小丑魚與海葵、豆科與根瘤菌、地衣（藻＋菌）。片利為＋／0、寄生為＋／−。(inter 課本對應)"}, {"tid": "inter", "q": "鯨魚身上附著的藤壺隨鯨游動而獲得食物與棲所，對鯨並無明顯影響。此種關係屬於？", "opts": ["競爭（−／−）", "片利共生（＋／0）", "寄生（＋／−）", "互利共生（＋／＋）"], "ans": 1, "exp": "一方得利、另一方無明顯影響為片利共生（＋／0），如鯨與藤壺、鯊魚與鮣魚、大樹與附生的鳥巢蕨。(inter 課本對應)"}, {"tid": "inter", "q": "在農田中釋放瓢蟲取食蚜蟲、或放養蓋斑鬥魚吃孑孓以控制病媒蚊，這種做法稱為？", "opts": ["生物防治，可減少農藥使用", "互利共生防治", "生物放大作用", "優養化處理"], "ans": 0, "exp": "利用天敵（掠食/寄生/競爭）控制有害生物即生物防治，可減少農藥；不可用互利共生防治，且引入外來天敵需謹慎以免變外來入侵種。(inter 課本對應)"}, {"tid": "inter", "q": "菟絲子纏附宿主植物吸取養分，使宿主受害而自身得利。此關係屬於下列何者？", "opts": ["寄生（＋／−）", "掠食（＋／−）", "互利共生（＋／＋）", "片利共生（＋／0）"], "ans": 0, "exp": "寄生者受益、宿主受害（＋／−）即寄生，如菟絲子、跳蚤、絛蟲、瘧原蟲；掠食通常是直接捕食殺死獵物。(inter 課本對應)"}, {"tid": "inter", "q": "以＋／−／0 表示交互作用中雙方的得失，若兩種生物間的關係呈現「−／−」，這代表何種關係？", "opts": ["掠食，一方得利一方受害", "互利共生，雙方皆得利", "片利共生，一方得利一方無影響", "競爭，雙方爭奪相同有限資源而皆受害"], "ans": 3, "exp": "−／−代表競爭：雙方爭奪相同有限資源而皆受影響；混養生長曲線雙雙下降即為競爭。＋／＋為互利、＋／0為片利、＋／−為掠食或寄生。(inter 課本對應)"}, {"tid": "inter", "q": "山貓（捕食者）與雪鞋兔（獵物）的數量隨時間呈交錯的週期性波動，這反映何種交互作用？", "opts": ["互利共生（＋／＋）", "片利共生（＋／0）", "寄生中宿主立即死亡", "掠食（＋／−）"], "ans": 3, "exp": "掠食關係中捕食者得利、被食者受害（＋／−），兩者數量常呈交錯週期波動，如山貓與雪鞋兔。(inter 課本對應)"}, {"tid": "energy", "q": "關於生態系中能量的最終來源，下列敘述何者正確？", "opts": ["所有生態系都完全不需要陽光", "大多數生態系的最終能量來源是太陽，由生產者行光合作用把光能轉成化學能", "消費者能直接把光能轉成化學能", "分解者是生態系能量的最初來源"], "ans": 1, "exp": "多數生態系最終能量來自太陽，生產者行光合作用轉成化學能；深海熱泉例外，靠硫化菌以化學能維生。(energy 課本對應)"}, {"tid": "energy", "q": "下列關於食物鏈與食物網的敘述，何者正確？", "opts": ["食物鏈中能量可循環流動", "食物網中只有一條攝食路徑", "食物網是多條食物鏈交織而成，比單一食物鏈更能反映複雜的攝食關係", "箭頭應由捕食者指向被食者"], "ans": 2, "exp": "食物網由多條食物鏈交織，箭頭由被食者指向捕食者，表示能量單向流動（不可循環）。(energy 課本對應)"}, {"tid": "energy", "q": "依能量塔的10%法則，每升高一個營養階層，可用能量約只剩前一階的十分之一。若生產者固定的能量為50000大卡，則第三級消費者（往上第三階）約可獲得多少大卡？", "opts": ["50 大卡", "5000 大卡", "500 大卡", "5 大卡"], "ans": 0, "exp": "每升一階×1/10。生產者50000→初級5000→次級500→三級50大卡。其餘約90%以呼吸作用、熱能散失。(energy 課本對應)"}, {"tid": "energy", "q": "能量塔（能量金字塔）通常呈「底寬頂窄」，且營養階層多不超過4～5階，主要原因是？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["頂端消費者光合效率最高", "能量沿食物鏈逐級遞減，每階約只剩10%，高階可用能量太少", "高階生物體型較小所以數量多", "能量會在各階層間循環不滅"], "ans": 1, "exp": "能量單向流動且逐級遞減（約剩10%，其餘以呼吸、熱散失），高階能量太少，故底寬頂窄、階層難超過4～5階。(energy 課本對應)"}, {"tid": "energy", "q": "下列何者在生態系中扮演「分解者」的角色？", "opts": ["草食性的兔子", "行光合作用的藍綠菌", "綠色植物與藻類", "細菌與真菌，分解動植物遺體與排泄物使物質回歸環境"], "ans": 3, "exp": "分解者為細菌、真菌，分解遺體與排泄物，使物質回歸環境；綠色植物、藻、藍綠菌是生產者，兔子是消費者。(energy 課本對應)"}, {"tid": "energy", "q": "關於生態系中「能量」與「物質」的流動，下列敘述何者正確？", "opts": ["能量會逐級增加，頂級消費者能量最多", "能量和物質都能在生態系中不斷循環", "物質單向流動，能量才會循環", "能量單向流動、逐級遞減、最終以熱散失，無法循環；物質（碳、氮、水）則可循環"], "ans": 3, "exp": "能量單向流動、逐級遞減、最終以熱散失，不能循環；碳、氮、水等物質才會在生物與環境間循環。(energy 課本對應)"}, {"tid": "energy", "q": "深海熱泉生態系不見陽光，其生產者是下列何者？", "opts": ["利用硫化氫化學能的硫化菌（化學自營細菌）", "食腐的禿鷹", "行光合作用的綠色植物", "草食性的小魚"], "ans": 0, "exp": "深海熱泉無陽光，由硫化菌（化學自營）以硫化氫的化學能合成有機物作為生產者，是不靠陽光的特例。(energy 課本對應)"}, {"tid": "energy", "q": "某草原食物網中，草是生產者，蝗蟲、鼠、兔取食草，蛇捕食鼠，鷹捕食蛇與兔。若鷹的數量大量減少，短期內最可能發生的是？", "opts": ["蛇與兔因天敵減少而數量上升", "草的數量立刻減為零", "鷹減少對食物網毫無影響", "蝗蟲因此完全消失"], "ans": 0, "exp": "鷹是上層捕食者，減少後其獵物（蛇、兔）因捕食壓力下降而短期增加，顯示食物網各環節彼此牽連。(energy 課本對應)"}, {"tid": "cycle", "q": "在碳循環中，下列哪一作用能「減少」大氣中的二氧化碳？", "opts": ["分解作用", "燃燒化石燃料", "光合作用", "呼吸作用"], "ans": 2, "exp": "固碳（減少大氣CO₂）的作用是光合作用（與溶於海水）；呼吸、分解、燃燒都會釋出CO₂增加大氣含量。(cycle 課本對應)"}, {"tid": "cycle", "q": "關於碳循環中各種生物與作用的角色，下列敘述何者「錯誤」？", "opts": ["燃燒化石燃料會把碳釋回大氣", "生物的呼吸作用會釋出二氧化碳", "生產者行光合作用可吸收大氣中的二氧化碳", "分解者只會固碳、不會釋放二氧化碳"], "ans": 3, "exp": "分解者分解遺體會釋出CO₂（屬釋碳），故「只固碳不釋碳」錯誤；光合固碳、呼吸與燃燒釋碳。(cycle 課本對應)"}, {"tid": "cycle", "q": "某食物鏈各生物體內DDT濃度如表（單位ppm）：甲2.0、乙0.2、丙20、丁0.04。依生物放大作用判斷，此食物鏈中「最高級消費者」與「生產者」分別是誰？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["最高級消費者是乙、生產者是甲", "最高級消費者是丁、生產者是丙", "最高級消費者是丙、生產者是丁", "最高級消費者是甲、生產者是乙"], "ans": 2, "exp": "難分解脂溶性毒物沿食物鏈累積，營養階層越高濃度越高。由低到高：丁0.04→乙0.2→甲2.0→丙20，故丙為最高級消費者、丁為生產者。(cycle 課本對應)"}, {"tid": "cycle", "q": "湖泊因家庭與農業廢水使氮、磷等營養鹽過多，引發優養化。下列關於優養化後果的敘述何者正確？", "opts": ["藻類大量繁殖遮光，加上夜間呼吸與分解耗氧，使水中溶氧大減導致魚蝦死亡", "氮、磷減少使藻類無法生長", "水中溶氧因藻類增加而大幅上升", "水質因此變得更清澈乾淨"], "ans": 0, "exp": "優養化：營養鹽過多→藻類大量繁殖（藻華）→遮光使水下藻死、夜間呼吸與分解耗氧→溶氧大減→魚蝦死亡、水質惡化。(cycle 課本對應)"}, {"tid": "cycle", "q": "關於「生物放大作用（生物濃縮）」，下列敘述何者正確？", "opts": ["營養階層越低的生物毒物濃度越高", "水溶性且易分解的物質最容易被放大", "毒物在分解者體內濃度最高", "難分解、脂溶性的毒物（如甲基汞、DDT）沿食物鏈累積，營養階層越高體內濃度越高"], "ans": 3, "exp": "生物放大作用指難分解、脂溶性毒物沿食物鏈逐級累積，高階濃度最高；甲基汞累積曾引發水俁病。(cycle 課本對應)"}, {"tid": "cycle", "q": "化石燃料（煤、石油）是古生物遺體長期形成、內含大量碳。人類過度燃燒化石燃料，最直接的環境後果是？", "opts": ["大氣二氧化碳上升，加劇溫室效應與全球暖化，並使海洋酸化", "大氣二氧化碳下降、氣溫降低", "使臭氧層破洞擴大為主要後果", "完全不影響碳循環"], "ans": 0, "exp": "燃燒化石燃料把長期固存的碳釋回大氣，CO₂上升→溫室效應、全球暖化與海洋酸化；臭氧層破洞主要與CFC有關。(cycle 課本對應)"}, {"tid": "eco", "q": "關於「生物圈」的敘述，下列何者正確？", "opts": ["生物圈內生物分布非常平均", "月球表面也屬於地球的生物圈", "生物圈是地球上所有生物及其生存環境的總和，範圍會隨生物的發現或滅絕而改變", "生物圈的範圍是海平面上下各約1萬公里"], "ans": 2, "exp": "生物圈是所有生物及其環境的總和，垂直範圍約海平面上下各1萬公尺，會隨生物發現或滅絕而變動，分布並不平均、佔地球比例極小。(eco 課本對應)"}, {"tid": "eco", "q": "陸域生態系主要受溫度與雨量影響。若依年雨量由少到多排列，下列何者正確？", "opts": ["草原 ＜ 沙漠 ＜ 森林", "森林 ＜ 草原 ＜ 沙漠", "沙漠 ＜ 草原 ＜ 森林", "沙漠 ＜ 森林 ＜ 草原"], "ans": 2, "exp": "陸域生態系受溫度與雨量影響；年雨量由少到多為沙漠＜草原＜森林，森林與草原常以年雨量約750mm為分界。(eco 課本對應)"}, {"tid": "eco", "q": "海洋由岸向海依序可分為潮間帶→淺海區（大陸棚）→大洋區。下列敘述何者正確？", "opts": ["深海無光區的生物全靠光合作用維生", "淺海區（大陸棚）陽光完全無法到達", "大洋區常以水深約200公尺分為透光區與無光區，無光區生物多靠上層落下的有機碎屑", "潮間帶位於最深的海底"], "ans": 2, "exp": "海洋依水深與光分潮間帶、淺海區（大陸棚，光可達、生物多）、大洋區（約200m分透光/無光區）；無光區多靠落下的有機碎屑或化學合成。(eco 課本對應)"}, {"tid": "eco", "q": "河口生態系海淡水交會、鹽度與水位變化大，下列哪一項是該環境常見的生物或特徵？", "opts": ["完全沒有生物能生存", "以仙人掌等耐旱植物為主", "終年低溫、植物矮小的凍原", "紅樹林（如水筆仔、海茄苳）具支持根與呼吸根，並以碎屑食物鏈為主"], "ans": 3, "exp": "河口鹽度與水位變化大，紅樹林具支持根、耐鹽呼吸根，常見招潮蟹、彈塗魚，以有機碎屑食物鏈為主。(eco 課本對應)"}, {"tid": "eco", "q": "下列關於「熱帶雨林」生態系的敘述，何者正確？", "opts": ["高溫多雨、全年雨量充足且分布平均，生物多樣性最高", "分布於高緯度與高海拔的針葉林帶", "年雨量極少、晝夜溫差大，以仙人掌為主", "終年低溫、植物矮小、生物種類稀少"], "ans": 0, "exp": "熱帶雨林高溫多雨、雨量充足平均，是生物多樣性最高的陸域生態系；低溫矮小是凍原、少雨溫差大是沙漠。(eco 課本對應)"}, {"tid": "conserv", "q": "關於生物多樣性三個層次的敘述，下列何者正確？", "opts": ["遺傳多樣性指同一物種內的基因或性狀變異，如同種綠豆有不同品系", "多樣性越低，生態系越穩定", "物種多樣性指同一物種內的基因變異", "生態系多樣性指一個族群內的個體數量"], "ans": 0, "exp": "三層次為遺傳（同種內基因/性狀變異）、物種（種類豐富度）、生態系（棲地類型多樣）；多樣性越高生態系越穩定。(conserv 課本對應)"}, {"tid": "conserv", "q": "下列哪一種生物是台灣常見的「外來入侵種」？", "opts": ["櫻花鉤吻鮭", "福壽螺", "黑面琵鷺", "石虎"], "ans": 1, "exp": "福壽螺是台灣常見外來入侵種（另如布袋蓮、小花蔓澤蘭、綠鬣蜥）；石虎、櫻花鉤吻鮭、黑面琵鷺為本土/原生種。(conserv 課本對應)"}, {"tid": "conserv", "q": "下列保育公約或組織與其主要任務的配對，何者正確？", "opts": ["華盛頓公約（CITES）——保護臭氧層", "IUCN——管制溫室氣體排放", "拉姆薩公約——保育溼地（如候鳥、水鳥棲地）", "蒙特婁議定書——管制瀕危物種國際貿易"], "ans": 2, "exp": "拉姆薩公約保育溼地；CITES（華盛頓公約）管制瀕危野生動植物國際貿易；蒙特婁議定書保護臭氧層；IUCN編製紅皮書評估滅絕風險。(conserv 課本對應)"}, {"tid": "conserv", "q": "環保5R中的「Refuse」指的是下列何者？", "opts": ["重複使用", "減少用量", "回收再製", "拒用（拒絕使用不必要或一次性的物品）"], "ans": 3, "exp": "5R為Refuse拒用、Reduce減量、Reuse重複使用、Repair修復、Recycle回收；Refuse即拒用不必要物品。(conserv 課本對應)"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
</html>
