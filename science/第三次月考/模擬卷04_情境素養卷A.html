<style>

body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}

.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}

.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}

.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}

.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}

.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}

.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "小安在校園生態解說牌上看到「台灣藍鵲 Urocissa caerulea」這串名稱。關於這種命名方式，下列敘述何者正確？", "opts": ["Urocissa 是種小名，caerulea 是屬名，屬名首字母不必大寫", "這是中文俗名直接翻譯，與親緣關係無關", "這是二名法，前一字 Urocissa 為屬名、後一字為種小名，須用斜體拉丁文", "同樣屬名 Urocissa 的兩種鳥親緣關係一定比不同屬的更遠"], "ans": 2, "exp": "二名法學名＝屬名＋種小名，拉丁文斜體、屬名首字大寫；同屬生物親緣較近。（分類基礎 cls，課本對應：二名法）"}, {"tid": "cls", "q": "自然課老師發給每組一張「校園昆蟲檢索表」，要學生依「有無翅膀」「足幾對」等特徵一層層往下找到答案。這種工具的運作原理是什麼？", "opts": ["依外形相似度由人主觀分群，與特徵無關", "依生物有或無某特徵逐層二分，把生物導向末端的正確類別", "先看顏色再看大小，與構造特徵無關", "依生物的棲息地把牠們分到不同欄位"], "ans": 1, "exp": "二分檢索表依「有/無某特徵」逐層二分把生物分到末端；分類依構造特徵與親緣，不是棲地或外形。（分類基礎 cls，課本對應：檢索表）"}, {"tid": "cls", "q": "逛菜市場時阿嬤指著攤位說「這些都是魚」：鯊魚、章魚、鱷魚乾、鮑魚、彈塗魚。若依分類學嚴格判定，真正屬於魚類的是哪些？", "opts": ["鯊魚、彈塗魚", "章魚、彈塗魚", "鱷魚乾、鯊魚", "章魚、鮑魚"], "ans": 0, "exp": "鯊魚為軟骨魚、彈塗魚為硬骨魚，皆屬魚類；章魚與鮑魚是軟體動物、鱷魚是爬蟲類，名字有魚卻非魚。（分類基礎 cls，課本對應：名實不符）"}, {"tid": "plant", "q": "美勞課要採集校園陰濕牆角的「地錢、土馬騌」做標本。同學發現它們矮小、沒有真正的根莖葉。關於這類植物，下列何者正確？", "opts": ["屬蕨類，已演化出維管束所以能長高", "有花有果實，靠昆蟲傳粉", "以種子繁殖，受精不需水", "屬蘚苔植物，無維管束、僅有假根，是最早登陸的植物"], "ans": 3, "exp": "地錢、土馬騌為蘚苔，無維管束、無真正根莖葉、僅假根，受精需水，是最早登陸植物；蕨類才有維管束，種子與花是裸子/被子的特徵。（植物界 plant，課本對應：蘚苔）"}, {"tid": "plant", "q": "小傑在後山步道觀察腎蕨與山蘇，翻開葉背發現一粒粒褐色的孢子囊堆。由此可判斷蕨類植物的哪一項特徵？", "opts": ["以種子繁殖、有花有果實", "無維管束，所以植株矮小貼地", "靠毬果生殖，種子裸露", "以孢子繁殖、不開花不結種子，且已有真正的維管束與根莖葉"], "ans": 3, "exp": "蕨類最早演化出維管束、有真正根莖葉，以葉背孢子囊堆的孢子繁殖、無種子；毬果與裸露種子是裸子植物特徵。（植物界 plant，課本對應：蕨類）"}, {"tid": "plant", "q": "公園裡園藝師指著松樹和銀杏說「它們有種子卻沒有果實，用毬果生殖」。下列關於裸子植物的敘述何者正確？", "opts": ["屬蘚苔，受精時需以水為媒介", "無種子，以孢子繁殖", "胚珠裸露、無花無果實，有花粉管使受精不需水", "有果實包住種子，靠昆蟲授粉"], "ans": 2, "exp": "裸子植物有維管束與種子但無花無果實、胚珠裸露、以毬果生殖，有花粉管故受精不需水；果實與孢子分別是被子、蕨類的特徵。（植物界 plant，課本對應：裸子）"}, {"tid": "plant", "q": "同學把校園的玉米和櫻花拿來比較。觀察根、葉脈與花瓣數後，下列哪一組配對正確？", "opts": ["玉米：鬚根、平行脈、花瓣3的倍數；櫻花：軸根、網狀脈、花瓣4或5及其倍數", "兩者都無花無果實，屬裸子植物", "玉米：軸根、網狀脈；櫻花：鬚根、平行脈", "兩者都是單子葉，根與葉脈相同"], "ans": 0, "exp": "玉米為單子葉（鬚根、平行脈、花瓣3倍數），櫻花為雙子葉（軸根、網狀脈、花瓣4/5倍數）；兩者皆為被子植物。（植物界 plant，課本對應：單/雙子葉）"}, {"tid": "plant", "q": "花市老闆說仙人掌「沒有葉子只有刺，又長在沙漠，應該是很原始的植物」。請問依分類標準，仙人掌正確的歸類為何？", "opts": ["是蕨類，因為它生長在乾旱地", "是裸子植物，因為它的針狀構造像松針", "是蘚苔，因為它矮小耐旱", "是被子植物，因為它會開花、種子由果實包住，肥莖針葉只是耐旱適應"], "ans": 3, "exp": "分類依「有花」判定，仙人掌會開花結果故為被子植物；肥莖儲水、葉退化成刺只是乾旱適應，與分類無關。（植物界 plant，課本對應：被子/適應）"}, {"tid": "inv", "q": "小魚缸邊老師展示一隻水螅，碰一下觸手會射出細絲捕食水蚤，且常固著在水草上。依此特徵，水螅屬於哪一類動物？", "opts": ["節肢動物，具外骨骼會蛻皮", "軟體動物，身體柔軟具外套膜", "環節動物，身體分許多相似環節", "刺絲胞動物，具刺絲胞捕食、輻射對稱、有口無肛門、可出芽生殖"], "ans": 3, "exp": "水螅有刺絲胞、輻射對稱、有口無肛門、可出芽生殖，屬刺絲胞動物；分節、外骨骼、外套膜分別是環節/節肢/軟體的特徵。（無脊椎動物 inv，課本對應：刺絲胞）"}, {"tid": "inv", "q": "野外溪邊石頭下發現一隻渦蟲，老師說牠身體扁平、有口無肛門，被切斷還能再生。渦蟲應歸入哪一類？", "opts": ["環節動物，身體分許多相似環節", "扁形動物，身體背腹扁平、有口無肛門", "刺絲胞動物，具刺絲胞捕食", "棘皮動物，具管足、生活於海洋"], "ans": 1, "exp": "渦蟲身體背腹扁平、有口無肛門、可再生，屬扁形動物；環節有環節與剛毛、棘皮有管足且僅海洋、刺絲胞有刺絲胞。（無脊椎動物 inv，課本對應：扁形）"}, {"tid": "inv", "q": "阿明在菜園翻土時挖到蚯蚓，看到牠身體由許多相似的環一節一節組成，摸起來有細小剛毛。蚯蚓屬於哪一類？", "opts": ["扁形動物，身體背腹扁平", "節肢動物，具外骨骼", "環節動物，身體分許多相似環節、具剛毛", "軟體動物，身體柔軟不分節"], "ans": 2, "exp": "蚯蚓身體分許多相似環節並有剛毛，屬環節動物；軟體不分節、扁形背腹扁平、節肢有外骨骼且附肢分節。（無脊椎動物 inv，課本對應：環節）"}, {"tid": "inv", "q": "海產攤上有文蛤、蝸牛、章魚、烏賊。老闆問學生這四種有什麼共同點。下列哪個說法最正確？", "opts": ["牠們都有許多相似環節", "牠們都是軟體動物，身體柔軟不分節，有的有殼有的無殼", "牠們都有外骨骼且會蛻皮", "牠們都具刺絲胞，可捕食"], "ans": 1, "exp": "文蛤、蝸牛、章魚、烏賊都是軟體動物，身體柔軟不分節、多具外套膜，有殼或無殼皆有；外骨骼蛻皮是節肢、環節分節、刺絲胞捕食皆不符。（無脊椎動物 inv，課本對應：軟體）"}, {"tid": "inv", "q": "野外調查隊統計一塊樣區內各類無脊椎動物的物種數，發現昆蟲、蜘蛛、蝦蟹、蜈蚣加起來的種類遠超過其他類群。這現象反映哪一門的特徵？", "opts": ["節肢動物種類數量最多，具外骨骼、身體與附肢分節、會蛻皮", "刺絲胞動物種類最多，可出芽生殖", "棘皮動物種類最多，具管足", "軟體動物種類最多，身體柔軟不分節"], "ans": 0, "exp": "昆蟲、蜘蛛、蝦蟹、蜈蚣都是節肢動物，具外骨骼、分節、會蛻皮，是種類數量最多的動物門。（無脊椎動物 inv，課本對應：節肢）"}, {"tid": "inv", "q": "潮間帶觀察課中，導覽員指著海星、海膽、海參說「牠們只住在海裡，靠很多小管伸縮移動」。這些動物屬於哪一類？", "opts": ["棘皮動物，具管足、體表多棘、成體輻射對稱、僅生活於海洋", "節肢動物，具外骨骼", "軟體動物，具外套膜可上岸生活", "環節動物，身體分節"], "ans": 0, "exp": "海星、海膽、海參具管足、體表多棘、成體五輻對稱、僅生活於海洋，屬棘皮動物；其餘類群特徵與分布皆不符。（無脊椎動物 inv，課本對應：棘皮）"}, {"tid": "vert", "q": "水族館解說員拿出一條鯊魚標本，指出牠骨骼是軟的、體側有一排鰓裂卻沒有鰓蓋，也沒有鰾。下列判斷何者正確？", "opts": ["牠是哺乳類，因為體型大會游泳", "牠不是魚，因為沒有鰓蓋", "牠是軟骨魚，屬魚類，靠鰓呼吸、體外受精、卵生", "牠是兩生類，幼體用鰓成體用肺"], "ans": 2, "exp": "鯊魚為軟骨魚，有鰓裂無鰓蓋、無鰾，仍是魚類，用鰓呼吸、外溫、多體外受精卵生；鰓蓋與鰾是硬骨魚特徵。（脊椎動物 vert，課本對應：軟骨魚）"}, {"tid": "vert", "q": "小新在水溝邊養青蛙的蝌蚪，觀察到牠先用鰓、長大後用肺加皮膚呼吸，皮膚裸露濕潤、卵沒有殼產在水中。青蛙屬於哪一類？", "opts": ["爬蟲類，體內受精、卵具殼", "魚類，終生用鰓", "兩生類，外溫、體外受精、卵無殼、皮膚不防水", "哺乳類，胎生哺乳"], "ans": 2, "exp": "青蛙幼鰓成肺加皮膚、皮膚裸露濕潤、卵無殼產於水中，屬兩生類；卵具殼體內受精是爬蟲、終生用鰓是魚、胎生哺乳是哺乳。（脊椎動物 vert，課本對應：兩生）"}, {"tid": "vert", "q": "自然老師問：「為什麼蛇、蜥蜴等爬蟲類比青蛙更能離開水生活？」下列哪一組原因最正確？", "opts": ["體外受精且皮膚裸露濕潤，可在陸上保水", "幼體用鰓、成體用肺，可隨時回水", "體內受精且卵具硬殼、體表有鱗片或骨板減少水分散失、用肺呼吸", "卵無殼產在水中，但用肺呼吸"], "ans": 2, "exp": "爬蟲類體內受精＋卵具殼不必回水生殖、鱗片或骨板減少失水、用肺呼吸，故更適應陸地；體外受精、皮膚裸露、卵無殼皆是兩生類較依賴水的特徵。（脊椎動物 vert，課本對應：陸地適應）"}, {"tid": "vert", "q": "動物園解說提到鴨嘴獸「會下蛋，卻又用乳汁餵小孩」。依此特徵，鴨嘴獸應歸入哪一類，為什麼？", "opts": ["爬蟲類，因為卵生且體溫多變", "兩生類，因為牠住在水邊", "鳥類，因為牠會下蛋", "哺乳類，因為牠有乳腺以乳汁哺育幼獸，只是少數卵生的哺乳動物"], "ans": 3, "exp": "鴨嘴獸有乳腺哺乳故為哺乳類，只是少數卵生的哺乳動物（無乳頭、無臍帶）；下蛋不代表是鳥，分類看乳腺哺乳此關鍵特徵。（脊椎動物 vert，課本對應：哺乳/鴨嘴獸）"}, {"tid": "vert", "q": "小組討論企鵝、蝙蝠、海豚三種會「游或飛」的動物該怎麼分類。正確的歸類是？", "opts": ["三者都是哺乳類", "企鵝是鳥類，蝙蝠與海豚都是哺乳類", "蝙蝠是鳥類，企鵝與海豚是哺乳類", "企鵝與海豚是魚類，蝙蝠是鳥類"], "ans": 1, "exp": "企鵝有羽毛、體內受精硬殼卵屬鳥類；蝙蝠與海豚有乳腺哺乳、胎生、用肺呼吸，屬哺乳類，與會飛或會游無關。（脊椎動物 vert，課本對應：類群判定）"}, {"tid": "vert", "q": "關於鳥類能飛行的構造適應，下列敘述何者「錯誤」？", "opts": ["有氣囊輔助呼吸，可進行雙重呼吸", "前肢特化為翼", "瞬膜的有無決定鳥類能否飛行，是飛行最重要的構造", "骨骼中空而輕"], "ans": 2, "exp": "瞬膜是保護眼睛的構造，與飛行無直接關係，故此敘述錯誤；翼、中空骨、氣囊雙重呼吸才是飛行適應。（脊椎動物 vert，課本對應：鳥類適應）"}, {"tid": "pop", "q": "生態社在校園水池記錄「某時間、某區域內所有的吳郭魚」。依生命組成層次的定義，這群生物屬於下列何者？", "opts": ["族群：同一時間、同一區域、同種生物的所有個體", "群集：同區所有不同種族群的總合", "生態系：群集加上非生物環境", "生物圈：地球上所有生物與環境的總和"], "ans": 0, "exp": "同時間、同區域、同種的所有個體為族群；群集是多種族群總合、生態系含非生物環境、生物圈是全球總和。（族群與群集 pop，課本對應：層次定義）"}, {"tid": "pop", "q": "老師說：「一座池塘裡的所有水生植物、魚、蝦、螺等不同種生物加在一起，再把陽光、水溫、土壤也算進去。」這指的是哪一個層次？", "opts": ["族群：同種所有個體", "生態系：群集加上非生物環境", "群集：只含所有不同種族群", "個體：單一一隻生物"], "ans": 1, "exp": "群集（多種族群總合）再加上陽光、水溫、土壤等非生物環境就是生態系；只含生物的是群集，同種為族群。（族群與群集 pop，課本對應：生態系）"}, {"tid": "pop", "q": "養殖場記錄一池虱目魚：某月「出生＋遷入」的數量少於「死亡＋遷出」。這個月該池魚的族群數量會如何變化？", "opts": ["維持完全不變", "減少", "增加", "先增加後立即回到原數"], "ans": 1, "exp": "當出生＋遷入＜死亡＋遷出時，族群數量減少；大於則增加、相等則動態平衡。（族群與群集 pop，課本對應：數量變化）"}, {"tid": "pop", "q": "研究員在一片湖區用標識再捕法估算鯽魚數量：先捕捉並標記 40 尾放回，數日後再捕 50 尾，其中 5 尾有標記。依公式估計湖中鯽魚總數約為多少？", "opts": ["400 尾", "250 尾", "500 尾", "2000 尾"], "ans": 0, "exp": "總數＝標記數×再捕總數÷再捕中標記數＝40×50÷5＝400 尾。（族群與群集 pop，課本對應：標識再捕）"}, {"tid": "pop", "q": "下列哪一種調查情境「不適合」用標識再捕法估算族群數量？", "opts": ["估算森林中會四處活動的山羌數量", "估算紅樹林溼地裡固著不動的水筆仔株數", "估算草地上會飛來飛去的麻雀數量", "估算湖中能自由游動的鯉魚數量"], "ans": 1, "exp": "標識再捕法適用能自由活動且會與族群混合的動物；水筆仔固著不動，應改用樣區法，故不適合。（族群與群集 pop，課本對應：估算法適用）"}, {"tid": "pop", "q": "園藝調查員想估算一片 600 平方公尺草地上某種野花的總數。他隨機取 1 平方公尺樣區三塊，分別數到 28、30、32 株。依樣區法估計總數約為多少株？", "opts": ["18000 株", "600 株", "9000 株", "90 株"], "ans": 0, "exp": "平均每樣區＝(28+30+32)/3＝30 株，總數＝30×(600÷1)＝18000 株。（族群與群集 pop，課本對應：樣區法）"}, {"tid": "pop", "q": "颱風後一塊裸露山坡逐漸被生物覆蓋。學生長期觀察記錄到植物的出現順序，下列哪一個順序最符合初級演替？", "opts": ["喬木森林 → 灌木 → 草本 → 地衣", "地衣苔蘚 → 草本 → 灌木 → 喬木森林", "草本 → 地衣 → 喬木 → 灌木", "灌木 → 喬木 → 草本 → 地衣"], "ans": 1, "exp": "裸地的初級演替先驅常為地衣、苔蘚，再依序為草本、灌木、喬木森林。（族群與群集 pop，課本對應：演替）"}, {"tid": "inter", "q": "潛水導覽介紹小丑魚住在海葵的觸手間，海葵保護小丑魚不被天敵吃，小丑魚則趕走啃食海葵的魚並帶來食物碎屑，雙方都得利。這是哪一種交互作用？", "opts": ["寄生（＋／−）", "片利共生（＋／0）", "競爭（−／−）", "互利共生（＋／＋）"], "ans": 3, "exp": "小丑魚與海葵雙方皆受益，屬互利共生（＋／＋）；片利為一方無影響、寄生宿主受害、競爭雙方皆受損。（交互作用 inter，課本對應：互利共生）"}, {"tid": "inter", "q": "漁民觀察到鯊魚游動時，鮣魚常吸附在牠身上「搭便車」並撿食殘渣，但對鯊魚並沒有明顯好處或壞處。這屬於哪一種交互作用？", "opts": ["互利共生（＋／＋）", "寄生（＋／−）", "掠食（＋／−）", "片利共生（＋／0）"], "ans": 3, "exp": "鮣魚得利、鯊魚無明顯影響，屬片利共生（＋／0）；互利為雙方得利、寄生與掠食則一方受害。（交互作用 inter，課本對應：片利共生）"}, {"tid": "inter", "q": "農夫發現果園裡的菟絲子纏住柑橘樹，伸出吸器奪取養分，使柑橘樹日漸衰弱。菟絲子與柑橘樹之間屬於哪一種關係？", "opts": ["寄生（＋／−）：菟絲子得利、柑橘樹受害", "互利共生（＋／＋）", "片利共生（＋／0）", "競爭（−／−）"], "ans": 0, "exp": "菟絲子奪養分得利、柑橘樹受害，屬寄生（＋／−）；互利、片利、競爭的符號組合皆不符。（交互作用 inter，課本對應：寄生）"}, {"tid": "inter", "q": "研究員把生長條件相同的兩種草履蟲養在同一管中，發現兩者數量都比各自單獨培養時下降。這個結果最能說明哪一種交互作用？", "opts": ["競爭：爭奪相同有限資源，雙方皆受影響", "互利共生：雙方皆得利", "片利共生：一方無影響", "掠食：一方吃另一方"], "ans": 0, "exp": "混養後雙方數量都下降，代表爭奪相同有限資源的競爭（−／−）；互利會雙增、掠食一方下降、片利一方不受影響。（交互作用 inter，課本對應：競爭）"}, {"tid": "inter", "q": "為了減少農藥，農民在稻田放養蓋斑鬥魚來吃孑孓、在荔枝園釋放平腹小蜂寄生荔枝椿象卵。這類做法稱為什麼？並利用了哪些關係？", "opts": ["優養化防治，靠增加養分抑制害蟲", "生物防治，利用掠食或寄生等天敵控制有害生物", "生物放大防治，靠毒物累積殺死害蟲", "互利共生防治，讓害蟲與天敵互相得利"], "ans": 1, "exp": "利用天敵（掠食、寄生）控制有害生物即生物防治，可減少農藥；不能用互利共生防治，優養化與生物放大皆與此無關。（交互作用 inter，課本對應：生物防治）"}, {"tid": "energy", "q": "科展同學想找出「為什麼校園草地生態系的能量最終來源」。在一般有陽光的生態系中，下列敘述何者正確？", "opts": ["能量最終來源是土壤中的礦物質", "分解者是能量的最終來源，因為牠們釋放能量", "消費者是能量來源，因為牠們把能量傳給植物", "太陽是最終能量來源，生產者行光合作用把光能轉成化學能"], "ans": 3, "exp": "多數生態系最終能量來源是太陽，生產者藉光合作用把光能轉為化學能；分解者與消費者皆取用既有能量，並非來源。（能量流動 energy，課本對應：能量來源）"}, {"tid": "energy", "q": "海洋研究船在深海熱泉口發現一個沒有陽光卻仍有大量生物的生態系。這裡的生產者是靠什麼獲得能量？", "opts": ["消費者捕食帶來的能量", "硫化菌行化學合成，利用硫化氫的化學能，不需陽光", "直接吸收海水溫度的熱能維生", "綠色植物行光合作用"], "ans": 1, "exp": "深海熱泉缺光，生產者為硫化菌（化學自營），以硫化氫的化學能合成有機物，是不靠陽光的例外。（能量流動 energy，課本對應：化學合成）"}, {"tid": "energy", "q": "老師畫了一個食物鏈：水稻→蝗蟲→青蛙→蛇→鷹。下列關於各角色的判斷何者正確？", "opts": ["水稻是生產者、蝗蟲是初級消費者、鷹是最高級消費者", "鷹是初級消費者，因為牠飛得最高", "蛇是分解者，因為牠在食物鏈中段", "蝗蟲是生產者、水稻是消費者"], "ans": 0, "exp": "食物鏈中水稻為生產者、蝗蟲為初級消費者、依序往上鷹為最高級消費者；分解者另指細菌真菌，不在此攝食序列。（能量流動 energy，課本對應：營養階層）"}, {"tid": "energy", "q": "參觀生態解說館看到一座能量塔（如圖），由底層生產者往上每升一個營養階層，能量約只剩前一階的十分之一。其餘約 90% 的能量到哪裡去了？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["全部被上一階的消費者吃下並儲存", "大多經呼吸作用以熱能形式散失，無法傳給上一階", "循環回到生產者再利用", "轉變成礦物質留在土壤"], "ans": 1, "exp": "每升一階能量約只剩10%，其餘約90%多經呼吸作用以熱能散失，不能傳遞或循環，所以能量塔底寬頂窄。（能量流動 energy，課本對應：10%法則）"}, {"tid": "energy", "q": "某草原食物鏈中，生產者一年固定的能量約為 80000 大卡。若每升高一個營養階層能量約剩 1/10，則第三級消費者大約可得到多少能量？", "opts": ["8000 大卡", "8 大卡", "800 大卡", "80 大卡"], "ans": 3, "exp": "生產者80000→初級8000→次級800→三級80大卡（每階×1/10，共乘三次）。（能量流動 energy，課本對應：能量塔計算）"}, {"tid": "energy", "q": "關於生態系中能量與物質的流動，下列敘述何者「正確」？", "opts": ["能量越往高階越多，所以最高級消費者能量最多", "能量單向流動、逐級遞減、最終以熱散失，無法循環；物質則可循環", "能量可以在生態系中不斷循環再利用", "物質只能單向流動，不會循環"], "ans": 1, "exp": "能量單向流動、逐級遞減、最終以熱散失而不循環，物質（碳氮水）才會循環；高階能量最少。（能量流動 energy，課本對應：能量vs物質）"}, {"tid": "cycle", "q": "環境課討論「人類大量燃燒煤、石油讓大氣 CO₂ 上升」。下列哪一個過程能把大氣中的 CO₂ 移除（固碳）？", "opts": ["所有生物行呼吸作用", "分解者分解遺體", "燃燒化石燃料", "生產者行光合作用，把 CO₂ 固定成有機物"], "ans": 3, "exp": "光合作用是把大氣CO₂固定的主要途徑（另溶於海水）；呼吸、分解、燃燒都會釋出CO₂。（物質循環 cycle，課本對應：碳循環）"}, {"tid": "cycle", "q": "自然課討論碳循環，同學對碳進出大氣的解讀如下，何者「錯誤」？", "opts": ["光合作用會把大氣 CO₂ 固定為有機物", "生產者行呼吸作用會減少大氣中的 CO₂", "分解者分解遺體會釋出 CO₂", "燃燒化石燃料會增加大氣 CO₂"], "ans": 1, "exp": "生產者也會行呼吸而釋出CO₂，並非減少，故此敘述錯誤；燃燒、分解放碳、光合固碳皆正確。（物質循環 cycle，課本對應：碳循環陷阱）"}, {"tid": "cycle", "q": "某河川調查測得食物鏈四種生物體內的 DDT 濃度（如表）。依生物放大作用判斷，何者為最高級消費者？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丙", "丁", "甲", "乙"], "ans": 0, "exp": "DDT等難分解毒物沿食物鏈累積，營養階層越高濃度越高；丙(20)濃度最高為最高級消費者，丁(0.04)最低為生產者。（物質循環 cycle，課本對應：生物放大）"}, {"tid": "cycle", "q": "魚塭夏天施過多肥料後，水面浮游藻類大量繁殖、水變綠，幾天後底層藻死亡分解，夜裡魚群陸續翻肚死亡。這現象與主要死因為何？", "opts": ["水中養分太少使魚餓死", "水溫驟降使魚凍死", "優養化，藻類遮光與分解耗氧使水中溶氧大減，導致魚缺氧死亡", "農藥直接毒死魚群"], "ans": 2, "exp": "氮磷過多導致優養化，藻華遮光使底層藻死、夜間呼吸與分解大量耗氧，溶氧驟減使魚缺氧死亡。（物質循環 cycle，課本對應：優養化）"}, {"tid": "eco", "q": "地理老師說「生物圈是地球上所有生物及其生存環境的總和」。下列關於生物圈的敘述何者正確？", "opts": ["範圍約在海平面上下各約 1 萬公尺，會隨生物的發現或滅絕而改變", "範圍是海平面上下各約 1 萬公里，固定不變", "月球表面也屬於生物圈的一部分", "生物在生物圈中分布非常平均"], "ans": 0, "exp": "生物圈範圍約海平面上下各約1萬公尺（合計約2萬公尺），會隨生物發現或滅絕而改變；非1萬公里、不含月球、分布也不平均。（生態系與生物圈 eco，課本對應：生物圈）"}, {"tid": "eco", "q": "研究團隊比較三地年雨量：甲地稀少、乙地中等、丙地充足且分布平均。依陸域生態系與年雨量的關係，三地最可能形成的生態系為何？", "opts": ["三地都形成熱帶雨林", "甲沙漠、乙草原、丙森林", "甲草原、乙沙漠、丙凍原", "甲森林、乙草原、丙沙漠"], "ans": 1, "exp": "陸域生態系主要受溫度與雨量影響，年雨量由少到多依序為沙漠＜草原＜森林。（生態系與生物圈 eco，課本對應：陸域生態系）"}, {"tid": "eco", "q": "潮間帶教學中，老師畫了海洋分區剖面（如圖），由岸往外延伸到深海。下列關於各區的敘述何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 470 280\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"470\" height=\"280\" fill=\"#ffffff\"/><rect x=\"60\" y=\"70\" width=\"370\" height=\"170\" fill=\"#eaf4fb\" stroke=\"none\"/><polygon points=\"60,120 150,150 250,168 250,225 430,235 430,240 60,240\" fill=\"#efe6d6\" stroke=\"#9a8a6a\" stroke-width=\"1.4\"/><line x1=\"60\" y1=\"70\" x2=\"430\" y2=\"70\" stroke=\"#3b82c4\" stroke-width=\"1.6\"/><line x1=\"250\" y1=\"150\" x2=\"430\" y2=\"150\" stroke=\"#0a7ea4\" stroke-width=\"1.2\" stroke-dasharray=\"6 4\"/><text x=\"426\" y=\"145\" font-size=\"11\" text-anchor=\"end\" fill=\"#0a7ea4\">水深約 200m</text><line x1=\"150\" y1=\"70\" x2=\"150\" y2=\"150\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"250\" y1=\"70\" x2=\"250\" y2=\"225\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">潮間帶</text><text x=\"200\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">淺海區</text><text x=\"200\" y=\"98\" font-size=\"10\" text-anchor=\"middle\" fill=\"#666\">(大陸棚)</text><text x=\"345\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">大洋區</text><text x=\"345\" y=\"115\" font-size=\"11\" text-anchor=\"middle\" fill=\"#0a7ea4\">透光區</text><text x=\"345\" y=\"195\" font-size=\"11\" text-anchor=\"middle\" fill=\"#444\">無光區</text><text x=\"44\" y=\"68\" font-size=\"10\" text-anchor=\"end\" fill=\"#3b82c4\">海面</text><circle cx=\"95\" cy=\"35\" r=\"13\" fill=\"#fde68a\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"110\" y1=\"35\" x2=\"117\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"46\" x2=\"111\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"50\" x2=\"95\" y2=\"57\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"46\" x2=\"79\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"80\" y1=\"35\" x2=\"73\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"24\" x2=\"79\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"20\" x2=\"95\" y2=\"13\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"24\" x2=\"111\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/></svg></div>", "opts": ["潮間帶終年被海水淹沒，水位不變", "淺海區位於大陸棚、陽光可達，珊瑚礁與生物多；大洋區以水深約 200 公尺分透光區與無光區", "深海無光區的生物全靠自身光合作用維生", "大洋區陽光可直達海底，生物最多"], "ans": 1, "exp": "由岸到海分潮間帶→淺海區(大陸棚,光可達,生物多)→大洋區(約200m分透光/無光區)；潮間帶水位會隨潮汐變化，深海無光區靠落下的有機碎屑或化學合成。（生態系與生物圈 eco，課本對應：海洋分區）"}, {"tid": "eco", "q": "生態營到河口溼地觀察，看到水筆仔長出支持根、招潮蟹與彈塗魚出沒，導覽員說這裡海水淡水交會。關於河口生態系，下列何者正確？", "opts": ["完全無生物能生存", "終年淡水、鹽度恆定", "以浮游藻的光合鏈為唯一能量來源，無碎屑鏈", "鹽度與水位變化大，生物多具耐鹽適應，能量多以有機碎屑食物鏈為主"], "ans": 3, "exp": "河口海淡水交會、鹽度與水位變化大，紅樹林等具耐鹽適應，並以有機碎屑食物鏈為主。（生態系與生物圈 eco，課本對應：河口）"}, {"tid": "conserv", "q": "園藝社發現同一批綠豆種出的植株，有的莖偏紫、有的偏綠，種子大小也略有差異。這種同物種內的變異屬於哪一層次的生物多樣性？", "opts": ["生態系多樣性", "族群多樣性", "遺傳（基因）多樣性", "物種多樣性"], "ans": 2, "exp": "同一物種內的基因或性狀變異屬遺傳（基因）多樣性；物種多樣性指種類豐富、生態系多樣性指棲地類型多樣。（多樣性與保育 conserv，課本對應：三層次）"}, {"tid": "conserv", "q": "溪流調查時，志工撈到福壽螺、琵琶鼠魚、美國螯蝦，卻擔心它們排擠原生種。下列關於外來入侵種的敘述何者正確？", "opts": ["引進外來種一定能增加當地生物多樣性", "櫻花鉤吻鮭與石虎都是外來入侵種", "引進外來入侵種通常使本土種減少，並不會增加本地生物多樣性", "隨意放生外來種有助於生態保育"], "ans": 2, "exp": "外來入侵種常排擠本土種、使其減少，不會增加多樣性；櫻花鉤吻鮭與石虎是台灣原生種，隨意放生有害生態。（多樣性與保育 conserv，課本對應：外來種）"}, {"tid": "conserv", "q": "報導指出某瀕危鳥被列入「紅皮書（紅色名錄）」，等級為瀕危(EN)。負責評估物種滅絕風險並編製此名錄的是哪個組織或公約？", "opts": ["蒙特婁議定書", "拉姆薩公約", "IUCN 國際自然保育聯盟", "CITES 華盛頓公約"], "ans": 2, "exp": "IUCN評估物種滅絕風險並編製紅皮書（紅色名錄）；CITES管制國際貿易、拉姆薩護溼地、蒙特婁護臭氧層。（多樣性與保育 conserv，課本對應：保育組織）"}, {"tid": "conserv", "q": "環保社推動校園「5R」減塑行動。下列哪一組正確對應 5R 的精神？", "opts": ["Reduce 減量、Repeat 重複、React 反應、Remind 提醒、Reward 獎勵", "Refuse 拒用、Reduce 減量、Reuse 重複使用、Repair 修復、Recycle 回收", "Run 跑步、Read 閱讀、Rest 休息、Relax 放鬆、Return 歸還", "Recycle 回收、Remove 移除、Replace 替換、Rebuild 重建、Restart 重啟"], "ans": 1, "exp": "5R＝Refuse 拒用、Reduce 減量、Reuse 重複使用、Repair 修復、Recycle 回收，是永續行動的具體做法。（多樣性與保育 conserv，課本對應：5R）"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
</html>
