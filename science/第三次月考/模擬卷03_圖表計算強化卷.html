<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}

header p{margin-top:5px;font-size:.82rem;opacity:.88}
.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}
#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}
.si span.val{font-weight:700;font-size:.95rem}
#ptbar{height:5px;background:rgba(255,255,255,.2);width:160px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}
.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.q-hd h2{font-size:.92rem;font-weight:700;color:var(--navy)}
.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "生物分類階層由大到小排列，下列何者正確？", "opts": ["界→門→綱→目→科→屬→種", "種→屬→科→目→綱→門→界", "界→綱→門→目→屬→科→種", "門→界→綱→目→科→種→屬"], "ans": 0, "exp": "分類階層由大到小為界、門、綱、目、科、屬、種；種是最基本單位，越下層親緣越近。(cls 課本對應)"}, {"tid": "cls", "q": "下列各組「名字有魚」的生物，何者「真的」屬於魚類？", "opts": ["鯊魚", "章魚", "鱷魚", "鯨魚"], "ans": 0, "exp": "鯊魚為軟骨魚（有鰓裂、無鰓蓋），確為魚類；鯨魚為哺乳類、鱷魚為爬蟲類、章魚為軟體動物，皆非魚。分類依構造特徵而非名稱。(cls 課本對應)"}, {"tid": "cls", "q": "關於二名法（學名）的敘述，下列何者正確？", "opts": ["學名由屬名加種小名組成，以拉丁文斜體書寫", "學名由科名加屬名組成，用正體中文書寫", "同屬不同種的生物親緣關係較疏遠", "種小名字首必須大寫，屬名則小寫"], "ans": 0, "exp": "林奈二名法：學名＝屬名＋種小名，拉丁文斜體，屬名首字母大寫。同屬生物親緣較近。(cls 課本對應)"}, {"tid": "plant", "q": "台灣四大類植物的物種比例（如表）。若某生物學家想統計「能結出果實」的植物所佔百分比，應為下列何者？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類群</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蘚苔</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蕨類</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">裸子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">被子</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">百分比</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">26.1%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">10.9%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">1.5%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">61.5%</td></tr></table>", "opts": ["38.5%", "26.1%", "61.5%", "37.0%"], "ans": 2, "exp": "能結果實者為被子植物（有果實包種子）＝61.5%。26.1%為蘚苔、38.5%為不開花類總和、37.0%為受精需水者。(plant 課本對應)"}, {"tid": "plant", "q": "承上表，「受精作用必須以水為媒介」的植物所佔百分比合計約為多少？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類群</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蘚苔</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蕨類</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">裸子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">被子</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">百分比</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">26.1%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">10.9%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">1.5%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">61.5%</td></tr></table>", "opts": ["48.5%", "38.5%", "26.1%", "37.0%"], "ans": 3, "exp": "受精需水者為蘚苔（26.1%）＋蕨類（10.9%）＝37.0%。裸子有花粉管、被子受精皆不需水。(plant 課本對應)"}, {"tid": "plant", "q": "下列植物特徵的○（有）×（無）比較表（如表），何者全部正確對應「蕨類植物」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">特徵</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">維管束</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">種子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">孢子繁殖</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">蘚苔</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">蕨類</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">裸子</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td></tr></table>", "opts": ["維管束×、種子○、以孢子繁殖×", "維管束○、種子○、以孢子繁殖×", "維管束×、種子×、以孢子繁殖○", "維管束○、種子×、以孢子繁殖○"], "ans": 3, "exp": "蕨類最早演化出維管束（有真正根莖葉），但無種子、以孢子繁殖。蘚苔無維管束、裸子有種子不靠孢子。(plant 課本對應)"}, {"tid": "plant", "q": "下列哪一組特徵全部屬於「單子葉植物」？", "opts": ["子葉2片、軸根、網狀脈", "子葉2片、鬚根、平行脈", "子葉1片、軸根、網狀脈", "子葉1片、鬚根、平行脈"], "ans": 3, "exp": "單子葉：子葉1、鬚根、平行脈、花瓣3或其倍數、維管束散生（如玉米、稻）。雙子葉則子葉2、軸根、網狀脈。(plant 課本對應)"}, {"tid": "plant", "q": "關於裸子植物的敘述，下列何者「錯誤」？", "opts": ["以毬果生殖，多為針葉樹", "有花粉管，受精作用不需要水", "胚珠裸露、無花無真正的果實", "有果實包住種子，靠昆蟲傳粉"], "ans": 3, "exp": "裸子植物胚珠裸露、無花無果實、以毬果生殖、有花粉管故受精不需水，多為風媒針葉樹。「有果實靠昆蟲傳粉」是被子植物特徵，故為錯誤敘述。(plant 課本對應)"}, {"tid": "inv", "q": "下列無脊椎動物中，何者「種類數量最多」、具外骨骼且會蛻皮？", "opts": ["環節動物", "軟體動物", "刺絲胞動物", "節肢動物"], "ans": 3, "exp": "節肢動物具外骨骼、身體與附肢分節、會蛻皮，是種類最多的動物門（昆蟲、蝦蟹、蜘蛛）。軟體不分節、環節有剛毛、刺絲胞用刺絲胞捕食。(inv 課本對應)"}, {"tid": "inv", "q": "水螅、水母、海葵、珊瑚都具有用來捕食的特殊構造，並且有口無肛門。牠們屬於下列哪一類？", "opts": ["棘皮動物", "軟體動物", "刺絲胞動物", "扁形動物"], "ans": 2, "exp": "刺絲胞動物具刺絲胞捕食、輻射對稱、有口無肛門，許多成體固著生活（珊瑚曾被誤認為植物）。(inv 課本對應)"}, {"tid": "inv", "q": "下列動物特徵○×比較表（如表），何者正確描述「軟體動物」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">特徵</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">身體分節</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">外骨骼</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">管足</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">環節</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">軟體</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">節肢</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">棘皮</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">×</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">○</td></tr></table>", "opts": ["體表有外骨骼，會蛻皮", "身體分許多相似環節，具剛毛", "身體柔軟不分節，有的有殼有的無殼", "具管足，僅生活於海洋"], "ans": 2, "exp": "軟體動物身體柔軟不分節、多具外套膜、有的有殼（文蛤、蝸牛）有的無殼（章魚、烏賊）。分節是環節/節肢、管足是棘皮的特徵。(inv 課本對應)"}, {"tid": "inv", "q": "海星、海膽、海參都具有管足、體表有棘且只生活在海洋中。下列何者與牠們屬於同一動物門？", "opts": ["蚯蚓", "渦蟲", "陽燧足", "水蛭"], "ans": 2, "exp": "棘皮動物具管足、體表多棘、僅生活於海洋，例如海星、海膽、海參、海百合、陽燧足。渦蟲為扁形、蚯蚓與水蛭為環節。(inv 課本對應)"}, {"tid": "inv", "q": "下列哪一種動物身體分成許多相似的環節，且具有剛毛？", "opts": ["海星", "沙蠶", "蝸牛", "水母"], "ans": 1, "exp": "環節動物身體分許多相似環節、具剛毛，例如蚯蚓、沙蠶、水蛭。蝸牛為軟體、海星為棘皮、水母為刺絲胞。(inv 課本對應)"}, {"tid": "inv", "q": "關於扁形動物的敘述，下列何者正確？", "opts": ["身體背腹扁平、有口無肛門，如渦蟲", "身體分節、具外骨骼會蛻皮", "具五輻對稱與管足，生活於海洋", "身體輻射對稱、以刺絲胞捕食"], "ans": 0, "exp": "扁形動物身體背腹扁平、有口無肛門，例如渦蟲（可再生）、絛蟲、吸蟲。刺絲胞、外骨骼、管足分別是其他類群特徵。(inv 課本對應)"}, {"tid": "vert", "q": "下列脊椎動物特徵比較表（如表），何者完全符合「爬蟲類」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類群</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">受精</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">卵殼</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">體表</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">兩生</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">體外</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">無殼</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">裸露濕潤</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">爬蟲</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">體內</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">具殼</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">鱗片或骨板</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">鳥</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">體內</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">硬殼</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">羽毛</td></tr></table>", "opts": ["體內受精、胎生哺乳、體表毛髮", "體內受精、卵具殼、體表鱗片或骨板", "體內受精、體表羽毛、具氣囊", "體外受精、卵無殼、體表裸露濕潤"], "ans": 1, "exp": "爬蟲類體內受精、卵具殼、體表鱗片或骨板，因此能離水繁殖。羽毛+氣囊是鳥、胎生哺乳是哺乳類。(vert 課本對應)"}, {"tid": "vert", "q": "爬蟲類比兩生類「更能適應陸地生活」的關鍵原因，下列何者正確？", "opts": ["體內受精且卵具殼、體表鱗片可減少水分散失", "體表裸露濕潤，有利於皮膚呼吸", "體外受精且卵無殼，可大量繁殖", "幼體用鰓呼吸、成體用皮膚輔助呼吸"], "ans": 0, "exp": "爬蟲類體內受精、卵具硬殼故不必回水中生殖，體表鱗片/骨板與肺呼吸可減少水分散失，比兩生類更適應陸地。其餘為兩生類特徵。(vert 課本對應)"}, {"tid": "vert", "q": "下列哪一組生物全部都是「哺乳類」？", "opts": ["蝙蝠、鱷魚、海豚", "企鵝、蝙蝠、鴨嘴獸", "海豚、蝙蝠、鴨嘴獸", "企鵝、海豚、鯨"], "ans": 2, "exp": "海豚、鯨、蝙蝠、鴨嘴獸（卵生但有乳腺哺乳）皆為哺乳類；企鵝是鳥、鱷魚是爬蟲。(vert 課本對應)"}, {"tid": "vert", "q": "關於軟骨魚（如鯊魚、魟魚）的敘述，下列何者正確？", "opts": ["骨骼為軟骨，有鰓裂、無鰓蓋、無鰾", "體溫恆定，體表覆蓋羽毛", "為哺乳類，用肺呼吸並胎生", "骨骼為硬骨，有鰓蓋與鰾"], "ans": 0, "exp": "軟骨魚骨骼為軟骨，有鰓裂、無鰓蓋、無鰾；硬骨魚才有鰓蓋與鰾。鯊、魟仍是魚類，外溫、卵生為主。(vert 課本對應)"}, {"tid": "vert", "q": "下列關於鳥類飛行適應的敘述，何者「錯誤」？", "opts": ["瞬膜的主要功能是提供飛行升力", "前肢特化為翼", "骨骼中空輕巧", "具氣囊輔助呼吸（雙重呼吸）"], "ans": 0, "exp": "鳥類飛行適應包含前肢成翼、骨骼中空、氣囊輔助呼吸、羽毛；瞬膜是保護眼睛的構造，與提供升力無關，故為錯誤。(vert 課本對應)"}, {"tid": "vert", "q": "鴨嘴獸與針鼴雖然會生蛋（卵生），但仍被分類為哺乳類，主要依據下列哪一項特徵？", "opts": ["具有乳腺能分泌乳汁哺育幼體", "具有羽毛與氣囊可飛行", "用鰓呼吸並在水中產卵", "體溫隨環境改變且體表有鱗片"], "ans": 0, "exp": "鴨嘴獸、針鼴雖卵生，但具乳腺能哺乳（無乳頭、無臍帶），因此屬哺乳類。鱗片、鰓、羽毛分別是爬蟲、魚、鳥的特徵。(vert 課本對應)"}, {"tid": "pop", "q": "生態學家在一座小池塘調查鯽魚族群，第一次捕獲並標記40尾後放回，數日後再捕獲75尾，其中有標記者10尾。依標識再捕法估計，此池塘鯽魚族群總數最接近多少尾？", "opts": ["250", "350", "300", "187"], "ans": 2, "exp": "標識再捕法：總數＝標記數×再捕總數÷再捕中標記數＝40×75÷10＝300尾。其他選項為公式套錯（如40×75÷12或加總）。(pop 課本對應)"}, {"tid": "pop", "q": "研究人員在一片草地調查某種候鳥，先捕捉並繫上腳環25隻後野放，一週後再捕48隻，其中6隻有腳環。則該地此鳥族群數量約為多少隻？", "opts": ["120", "150", "288", "200"], "ans": 3, "exp": "標識再捕法：25×48÷6＝1200÷6＝200隻。鳥能自由活動並與族群混合，適用此法。其他為運算錯誤。(pop 課本對應)"}, {"tid": "pop", "q": "某湖泊以捉放法估計吳郭魚數量：標記120尾放回，再捕50尾其中8尾有記號。下列估計值何者正確？", "opts": ["750", "430", "960", "600"], "ans": 0, "exp": "120×50÷8＝6000÷8＝750尾。注意是用「再捕中有記號數」當分母，不是再捕總數。(pop 課本對應)"}, {"tid": "pop", "q": "關於下列四種生物，何者「不適合」用標識再捕法估計其族群數量？", "opts": ["樹林間活動的台灣獼猴", "空中飛行的家燕", "潮間帶岩石上固著的藤壺", "會四處游動的溪流苦花魚"], "ans": 2, "exp": "標識再捕法適用「能自由活動、會與族群充分混合」的動物；藤壺固著不動，應改用樣區法。其餘三者皆能自由移動，適用捉放法。(pop 課本對應)"}, {"tid": "pop", "q": "小明用樣區法估計一片200平方公尺空地上的蒲公英數量，他取4個各1平方公尺的樣區，數得株數分別為28、35、33、24。則全區蒲公英總數約為多少株？", "opts": ["6000", "1200", "3000", "4800"], "ans": 0, "exp": "平均每樣區＝(28+35+33+24)÷4＝120÷4＝30株；總數＝30×(200÷1)＝6000株。植物固著，適用樣區法。(pop 課本對應)"}, {"tid": "pop", "q": "某研究在1000平方公尺草地調查車前草，隨機取5個各2平方公尺的樣區（如表），各樣區株數見下。估計全區車前草總數約為多少株？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">樣區</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">1</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">2</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">3</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">4</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">5</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">株數</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">16</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">12</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">18</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">14</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">15</td></tr></table>", "opts": ["3000", "7500", "1500", "15000"], "ans": 1, "exp": "平均每樣區＝(16+12+18+14+15)÷5＝75÷5＝15株（每2 m²）；總數＝15×(1000÷2)＝15×500＝7500株。(pop 課本對應)"}, {"tid": "pop", "q": "族群在新環境中常呈S型成長曲線（如圖）。關於甲（緩慢期）、乙（快速增長期）、丙（趨平期）的敘述，何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">時間</text><text x=\"52\" y=\"46\" font-size=\"13\" text-anchor=\"end\" fill=\"#111\">族群數量</text><line x1=\"60\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#0a7ea4\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/><text x=\"430\" y=\"74\" font-size=\"12\" text-anchor=\"end\" fill=\"#0a7ea4\">環境負荷量 K</text><path d=\"M60.0,248.1 L63.7,248.0 L67.4,247.8 L71.1,247.6 L74.8,247.3 L78.5,247.1 L82.2,246.8 L85.9,246.5 L89.6,246.2 L93.3,245.9 L97.0,245.5 L100.7,245.1 L104.4,244.6 L108.1,244.1 L111.8,243.6 L115.5,243.0 L119.2,242.4 L122.9,241.7 L126.6,241.0 L130.3,240.2 L134.0,239.3 L137.7,238.4 L141.4,237.3 L145.1,236.2 L148.8,235.1 L152.5,233.8 L156.2,232.4 L159.9,231.0 L163.6,229.4 L167.3,227.7 L171.0,225.9 L174.7,224.0 L178.4,221.9 L182.1,219.7 L185.8,217.4 L189.5,215.0 L193.2,212.4 L196.9,209.7 L200.6,206.9 L204.3,203.9 L208.0,200.9 L211.7,197.7 L215.4,194.3 L219.1,190.9 L222.8,187.4 L226.5,183.8 L230.2,180.1 L233.9,176.4 L237.6,172.6 L241.3,168.8 L245.0,165.0 L248.7,161.2 L252.4,157.4 L256.1,153.6 L259.8,149.9 L263.5,146.2 L267.2,142.6 L270.9,139.1 L274.6,135.7 L278.3,132.3 L282.0,129.1 L285.7,126.1 L289.4,123.1 L293.1,120.3 L296.8,117.6 L300.5,115.0 L304.2,112.6 L307.9,110.3 L311.6,108.1 L315.3,106.0 L319.0,104.1 L322.7,102.3 L326.4,100.6 L330.1,99.0 L333.8,97.6 L337.5,96.2 L341.2,94.9 L344.9,93.8 L348.6,92.7 L352.3,91.6 L356.0,90.7 L359.7,89.8 L363.4,89.0 L367.1,88.3 L370.8,87.6 L374.5,87.0 L378.2,86.4 L381.9,85.9 L385.6,85.4 L389.3,84.9 L393.0,84.5 L396.7,84.1 L400.4,83.8 L404.1,83.5 L407.8,83.2 L411.5,82.9 L415.2,82.7 L418.9,82.4 L422.6,82.2 L426.3,82.0 L430.0,81.9\" fill=\"none\" stroke=\"#111\" stroke-width=\"2.2\"/><line x1=\"155\" y1=\"250\" x2=\"155\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"270\" y1=\"250\" x2=\"270\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">甲</text><text x=\"212\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["丙段族群會持續無限制增加", "甲段族群數量呈指數爆發增加", "乙段是因食物耗盡而成長停滯", "丙段族群數量在環境負荷量上下波動"], "ans": 3, "exp": "S型曲線達負荷量後（丙段）數量在負荷量上下波動趨於穩定；甲為起始緩慢期，乙才是快速增長，丙非無限增加。(pop 課本對應)"}, {"tid": "inter", "q": "小丑魚住在海葵的觸手間獲得保護，同時幫海葵趕走食葵魚並清理殘屑，雙方皆獲利。這種關係屬於下列何者？", "opts": ["寄生", "片利共生", "掠食", "互利共生"], "ans": 3, "exp": "雙方皆受益（＋／＋）為互利共生，如小丑魚與海葵、地衣、根瘤菌。片利為一方得利另一方無影響，寄生與掠食則有一方受害。(inter 課本對應)"}, {"tid": "inter", "q": "鮣魚附著在鯊魚身上，藉鯊魚游動取得殘食與搬運，鯊魚則不受明顯影響。這種交互作用屬於下列何者？", "opts": ["競爭", "寄生", "片利共生", "互利共生"], "ans": 2, "exp": "一方得利、另一方無明顯影響（＋／0）為片利共生，如鯊魚與鮣魚、大樹與鳥巢蕨。互利為雙方皆利。(inter 課本對應)"}, {"tid": "inter", "q": "甲、乙、丙、丁四種生物兩兩交互作用的得失符號表（如表，＋有利、−有害、0無影響）。其中關係為「寄生」的是哪一對？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">關係</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">符號</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">甲與乙</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">＋／−</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">丙與丁</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">＋／＋</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">甲與丙</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">−／−</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">乙與丁</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">＋／0</td></tr></table>", "opts": ["甲與乙（＋／−）", "丙與丁（＋／＋）", "甲與丙（−／−）", "乙與丁（＋／0）"], "ans": 0, "exp": "寄生為一方得利一方受害（＋／−），即甲與乙。＋／＋為互利共生、−／−為競爭、＋／0為片利共生。(inter 課本對應)"}, {"tid": "inter", "q": "農民釋放蓋斑鬥魚到水池中捕食孑孓，以減少病媒蚊孳生。這種利用天敵控制有害生物的方法稱為什麼？", "opts": ["優養化", "互利共生", "群集演替", "生物防治"], "ans": 3, "exp": "利用天敵（掠食/寄生/競爭）控制有害生物即生物防治，可減少農藥，如瓢蟲治蚜蟲、蓋斑鬥魚吃孑孓。不可用互利共生來防治。(inter 課本對應)"}, {"tid": "inter", "q": "兩種草履蟲混養於同一容器，因爭奪相同的有限食物，使彼此的生長曲線都比單獨培養時下降。這屬於下列何種交互作用？", "opts": ["競爭", "掠食", "片利共生", "互利共生"], "ans": 0, "exp": "爭奪相同有限資源、雙方皆受影響（−／−）為競爭；混養雙雙下降即典型競爭。掠食為一方吃另一方，共生則至少一方得利。(inter 課本對應)"}, {"tid": "energy", "q": "在能量塔中，每升高一個營養階層，可用能量約只剩前一階的10%。若生產者固定60000大卡的能量，則第三級消費者約可獲得多少大卡？", "opts": ["6", "60", "600", "6000"], "ans": 1, "exp": "每升一階×1/10：生產者60000→初級6000→次級600→三級60大卡（60000×0.1³）。其餘為階數算錯。(energy 課本對應)"}, {"tid": "energy", "q": "某草原食物鏈中，生產者所含能量為800000大卡。若每升一營養階層能量只剩10%，則第四級消費者約可獲得多少大卡？", "opts": ["8000", "800", "80", "8"], "ans": 2, "exp": "800000×0.1⁴＝800000×0.0001＝80大卡。能量逐級遞減，約90%以呼吸與熱散失。(energy 課本對應)"}, {"tid": "energy", "q": "在一條食物鏈中，某營養階層的蛇可獲得5000大卡能量。若依10%法則，則被蛇捕食的「下一較低營養階層」生物約含有多少大卡能量？", "opts": ["500", "250", "50000", "5000"], "ans": 2, "exp": "能量往高階只剩1/10，故較低階層擁有的能量是高階的10倍：5000÷0.1＝50000大卡。注意方向是往低階×10。(energy 課本對應)"}, {"tid": "energy", "q": "關於能量塔（能量金字塔，如圖）的敘述，下列何者正確？甲為底層生產者，丁為頂層三級消費者。<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#b91c1c\"/></marker></defs><polygon points=\"40,245 380,245 338,195 82,195\" fill=\"#e8f0fb\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"215\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">甲　生產者</text><polygon points=\"82,190 338,190 296,140 124,140\" fill=\"#eef7ea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"160\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">乙　初級消費者</text><polygon points=\"124,135 296,135 254,85 166,85\" fill=\"#fdf3e0\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"105\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丙　次級消費者</text><polygon points=\"166,80 254,80 226,30 194,30\" fill=\"#fdecea\" stroke=\"#222\" stroke-width=\"1.6\"/><text x=\"210\" y=\"50\" font-size=\"15\" text-anchor=\"middle\" fill=\"#111\">丁　三級消費者</text><line x1=\"395\" y1=\"220\" x2=\"395\" y2=\"165\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"165\" x2=\"395\" y2=\"110\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><line x1=\"395\" y1=\"110\" x2=\"395\" y2=\"55\" stroke=\"#b91c1c\" stroke-width=\"1.4\" marker-end=\"url(#ar)\"/><text x=\"402\" y=\"160\" font-size=\"12\" fill=\"#b91c1c\" transform=\"rotate(0)\">每升一階</text><text x=\"402\" y=\"176\" font-size=\"12\" fill=\"#b91c1c\">約剩 10%</text><text x=\"210\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" fill=\"#111\">能量塔（能量金字塔）</text></svg></div>", "opts": ["能量可在各階層間循環不滅", "丁（高階）擁有的總能量最多", "甲（生產者）擁有的總能量最多，丁最少", "各階層能量相等，故塔呈長方形"], "ans": 2, "exp": "能量塔底寬頂窄：生產者(甲)總能量最多，越往高階越少（丁最少），因每階約只剩10%。能量單向流動、不循環。(energy 課本對應)"}, {"tid": "energy", "q": "關於深海熱泉生態系的能量來源，下列敘述何者正確？", "opts": ["靠綠色植物行光合作用提供能量", "完全依賴陽光直接照射深海", "沒有生產者，只靠死屍堆積", "靠硫化菌利用硫化氫的化學能（化學自營），不需陽光"], "ans": 3, "exp": "深海熱泉無陽光，由硫化菌（化學自營）以硫化氫的化學能合成有機物，為該系統的生產者。大多數生態系才以太陽為最終能量來源。(energy 課本對應)"}, {"tid": "energy", "q": "在生態系中，能分解動植物遺體與排泄物、使物質回歸環境的角色稱為什麼？", "opts": ["初級消費者", "分解者", "次級消費者", "生產者"], "ans": 1, "exp": "分解者（細菌、真菌）分解遺體與排泄物，使物質回歸環境；生產者行光合製造養分，消費者攝食他者。(energy 課本對應)"}, {"tid": "cycle", "q": "某食物鏈中四種生物體內DDT濃度（如表）。若DDT會沿食物鏈發生生物放大作用，則此食物鏈中「最高級消費者」最可能是哪一種生物？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁", "丙", "乙", "甲"], "ans": 1, "exp": "生物放大：營養階層越高濃度越高。濃度由低到高為丁(0.04)→乙(0.2)→甲(2.0)→丙(20)，故丙濃度最高，為最高級消費者；丁為生產者。(cycle 課本對應)"}, {"tid": "cycle", "q": "承上表（甲2.0、乙0.2、丙20、丁0.04），依生物放大作用推論此食物鏈的能量流動方向（由生產者到最高級消費者），下列何者正確？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁→乙→甲→丙", "甲→乙→丙→丁", "丙→甲→乙→丁", "丁→甲→乙→丙"], "ans": 0, "exp": "毒物濃度由低到高即食物鏈方向（生產者濃度最低）：丁(0.04)→乙(0.2)→甲(2.0)→丙(20)。(cycle 課本對應)"}, {"tid": "cycle", "q": "關於碳循環中「會增加大氣中二氧化碳」的作用，下列何者正確？", "opts": ["光合作用與二氧化碳溶於海水", "植物的蒸散作用", "呼吸作用、分解作用與燃燒化石燃料", "只有光合作用"], "ans": 2, "exp": "釋放CO₂者為呼吸、分解、燃燒（化石燃料/森林）；唯一固碳（減少CO₂）的生物作用是光合作用，海水也可吸收CO₂。(cycle 課本對應)"}, {"tid": "cycle", "q": "水域中氮、磷等營養鹽過多時，常引發優養化。下列關於優養化造成魚蝦死亡的過程，何者正確？", "opts": ["藻類大量繁殖→遮光與分解耗氧→水中溶氧大減", "營養鹽過多→水溫驟降→魚蝦凍死", "藻類大量繁殖→水中溶氧大增→魚蝦過度繁殖", "營養鹽過多→水中含氧量持續上升"], "ans": 0, "exp": "優養化：營養鹽過多→藻類/浮游植物暴增（藻華）→遮光使水下藻死亡、呼吸與分解大量耗氧→溶氧大減→魚蝦死亡。(cycle 課本對應)"}, {"tid": "eco", "q": "某地各月雨量資料（如表，全年總雨量約2400 mm且各月分布平均），且全年高溫。依此判斷該地最可能屬於哪一種陸域生態系？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">月份</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">1</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">4</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">7</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">10</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">雨量(mm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">190</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">210</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">220</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">200</td></tr></table>", "opts": ["草原", "熱帶雨林", "凍原", "沙漠"], "ans": 1, "exp": "全年高溫、雨量充足且分布平均→森林（熱帶雨林，生物多樣性最高）。沙漠雨量極少、草原雨量中等、凍原低溫。(eco 課本對應)"}, {"tid": "eco", "q": "陸域生態系主要受溫度與雨量影響。下列依「年雨量由少到多」排列，何者正確？", "opts": ["草原＜沙漠＜森林", "沙漠＜草原＜森林", "森林＜草原＜沙漠", "沙漠＜森林＜草原"], "ans": 1, "exp": "年雨量由少到多：沙漠＜草原＜森林；森林與草原常以年雨量約750 mm為分界。(eco 課本對應)"}, {"tid": "eco", "q": "關於生物圈的敘述，下列何者正確？", "opts": ["月球表面也屬於地球的生物圈", "範圍約海平面上下各約1萬公尺，會隨生物發現或滅絕而改變", "生物在生物圈中分布非常平均", "範圍為海平面上下各約1萬公里，固定不變"], "ans": 1, "exp": "生物圈是所有生物及其生存環境的總和，約海平面上下各1萬公尺（合計約2萬公尺），會隨生物的發現或滅絕而改變，分布並不平均，月球不屬於生物圈。(eco 課本對應)"}, {"tid": "eco", "q": "海洋依水深與光線可分為潮間帶、淺海區（大陸棚）與大洋區。關於「大洋區」的敘述，下列何者正確？", "opts": ["即大陸棚淺海，陽光可達底部", "位於潮間帶，受潮汐漲退影響最大", "以水深約200公尺分為透光區與無光區", "完全沒有任何生物存在"], "ans": 2, "exp": "海洋由岸到海分潮間帶→淺海區(大陸棚)→大洋區；大洋區以水深約200公尺分透光區/無光區，深海無光區靠落下的有機碎屑或化學合成維生。(eco 課本對應)"}, {"tid": "conserv", "q": "關於生物多樣性三層次的敘述，下列何者正確？", "opts": ["生態系多樣性指同種生物的性狀差異", "一地區棲地類型多寡屬於物種多樣性", "同一種綠豆有不同品系屬於遺傳（基因）多樣性", "物種多樣性指同一物種內的基因變異"], "ans": 2, "exp": "遺傳多樣性＝同種內基因/性狀變異（如同種綠豆不同品系）；物種多樣性＝物種豐富度；生態系多樣性＝棲地/生態系類型多樣。(conserv 課本對應)"}, {"tid": "conserv", "q": "下列各保育公約與其主要目的的配對（如表），何者「正確」？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">公約／議定書</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">主要目的</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">拉姆薩公約</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">保育溼地</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">華盛頓公約(CITES)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">管制瀕危野生物貿易</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">蒙特婁議定書</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">保護臭氧層(管制CFC)</td></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">京都議定書</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">減少溫室氣體</td></tr></table>", "opts": ["華盛頓公約—保護臭氧層", "蒙特婁議定書—管制野生物貿易", "京都議定書—編製紅皮書", "拉姆薩公約—保育溼地"], "ans": 3, "exp": "拉姆薩公約保育溼地（正確）。華盛頓公約管制野生物貿易、蒙特婁議定書保護臭氧層、京都議定書減溫室氣體；紅皮書由IUCN編製。其餘配對皆錯置。(conserv 課本對應)"}, {"tid": "conserv", "q": "下列何者全部屬於「台灣的外來入侵種」？", "opts": ["福壽螺、小花蔓澤蘭、綠鬣蜥", "石虎、櫻花鉤吻鮭、梅花鹿", "黑面琵鷺、藍腹鷳、長尾水雉", "台灣山椒魚、梅花鹿、石虎"], "ans": 0, "exp": "福壽螺、小花蔓澤蘭、綠鬣蜥皆為台灣外來入侵種；石虎、櫻花鉤吻鮭、梅花鹿、黑面琵鷺等為本土/原生種，勿誤判。(conserv 課本對應)"}, {"tid": "conserv", "q": "下列關於永續行動5R的敘述，何者正確？", "opts": ["回收（Recycle）應是5R中最優先採取的", "5R包含拒用、減量、重複使用、修復、回收", "引進外來種可增加本地生物多樣性", "5R是指增加塑膠製品的五種方式"], "ans": 1, "exp": "5R＝Refuse拒用、Reduce減量、Reuse重複使用、Repair修復、Recycle回收，回收非最優先（拒用減量更前）；引進外來種會使本土種減少而非增加多樣性。(conserv 課本對應)"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
