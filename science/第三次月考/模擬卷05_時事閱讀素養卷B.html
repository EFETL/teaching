<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "科普文章：「鯨魚、鱷魚、章魚、彈塗魚名字都有『魚』。」下列哪一種「真的」是魚類？", "opts": ["彈塗魚", "鱷魚", "鯨魚", "章魚"], "ans": 0, "exp": "彈塗魚是真正的魚類；鯨魚是哺乳類、鱷魚是爬蟲類、章魚是軟體動物（cls 課本對應）。"}, {"tid": "cls", "q": "報導介紹學名以「二名法」書寫。下列關於二名法的敘述何者正確？", "opts": ["同一屬的生物親緣關係最遠", "學名＝屬名＋種小名，用拉丁文斜體，屬名首字母大寫", "學名只用一個中文俗名表示", "分類依棲息地與外形，而非親緣關係"], "ans": 1, "exp": "二名法由林奈提出，學名＝屬名＋種小名、拉丁文斜體、屬名首字大寫；分類依構造與親緣，同屬親緣較近（cls 課本對應）。"}, {"tid": "plant", "q": "園藝報導：「松、杉、紅檜以毬果繁殖，種子裸露沒有果實包覆。」這些植物屬於下列哪一類？", "opts": ["蕨類植物", "被子植物", "裸子植物", "蘚苔植物"], "ans": 2, "exp": "裸子植物有維管束與種子，但無花無果實、胚珠裸露、以毬果生殖，如松杉檜；被子植物有果實包種子（plant 課本對應）。"}, {"tid": "plant", "q": "自然觀察報導：「腎蕨、山蘇靠葉背的孢子囊堆散播孢子繁殖，且最早演化出維管束。」這類植物屬於下列何者？", "opts": ["裸子植物", "蘚苔植物", "蕨類植物", "被子植物"], "ans": 2, "exp": "蕨類最早演化出維管束、有真正根莖葉、無種子、以孢子繁殖、受精需水；蘚苔則無維管束（plant 課本對應）。"}, {"tid": "plant", "q": "某報導稱「水韭、地錢生於陰濕處，矮小、無真正的根莖葉，是最早登陸的植物」。地錢、土馬騌屬於下列哪一類？", "opts": ["裸子植物", "被子植物", "蕨類植物", "蘚苔植物"], "ans": 3, "exp": "蘚苔植物無維管束、無真正根莖葉（僅假根）、矮小生於陰濕處、受精需水、為最早登陸植物（plant 課本對應）。"}, {"tid": "plant", "q": "花卉新聞介紹「向日葵與綠豆都是雙子葉植物」。下列何者是雙子葉植物的特徵？", "opts": ["胚珠裸露、無花無果實", "子葉2片、軸根（主根）、葉為網狀脈", "子葉1片、鬚根、葉為平行脈", "以孢子繁殖、無種子"], "ans": 1, "exp": "雙子葉植物子葉2片、主根（軸根）、網狀脈、維管束環狀；單子葉才是鬚根與平行脈（plant 課本對應）。"}, {"tid": "inv", "q": "海洋保育新聞提到「珊瑚是動物而非植物」。珊瑚（珊瑚蟲）屬於下列哪一類動物？", "opts": ["軟體動物", "環節動物", "刺絲胞動物（腔腸動物）", "棘皮動物"], "ans": 2, "exp": "珊瑚蟲具刺絲胞、輻射對稱、固著生活，屬刺絲胞動物；曾因固著被誤認為植物（inv 課本對應）。"}, {"tid": "inv", "q": "報導稱「外來入侵種非洲大蝸牛啃食農作」。蝸牛身體柔軟不分節、具外套膜，屬於下列哪一類動物？", "opts": ["節肢動物", "軟體動物", "棘皮動物", "環節動物"], "ans": 1, "exp": "蝸牛身體柔軟不分節、具外套膜（有殼），屬軟體動物；節肢有外骨骼會蛻皮、環節分節（inv 課本對應）。"}, {"tid": "inv", "q": "防疫新聞：「登革熱病媒蚊與紅火蟻都屬同一動物門。」蚊與螞蟻具外骨骼、身體與附肢分節、會蛻皮，屬於下列哪一類？", "opts": ["軟體動物", "環節動物", "節肢動物", "刺絲胞動物"], "ans": 2, "exp": "昆蟲具外骨骼、分節附肢、會蛻皮，屬節肢動物，是種類數量最多的動物門（inv 課本對應）。"}, {"tid": "inv", "q": "潮間帶觀察報導提到「海星、海膽、海參都只生活在海洋，體表有棘」。三者共同屬於下列哪一類？", "opts": ["軟體動物", "棘皮動物", "節肢動物", "刺絲胞動物"], "ans": 1, "exp": "海星、海膽、海參具管足、體表多棘、輻射對稱，僅生活於海洋，屬棘皮動物（inv 課本對應）。"}, {"tid": "inv", "q": "下列關於無脊椎動物的敘述，何者「錯誤」？", "opts": ["軟體動物身體分成許多相似的環節並具剛毛", "刺絲胞動物有口無肛門、可行出芽生殖", "節肢動物具外骨骼、會蛻皮", "環節動物身體分許多相似環節、有剛毛"], "ans": 0, "exp": "身體分相似環節、具剛毛的是環節動物（如蚯蚓）；軟體動物身體柔軟不分節，故敘述錯誤（inv 課本對應）。"}, {"tid": "vert", "q": "新聞報導黑面琵鷺度冬。鳥類具有下列哪一項與飛行有關的特殊構造？", "opts": ["氣囊，可輔助呼吸（雙重呼吸）", "幼體用鰓呼吸", "具乳腺可哺乳", "體表覆蓋鱗片或骨板"], "ans": 0, "exp": "鳥類有氣囊輔助呼吸、骨骼中空、前肢特化為翼、有羽毛；乳腺是哺乳類、鱗片/骨板是爬蟲（vert 課本對應）。"}, {"tid": "vert", "q": "科普影片強調「鯨魚、海豚雖然生活在海裡，名字有魚，卻不是魚類」。牠們屬於下列哪一類脊椎動物？", "opts": ["哺乳類", "爬蟲類", "魚類", "兩生類"], "ans": 0, "exp": "鯨、海豚用肺呼吸、胎生、有乳腺哺乳、屬內溫動物，是哺乳類；鱷魚才是爬蟲（vert 課本對應）。"}, {"tid": "vert", "q": "關於「爬蟲類比兩生類更能適應陸地生活」的原因，下列敘述何者正確？", "opts": ["幼體必須回到水中用鰓呼吸", "體內受精且卵具殼、體表有鱗片可減少水分散失", "受精在水中進行、卵無殼", "體表裸露濕潤、需保持皮膚潮濕"], "ans": 1, "exp": "爬蟲類體內受精、卵具殼不必回水中生殖，鱗片/骨板減少水分散失、用肺呼吸，故更適應陸地（vert 課本對應）。"}, {"tid": "vert", "q": "水族新聞介紹軟骨魚（如鯊魚、魟魚）。下列關於軟骨魚的敘述何者正確？", "opts": ["為內溫動物、胎生哺乳", "用肺呼吸、體表覆羽毛", "骨骼為硬骨、有鰓蓋與鰾", "骨骼為軟骨、有鰓裂而無鰓蓋、無鰾"], "ans": 3, "exp": "軟骨魚骨骼為軟骨、有鰓裂無鰓蓋、無鰾；硬骨魚才有鰓蓋與鰾（vert 課本對應）。"}, {"tid": "vert", "q": "特殊動物報導：「鴨嘴獸雖然會下蛋，卻有乳腺能分泌乳汁哺育幼獸。」依此判斷鴨嘴獸屬於哪一類？", "opts": ["哺乳類（卵生哺乳類）", "鳥類", "兩生類", "爬蟲類"], "ans": 0, "exp": "鴨嘴獸、針鼴雖卵生，但有乳腺哺乳，屬哺乳類；下蛋並非鳥類專利（vert 課本對應）。"}, {"tid": "pop", "q": "防疫新聞：「為估算社區某公園的吳郭魚數量，研究人員先標記 50 尾放回，數日後再捕得 80 尾、其中 8 尾有標記。」依標識再捕法，估計族群總數約為多少尾？", "opts": ["500", "800", "400", "640"], "ans": 0, "exp": "族群總數＝50×80÷8＝500；吳郭魚會自由游動並與族群混合，適用標識再捕法（pop 課本對應）。"}, {"tid": "pop", "q": "研究團隊以樣區法估算某保護區的某種草本植物。每個樣區面積相同，三個樣區株數為 28、30、32 株，總面積為樣區面積的 20 倍。估計總數約為多少株？", "opts": ["300", "900", "600", "450"], "ans": 2, "exp": "平均每樣區(28+30+32)/3＝30 株，×（總面積/樣區面積）20＝600 株；植物固著，適用樣區法而非標識再捕（pop 課本對應）。"}, {"tid": "pop", "q": "下列哪一種對象「不」適合用標識再捕法（捉放法）估算數量？", "opts": ["河中可自由游動的鯉魚", "會在區域內移動的野鳥", "潮間帶岩石上固著的藤壺", "在草地活動的野鼠"], "ans": 2, "exp": "標識再捕法適用能自由活動並與族群混合者；藤壺固著不移動，應改用樣區法（pop 課本對應）。"}, {"tid": "pop", "q": "生態觀察報導指出某外來魚種引入新水域後，「初期數量緩慢、接著快速暴增、最後在環境負荷量上下波動」。此族群成長最符合下列哪種曲線（如圖）？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC' 84.5 L396.7,84.1 L400.4,83.8 L404.1,83.5 L407.8,83.2 L411.5,82.9 L415.2,82.7 L418.9,82.4 L422.6,82.2 L426.3,82.0 L430.0,81.9\" fill=\"none\" stroke=\"#111\" stroke-width=\"2.2\"/><line x1=\"155\" y1=\"250\" x2=\"155\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"270\" y1=\"250\" x2=\"270\" y2=\"40\" stroke=\"#bbb\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">甲</text><text x=\"212\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["先快速下降再緩慢回升", "維持水平不變的直線", "S 型成長曲線，達負荷量後趨於平緩", "直線無限上升，永不停止"], "ans": 2, "exp": "S 型曲線初期緩、中期指數增、達環境負荷量後趨平並上下波動，符合描述；資源有限不可能無限上升（pop 課本對應）。"}, {"tid": "pop", "q": "關於「環境負荷量（容納量）」，下列敘述何者正確？", "opts": ["負荷量越大表示族群一定瀕臨滅絕", "指族群一年內出生的個體總數", "負荷量是固定不變、與環境資源無關", "指某環境能長期維持的某族群最大數量，族群常在其上下波動"], "ans": 3, "exp": "環境負荷量是環境能長期維持的最大族群量，族群常在其上下波動，且隨環境資源改變（pop 課本對應）。"}, {"tid": "pop", "q": "關於生物組成的層次，下列由小到大的排列何者正確？", "opts": ["群集 → 族群 → 個體 → 生物圈 → 生態系", "族群 → 個體 → 生態系 → 群集 → 生物圈", "個體 → 族群 → 群集 → 生態系 → 生物圈", "生物圈 → 生態系 → 群集 → 族群 → 個體"], "ans": 2, "exp": "由小到大為個體→族群→群集→生態系→生物圈；族群為同種、群集為同區所有不同種、生態系再加非生物環境（pop 課本對應）。"}, {"tid": "inter", "q": "防疫新聞：「衛生單位在水溝放養蓋斑鬥魚，讓牠吃掉孑孓，以減少登革熱病媒蚊。」此做法屬於下列何者？", "opts": ["優養化，營養鹽過多", "片利共生，一方得利一方無影響", "生物防治，利用天敵控制有害生物", "互利共生，兩者皆受益"], "ans": 2, "exp": "蓋斑鬥魚捕食孑孓屬掠食關係，用以控制病媒蚊即生物防治，可減少農藥；非共生（inter 課本對應）。"}, {"tid": "inter", "q": "海洋紀錄片介紹「小丑魚住在海葵的觸手間，海葵保護小丑魚、小丑魚趕走海葵的敵人並帶來食物碎屑」。兩者的關係屬於下列何者？", "opts": ["互利共生（＋／＋）", "片利共生（＋／0）", "競爭（−／−）", "寄生（＋／−）"], "ans": 0, "exp": "小丑魚與海葵雙方皆受益，屬互利共生（＋／＋）；片利為一方無影響、寄生有一方受害（inter 課本對應）。"}, {"tid": "inter", "q": "科普報導：「鮣魚以吸盤附著在鯊魚腹部，搭便車並撿食鯊魚吃剩的碎屑，對鯊魚幾乎沒有影響。」兩者關係屬於下列何者？", "opts": ["片利共生（＋／0）", "寄生（＋／−）", "互利共生（＋／＋）", "掠食（＋／−）"], "ans": 0, "exp": "鮣魚得利、鯊魚無明顯影響，屬片利共生（＋／0）；若雙方皆得利才是互利（inter 課本對應）。"}, {"tid": "inter", "q": "園藝新聞警告外來種「小花蔓澤蘭」會纏勒覆蓋其他植物、奪取陽光，使被覆蓋植物枯死。此種交互作用最接近下列何者？", "opts": ["掠食，直接把植物吃掉", "片利共生，對方不受影響", "互利共生，兩者皆受益", "競爭／寄生，奪取資源使對方受害"], "ans": 3, "exp": "小花蔓澤蘭纏勒奪光使對方受害，屬競爭/寄生類型，對方明顯受損；非互利、非片利（inter 課本對應）。"}, {"tid": "inter", "q": "研究將甲、乙兩種生物混養，記錄到兩者的生長曲線都比單獨培養時下降。此結果最可能反映哪種交互作用？", "opts": ["片利共生（＋／0）", "掠食（＋／−）", "競爭（−／−）", "互利共生（＋／＋）"], "ans": 2, "exp": "混養後雙方生長都下降，表示彼此爭奪有限資源、皆受損，屬競爭（−／−）（inter 課本對應）。"}, {"tid": "energy", "q": "生態紀錄片以「草→蝗蟲→青蛙→蛇→鷹」說明能量流動。下列關於能量塔的敘述何者正確？", "opts": ["能量在傳遞時不會有任何散失", "每升高一個營養階層，可用能量約只剩前一階的 10%", "能量可在生態系中循環使用", "越高階生物獲得的總能量越多"], "ans": 1, "exp": "能量塔每升一階約只剩 10%，其餘約 90% 以呼吸、熱能散失；能量單向流動、逐級遞減、不可循環（energy 課本對應）。"}, {"tid": "energy", "q": "若某草原生產者固定的能量為 50000 大卡，依 10% 法則估算，第三級消費者（生產者往上第三階）可獲得的能量約為多少大卡？", "opts": ["5000", "50", "5", "500"], "ans": 1, "exp": "每升一階×1/10：生產者 50000→初級 5000→次級 500→三級 50 大卡；高階能量最少（energy 課本對應）。"}, {"tid": "energy", "q": "深海熱泉生態系沒有陽光，新聞稱其食物網「自成一格」。其生產者（最終能量來源）是下列何者？", "opts": ["禿鷹等清除者", "綠色植物，行光合作用", "硫化菌，利用硫化氫的化學能（化學自營）", "行呼吸作用的分解者"], "ans": 2, "exp": "深海熱泉無陽光，由硫化菌（化學自營）以硫化氫的化學能為來源；多數生態系最終能量來自太陽，此為例外（energy 課本對應）。"}, {"tid": "energy", "q": "關於分解者在生態系中的角色，下列敘述何者正確？", "opts": ["使能量在生態系中循環不滅", "只能行光合作用製造養分", "屬於營養階層最高的肉食者", "分解遺體與排泄物，使物質回歸環境"], "ans": 3, "exp": "分解者（細菌、真菌）分解遺體與排泄物使物質回歸環境，是物質循環關鍵；能量不能循環（energy 課本對應）。"}, {"tid": "energy", "q": "下列關於生態系中「能量」與「物質」的比較，何者正確？", "opts": ["能量與物質都只能單向流動、無法循環", "能量與物質都能循環使用", "能量單向流動且逐級遞減，物質可在生物與環境間循環", "物質單向流動，能量可循環"], "ans": 2, "exp": "能量單向流動、逐級遞減、最終以熱散失而不循環；碳、氮、水等物質則能循環（energy 課本對應）。"}, {"tid": "cycle", "q": "新聞：「研究團隊在偏遠海域魚體中驗出微塑膠，且越大型的掠食魚體內塑膠微粒越多。」此現象與下列哪一作用原理相同？", "opts": ["優養化，營養鹽過多使藻類大量繁殖", "碳循環，二氧化碳在生物與環境間流動", "能量塔，每升一階能量只剩約 10%", "生物放大作用，難分解物質沿食物鏈逐級累積，高階濃度最高"], "ans": 3, "exp": "塑膠微粒難分解、會沿食物鏈累積，營養階層越高體內濃度越高，屬生物放大作用；其餘為不同概念（cycle 課本對應）。"}, {"tid": "cycle", "q": "報導指出近年「大氣二氧化碳濃度持續上升，導致全球暖化與海洋酸化」。下列哪一項人類活動是大氣 CO₂ 上升的最主要原因？", "opts": ["大量燃燒化石燃料", "生產者行光合作用", "綠色植物面積增加", "海洋大量吸收 CO₂"], "ans": 0, "exp": "燃燒化石燃料釋放大量 CO₂ 使其上升；光合作用與海水溶解反而會減少大氣 CO₂（cycle 課本對應）。"}, {"tid": "cycle", "q": "夏季新聞常見「某水庫優養化、藻華爆發、魚群大量暴斃」。下列關於優養化導致魚群死亡的敘述，何者正確？", "opts": ["藻類大量繁殖使水中溶氧持續增加", "魚群死亡是因水溫過低結冰", "氮、磷等營養鹽不足才會引發藻華", "藻類過度繁殖後遮光與分解耗氧，使水中溶氧大減"], "ans": 3, "exp": "優養化是氮磷過多→藻類大量繁殖→遮光及分解耗氧→溶氧大減→魚蝦死亡；溶氧是減少而非增加（cycle 課本對應）。"}, {"tid": "cycle", "q": "某汙染調查測得食物鏈四種生物體內 DDT 濃度（如表）。依生物放大原理，下列推論何者正確？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁是生產者、丙是最高級消費者", "四者濃度相同表示無生物放大", "甲是生產者、丁是最高級消費者", "乙的營養階層最高"], "ans": 0, "exp": "濃度由低到高 丁0.04→乙0.2→甲2.0→丙20，故丁為生產者、丙營養階層最高；生物放大下高階濃度最高（cycle 課本對應）。"}, {"tid": "cycle", "q": "報導：「燃煤電廠排放使空氣中 CO₂ 增加。」關於碳循環中能『減少』大氣 CO₂ 的途徑，下列何者正確？", "opts": ["生產者行光合作用固定 CO₂", "分解者分解遺體釋放 CO₂", "燃燒化石燃料", "動物與植物行呼吸作用"], "ans": 0, "exp": "減少大氣 CO₂ 的唯一生物途徑是光合作用（另有溶於海水）；呼吸、分解、燃燒都是釋放 CO₂（cycle 課本對應）。"}, {"tid": "cycle", "q": "日本「水俁病」的新聞背景是工廠排放含汞廢水，居民食用受汙染魚貝後中毒。此事件最直接反映下列哪一概念？", "opts": ["甲基汞經生物放大累積於高階生物，人食用後中毒", "汞是能量來源，可沿食物鏈傳遞", "汞屬營養鹽，會造成優養化", "汞會被光合作用快速分解"], "ans": 0, "exp": "甲基汞難分解、脂溶性，沿食物鏈累積於高階生物，人食用後中毒即水俁病；汞非營養鹽也非能量（cycle 課本對應）。"}, {"tid": "eco", "q": "科普報導以「蘋果果皮」比喻生物圈占地球的比例。關於生物圈，下列敘述何者正確？", "opts": ["生物在生物圈中分布非常平均", "月球表面也屬於地球生物圈的一部分", "生物圈範圍約海平面上下各約 1 萬公尺，且會隨生物發現或滅絕而改變", "生物圈範圍為海平面上下各約 1 萬公里"], "ans": 2, "exp": "生物圈約海平面上下各 1 萬公尺、合計約 2 萬公尺，且會隨生物發現或滅絕而變動；月球不屬生物圈、分布也不平均（eco 課本對應）。"}, {"tid": "eco", "q": "潛水新聞報導「珊瑚礁白化」多發生於陽光可達、生物豐富的近岸海域。依海洋分區（如圖），珊瑚礁主要分布在哪一區？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 470 280\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"470\" height=\"280\" fill=\"#ffffff\"/><rect x=\"60\" y=\"70\" width=\"370\" height=\"170\" fill=\"#eaf4fb\" stroke=\"none\"/><polygon points=\"60,120 150,150 250,168 250,225 430,235 430,240 60,240\" fill=\"#efe6d6\" stroke=\"#9a8a6a\" stroke-width=\"1.4\"/><line x1=\"60\" y1=\"70\" x2=\"430\" y2=\"70\" stroke=\"#3b82c4\" stroke-width=\"1.6\"/><line x1=\"250\" y1=\"150\" x2=\"430\" y2=\"150\" stroke=\"#0a7ea4\" stroke-width=\"1.2\" stroke-dasharray=\"6 4\"/><text x=\"426\" y=\"145\" font-size=\"11\" text-anchor=\"end\" fill=\"#0a7ea4\">水深約 200m</text><line x1=\"150\" y1=\"70\" x2=\"150\" y2=\"150\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><line x1=\"250\" y1=\"70\" x2=\"250\" y2=\"225\" stroke=\"#888\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">潮間帶</text><text x=\"200\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">淺海區</text><text x=\"200\" y=\"98\" font-size=\"10\" text-anchor=\"middle\" fill=\"#666\">(大陸棚)</text><text x=\"345\" y=\"60\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">大洋區</text><text x=\"345\" y=\"115\" font-size=\"11\" text-anchor=\"middle\" fill=\"#0a7ea4\">透光區</text><text x=\"345\" y=\"195\" font-size=\"11\" text-anchor=\"middle\" fill=\"#444\">無光區</text><text x=\"44\" y=\"68\" font-size=\"10\" text-anchor=\"end\" fill=\"#3b82c4\">海面</text><circle cx=\"95\" cy=\"35\" r=\"13\" fill=\"#fde68a\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"110\" y1=\"35\" x2=\"117\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"46\" x2=\"111\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"50\" x2=\"95\" y2=\"57\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"46\" x2=\"79\" y2=\"51\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"80\" y1=\"35\" x2=\"73\" y2=\"35\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"84\" y1=\"24\" x2=\"79\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"95\" y1=\"20\" x2=\"95\" y2=\"13\" stroke=\"#e8a000\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"24\" x2=\"111\" y2=\"19\" stroke=\"#e8a000\" stroke-width=\"1.2\"/></svg></div>", "opts": ["潮上帶岩岸", "淺海區（大陸棚）", "深海熱泉區", "大洋區無光區"], "ans": 1, "exp": "由岸到海分潮間帶→淺海區（大陸棚，光可達、珊瑚礁與生物多）→大洋區（200m 分透光/無光）；珊瑚礁在淺海區（eco 課本對應）。"}, {"tid": "eco", "q": "濕地新聞常提到河口紅樹林（如水筆仔）。下列關於河口生態系的敘述，何者正確？", "opts": ["完全沒有生物能適應而生存", "海淡水交會、鹽度與水位變化大，以有機碎屑食物鏈為主", "為完全淡水、鹽度極穩定的環境", "水深皆超過 200 公尺，屬無光區"], "ans": 1, "exp": "河口為海淡水交會、鹽度水位變化大，以碎屑食物鏈為主，紅樹林、招潮蟹、彈塗魚可適應（eco 課本對應）。"}, {"tid": "eco", "q": "某地年雨量資料（如表）。依年雨量推測，雨量最多的甲地最可能發育成下列哪種陸域生態系？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">地點</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">年雨量(mm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:ce let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
