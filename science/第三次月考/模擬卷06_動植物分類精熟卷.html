<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}

.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}

.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}

.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}

.qtxt{font-size:.88rem;line-height:1.75;flex:1}

.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}

.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

<script>
const TOPICS=[{"id": "cls", "icon": "🔍", "name": "分類基礎"}, {"id": "plant", "icon": "🌿", "name": "植物界"}, {"id": "inv", "icon": "🦐", "name": "無脊椎動物"}, {"id": "vert", "icon": "🐢", "name": "脊椎動物"}, {"id": "pop", "icon": "👥", "name": "族群與群集"}, {"id": "inter", "icon": "🤝", "name": "交互作用"}, {"id": "energy", "icon": "⚡", "name": "能量流動"}, {"id": "cycle", "icon": "♻️", "name": "物質循環"}, {"id": "eco", "icon": "🌍", "name": "生態系與生物圈"}, {"id": "conserv", "icon": "🛡️", "name": "多樣性與保育"}];
const NOTES={};
const QDB=[{"tid": "cls", "q": "生物分類階層由大到小排列，下列何者正確？", "opts": ["界→綱→門→目→屬→科→種", "門→界→綱→目→科→種→屬", "界→門→綱→目→科→屬→種", "種→屬→科→目→綱→門→界"], "ans": 2, "exp": "分類基礎(課本對應)：階層由大到小為界門綱目科屬種，種是最基本單位；越下層親緣越近、種類越少。其餘排序顛倒。"}, {"tid": "cls", "q": "關於「五界」分類，下列敘述何者正確？", "opts": ["五界包含原核生物界、原生生物界、菌物界、植物界與礦物界", "藍綠菌因能行光合作用故屬於植物界", "原核生物界的細胞無核膜包圍的細胞核", "真菌因能行光合作用而獨立成菌物界"], "ans": 2, "exp": "分類基礎(課本對應)：五界為原核、原生、菌物、植物、動物，無「礦物界」；原核生物（細菌、藍綠菌）無核膜包圍的細胞核；藍綠菌屬原核生物界；真菌不行光合作用。"}, {"tid": "cls", "q": "二名法（學名）的書寫規則，下列何者正確？", "opts": ["學名由科名加屬名組成，種小名首字母大寫", "學名由屬名加種小名組成，用拉丁文，屬名首字母大寫", "同屬的生物親緣關係較遠", "學名以中文書寫，依棲息地命名"], "ans": 1, "exp": "分類基礎(課本對應)：林奈二名法＝屬名＋種小名，拉丁文斜體，屬名首字母大寫；同屬生物親緣較近；學名不依棲地命名。"}, {"tid": "cls", "q": "下列哪一種動物名字有「魚」字，但真的是魚類？", "opts": ["鯊魚", "章魚", "鱷魚", "鯨魚"], "ans": 0, "exp": "分類基礎(課本對應)：鯊魚為軟骨魚，是真正的魚類；鯨魚是哺乳類、鱷魚是爬蟲類、章魚是軟體動物，皆非魚類。"}, {"tid": "cls", "q": "關於二分檢索表（二分檢索）的使用，下列敘述何者正確？", "opts": ["親緣關係越遠的生物共同特徵越多", "依「有或無某特徵」逐層二分，把生物分到末端類群", "只能用於植物，不能用於動物", "依生物的棲息地由高到低排列分群"], "ans": 1, "exp": "分類基礎(課本對應)：二分檢索表依特徵的有無逐層二分；分類依構造特徵與親緣關係，不依棲地；動植物皆可用；親緣越近共同特徵越多。"}, {"tid": "plant", "q": "植物界四大類由構造簡單到複雜，正確順序為何？", "opts": ["裸子→被子→蕨類→蘚苔", "蕨類→蘚苔→被子→裸子", "蘚苔→蕨類→裸子→被子", "被子→裸子→蕨類→蘚苔"], "ans": 2, "exp": "植物界(課本對應)：由簡到繁為蘚苔、蕨類、裸子、被子；蘚苔最原始（無維管束），被子最進化（有花有果實）。"}, {"tid": "plant", "q": "關於蘚苔植物的敘述，下列何者正確？", "opts": ["以種子繁殖，生殖不需水", "以毬果生殖，多為針葉樹", "具有真正的根莖葉與維管束，能長得高大", "無維管束、無真正根莖葉，矮小且生於陰濕處，是最早登陸的植物"], "ans": 3, "exp": "植物界(課本對應)：蘚苔無維管束、僅假根、矮小、受精需水、是最早登陸的植物（如地錢、土馬騌）；有維管束、種子、毬果者分別為蕨類、種子植物與裸子植物。"}, {"tid": "plant", "q": "下列關於蕨類植物的敘述，何者正確？", "opts": ["有種子但無花無果實，以毬果生殖", "最早演化出維管束、有真正根莖葉，以孢子繁殖", "有花、有果實包住種子", "無維管束、僅有假根"], "ans": 1, "exp": "植物界(課本對應)：蕨類最早演化出維管束、有真正根莖葉、以孢子繁殖（葉背孢子囊堆）、受精需水，如腎蕨、山蘇；毬果為裸子、果實為被子、無維管束為蘚苔。"}, {"tid": "plant", "q": "關於裸子植物的特徵，下列敘述何者正確？", "opts": ["無維管束、無真正根莖葉", "以孢子繁殖，受精需以水為媒介", "有花有果實，種子被果實包住", "有維管束與種子，胚珠裸露無果實，以毬果生殖，受精不需水"], "ans": 3, "exp": "植物界(課本對應)：裸子植物有維管束與種子、胚珠裸露無果實、以毬果生殖、有花粉管故受精不需水（松、杉、銀杏）；有花有果為被子、孢子繁殖為蕨類、無維管束為蘚苔。"}, {"tid": "plant", "q": "被子植物與裸子植物最主要的區別在於被子植物具有下列何者？", "opts": ["有種子", "有維管束", "以孢子繁殖", "有花並有果實包住種子"], "ans": 3, "exp": "植物界(課本對應)：被子植物（開花植物）有花、有果實包住種子（種子由子房發育的果實保護）；維管束與種子裸子植物也有；裸子植物不以孢子繁殖。"}, {"tid": "plant", "q": "小明觀察一株植物：葉脈呈網狀、根為軸根（有明顯主根）、花瓣為5片。此植物最可能是下列何者？", "opts": ["蕨類植物，如腎蕨", "裸子植物，如松樹", "單子葉植物，如玉米", "雙子葉植物，如玫瑰"], "ans": 3, "exp": "植物界(課本對應)：雙子葉植物子葉2、軸根、網狀脈、花瓣4或5的倍數（如玫瑰、櫻花）；單子葉為鬚根、平行脈、花瓣3倍數；松為裸子、腎蕨為蕨類，皆不開花瓣狀花。"}, {"tid": "plant", "q": "仙人掌生長在乾旱沙漠，葉退化為針狀、莖肥大。依分類它應屬於下列哪一類植物？", "opts": ["被子植物，因為它會開花", "蕨類植物，因為它生於陸地", "裸子植物，因為它有針狀構造", "蘚苔植物，因為它能耐旱"], "ans": 0, "exp": "植物界(課本對應)：分類依「有花」判定，仙人掌會開花結果故為被子植物，肥莖針葉只是乾旱適應；針葉不等於裸子，蕨類無花、蘚苔無維管束。"}, {"tid": "plant", "q": "已知台灣維管束植物中，被子植物約佔61.5%、蘚苔約26.1%、蕨類約10.9%、裸子約1.5%（如表）。下列推算何者正確？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">類群</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蘚苔</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">蕨類</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">裸子</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">被子</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">百分比</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">26.1%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">10.9%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">1.5%</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">61.5%</td></tr></table>", "opts": ["「無維管束」的植物約佔10.9%", "「能結出果實」的植物約佔26.1%", "「受精需以水為媒介」的植物（蘚苔＋蕨類）約佔37.0%", "「不開花」的植物約佔1.5%"], "ans": 2, "exp": "植物界(課本對應)：受精需水者為蘚苔＋蕨類＝26.1＋10.9＝37.0%；能結果為被子61.5%；無維管束為蘚苔26.1%；不開花為蘚苔＋蕨＋裸＝38.5%。"}, {"tid": "inv", "q": "下列哪一類動物具有「刺絲胞」用以捕食，且體呈輻射對稱、有口無肛門？", "opts": ["刺絲胞動物，如海葵、水母", "棘皮動物，如海星", "軟體動物，如蝸牛", "環節動物，如蚯蚓"], "ans": 0, "exp": "無脊椎動物(課本對應)：刺絲胞動物（腔腸動物）具刺絲胞、輻射對稱、有口無肛門、可出芽生殖，如水螅、水母、海葵、珊瑚；其他三類無刺絲胞。"}, {"tid": "inv", "q": "渦蟲、絛蟲、吸蟲身體背腹扁平、有口無肛門，牠們屬於下列哪一動物門？", "opts": ["扁形動物", "環節動物", "棘皮動物", "刺絲胞動物"], "ans": 0, "exp": "無脊椎動物(課本對應)：扁形動物身體背腹扁平、有口無肛門（渦蟲可再生、絛蟲與吸蟲寄生）；環節有分節剛毛、刺絲胞有刺絲胞、棘皮有管足，皆不同。"}, {"tid": "inv", "q": "蚯蚓、沙蠶、水蛭身體由許多相似的「環節」構成且具剛毛，屬於下列哪一動物門？", "opts": ["軟體動物", "扁形動物", "節肢動物", "環節動物"], "ans": 3, "exp": "無脊椎動物(課本對應)：環節動物身體分許多相似環節、有剛毛（蚯蚓、沙蠶、水蛭）；軟體不分節、扁形不分節、節肢有外骨骼與分節附肢。"}, {"tid": "inv", "q": "下列關於軟體動物的敘述，何者正確？", "opts": ["身體分許多相似環節並具剛毛", "具外骨骼，附肢分節且會蛻皮", "身體柔軟不分節，多具外套膜，有的有殼有的無殼", "體表具管足，僅生活於海洋"], "ans": 2, "exp": "無脊椎動物(課本對應)：軟體動物身體柔軟不分節、多具外套膜、有殼（文蛤、蝸牛）或無殼（章魚、海兔）；分節剛毛為環節、外骨骼蛻皮為節肢、管足為棘皮。"}, {"tid": "inv", "q": "昆蟲、蜘蛛、蝦蟹、蜈蚣都屬於哪一動物門？此門有何共同特徵？", "opts": ["棘皮動物；具管足、僅生活於海洋", "節肢動物；具外骨骼、身體與附肢分節、會蛻皮，是種類最多的門", "環節動物；身體分許多相似環節", "軟體動物；身體柔軟不分節"], "ans": 1, "exp": "無脊椎動物(課本對應)：節肢動物具外骨骼、身體與附肢分節、會蛻皮，是種類數量最多的動物門（昆蟲、蜘蛛、蝦蟹、蜈蚣、藤壺）。"}, {"tid": "inv", "q": "海星、海膽、海參具有「管足」、體表多棘、僅生活於海洋，屬於下列哪一門？", "opts": ["刺絲胞動物", "軟體動物", "節肢動物", "棘皮動物"], "ans": 3, "exp": "無脊椎動物(課本對應)：棘皮動物具管足、體表多棘、成體五輻對稱、僅生活於海洋（海星、海膽、海參、陽燧足）；其餘門皆無管足。"}, {"tid": "inv", "q": "珊瑚因「固著生活」曾被誤認為植物，但其實牠是動物。珊瑚屬於下列哪一動物門？", "opts": ["刺絲胞動物，與水母、海葵同門", "軟體動物，與蛤蜊同門", "棘皮動物，與海星同門", "植物界，因為固著且能行光合作用"], "ans": 0, "exp": "無脊椎動物(課本對應)：珊瑚（珊瑚蟲）為刺絲胞動物，具刺絲胞、可出芽生殖、固著生活，與水母、海葵同門；牠是動物不是植物。"}, {"tid": "inv", "q": "下列哪一組動物全部都「不具脊椎骨」（皆為無脊椎動物）？", "opts": ["蝸牛、烏賊、麻雀、海葵", "蚯蚓、海星、蛇、蜘蛛", "水母、蚯蚓、章魚、蝦", "水母、青蛙、章魚、蝦"], "ans": 2, "exp": "無脊椎動物(課本對應)：水母（刺絲胞）、蚯蚓（環節）、章魚（軟體）、蝦（節肢）皆無脊椎骨；青蛙、蛇、麻雀皆為脊椎動物，故其他組含脊椎動物。"}, {"tid": "inv", "q": "下列關於無脊椎動物特殊能力的配對，何者「錯誤」？", "opts": ["水螅（刺絲胞動物）可行出芽生殖", "渦蟲（扁形動物）被切斷後可再生", "蚯蚓（環節動物）會以出芽方式生殖", "海星（棘皮動物）斷腕後能再生"], "ans": 2, "exp": "無脊椎動物(課本對應)：出芽生殖常見於刺絲胞動物（水螅）；蚯蚓為環節動物，主要行有性生殖，不以出芽生殖為特徵，故此配對錯誤。其餘配對正確。"}, {"tid": "vert", "q": "關於兩生類動物（如青蛙、山椒魚）的敘述，下列何者正確？", "opts": ["體外受精、卵無殼，幼時用鰓、成體用肺及皮膚呼吸", "體溫恆定（內溫），體表有羽毛", "體內受精、卵具硬殼，全程用肺呼吸", "胎生並以乳腺哺乳幼兒"], "ans": 0, "exp": "脊椎動物(課本對應)：兩生類外溫、體外受精、卵無殼、體表裸露濕潤、幼鰓成肺加皮膚呼吸；卵具殼體內受精為爬蟲、羽毛為鳥、哺乳為哺乳類。"}, {"tid": "vert", "q": "爬蟲類比兩生類「更能適應陸地生活」，最主要的關鍵特徵是下列何者？", "opts": ["為恆溫動物且體表有羽毛", "體表裸露濕潤、可行皮膚呼吸", "幼時用鰓呼吸，成體用肺呼吸", "體內受精、卵具殼，且體表有鱗片或骨板可減少水分散失"], "ans": 3, "exp": "脊椎動物(課本對應)：爬蟲類體內受精＋卵具殼故不必回水中生殖，鱗片或骨板與肺呼吸減少水分散失，所以比兩生類更適應陸地；皮膚裸露濕潤反而是兩生類限制，羽毛為鳥類。"}, {"tid": "vert", "q": "關於鯊魚、魟魚（軟骨魚）的敘述，下列何者正確？", "opts": ["用肺呼吸，體內受精且卵具硬殼", "骨骼為硬骨，有鰓蓋與鰾", "為恆溫動物，體表覆有羽毛", "骨骼為軟骨，有鰓裂、無鰓蓋、無鰾"], "ans": 3, "exp": "脊椎動物(課本對應)：軟骨魚（鯊、魟）骨骼為軟骨、有鰓裂、無鰓蓋、無鰾；硬骨魚才有鰓蓋與鰾；魚類用鰓呼吸、為外溫動物。"}, {"tid": "vert", "q": "鴨嘴獸與針鼴雖然「卵生」，但仍被分類為哺乳類，主要依據為何？", "opts": ["體溫為外溫（變溫）", "具有乳腺能分泌乳汁哺育幼兒、體表有毛髮", "胎生且有胎盤", "用鰓呼吸並於水中產卵"], "ans": 1, "exp": "脊椎動物(課本對應)：哺乳類關鍵特徵為具乳腺哺乳、體表有毛髮；鴨嘴獸雖卵生、無乳頭無臍帶，但有乳腺哺乳故為哺乳類；多數哺乳類胎生但非絕對。"}, {"tid": "vert", "q": "關於鳥類能適應飛行的構造，下列敘述何者「錯誤」？", "opts": ["具氣囊輔助呼吸（雙重呼吸）", "骨骼中空而輕", "前肢特化為翼", "瞬膜的存在是鳥類能飛行的主要原因"], "ans": 3, "exp": "脊椎動物(課本對應)：鳥類飛行適應為前肢特化為翼、骨骼中空輕、有氣囊輔助呼吸、羽毛；瞬膜是保護眼睛的構造，與飛行無直接關係，故此敘述錯誤。"}, {"tid": "vert", "q": "企鵝、蝙蝠、海豚的分類，下列何者「完全正確」？", "opts": ["三者都是哺乳類", "企鵝是鳥類，蝙蝠與海豚是哺乳類", "企鵝是哺乳類，蝙蝠是鳥類", "企鵝、蝙蝠、海豚都是鳥類"], "ans": 1, "exp": "脊椎動物(課本對應)：企鵝有羽毛、卵生屬鳥類；蝙蝠有毛髮哺乳、海豚胎生哺乳皆為哺乳類；分類依特徵與親緣，不依會不會飛或棲地。"}, {"tid": "vert", "q": "依脊椎動物的二分檢索表（如圖），體溫為「內溫（恆溫）」且體表覆有羽毛、生殖以氣囊輔助呼吸的類群是下列何者？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 470 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"470\" height=\"300\" fill=\"#ffffff\"/><rect x=\"180\" y=\"15\" width=\"120\" height=\"34\" rx=\"5\" fill=\"#eef\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"240.0\" y=\"36.0\" font-size=\"12\" text-anchor=\"middle\" fill=\"#111\">脊椎動物</text><line x1=\"240\" y1=\"49\" x2=\"120\" y2=\"80\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"174.0\" y=\"62.5\" font-size=\"10\" fill=\"#0a7ea4\">內溫</text><line x1=\"240\" y1=\"49\" x2=\"360\" y2=\"80\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"306.0\" y=\"62.5\" font-size=\"10\" fill=\"#0a7ea4\">外溫</text><rect x=\"70\" y=\"80\" width=\"120\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"130.0\" y=\"101.0\" font-size=\"12\" text-anchor=\"middle\" fill=\"#111\">內溫(恆溫)</text><line x1=\"130\" y1=\"114\" x2=\"70\" y2=\"150\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"90.0\" y=\"132.0\" font-size=\"10\" fill=\"#0a7ea4\">羽毛</text><line x1=\"130\" y1=\"114\" x2=\"190\" y2=\"150\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"178.0\" y=\"132.0\" font-size=\"10\" fill=\"#0a7ea4\">毛髮乳腺</text><rect x=\"20\" y=\"150\" width=\"100\" height=\"34\" rx=\"5\" fill=\"#fef9e7\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"70.0\" y=\"171.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">鳥類</text><rect x=\"140\" y=\"150\" width=\"110\" height=\"34\" rx=\"5\" fill=\"#fef9e7\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"195.0\" y=\"171.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">哺乳類</text><rect x=\"300\" y=\"80\" width=\"130\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"365.0\" y=\"101.0\" font-size=\"12\" text-anchor=\"middle\" fill=\"#111\">外溫</text><line x1=\"365\" y1=\"114\" x2=\"310\" y2=\"150\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"307.5\" y=\"132.0\" font-size=\"10\" fill=\"#0a7ea4\">鱗片/卵有殼</text><line x1=\"365\" y1=\"114\" x2=\"420\" y2=\"150\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"410.5\" y=\"132.0\" font-size=\"10\" fill=\"#0a7ea4\">皮膚裸露</text><rect x=\"255\" y=\"150\" width=\"110\" height=\"34\" rx=\"5\" fill=\"#e8f6ef\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"310.0\" y=\"171.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">爬蟲類</text><rect x=\"380\" y=\"150\" width=\"90\" height=\"34\" rx=\"5\" fill=\"#e8f6ef\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"425.0\" y=\"171.0\" font-size=\"13\" text-anchor=\"middle\" fill=\"#111\">兩生類</text><rect x=\"255\" y=\"205\" width=\"110\" height=\"34\" rx=\"5\" fill=\"#e8f6ef\" stroke=\"#222\" stroke-width=\"1.4\"/><text x=\"310.0\" y=\"226.0\" font-size=\"11\" text-anchor=\"middle\" fill=\"#111\">魚類(水生·鰓)</text><line x1=\"365\" y1=\"184\" x2=\"310\" y2=\"205\" stroke=\"#444\" stroke-width=\"1.3\"/><text x=\"235\" y=\"285\" font-size=\"11\" fill=\"#666\">※ 依體溫、體表、受精/卵殼等特徵二分檢索</text></svg></div>", "opts": ["爬蟲類", "哺乳類", "鳥類", "兩生類"], "ans": 2, "exp": "脊椎動物(課本對應)：依體溫、受精方式、體表分岔的檢索表，內溫＋羽毛者為鳥類（哺乳類為毛髮、乳腺）；爬蟲與兩生為外溫。"}, {"tid": "vert", "q": "就親緣關係而言，下列何組生物的關係「最接近」？", "opts": ["鱷魚與青蛙", "海豚與鯊魚", "鱷魚與烏龜（同為爬蟲類）", "企鵝與企鵝形狀相似的魚"], "ans": 2, "exp": "脊椎動物(課本對應)：親緣關係依分類地位，同類群最近；鱷與龜同為爬蟲類最近；青蛙是兩生、鯊魚是魚、企鵝是鳥，跨類群親緣較遠。"}, {"tid": "pop", "q": "生物組成由小到大的層次，下列排列何者正確？", "opts": ["個體→族群→群集→生態系→生物圈", "族群→個體→群集→生物圈→生態系", "生物圈→生態系→群集→個體→族群", "個體→群集→族群→生態系→生物圈"], "ans": 0, "exp": "族群與群集(課本對應)：由小到大為個體、族群、群集、生態系、生物圈；族群是同種個體總和，群集是同區所有不同族群總合，生態系再加非生物環境。"}, {"tid": "pop", "q": "生態學家在湖中標記50條魚放回，一段時間後再捕得60條，其中有4條帶標記。估計該湖魚的族群總數約為多少？", "opts": ["750條", "375條", "120條", "240條"], "ans": 0, "exp": "族群與群集(課本對應)：標識再捕法，總數＝第一次標記數×第二次捕捉總數÷再捕中標記數＝50×60÷4＝750條；其餘為公式套用錯誤的結果。"}, {"tid": "pop", "q": "研究人員調查草地上某種雜草的密度，取3個1平方公尺樣區，各數得27、32、31株，全區共15個樣區面積。以樣區法估計該草地此雜草總數約為多少株？", "opts": ["135株", "90株", "450株", "300株"], "ans": 2, "exp": "族群與群集(課本對應)：樣區法，平均每樣區＝(27+32+31)/3＝30株，總數＝30×15＝450株；雜草固著適用樣區法而非標識再捕。"}, {"tid": "pop", "q": "某族群在環境中的數量呈S型成長曲線（如圖），下列敘述何者正確？<div style=\"text-align:center;margin:6px 0\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 460 300\" style=\"max-width:100%;height:auto;width:360px\" font-family=\"STHeiti, 'Heiti TC', 'PingFang TC', sans-serif\"><rect x=\"0\" y=\"0\" width=\"460\" height=\"300\" fill=\"#ffffff\"/><defs><marker id=\"ax\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 z\" fill=\"#222\"/></marker></defs><line x1=\"60\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#222\" stroke-width=\"1.6\" marker-end=\"url(#ax)\"/><text x=\"424\" y=\"270\" font-size=\"13\" text 244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">乙</text><text x=\"350\" y=\"244\" font-size=\"14\" text-anchor=\"middle\" fill=\"#15803d\">丙</text><text x=\"105\" y=\"98\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">緩慢期</text><text x=\"212\" y=\"58\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">快速增長</text><text x=\"350\" y=\"102\" font-size=\"11\" text-anchor=\"middle\" fill=\"#666\">趨平/波動</text></svg></div>", "opts": ["負荷量是指族群能達到的最小數量", "族群數量達環境負荷量後成長趨於平緩，並在負荷量上下波動", "S型曲線的初期成長最快速", "族群會無限制地持續指數成長"], "ans": 1, "exp": "族群與群集(課本對應)：S型曲線初期緩、中期快、達環境負荷量後趨平並上下波動；負荷量是環境能長期維持的最大數量，非最小，初期成長不是最快。"}, {"tid": "inter", "q": "小丑魚住在海葵的觸手間獲得保護，同時幫海葵驅趕食葵魚並帶來食物碎屑，雙方皆獲利。這種關係屬於下列何者？", "opts": ["片利共生（＋／0）", "掠食（＋／−）", "互利共生（＋／＋）", "寄生（＋／−）"], "ans": 2, "exp": "交互作用(課本對應)：雙方皆受益為互利共生（如小丑魚與海葵、豆科與根瘤菌）；片利為一益一無影響、寄生與掠食皆一益一害。"}, {"tid": "inter", "q": "鮣魚以吸盤附在鯊魚身上，藉鯊魚移動取得食物殘屑與保護，但對鯊魚並無明顯影響。這屬於下列哪一種關係？", "opts": ["互利共生（＋／＋）", "片利共生（＋／0）", "寄生（＋／−）", "競爭（−／−）"], "ans": 1, "exp": "交互作用(課本對應)：一方得利、另一方無明顯影響為片利共生（鯊與鮣魚、鯨與藤壺、大樹與鳥巢蕨）；互利雙益、寄生一害、競爭雙害。"}, {"tid": "inter", "q": "農夫釋放瓢蟲來控制田裡的蚜蟲、或養蓋斑鬥魚吃孑孓以防治病媒蚊。這種利用天敵控制有害生物的方法稱為什麼？", "opts": ["生物防治，可減少農藥使用", "生物放大防治", "優養化防治", "互利共生防治"], "ans": 0, "exp": "交互作用(課本對應)：利用天敵（掠食、寄生、競爭）控制有害生物為生物防治，可減少農藥；不可用互利共生防治；優養化與生物放大是汙染現象。"}, {"tid": "energy", "q": "關於生態系中能量的最終來源與流動，下列敘述何者正確？", "opts": ["能量可在生態系中不斷循環使用", "消費者能直接利用陽光製造養分", "太陽是大多數生態系的最終能量來源，生產者把光能轉成化學能", "分解者是生態系中能量的最終來源"], "ans": 2, "exp": "能量流動(課本對應)：太陽是大多數生態系的最終能量來源，生產者行光合把光能轉化學能；能量單向流動不能循環，分解者非能量來源，消費者不能行光合。"}, {"tid": "energy", "q": "關於能量塔（能量金字塔）的敘述，下列何者正確？", "opts": ["能量塔頂寬底窄", "每升高一個營養階層，可用能量約只剩前一階的10%，其餘多以呼吸與熱散失", "每升高一階可用能量增加為10倍", "營養階層可無限制地增加"], "ans": 1, "exp": "能量流動(課本對應)：每升一營養階層能量約剩10%（約90%以呼吸、熱散失），故能量塔底寬頂窄，營養階層通常不超過4到5階。"}, {"tid": "energy", "q": "某能量塔最底層生產者所含能量為8000大卡，若每升高一個營養階層可用能量約為前一階的10%，則第三個營養階層（次級消費者）約含能量多少大卡？", "opts": ["8大卡", "800大卡", "80000大卡", "80大卡"], "ans": 3, "exp": "能量流動(課本對應)：每階×1/10，生產者8000→初級800→次級80大卡；能量逐級遞減，故第三階為80大卡。"}, {"tid": "cycle", "q": "關於大氣中二氧化碳的增減，下列敘述何者正確？", "opts": ["燃燒化石燃料不影響碳循環", "分解者只固碳而不釋放CO₂", "呼吸作用可減少大氣中的CO₂", "光合作用可減少大氣CO₂；呼吸、分解與燃燒則增加大氣CO₂"], "ans": 3, "exp": "物質循環(課本對應)：減少大氣CO₂的是光合作用（固碳）；呼吸、分解、燃燒都釋放CO₂；分解者也會釋碳，燃燒化石燃料使大氣CO₂上升造成暖化。"}, {"tid": "cycle", "q": "某食物鏈中四種生物體內DDT濃度如表（單位ppm）。下列推論何者正確？<table style=\"border-collapse:collapse;margin:8px auto;font-size:.85em\"><tr><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">生物</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">甲</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">乙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丙</th><th style=\"border:1px solid #888;padding:3px 9px;text-align:center;background:#eef3fb;\">丁</th></tr><tr><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">DDT(ppm)</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">2.0</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.2</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">20</td><td style=\"border:1px solid #888;padding:3px 9px;text-align:center;\">0.04</td></tr></table>", "opts": ["丁為生產者（濃度最低），丙為最高級消費者（濃度最高）", "濃度越高者營養階層越低", "甲為生產者，丁為最高級消費者", "DDT濃度沿食物鏈逐級降低"], "ans": 0, "exp": "物質循環(課本對應)：生物放大作用使難分解毒物沿食物鏈逐級累積，濃度最低者為生產者（丁0.04），最高者為最高級消費者（丙20）；故由低到高為丁→乙→甲→丙。"}, {"tid": "cycle", "q": "湖泊因大量含氮、磷的肥料與廢水流入而發生「優養化」，下列關於其過程與結果的敘述，何者正確？", "opts": ["優養化會使水質變得更清澈乾淨", "優養化是因水溫過低造成藻類凍死", "藻類大量繁殖遮光並耗氧，使水中溶氧大減，導致魚蝦死亡", "營養鹽增加使水中溶氧上升，魚蝦更易存活"], "ans": 2, "exp": "物質循環(課本對應)：優養化是氮磷過多→藻類大量繁殖（水華）→遮光使水下藻死、夜間呼吸與分解耗氧→溶氧大減→魚蝦死亡、水質惡化發臭。"}, {"tid": "eco", "q": "關於「生物圈」的敘述，下列何者正確？", "opts": ["月球表面也屬於地球的生物圈", "範圍為海平面上下各約1萬公里，且永不改變", "指地球上所有生物及其生存環境的總和，範圍約海平面上下各約1萬公尺", "生物在生物圈中分布非常平均"], "ans": 2, "exp": "生態系與生物圈(課本對應)：生物圈是所有生物及其環境的總和，範圍約海平面上下各約1萬公尺，會隨生物發現或滅絕而改變、佔地球比例極小；月球不屬生物圈、分布不平均。"}, {"tid": "eco", "q": "陸域生態系的類型主要受溫度與雨量影響。依年雨量由少到多排列，下列何者正確？", "opts": ["草原＜沙漠＜森林", "沙漠＜森林＜草原", "沙漠＜草原＜森林", "森林＜草原＜沙漠"], "ans": 2, "exp": "生態系與生物圈(課本對應)：陸域生態系主要受溫度與雨量影響，年雨量由少到多為沙漠、草原、森林，森林與草原常以年雨量約750mm為分界。"}, {"tid": "eco", "q": "海洋生態系依水深與光線可分為不同區域。下列敘述何者正確？", "opts": ["潮間帶位於最深的海底，終年無光", "由岸到海依序為潮間帶、淺海區（大陸棚）、大洋區，大洋區以水深約200公尺分透光區與無光區", "大洋區光線充足，是生物種類最多的區域", "深海無光區的生物能自行行光合作用製造養分"], "ans": 1, "exp": "生態系與生物圈(課本對應)：海洋由岸到海分潮間帶、淺海區（大陸棚，珊瑚礁多）、大洋區（以約200公尺分透光與無光區）；深海無光，生物靠上層落下的碎屑或化學合成。"}, {"tid": "eco", "q": "關於河口（紅樹林）生態系的敘述，下列何者正確？", "opts": ["以陽光直接行光合的浮游植物食物鏈為唯一能量來源", "為終年穩定、鹽度不變的淡水環境", "位於海水與淡水交會處，鹽度與水位變化大，常見水筆仔、招潮蟹", "完全沒有生物能適應，是生物的禁區"], "ans": 2, "exp": "生態系與生物圈(課本對應)：河口為海淡水交會、鹽度與水位變化大，有耐鹽的紅樹林（水筆仔、海茄苳）、招潮蟹、彈塗魚，以有機碎屑食物鏈為主。"}, {"tid": "conserv", "q": "關於「生物多樣性」的三個層次，下列配對何者正確？", "opts": ["同種內的基因變異屬生態系多樣性", "同種綠豆有不同品系屬遺傳多樣性；一地有溼地、森林、草原並存屬生態系多樣性", "棲地類型的多樣屬物種多樣性", "一地物種種類的豐富度屬遺傳多樣性"], "ans": 1, "exp": "多樣性與保育(課本對應)：三層次為遺傳（同種內基因變異，如綠豆品系）、物種（物種種類豐富度）、生態系（棲地類型多樣，如溼地森林草原並存）；其餘配對錯置。"}, {"tid": "conserv", "q": "下列保育公約或組織與其主要功能的配對，何者「錯誤」？", "opts": ["CITES（華盛頓公約）管制瀕危野生動植物的國際貿易", "拉姆薩公約保育溼地與水鳥棲地", "IUCN（國際自然保育聯盟）負責管制瀕危野生動植物的國際貿易", "蒙特婁議定書管制氟氯碳化物以保護臭氧層"], "ans": 2, "exp": "多樣性與保育(課本對應)：IUCN負責評估物種滅絕風險、編製紅皮書（紅色名錄），管制國際貿易的是CITES（華盛頓公約），故第一項配對錯誤；其餘正確。"}, {"tid": "conserv", "q": "下列關於台灣外來入侵種與保育的敘述，何者正確？", "opts": ["引進外來種一定能增加本地生物多樣性", "福壽螺、小花蔓澤蘭、綠鬣蜥屬外來入侵種，引進外來種通常不會增加本地生物多樣性", "隨意放生外來種有助於保育本土物種", "石虎與櫻花鉤吻鮭是常見的外來入侵種"], "ans": 1, "exp": "多樣性與保育(課本對應)：福壽螺、小花蔓澤蘭、綠鬣蜥為外來入侵種，會使本土種減少、不會增加本地多樣性；石虎、櫻花鉤吻鮭是本土原生種；勿隨意棄養放生。"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
