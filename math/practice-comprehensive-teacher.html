<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國一數學 暑期先修 · 綜合練習題（教用互動版）</title>
<style>
  :root { --main:#2b6cb0; --accent:#e6a800; --ok:#1d8a4c; --step:#2b6cb0; --bg:#eef3f9; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:#1a1a1a; background:var(--bg); line-height:1.85; font-size:19px; padding:0 0 90px; }
  header { background:linear-gradient(135deg,var(--main),#3d8bd4); color:#fff; padding:26px 20px 22px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.18); }
  header .tag { display:inline-block; background:rgba(255,255,255,.22); border-radius:20px; padding:4px 16px; font-size:16px; margin-bottom:8px; }
  header h1 { font-size:27px; margin-bottom:6px; }
  header p { font-size:16px; opacity:.95; }
  .wrap { max-width:940px; margin:0 auto; padding:22px 16px; }
  .toolbar { position:sticky; top:0; z-index:40; background:#fff; border:1px solid #d9e2ec; border-radius:12px; padding:12px 16px; margin-bottom:18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .toolbar .tip { font-size:15px; color:#567; }
  .btns { display:flex; gap:10px; flex-wrap:wrap; }
  button.act { font-family:inherit; font-size:15px; font-weight:bold; border:none; border-radius:10px; padding:9px 16px; cursor:pointer; }
  button.exp { background:var(--main); color:#fff; }
  button.col { background:#7b8a9a; color:#fff; }
  .group-h { font-size:20px; font-weight:bold; color:#fff; background:var(--main); border-radius:8px; padding:9px 16px; margin:26px 0 14px; }
  .group-h.fill { background:#1d8a4c; } .group-h.calc { background:#b06a00; }
  .prob { background:#fff; border-radius:14px; padding:16px 20px; margin-bottom:15px; box-shadow:0 1px 6px rgba(0,0,0,.08); }
  .q-line { display:flex; gap:10px; align-items:flex-start; margin-bottom:6px; }
  .q-badge { flex-shrink:0; background:#e8f0fb; color:var(--main); font-weight:bold; border-radius:8px; padding:2px 12px; font-size:16px; white-space:nowrap; }
  .q-text { font-size:19px; }
  .opts { margin:4px 0 0 6px; }
  .opts span { display:inline-block; margin-right:20px; white-space:nowrap; }
  /* 問號按鈕（空格） */
  .qmark { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:30px; padding:0 8px; margin:0 4px; vertical-align:middle; border:none; border-radius:8px; background:var(--accent); color:#fff; font-weight:bold; font-size:18px; cursor:pointer; box-shadow:0 1px 4px rgba(230,168,0,.5); transition:transform .1s,filter .1s; font-family:inherit; }
  .qmark:hover { filter:brightness(1.08); transform:scale(1.08); }
  .qmark.done { background:var(--ok); box-shadow:none; }
  /* 解題面板：按？或步驟才顯示 */
  .sol { display:none; margin-top:10px; border-top:1px dashed #cdd8e6; padding-top:10px; }
  .sol.show { display:block; animation:fade .25s ease; }
  .step { display:flex; gap:12px; align-items:flex-start; margin:9px 0; }
  button.num { flex-shrink:0; width:34px; height:34px; border-radius:50%; background:var(--step); color:#fff; font-weight:bold; font-size:15px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(43,108,176,.4); transition:transform .1s,filter .1s; font-family:inherit; line-height:1.1; }
  button.num:hover { filter:brightness(1.12); transform:scale(1.08); }
  .step.shown button.num { background:var(--ok); box-shadow:none; cursor:default; }
  .txt { display:none; font-size:18px; padding:8px 14px; background:#f5f9fe; border-left:4px solid var(--step); border-radius:0 10px 10px 0; flex:1; }
  .step.shown .txt { display:block; animation:fade .25s ease; }
  .txt .lbl { color:var(--main); font-weight:bold; margin-right:6px; }
  .txt b { color:#b3007a; }
  .answer { display:none; margin-top:10px; padding:11px 16px; background:#e7f6ee; border:1.5px solid var(--ok); border-radius:10px; font-size:19px; font-weight:bold; color:#13633a; }
  .answer.show { display:block; animation:fade .25s ease; }
  .answer::before { content:"✅ 答案："; }
  @keyframes fade { from{opacity:0; transform:translateX(-6px);} to{opacity:1;} }
  footer { text-align:center; color:#789; font-size:15px; margin-top:26px; }
  @media print {
    .toolbar { display:none!important; }
    .sol { display:block!important; } .txt { display:block!important; } .answer { display:block!important; }
    .prob { break-inside:avoid; box-shadow:none; border:1px solid #ddd; }
    body { background:#fff; font-size:15px; }
  }
</style>
</head>
<body>
<header>
  <div class="tag">國一數學 · 暑期先修 · 教用互動版</div>
  <h1>綜合練習題　25 題　解題教學</h1>
  <p>點黃色「？」→ 一次跳出第一步、第二步…與答案；或點藍色數字逐步講解 · 全民補習班 線上教學</p>
</header>
<div class="wrap">
  <div class="toolbar">
    <span class="tip">💡 教學用：按「？」整題解析全開；按 ①②③ 可一步一步帶學生想</span>
    <div class="btns">
      <button class="act exp" onclick="showAll()">全部顯示</button>
      <button class="act col" onclick="resetAll()">全部隱藏</button>
    </div>
  </div>

  <div class="group-h">第一大題　選擇題（每題 4 分，共 40 分）</div>
  <div id="mc"></div>

  <div class="group-h fill">第二大題　填充題（每題 4 分，共 40 分）</div>
  <div id="fill"></div>

  <div class="group-h calc">第三大題　計算題（每題 4 分，共 20 分）</div>
  <div id="calc"></div>

  <footer>滿分 100 分 · 共 25 題 · 每題 4 分 · 教師解題版</footer>
</div>

<script>
const LET=["A","B","C","D"];
// 選擇題：題幹、選項、正解索引、步驟、答案
const MC=[
 {q:"將 −1.49、0、3⅓、−2⅓ 四個數<b>由大到小</b>排列，下列何者正確？",
  o:["3⅓＞0＞−1.49＞−2⅓","3⅓＞0＞−2⅓＞−1.49","−2⅓＞−1.49＞0＞3⅓","3⅓＞−1.49＞0＞−2⅓"],a:0,
  steps:["先分正負：正數 3⅓ 最大，0 居中，−1.49 與 −2⅓ 都是負數。",
         "比兩個負數：−2⅓ ≈ −2.33，<b>負數絕對值大的反而小</b>，所以 −1.49 ＞ −2⅓。",
         "合起來：<b>3⅓ ＞ 0 ＞ −1.49 ＞ −2⅓</b>，選 (A)。"], ans:"(A)"},
 {q:"已知某數 a 的絕對值是 5，且 a 是負數，則 a＋3＝？",
  o:["8","−2","2","−8"],a:1,
  steps:["｜a｜＝5 → a 可能是 5 或 −5。","題目說 a 是負數 → <b>a＝−5</b>。","a＋3＝−5＋3＝<b>−2</b>，選 (B)。"], ans:"(B)"},
 {q:"大於 −5 且小於 4 的所有<b>整數</b>，它們的總和是多少？",
  o:["−4","0","−7","＋4"],a:0,
  steps:["列出整數：−4、−3、−2、−1、0、1、2、3。","相反數兩兩相消：(−3＋3)、(−2＋2)、(−1＋1) 都＝0。","只剩 −4 與 0，總和＝<b>−4</b>，選 (A)。"], ans:"(A)"},
 {q:"計算　｜−9｜−｜−4｜＋(−10)＝？",
  o:["5","−5","3","−15"],a:1,
  steps:["先把絕對值算出來：｜−9｜＝9、｜−4｜＝4。","代回式子：9−4＋(−10)。","9−4＝5，5＋(−10)＝<b>−5</b>，選 (B)。"], ans:"(B)"},
 {q:"計算　(−3)＋15−[(−11)＋3]＝？",
  o:["20","4","−4","26"],a:0,
  steps:["先算中括號：(−11)＋3＝−8。","減一個負數＝加正數：(−3)＋15−(−8)＝(−3)＋15＋8。","12＋8＝<b>20</b>，選 (A)。"], ans:"(A)"},
 {q:"以北為正方向。某人從原地先向北走 15 公尺，再向南走 20 公尺，最後位於原地的哪一邊、幾公尺處？",
  o:["北方 5 公尺","南方 5 公尺","南方 35 公尺","北方 35 公尺"],a:1,
  steps:["北為正、南為負：向北 ＋15、向南 −20。","相加：15＋(−20)＝−5。","結果是負的 → 在<b>南方 5 公尺</b>，選 (B)。"], ans:"(B)"},
 {q:"關於相反數與絕對值，下列敘述何者<b>正確</b>？",
  o:["絕對值相等的兩數一定相等","一個數的絕對值一定大於這個數本身","互為相反數的兩數，絕對值一定相等","0 沒有相反數"],a:2,
  steps:["(A) 錯：｜5｜＝｜−5｜，但 5≠−5。","(B) 錯：正數的絕對值等於本身（不是大於）；(D) 錯：0 的相反數是 0。",
         "(C) 對：互為相反數的兩數，到原點的距離相同，<b>絕對值相等</b>，選 (C)。"], ans:"(C)"},
 {q:"某日全球最低氣溫為 −25 度，當天臺北為 12 度，則臺北比最低氣溫高出幾度？",
  o:["13 度","−37 度","37 度","−13 度"],a:2,
  steps:["「高出幾度」＝臺北溫度 − 最低溫度＝12−(−25)。","減負數變加正數：12＋25。","＝<b>37 度</b>，選 (C)。"], ans:"(C)"},
 {q:"計算　48＋(−15)＋(−48)＝？",
  o:["−15","＋15","−111","＋81"],a:0,
  steps:["用交換律，把互為相反數的 48 和 −48 湊在一起。","48＋(−48)＝0。","0＋(−15)＝<b>−15</b>，選 (A)。"], ans:"(A)"},
 {q:"將 ｜−6｜、｜＋1｜、｜−4｜、｜＋3｜ <b>由大到小</b>排列，下列何者正確？",
  o:["｜−6｜＞｜−4｜＞｜＋3｜＞｜＋1｜","｜＋1｜＞｜＋3｜＞｜−4｜＞｜−6｜","｜−6｜＞｜＋3｜＞｜−4｜＞｜＋1｜","｜−4｜＞｜−6｜＞｜＋3｜＞｜＋1｜"],a:0,
  steps:["先把每個絕對值算出來：6、1、4、3。","數值由大到小：6＞4＞3＞1。","對回去：<b>｜−6｜＞｜−4｜＞｜＋3｜＞｜＋1｜</b>，選 (A)。"], ans:"(A)"},
];
// 填充題：題幹（用 {?} 標記空格位置）、步驟、答案文字
const FILL=[
 {q:"商人第一週賺 4520 元、第二週賺 3540 元、第三週賠 1500 元，三週合計賺 {?} 元。",
  steps:["賺記正、賠記負：＋4520、＋3540、−1500。","先把賺的加起來：4520＋3540＝8060。","再扣掉賠的：8060−1500＝<b>6560</b>。"], ans:"賺 6560 元"},
 {q:"韋韋比平均低 13 分（記 −13），康康比平均高 8 分（記 ＋8），則康康比韋韋高 {?} 分。",
  steps:["康康＝＋8，韋韋＝−13。","「高幾分」＝康康 − 韋韋＝8−(−13)。","＝8＋13＝<b>21</b> 分。"], ans:"21 分"},
 {q:"大於 −3 且小於 5 的所有整數，它們的總和是 {?}。",
  steps:["列出整數：−2、−1、0、1、2、3、4。","相反數相消：(−2＋2)、(−1＋1)＝0。","剩 3＋4＝<b>7</b>。"], ans:"7"},
 {q:"一個人從甲地西方 75 公尺處，沿直線走到甲地東方 32 公尺處，他總共走了 {?} 公尺。",
  steps:["注意：問的是「走的總長度（距離）」，不是位移。","西方 75 走到甲地走 75 公尺，甲地再到東方 32 又走 32 公尺。","總距離＝75＋32＝<b>107</b> 公尺。"], ans:"107 公尺"},
 {q:"冰箱原本是 8 度，先調降 7 度，再調降 6 度，最後溫度是 {?} 度。",
  steps:["調降＝減：8＋(−7)＋(−6)。","8−7＝1。","1−6＝<b>−5</b> 度。"], ans:"−5 度"},
 {q:"計算　｜＋8｜＋｜−2｜−｜−5｜＝ {?}。",
  steps:["先把每個絕對值算出來：8、2、5。","8＋2＝10。","10−5＝<b>5</b>。"], ans:"5"},
 {q:"已知某數的絕對值是 9，且它是負數，則這個數是 {?}；它的相反數是 {?}。",
  steps:["絕對值是 9 的數有 9 和 −9。","題目說它是負數 → 這個數是 <b>−9</b>。","把符號改變 → 相反數是 <b>＋9</b>。"], ans:"−9；＋9"},
 {q:"計算　(−8)＋5＋(−2)＋5＝ {?}。",
  steps:["把同號的歸在一起：負的 (−8)＋(−2)＝−10。","正的 5＋5＝10。","−10＋10＝<b>0</b>。"], ans:"0"},
 {q:"計算　｜(−3)＋15｜−｜(−11)＋3｜＝ {?}。",
  steps:["先算每個絕對值「裡面」：(−3)＋15＝12，(−11)＋3＝−8。","再取絕對值：｜12｜＝12，｜−8｜＝8。","12−8＝<b>4</b>。"], ans:"4"},
 {q:"大於 −5 且小於 0 的整數共有 {?} 個，它們的總和是 {?}。",
  steps:["列出整數：−4、−3、−2、−1，共 <b>4</b> 個。","相加：(−4)＋(−3)＋(−2)＋(−1)。","總和＝<b>−10</b>。"], ans:"4 個；−10"},
];
// 計算題：題幹、步驟、答案
const CALC=[
 {q:"計算　(−52)−[(−3)＋(−5)]　＝ {?}",
  steps:["先算中括號：(−3)＋(−5)＝−8。","減負數變加正數：(−52)−(−8)＝(−52)＋8。","＝<b>−44</b>。"], ans:"−44"},
 {q:"計算　25＋(−18)＋(−26)＋24　＝ {?}",
  steps:["先湊整：25＋24＝49。","負的相加：(−18)＋(−26)＝−44。","49＋(−44)＝<b>5</b>。"], ans:"5"},
 {q:"計算　｜43−(−29)＋7｜−｜(−55)−(−12)＋33｜　＝ {?}",
  steps:["第一個絕對值內：43−(−29)＋7＝43＋29＋7＝79 → ｜79｜＝79。","第二個絕對值內：(−55)−(−12)＋33＝−55＋12＋33＝−10 → ｜−10｜＝10。","79−10＝<b>69</b>。"], ans:"69"},
 {q:"計算　｜6＋(−14)＋2｜−｜(−11)−4＋25｜＋(−3)　＝ {?}",
  steps:["第一個絕對值內：6＋(−14)＋2＝−6 → ｜−6｜＝6。","第二個絕對值內：(−11)−4＋25＝10 → ｜10｜＝10。","6−10＋(−3)＝−4＋(−3)＝<b>−7</b>。"], ans:"−7"},
 {q:"一艘潛水艇停在海平面（記為 0）。它先下潛 13 公尺，上升 6 公尺，再下潛 9 公尺，最後上升 4 公尺。問最後位置？ {?}",
  steps:["下潛記負、上升記正，列式：0＋(−13)＋6＋(−9)＋4。","依序算：−13＋6＝−7；−7＋(−9)＝−16；−16＋4＝−12。","結果 −12 → 在海平面<b>下方 12 公尺</b>。"], ans:"−12，即海平面下方 12 公尺"},
];

function buildSteps(prefix,i,steps,ans){
  const labels=["第一步","第二步","第三步","第四步","第五步"];
  let rows=steps.map((t,k)=>`<div class="step"><button class="num" onclick="oneStep(this)">${k+1}</button><span class="txt"><span class="lbl">${labels[k]}</span>${t}</span></div>`).join("");
  return `<div class="sol" id="sol-${prefix}-${i}">${rows}<div class="answer" id="ans-${prefix}-${i}">${ans}</div></div>`;
}
function qmark(prefix,i){ return `<button class="qmark" onclick="reveal('${prefix}',${i},this)">？</button>`; }

// 選擇題
const mc=document.getElementById("mc");
MC.forEach((it,i)=>{
  const d=document.createElement("div"); d.className="prob";
  const opts=it.o.map((t,j)=>`<span>(${LET[j]}) ${t}</span>`).join("");
  d.innerHTML=`<div class="q-line"><span class="q-badge">${i+1}</span><span class="q-text">${it.q}</span></div>
    <div class="opts">${opts}</div>
    <div class="q-text" style="margin:8px 0 0 6px">正解：${qmark('mc',i)}</div>
    ${buildSteps('mc',i,it.steps,it.ans)}`;
  mc.appendChild(d);
});
// 填充題
const fill=document.getElementById("fill");
FILL.forEach((it,i)=>{
  const d=document.createElement("div"); d.className="prob";
  let n=0; const qhtml=it.q.replace(/\{\?\}/g,()=>qmark('fill',i));
  d.innerHTML=`<div class="q-line"><span class="q-badge">${i+11}</span><span class="q-text">${qhtml}</span></div>
    ${buildSteps('fill',i,it.steps,it.ans)}`;
  fill.appendChild(d);
});
// 計算題
const calc=document.getElementById("calc");
CALC.forEach((it,i)=>{
  const d=document.createElement("div"); d.className="prob";
  const qhtml=it.q.replace(/\{\?\}/g,()=>qmark('calc',i));
  d.innerHTML=`<div class="q-line"><span class="q-badge">${i+21}</span><span class="q-text">${qhtml}</span></div>
    ${buildSteps('calc',i,it.steps,it.ans)}`;
  calc.appendChild(d);
});

// 點？：整題解析全開（所有步驟＋答案一起跳出）
function reveal(prefix,i,btn){
  const sol=document.getElementById(`sol-${prefix}-${i}`);
  sol.classList.add("show");
  sol.querySelectorAll(".step").forEach(s=>s.classList.add("shown"));
  document.getElementById(`ans-${prefix}-${i}`).classList.add("show");
  // 同一題的所有？都標記完成
  btn.closest(".prob").querySelectorAll(".qmark").forEach(q=>q.classList.add("done"));
}
// 點數字：只顯示那一步（逐步講解用）
function oneStep(b){
  b.closest(".sol").classList.add("show");
  b.parentElement.classList.add("shown");
}
function showAll(){
  document.querySelectorAll(".sol").forEach(s=>{s.classList.add("show"); s.querySelectorAll(".step").forEach(st=>st.classList.add("shown"));});
  document.querySelectorAll(".answer").forEach(a=>a.classList.add("show"));
  document.querySelectorAll(".qmark").forEach(q=>q.classList.add("done"));
}
function resetAll(){
  document.querySelectorAll(".sol").forEach(s=>s.classList.remove("show"));
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("shown"));
  document.querySelectorAll(".answer").forEach(a=>a.classList.remove("show"));
  document.querySelectorAll(".qmark").forEach(q=>q.classList.remove("done"));
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>
</body>
</html>
