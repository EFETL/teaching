<style>
  :root { --main:#2c5f8a; --accent:#e6a800; --subject:#3498db; --teach:#7b6000; --bg:#eef3f9; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:#1a1a1a; background:var(--bg); line-height:1.7; padding:0 0 60px; }
  header { background:linear-gradient(135deg,#2c5f8a,#3d7cb0); color:#fff; padding:30px 20px 26px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.18); }
  header h1 { font-size:30px; margin-bottom:8px; }
  header p { font-size:18px; opacity:.95; }
  .back { display:inline-block; margin:16px auto 0; color:#2c5f8a; background:#fff; border:2px solid #cdddef; border-radius:20px; padding:6px 16px; font-size:16px; text-decoration:none; }
  .back:hover { background:#eef6ff; }
  .wrap { max-width:880px; margin:0 auto; padding:20px 16px; }
  .intro { background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:22px; box-shadow:0 1px 6px rgba(0,0,0,.07); font-size:18px; }
  .intro b { color:var(--main); }
  .combo { display:block; text-align:center; background:var(--accent); color:#3a2c00; font-size:22px; font-weight:bold; text-decoration:none; padding:16px; border-radius:12px; margin-bottom:14px; box-shadow:0 2px 8px rgba(230,168,0,.4); transition:transform .12s; }
  .combo:hover { transform:translateY(-2px); }
  .unit { background:#fff; border-radius:12px; margin-bottom:18px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,.08); }
  .unit-head { background:var(--main); color:#fff; font-size:21px; font-weight:bold; padding:12px 20px; }
  .unit-head .n { background:#fff; color:var(--main); border-radius:50%; width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; font-size:18px; margin-right:10px; }
  .links { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:16px 20px; }
  .links a { display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; border:2px solid #d9e2ec; border-radius:10px; padding:14px 8px; font-size:18px; color:#1a1a1a; transition:all .12s; text-align:center; }
  .links a:hover { border-color:var(--main); background:#f0f6fc; transform:translateY(-2px); }
  .links a .ic { font-size:26px; }
  .links a.teach { border-color:#e7d9a8; }
  .links a.teach:hover { border-color:var(--teach); background:#fffbe9; }
  .links a small { color:#667; font-size:14px; }
  footer { text-align:center; color:#789; font-size:15px; margin-top:30px; }
  @media (max-width:560px){ .links{ grid-template-columns:1fr; } header h1{ font-size:24px; } }
