<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學科 互動學習</title>
<style>
  :root { --main:#2c5f8a; --bg:#eef3f9; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:#1a1a1a; background:var(--bg); line-height:1.7; padding:0 0 60px; }
  header { background:linear-gradient(135deg,#2c5f8a,#3d7cb0); color:#fff; padding:30px 20px 26px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.18); }
  header h1 { font-size:30px; margin-bottom:8px; }
  header p { font-size:18px; opacity:.95; }
  .back { display:inline-block; margin:16px auto 0; color:#2c5f8a; background:#fff; border:2px solid #cdddef; border-radius:20px; padding:6px 16px; font-size:16px; text-decoration:none; }
  .back:hover { background:#eef6ff; }
  .wrap { max-width:900px; margin:0 auto; padding:22px 16px; }
  .intro { background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:24px; box-shadow:0 1px 6px rgba(0,0,0,.07); font-size:18px; }
  .intro b { color:var(--main); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:18px; }
  .vcard { display:block; text-decoration:none; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.10); border:1px solid #e2e8f0; transition:transform .12s, box-shadow .12s; position:relative; }
  .vcard:hover { transform:translateY(-5px); box-shadow:0 10px 22px rgba(20,60,90,.20); }
  .vthumb { height:104px; display:flex; align-items:center; justify-content:center; gap:6px; color:#fff; background:linear-gradient(135deg,var(--g1),var(--g2)); position:relative; }
  .vthumb::after { content:"📐"; position:absolute; right:10px; bottom:6px; font-size:20px; opacity:.5; }
  .vthumb .vn { font-size:52px; font-weight:800; line-height:1; letter-spacing:1px; text-shadow:0 2px 6px rgba(0,0,0,.18); }
  .vthumb .vn.txt { font-size:34px; }
  .vthumb .vc { font-size:20px; font-weight:700; align-self:flex-end; margin-bottom:18px; opacity:.92; }
  .vbody { padding:13px 16px 15px; }
  .vlabel { font-size:21px; font-weight:800; color:#15324a; }
  .vsub { font-size:14.5px; color:#5a6b78; margin-top:3px; }
  .vcard.soon { cursor:default; }
  .vcard.soon .vthumb { filter:grayscale(.55) opacity(.75); }
  .vcard.soon:hover { transform:none; box-shadow:0 2px 10px rgba(0,0,0,.10); }
  .ribbon { position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92); color:#7a8794; font-size:12.5px; font-weight:700; border-radius:14px; padding:2px 11px; }
  footer { text-align:center; color:#789; font-size:15px; margin-top:34px; }
  @media (max-width:560px){ header h1{ font-size:24px; } .grid{ grid-template-columns:1fr 1fr; gap:12px; } .vthumb .vn{ font-size:42px; } }
</style>
</head>

    </div>

  </div>
  <footer>數學科 互動學習 ‧ teaching.efetl.com</footer>

</html>
