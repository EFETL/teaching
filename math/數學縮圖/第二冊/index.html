<!DOCTYPE html>
<html lang="zh-TW">
<head>

<title>數學第二冊 期末模擬考</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

.container{max-width:680px;margin:0 auto}
.back{display:inline-block;margin-bottom:20px;color:#1a73e8;text-decoration:none;font-size:14px}

.sub{color:#666;font-size:14px;margin-bottom:28px}
.cards{display:grid;gap:16px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.card-info h2{font-size:17px;color:#1a1a2e;margin-bottom:4px}

.btn{display:inline-block;padding:10px 24px;background:#1a73e8;color:#fff;border-radius:24px;text-decoration:none;font-size:14px;white-space:nowrap}
.btn:hover{background:#1558b0}
.tag{display:inline-block;background:#e8f0fe;color:#1a73e8;font-size:12px;padding:2px 10px;border-radius:12px;margin-top:6px}
</style>
</head>
<body>
<div class="container">

  <div class="cards">
    <div class="card">
      <div class="card-info">
        <h2>期末模擬考　A 卷</h2>
        <p>共 25 題選擇題・互動解析・支援列印</p>

      </div>

        <span class="tag">第二冊</span>
      </div>
      <a class="btn" href="一下數學期末模擬考_B卷.html">開始作答</a>
    </div>
  </div>
</div>

</html>
