<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f2744;--gold:#e8a000;--teal:#0a7ea4;--green:#15803d;--red:#b91c1c;--bg:#f0f4f9;--border:#dde3ed}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}

.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}
#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}
.si span.val{font-weight:700;font-size:.95rem}
#ptbar{height:5px;background:rgba(255,255,255,.2);width:160px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}
.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.q-hd h2{font-size:.92rem;font-weight:700;color:var(--navy)}
.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

.concept h3{color:#0f2744;font-size:1rem;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #eef0f5}
table.tbl{border-collapse:collapse;width:100%;margin:10px 0;font-size:.82rem;line-height:1.5}
table.tbl th,table.tbl td{border:1px solid #c9d4e2;padding:6px 9px;text-align:left;vertical-align:top}
table.tbl th{background:#0f2744;color:#fff;font-weight:700;white-space:nowrap}
table.tbl tr:nth-child(even) td{background:#f5f9ff}
.eg{background:#fffbe8;border-left:4px solid #e8a000;border-radius:0 8px 8px 0;padding:9px 13px;margin:10px 0;font-size:.84rem;line-height:1.7;color:#4a3b00}
.eg b{color:#0f2744}
.map-txt{font-family:ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;background:#0f2744;color:#e8f0fc;border-radius:8px;padding:10px 12px;font-size:.76rem;line-height:1.65;margin:10px 0;overflow-x:auto}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.76rem;font-weight:700;color:#fff;line-height:1.6}
.tag.g{background:#15803d}.tag.r{background:#b91c1c}.tag.b{background:#0a7ea4}.tag.y{background:#b8860b}
.concept p{margin:6px 0;font-size:.86rem;line-height:1.7}
</style>

const TOPICS=[{"id": "conc", "icon": "🧪", "name": "溶液與濃度"}, {"id": "solub", "icon": "🌡️", "name": "溶解度"}, {"id": "acid", "icon": "⚗️", "name": "酸鹼反應"}];
const NOTES={"conc": "\n<div class=\"concept\">\n<h3>① 分散系三大分類（看「粒子大小」分）</h3>\n<svg viewBox=\"0 0 480 235\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:470px;display:block;margin:12px auto;font-family:inherit\"><path d=\"M60.0,40 L60.0,155 Q60.0,170 75.0,170 L165.0,170 Q180.0,170 180.0,155 L180.0,40\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"2\"/><line x1=\"60.0\" y1=\"58\" x2=\"180.0\" y2=\"58\" stroke=\"#9cc3de\" stroke-width=\"1.5\"/><circle cx=\"86\" cy=\"81\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"109\" cy=\"81\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"131\" cy=\"81\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"154\" cy=\"81\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"86\" cy=\"104\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"109\" cy=\"104\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"131\" cy=\"104\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"154\" cy=\"104\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"86\" cy=\"126\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"109\" cy=\"126\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"131\" cy=\"126\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"154\" cy=\"126\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"86\" cy=\"149\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"109\" cy=\"149\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"131\" cy=\"149\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"154\" cy=\"149\" r=\"1.4\" fill=\"#2b6f9e\"/><circle cx=\"20\" cy=\"110\" r=\"8\" fill=\"#e8a000\"/><text x=\"20\" y=\"98\" font-size=\"9\" text-anchor=\"middle\" fill=\"#4a3b00\">光源</text><line x1=\"28\" y1=\"110\" x2=\"60\" y2=\"110\" stroke=\"#e8a000\" stroke-width=\"3\"/><line x1=\"60\" y1=\"110\" x2=\"180\" y2=\"110\" stroke=\"#cbd5e1\" stroke-width=\"2\" stroke-dasharray=\"3 3\"/><line x1=\"180\" y1=\"110\" x2=\"205\" y2=\"110\" stroke=\"#e8a000\" stroke-width=\"3\" opacity=\"0.45\"/><text x=\"120\" y=\"192\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#0f2744\">真溶液（食鹽水）</text><text x=\"120\" y=\"208\" font-size=\"10\" text-anchor=\"middle\" fill=\"#b91c1c\">光直接穿透，看不到光徑</text><text x=\"120\" y=\"222\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">粒子&lt;1nm</text><path d=\"M300.0,40 L300.0,155 Q300.0,170 315.0,170 L405.0,170 Q420.0,170 420.0,155 L420.0,40\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"2\"/><line x1=\"300.0\" y1=\"58\" x2=\"420.0\" y2=\"58\" stroke=\"#9cc3de\" stroke-width=\"1.5\"/><circle cx=\"326\" cy=\"81\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"349\" cy=\"81\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"371\" cy=\"81\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"394\" cy=\"81\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"326\" cy=\"104\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"349\" cy=\"104\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"371\" cy=\"104\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"394\" cy=\"104\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"326\" cy=\"126\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"349\" cy=\"126\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"371\" cy=\"126\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"394\" cy=\"126\" r=\"3.2\" fill=\"#0a7ea4\"/><circle cx=\"262\" cy=\"110\" r=\"8\" fill=\"#e8a000\"/><text x=\"262\" y=\"98\" font-size=\"9\" text-anchor=\"middle\" fill=\"#4a3b00\">光源</text><rect x=\"300\" y=\"104\" width=\"120\" height=\"12\" fill=\"#ffd75e\" opacity=\"0.65\" rx=\"3\"/><line x1=\"270\" y1=\"110\" x2=\"300\" y2=\"110\" stroke=\"#e8a000\" stroke-width=\"3\"/><line x1=\"300\" y1=\"110\" x2=\"455\" y2=\"110\" stroke=\"#e8a000\" stroke-width=\"3\"/><line x1=\"330\" y1=\"110\" x2=\"330\" y2=\"92\" stroke=\"#e8a000\" stroke-width=\"1.3\"/><line x1=\"370\" y1=\"110\" x2=\"378\" y2=\"128\" stroke=\"#e8a000\" stroke-width=\"1.3\"/><line x1=\"350\" y1=\"110\" x2=\"342\" y2=\"128\" stroke=\"#e8a000\" stroke-width=\"1.3\"/><text x=\"360\" y=\"192\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#0f2744\">膠體溶液（牛奶）</text><text x=\"360\" y=\"208\" font-size=\"10\" text-anchor=\"middle\" fill=\"#15803d\">廷得耳效應：光徑清楚可見</text><text x=\"360\" y=\"222\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">粒子1–100nm</text></svg>\n<table class=\"tbl\">\n<tr><th>類型</th><th>粒子大小</th><th>廷得耳效應</th><th>靜置是否沉降</th><th>生活例子</th></tr>\n<tr><td>真溶液</td><td>&lt; 1 nm</td><td>無</td><td>不沉降（透明）</td><td>食鹽水、糖水、醋</td></tr>\n<tr><td><b>膠體溶液</b></td><td>1–100 nm</td><td><b>有（光徑可見）</b></td><td>不沉降</td><td>牛奶、豆漿、雲霧</td></tr>\n<tr><td>懸浮液</td><td>&gt; 100 nm</td><td>會散射但易沉降</td><td>會沉降、可過濾</td><td>泥漿、未搖勻果汁</td></tr>\n</table>\n<p>粒子大小排序：<span class=\"tag r\">懸浮粒子</span> ＞ <span class=\"tag g\">膠體粒子</span> ＞ <span class=\"tag b\">真溶液溶質</span>。</p>\n</div>\n<div class=\"eg\">🌳 <b>生活例子（廷得耳效應）</b>：清晨陽光穿過樹叢的「光柱」、戲院投影機的光束、車燈在霧中的光錐——看得見的光徑就是<b>膠體粒子使光散射</b>。真溶液粒子太小不散射，所以乾淨空氣不會有光徑。</div>\n\n<div class=\"concept\">\n<h3>② 三種濃度表示法（務必背公式＋分母）</h3>\n<table class=\"tbl\">\n<tr><th>名稱</th><th>公式</th><th>重點</th></tr>\n<tr><td>重量百分濃度 (%)</td><td>溶質質量 ÷ <b>溶液</b>質量 × 100%</td><td>分母是「溶液」＝溶質＋溶劑，<b>不是水</b></td></tr>\n<tr><td>體積莫耳濃度 (M)</td><td>溶質莫耳數 ÷ 溶液<b>體積(L)</b></td><td>反應計算最常用；M＝mol/L</td></tr>\n<tr><td>百萬分點 (ppm)</td><td>溶質質量 ÷ 溶液質量 × 10⁶</td><td>微量；稀薄水溶液 1 ppm ≈ 1 mg/L</td></tr>\n</table>\n<p class=\"map-txt\">15 克鹽 + 135 克水 → 重量% = 15 / (15+135) = 10%   （分母用 150，不是 135）\n2 克 NaOH(=0.05 mol) 配成 0.2 L → M = 0.05 / 0.2 = 0.25 M\n500 ppm 飲品 = 每 mL 含 0.5 mg → 300 mg ÷ 0.5 = 600 mL</p>\n</div>\n\n<div class=\"concept\">\n<h3>③ 比重換算與溶液混合</h3>\n<p><b>濃溶液→M：</b> 體積莫耳濃度 = (1000 × 比重 × 重量%) ÷ 莫耳質量。<br>\n例：98%、比重1.8 濃硫酸 → M = (1000×1.8×0.98)/98 = <b>18 M</b>。</p>\n<p><b>溶液混合（體積加成）：</b> 混合後 M = （各溶液 mol 相加）÷（總體積 L）。<br>\n例：0.2M×0.1L + 0.1M×0.4L = 0.06 mol，÷0.5 L = <b>0.12 M</b>。</p>\n<p><b>準確配製五步驟：</b></p>\n<svg viewBox=\"0 0 650 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:640px;display:block;margin:12px auto;font-family:inherit\"><circle cx=\"26\" cy=\"22\" r=\"11\" fill=\"#0f2744\"/><text x=\"26\" y=\"26\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#fff\">1</text><line x1=\"46\" y1=\"60\" x2=\"94\" y2=\"60\" stroke=\"#0f2744\" stroke-width=\"2\"/><path d=\"M64,60 L76,60 L70,80 Z\" fill=\"#9cc3de\" stroke=\"#0f2744\" stroke-width=\"1.2\"/><line x1=\"50\" y1=\"60\" x2=\"50\" y2=\"72\" stroke=\"#0f2744\"/><line x1=\"90\" y1=\"60\" x2=\"90\" y2=\"72\" stroke=\"#0f2744\"/><rect x=\"44\" y=\"72\" width=\"12\" height=\"5\" fill=\"#c8924a\"/><text x=\"70\" y=\"138\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0f2744\">稱取溶質</text><circle cx=\"154\" cy=\"22\" r=\"11\" fill=\"#0f2744\"/><text x=\"154\" y=\"26\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#fff\">2</text><path d=\"M178,46 L182,86 Q183,92 190,92 L206,92 Q213,92 214,86 L218,46\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><line x1=\"180\" y1=\"58\" x2=\"216\" y2=\"58\" stroke=\"#9cc3de\"/><line x1=\"198\" y1=\"40\" x2=\"198\" y2=\"62\" stroke=\"#0f2744\" stroke-width=\"1.2\"/><circle cx=\"192\" cy=\"74\" r=\"1.6\" fill=\"#0a7ea4\"/><circle cx=\"203\" cy=\"80\" r=\"1.6\" fill=\"#0a7ea4\"/><text x=\"198\" y=\"138\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0f2744\">加少量水溶解</text><circle cx=\"282\" cy=\"22\" r=\"11\" fill=\"#0f2744\"/><text x=\"282\" y=\"26\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#fff\">3</text><rect x=\"326\" y=\"40\" width=\"8\" height=\"20\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><path d=\"M326,60 L313,86 Q330,98 347,86 L334,60 Z\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><line x1=\"326\" y1=\"49\" x2=\"334\" y2=\"49\" stroke=\"#b91c1c\" stroke-width=\"1.5\"/><path d=\"M300,46 L303,70 Q304,75 310,75 L322,75 Q328,75 329,70 L331,46\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.3\"/><path d=\"M322,60 Q330,55 330,52\" fill=\"none\" stroke=\"#0a7ea4\" stroke-width=\"2\"/><text x=\"326\" y=\"138\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0f2744\">溶液倒入量瓶</text><circle cx=\"410\" cy=\"22\" r=\"11\" fill=\"#0f2744\"/><text x=\"410\" y=\"26\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#fff\">4</text><rect x=\"450\" y=\"40\" width=\"8\" height=\"20\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><path d=\"M450,60 L437,86 Q454,98 471,86 L458,60 Z\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><line x1=\"450\" y1=\"49\" x2=\"458\" y2=\"49\" stroke=\"#b91c1c\" stroke-width=\"1.5\"/><circle cx=\"454\" cy=\"32\" r=\"2.5\" fill=\"#0a7ea4\"/><line x1=\"468\" y1=\"49\" x2=\"480\" y2=\"49\" stroke=\"#b91c1c\" stroke-width=\"1\"/><text x=\"495\" y=\"52\" font-size=\"9\" fill=\"#b91c1c\">刻度線</text><text x=\"454\" y=\"138\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0f2744\">加水至刻度線</text><circle cx=\"538\" cy=\"22\" r=\"11\" fill=\"#0f2744\"/><text x=\"538\" y=\"26\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#fff\">5</text><rect x=\"578\" y=\"40\" width=\"8\" height=\"20\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><path d=\"M578,60 L565,86 Q582,98 599,86 L586,60 Z\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"1.4\"/><line x1=\"578\" y1=\"49\" x2=\"586\" y2=\"49\" stroke=\"#b91c1c\" stroke-width=\"1.5\"/><path d=\"M566,40 A18,18 0 1 1 564,52\" fill=\"none\" stroke=\"#15803d\" stroke-width=\"1.6\"/><path d=\"M564,52 l-4,-5 m4,5 l5,-3\" stroke=\"#15803d\" stroke-width=\"1.6\" fill=\"none\"/><text x=\"582\" y=\"138\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0f2744\">倒轉搖勻</text><text x=\"134\" y=\"80\" font-size=\"18\" text-anchor=\"middle\" fill=\"#0a7ea4\">›</text><text x=\"262\" y=\"80\" font-size=\"18\" text-anchor=\"middle\" fill=\"#0a7ea4\">›</text><text x=\"390\" y=\"80\" font-size=\"18\" text-anchor=\"middle\" fill=\"#0a7ea4\">›</text><text x=\"518\" y=\"80\" font-size=\"18\" text-anchor=\"middle\" fill=\"#0a7ea4\">›</text></svg>\n<p>要「定容」到指定體積一定用<span class=\"tag g\">量瓶（容量瓶）</span>；燒杯、錐形瓶、圓底燒瓶刻度只能概估。</p>\n</div>\n<div class=\"eg\">📌 <b>學測對照</b>：111、112 學測都考過「由溶解度／比重換算成體積莫耳濃度」「ppm 微量濃度」，公式與本節完全相同，只是包在情境題裡。</div>\n", "solub": "\n<div class=\"concept\">\n<h3>① 溶解度的定義與飽和度</h3>\n<p><b>溶解度</b>＝在某溫度下，<b>100 克水</b>所能溶解溶質的<b>最大克數</b>（單位 g/100g 水）。</p>\n<svg viewBox=\"0 0 480 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:470px;display:block;margin:12px auto;font-family:inherit\"><path d=\"M35.0,35 L35.0,135 Q35.0,150 50.0,150 L120.0,150 Q135.0,150 135.0,135 L135.0,35\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"2\"/><line x1=\"35.0\" y1=\"53\" x2=\"135.0\" y2=\"53\" stroke=\"#9cc3de\" stroke-width=\"1.5\"/><circle cx=\"61\" cy=\"72\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"85\" cy=\"72\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"109\" cy=\"72\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"61\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"85\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"109\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"61\" cy=\"126\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"85\" cy=\"126\" r=\"2.4\" fill=\"#0a7ea4\"/><text x=\"85\" y=\"170\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#15803d\">未飽和</text><text x=\"85\" y=\"185\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">還能再溶</text><path d=\"M190.0,35 L190.0,135 Q190.0,150 205.0,150 L275.0,150 Q290.0,150 290.0,135 L290.0,35\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"2\"/><line x1=\"190.0\" y1=\"53\" x2=\"290.0\" y2=\"53\" stroke=\"#9cc3de\" stroke-width=\"1.5\"/><circle cx=\"213\" cy=\"68\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"231\" cy=\"68\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"249\" cy=\"68\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"267\" cy=\"68\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"213\" cy=\"89\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"231\" cy=\"89\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"249\" cy=\"89\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"267\" cy=\"89\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"213\" cy=\"109\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"231\" cy=\"109\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"249\" cy=\"109\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"267\" cy=\"109\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"213\" cy=\"130\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"231\" cy=\"130\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"249\" cy=\"130\" r=\"2.4\" fill=\"#0a7ea4\"/><rect x=\"206\" y=\"138\" width=\"68\" height=\"11\" fill=\"#c8924a\" rx=\"2\"/><text x=\"240\" y=\"147\" font-size=\"7.5\" text-anchor=\"middle\" fill=\"#fff\">未溶固體</text><text x=\"240\" y=\"170\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#0a7ea4\">飽和</text><text x=\"240\" y=\"185\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">達最大溶解量</text><path d=\"M345.0,35 L345.0,135 Q345.0,150 360.0,150 L430.0,150 Q445.0,150 445.0,135 L445.0,35\" fill=\"#eaf4fb\" stroke=\"#0f2744\" stroke-width=\"2\"/><line x1=\"345.0\" y1=\"53\" x2=\"445.0\" y2=\"53\" stroke=\"#9cc3de\" stroke-width=\"1.5\"/><circle cx=\"366\" cy=\"66\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"381\" cy=\"66\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"395\" cy=\"66\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"409\" cy=\"66\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"424\" cy=\"66\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"366\" cy=\"83\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"381\" cy=\"83\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"395\" cy=\"83\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"409\" cy=\"83\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"424\" cy=\"83\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"366\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"381\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"395\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"409\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"424\" cy=\"99\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"366\" cy=\"115\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"381\" cy=\"115\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"395\" cy=\"115\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"409\" cy=\"115\" r=\"2.4\" fill=\"#0a7ea4\"/><circle cx=\"424\" cy=\"115\" r=\"2.4\" fill=\"#0a7ea4\"/><text x=\"395\" y=\"170\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#b91c1c\">過飽和</text><text x=\"395\" y=\"185\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">超量、不穩定</text><text x=\"395\" y=\"55\" font-size=\"14\" text-anchor=\"middle\">⚡</text></svg>\n<table class=\"tbl\">\n<tr><th>溶液狀態</th><th>含溶質量</th><th>底部有無未溶固體</th></tr>\n<tr><td>未飽和</td><td>＜ 該溫度最大溶解量</td><td>無</td></tr>\n<tr><td>飽和</td><td>＝ 最大溶解量</td><td>剛好或有剩餘固體與溶液達平衡</td></tr>\n<tr><td><b>過飽和</b></td><td>＞ 最大溶解量（不穩定）</td><td>暫無，受擾動／加晶種即析出</td></tr>\n</table>\n<p class=\"map-txt\">26°C KNO₃溶解度=40 → 50克水最多溶 40×(50/100)=20克\n放入30克 → 只溶20克，剩10克未溶 = 飽和；重量% = 20/(20+50) ≈ 28.6%</p>\n</div>\n\n<div class=\"concept\">\n<h3>② 溶解度曲線 → 看出「吸熱或放熱」</h3>\n<svg viewBox=\"0 0 620 290\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:600px;display:block;margin:12px auto;font-family:inherit\"><line x1=\"50\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"253\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">0</text><line x1=\"50\" y1=\"215\" x2=\"430\" y2=\"215\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"218\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">15</text><line x1=\"50\" y1=\"180\" x2=\"430\" y2=\"180\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"182\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">30</text><line x1=\"50\" y1=\"144\" x2=\"430\" y2=\"144\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"147\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">45</text><line x1=\"50\" y1=\"109\" x2=\"430\" y2=\"109\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"112\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">60</text><line x1=\"50\" y1=\"74\" x2=\"430\" y2=\"74\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"77\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">75</text><line x1=\"50\" y1=\"38\" x2=\"430\" y2=\"38\" stroke=\"#e3e9f1\" stroke-width=\"1\"/><text x=\"44\" y=\"42\" font-size=\"9\" text-anchor=\"end\" fill=\"#555\">90</text><text x=\"50\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">0</text><text x=\"124\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">20</text><text x=\"198\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">40</text><text x=\"272\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">60</text><text x=\"346\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">80</text><text x=\"420\" y=\"266\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">100</text><line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"250\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><text x=\"14\" y=\"140\" font-size=\"10\" fill=\"#0f2744\" transform=\"rotate(-90 14,140)\" text-anchor=\"middle\">溶解度 (g/100g 水)</text><text x=\"240\" y=\"284\" font-size=\"10\" fill=\"#0f2744\" text-anchor=\"middle\">溫度 (°C)</text><polyline points=\"50,226 124,203 198,172 272,137 346,90 420,41\" fill=\"none\" stroke=\"#b91c1c\" stroke-width=\"2.4\"/><polyline points=\"50,238 124,203 198,135 272,142 346,147 420,151\" fill=\"none\" stroke=\"#7c3aed\" stroke-width=\"2.4\"/><polyline points=\"50,166 124,165 198,164 272,163 346,161 420,158\" fill=\"none\" stroke=\"#15803d\" stroke-width=\"2.4\"/><polyline points=\"50,238 124,229 198,210 272,187 346,170 420,154\" fill=\"none\" stroke=\"#0a7ea4\" stroke-width=\"2.4\"/><polyline points=\"50,201 124,226 198,234 272,236 346,238 420,241\" fill=\"none\" stroke=\"#e8a000\" stroke-width=\"2.4\"/><text x=\"436\" y=\"30\" font-size=\"9\" fill=\"#b91c1c\" font-weight=\"700\">Na₂HAsO₄</text><text x=\"436\" y=\"118\" font-size=\"9\" fill=\"#7c3aed\" font-weight=\"700\">Na₂SO₄</text><text x=\"436\" y=\"150\" font-size=\"9\" fill=\"#15803d\" font-weight=\"700\">NaCl</text><text x=\"436\" y=\"135\" font-size=\"9\" fill=\"#0a7ea4\" font-weight=\"700\">Ba(NO₃)₂</text><text x=\"436\" y=\"240\" font-size=\"9\" fill=\"#e8a000\" font-weight=\"700\">Ce₂(SO₄)₃·9H₂O</text><text x=\"240\" y=\"20\" font-size=\"10\" fill=\"#888\" text-anchor=\"middle\">（趨勢示意圖，依課本第8課）</text></svg>\n<table class=\"tbl\">\n<tr><th>曲線走勢</th><th>升溫時溶解度</th><th>溶解反應熱</th><th>課本例子</th></tr>\n<tr><td>往右上（陡）</td><td>變大</td><td><span class=\"tag b\">吸熱</span></td><td>Na₂HAsO₄、KNO₃</td></tr>\n<tr><td>幾乎水平</td><td>幾乎不變</td><td>很小</td><td><b>NaCl</b></td></tr>\n<tr><td>往右下（降）</td><td>變小</td><td><span class=\"tag r\">放熱</span></td><td>Ce₂(SO₄)₃·9H₂O</td></tr>\n</table>\n<p>判斷口訣：<b>升溫溶得更多 → 吸熱；升溫反而溶得少 → 放熱</b>。受溫度影響最小的是 NaCl（曲線最平）。</p>\n</div>\n\n<div class=\"concept\">\n<h3>③ 溫度、壓力對溶解度的影響</h3>\n<table class=\"tbl\">\n<tr><th></th><th>固體溶質</th><th>氣體溶質</th></tr>\n<tr><td>溫度升高</td><td>多數變大（少數變小）</td><td><b>一律變小</b></td></tr>\n<tr><td>壓力升高</td><td>幾乎無影響</td><td><b>變大</b>（亨利定律）</td></tr>\n</table>\n</div>\n<div class=\"eg\">🥤 <b>生活例子</b>：汽水要<b>低溫保存</b>才不會跑氣（低溫→CO₂溶解度大）；一開瓶壓力驟降→CO₂溶解度變小而冒泡。喝下肚體溫高→氣體跑出來而打嗝。</div>\n\n<div class=\"concept\">\n<h3>④ 結晶與分離</h3>\n<p><b>冷卻結晶＋過濾</b>：把「溶解度受溫度影響大」的溶質（如 KNO₃）與「受溫度影響小」的（如 NaCl）分開——降溫時 KNO₃ 大量析出、NaCl 仍留溶液中，過濾即分離。</p>\n<p><b>蒸發結晶</b>：適合 NaCl（受溫度影響小，靠蒸發水分析出）。<b>再結晶</b>純化 KNO₃ 須用水（溶解度隨溫度大幅變化），汽油不溶 KNO₃。</p>\n</div>\n<div class=\"eg\">📌 <b>學測對照</b>：105（揮發法求溶解度）、108（KNO₃ 飽和判斷）、112（NaNO₃/KCl 曲線＋分離）、114（再結晶與分離法）都直接考本節觀念——本講義示範題第 11、14、16 題即取自這些年份。</div>\n", "acid": "\n<div class=\"concept\">\n<h3>① 阿瑞尼斯酸鹼 & 電解質解離</h3>\n<table class=\"tbl\">\n<tr><th></th><th>定義</th><th>例子</th></tr>\n<tr><td>阿瑞尼斯酸</td><td>溶於水解離出 <b>H⁺</b></td><td>HCl、H₂SO₄、HF、CH₃COOH</td></tr>\n<tr><td>阿瑞尼斯鹼</td><td>溶於水解離出 <b>OH⁻</b></td><td>NaOH、KOH、NH₃(間接生成 OH⁻)</td></tr>\n</table>\n<p><span class=\"tag g\">強電解質</span>（HCl、H₂SO₄、NaOH、KOH、鹽類）水中<b>完全解離</b>；\n<span class=\"tag y\">弱電解質</span>（HF、CH₃COOH、H₂CO₃、NH₃）<b>僅部分解離</b>。\n乙醇 C₂H₅OH 是<b>非電解質</b>（不解離、中性）。</p>\n</div>\n\n<div class=\"concept\">\n<h3>② 水的離子積 Kw 與 pH</h3>\n<p>純水：Kw ＝ [H⁺][OH⁻]，<b>25°C 時 Kw＝1.0×10⁻¹⁴</b>。Kw 只隨<b>溫度</b>改變（升溫變大）。</p>\n<table class=\"tbl\">\n<tr><th>定義</th><th>式子</th></tr>\n<tr><td>pH</td><td>pH ＝ −log[H⁺]</td></tr>\n<tr><td>pOH</td><td>pOH ＝ −log[OH⁻]</td></tr>\n<tr><td>關係（25°C）</td><td>pH ＋ pOH ＝ 14</td></tr>\n</table>\n<svg viewBox=\"0 0 380 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:380px;display:block;margin:12px auto;font-family:inherit\"><line x1=\"50\" y1=\"190\" x2=\"350\" y2=\"190\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"193\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">0</text><line x1=\"50\" y1=\"159\" x2=\"350\" y2=\"159\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"162\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">5</text><line x1=\"50\" y1=\"128\" x2=\"350\" y2=\"128\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"131\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">10</text><line x1=\"50\" y1=\"97\" x2=\"350\" y2=\"97\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"100\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">15</text><line x1=\"50\" y1=\"66\" x2=\"350\" y2=\"66\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"69\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">20</text><line x1=\"50\" y1=\"35\" x2=\"350\" y2=\"35\" stroke=\"#e3e9f1\"/><text x=\"44\" y=\"38\" font-size=\"8\" text-anchor=\"end\" fill=\"#555\">25</text><text x=\"50\" y=\"204\" font-size=\"8\" text-anchor=\"middle\" fill=\"#555\">0</text><text x=\"120\" y=\"204\" font-size=\"8\" text-anchor=\"middle\" fill=\"#555\">20</text><text x=\"190\" y=\"204\" font-size=\"8\" text-anchor=\"middle\" fill=\"#555\">40</text><text x=\"260\" y=\"204\" font-size=\"8\" text-anchor=\"middle\" fill=\"#555\">60</text><text x=\"330\" y=\"204\" font-size=\"8\" text-anchor=\"middle\" fill=\"#555\">80</text><line x1=\"50\" y1=\"20\" x2=\"50\" y2=\"190\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"190\" x2=\"350\" y2=\"190\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><polyline points=\"50,189 120,186 138,184 260,128 330,35\" fill=\"none\" stroke=\"#b91c1c\" stroke-width=\"2.4\"/><circle cx=\"138\" cy=\"184\" r=\"3.5\" fill=\"#0f2744\"/><line x1=\"138\" y1=\"184\" x2=\"138\" y2=\"190\" stroke=\"#0f2744\" stroke-dasharray=\"2 2\"/><text x=\"144\" y=\"180\" font-size=\"9\" fill=\"#0f2744\">25°C, Kw=1.0×10⁻¹⁴</text><text x=\"20\" y=\"105\" font-size=\"9\" fill=\"#0f2744\" transform=\"rotate(-90 20,105)\" text-anchor=\"middle\">Kw (×10⁻¹⁴)</text><text x=\"200\" y=\"222\" font-size=\"9\" fill=\"#0f2744\" text-anchor=\"middle\">溫度 (°C)　→　升溫 Kw 變大</text></svg>\n<p class=\"map-txt\">純水 [H⁺]=√Kw  →  25°C: √1e-14 = 1e-7 (pH=7)\n            →  80°C: √25e-14 = 5e-7  (是25°C的5倍，pH<7 但仍中性!)</p>\n<p><b>關鍵觀念</b>：純水永遠中性（[H⁺]=[OH⁻]），但「pH=7」只在 25°C 成立；高溫純水 pH&lt;7 卻不是酸性。</p>\n</div>\n\n<div class=\"concept\">\n<h3>③ 酸鹼性質與強弱比較</h3>\n<svg viewBox=\"0 0 480 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:470px;display:block;margin:12px auto;font-family:inherit\"><defs><linearGradient id=\"phg\" x1=\"0\" x2=\"1\"><stop offset=\"0\" stop-color=\"#b91c1c\"/><stop offset=\"0.36\" stop-color=\"#e8a000\"/><stop offset=\"0.5\" stop-color=\"#15803d\"/><stop offset=\"0.64\" stop-color=\"#0a7ea4\"/><stop offset=\"1\" stop-color=\"#0f2744\"/></linearGradient></defs><rect x=\"40\" y=\"52\" width=\"420\" height=\"16\" fill=\"url(#phg)\" rx=\"3\"/><line x1=\"40\" y1=\"70\" x2=\"40\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"40\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">0</text><line x1=\"70\" y1=\"70\" x2=\"70\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"70\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">1</text><line x1=\"100\" y1=\"70\" x2=\"100\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"100\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">2</text><line x1=\"130\" y1=\"70\" x2=\"130\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"130\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">3</text><line x1=\"160\" y1=\"70\" x2=\"160\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"160\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">4</text><line x1=\"190\" y1=\"70\" x2=\"190\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"190\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">5</text><line x1=\"220\" y1=\"70\" x2=\"220\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"220\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">6</text><line x1=\"250\" y1=\"70\" x2=\"250\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"250\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">7</text><line x1=\"280\" y1=\"70\" x2=\"280\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"280\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">8</text><line x1=\"310\" y1=\"70\" x2=\"310\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"310\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">9</text><line x1=\"340\" y1=\"70\" x2=\"340\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"340\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">10</text><line x1=\"370\" y1=\"70\" x2=\"370\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"370\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">11</text><line x1=\"400\" y1=\"70\" x2=\"400\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"400\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">12</text><line x1=\"430\" y1=\"70\" x2=\"430\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"430\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">13</text><line x1=\"460\" y1=\"70\" x2=\"460\" y2=\"80\" stroke=\"#0f2744\" stroke-width=\"1\"/><text x=\"460\" y=\"94\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">14</text><line x1=\"100\" y1=\"50\" x2=\"100\" y2=\"68\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/><text x=\"100\" y=\"44\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">檸檬汁</text><line x1=\"130\" y1=\"50\" x2=\"130\" y2=\"68\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/><text x=\"130\" y=\"44\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">醋</text><line x1=\"250\" y1=\"50\" x2=\"250\" y2=\"68\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/><text x=\"250\" y=\"44\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">純水</text><line x1=\"310\" y1=\"50\" x2=\"310\" y2=\"68\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/><text x=\"310\" y=\"44\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">小蘇打</text><line x1=\"370\" y1=\"50\" x2=\"370\" y2=\"68\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/><text x=\"370\" y=\"44\" font-size=\"9\" text-anchor=\"middle\" fill=\"#0f2744\">氨水</text><text x=\"115\" y=\"118\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#b91c1c\">← 酸性 (pH&lt;7)</text><text x=\"250\" y=\"118\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#15803d\">中性 7</text><text x=\"390\" y=\"118\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#0a7ea4\">鹼性 (pH&gt;7) →</text></svg>\n<table class=\"tbl\">\n<tr><th></th><th>酸性 (25°C)</th><th>中性</th><th>鹼性</th></tr>\n<tr><td>pH</td><td>&lt; 7</td><td>= 7</td><td>&gt; 7</td></tr>\n<tr><td>[H⁺] vs [OH⁻]</td><td>[H⁺] &gt; [OH⁻]</td><td>相等</td><td>[H⁺] &lt; [OH⁻]</td></tr>\n<tr><td>石蕊</td><td>變紅</td><td>不變</td><td>變藍</td></tr>\n<tr><td>酚酞</td><td>無色</td><td>無色</td><td>變紅</td></tr>\n</table>\n<p><b>酸性強弱看 pH</b>：pH 愈小、[H⁺]愈大、酸性愈強。pH 每差 1 → [H⁺] 差 10 倍。</p>\n</div>\n\n<div class=\"concept\">\n<h3>④ 中和與稀釋計算</h3>\n<p><b>中和：</b> 強酸＋強鹼 → 鹽＋水。先比 mol 找出過量者，再算剩餘 [H⁺] 或 [OH⁻]。<br>\n例：0.1M×45mL HCl 與 0.1M×55mL NaOH → NaOH 多 0.001 mol，總體積 0.1 L → [OH⁻]=0.01 → pOH=2 → <b>pH=12</b>。</p>\n<svg viewBox=\"0 0 430 185\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:420px;display:block;margin:12px auto;font-family:inherit\"><line x1=\"40\" y1=\"150\" x2=\"290\" y2=\"150\" stroke=\"#0f2744\" stroke-width=\"1.5\"/><rect x=\"80\" y=\"60\" width=\"48\" height=\"90\" fill=\"#b91c1c\" opacity=\"0.8\" rx=\"2\"/><text x=\"104\" y=\"52\" font-size=\"10\" text-anchor=\"middle\" fill=\"#b91c1c\" font-weight=\"700\">HCl(H⁺)</text><text x=\"104\" y=\"166\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">0.0045 mol</text><rect x=\"200\" y=\"40\" width=\"48\" height=\"110\" fill=\"#0a7ea4\" opacity=\"0.85\" rx=\"2\"/><text x=\"224\" y=\"32\" font-size=\"10\" text-anchor=\"middle\" fill=\"#0a7ea4\" font-weight=\"700\">NaOH(OH⁻)</text><text x=\"224\" y=\"166\" font-size=\"9\" text-anchor=\"middle\" fill=\"#555\">0.0055 mol</text><line x1=\"128\" y1=\"60\" x2=\"200\" y2=\"60\" stroke=\"#15803d\" stroke-dasharray=\"3 3\"/><rect x=\"200\" y=\"40\" width=\"48\" height=\"20\" fill=\"none\" stroke=\"#15803d\" stroke-width=\"2\"/><text x=\"355\" y=\"70\" font-size=\"10\" fill=\"#15803d\" font-weight=\"700\">NaOH 過量</text><text x=\"355\" y=\"86\" font-size=\"10\" fill=\"#15803d\">0.001 mol</text><text x=\"355\" y=\"112\" font-size=\"9\" fill=\"#0f2744\">[OH⁻]=0.001/0.1</text><text x=\"355\" y=\"126\" font-size=\"9\" fill=\"#0f2744\">=0.01 → pOH=2</text><text x=\"355\" y=\"145\" font-size=\"12\" fill=\"#b91c1c\" font-weight=\"700\">pH = 12</text><text x=\"165\" y=\"180\" font-size=\"9\" fill=\"#888\" text-anchor=\"middle\">先比 mol 找過量者，再算剩餘濃度</text></svg>\n<p><b>稀釋：</b> 加水稀釋「酸」時 pH 上升但<b>趨近 7 而不會超過 7</b>（稀釋「鹼」時 pH 下降但不會低於 7）。</p>\n</div>\n<div class=\"eg\">📌 <b>學測對照</b>：112（牛乳 pH→[H⁺]倍數，log2 換算）、114（解離與電解質）、109（強酸強鹼混合 pH）都對應本節——示範題第 23、24 題即取自學測。</div>\n"};
const QDB=[{"tid": "conc", "q": "在森林中可觀察到陽光穿過樹叢形成明顯的「光徑」（廷得耳效應）。據此判斷該處空氣中的分散系屬於下列何者？其成因為何？", "opts": ["膠體溶液；膠體粒子使光線散射", "真溶液；空氣分子碰撞溶質粒子", "懸浮液；溶質粒子折射光線", "膠體溶液；溶質粒子互相碰撞"], "ans": 0, "exp": "廷得耳效應是<b>膠體粒子</b>（直徑約 1–100 nm）對光的<b>散射</b>，使光行進路徑清楚可見，故屬膠體溶液。真溶液粒子太小不散射、懸浮液會沉降。"}, {"tid": "conc", "q": "下列何者屬於膠體溶液？", "opts": ["0.1 M 蔗糖水", "拿鐵咖啡（牛奶與咖啡混合）", "醋", "食鹽水"], "ans": 1, "exp": "牛奶、豆漿、雲霧、拿鐵等為<b>膠體溶液</b>（粒子 1–100 nm，有廷得耳效應）；食鹽水、醋、蔗糖水為真溶液（粒子<1 nm）；泥漿則屬懸浮液。"}, {"tid": "conc", "q": "比較三種分散系中分散粒子的大小：甲＝膠體粒子、乙＝真溶液溶質粒子、丙＝懸浮粒子，下列何者正確？", "opts": ["乙＞甲＞丙", "丙＞甲＞乙", "甲＞乙＞丙", "丙＞乙＞甲"], "ans": 1, "exp": "粒子大小：懸浮粒子（>100 nm，丙）＞膠體粒子（1–100 nm，甲）＞真溶液溶質粒子（<1 nm，乙），故 <b>丙＞甲＞乙</b>。"}, {"tid": "conc", "q": "欲精確配製 0.1 M 過錳酸鉀水溶液 100 毫升，下列何種玻璃器材最適合用來「準確定容」至 100 mL？", "opts": ["燒杯", "量瓶（容量瓶）", "錐形瓶", "圓底燒瓶"], "ans": 1, "exp": "燒杯、錐形瓶、圓底燒瓶的刻度僅供概估；要準確定容到指定體積必須用<b>量瓶（容量瓶）</b>，加水至頸部刻度線。"}, {"tid": "conc", "q": "取 15 克食鹽溶於 135 克水中完全溶解，所得食鹽水的重量百分濃度為多少？", "opts": ["10%", "11%", "15%", "13.5%"], "ans": 0, "exp": "重量百分濃度＝溶質/<b>溶液</b>×100%＝15/(15+135)×100%＝15/150×100%＝<b>10%</b>。注意分母是溶液總質量，不是水的質量。"}, {"tid": "conc", "q": "取 2 克氫氧化鈉固體完全溶解後，配成體積為 200 毫升的水溶液，其體積莫耳濃度為多少？（NaOH 莫耳質量＝40）", "opts": ["0.10 M", "0.15 M", "0.20 M", "0.25 M"], "ans": 3, "exp": "莫耳數＝2/40＝0.05 mol；體積＝0.2 L；M＝0.05/0.2＝<b>0.25 M</b>。"}, {"tid": "conc", "q": "某品牌咖啡飲品咖啡因濃度為 500 ppm。若成人每日咖啡因建議上限為 300 毫克，則每日最多可飲用多少毫升此飲品？（飲品密度視為 1 g/mL）", "opts": ["1000 mL", "300 mL", "600 mL", "500 mL"], "ans": 2, "exp": "500 ppm＝每 1 克溶液含 500×10⁻⁶ 克＝0.5 mg 咖啡因；密度 1 → 每 mL 含 0.5 mg。300 mg÷0.5 mg/mL＝<b>600 mL</b>。"}, {"tid": "conc", "q": "取 0.2 M、100 毫升蔗糖水溶液 A，與 0.1 M、400 毫升蔗糖水溶液 B 混合（體積具加成性），混合後蔗糖的體積莫耳濃度為多少？", "opts": ["0.15 M", "0.12 M", "0.10 M", "0.16 M"], "ans": 1, "exp": "莫耳總數＝0.2×0.1＋0.1×0.4＝0.02＋0.04＝0.06 mol；總體積＝0.1＋0.4＝0.5 L；M＝0.06/0.5＝<b>0.12 M</b>。"}, {"tid": "conc", "q": "欲以「重量百分濃度 98%、比重 1.8」的濃硫酸，配製 1 M 稀硫酸 500 毫升，須量取多少毫升的濃硫酸？（H₂SO₄ 莫耳質量＝98）", "opts": ["約 49.0 mL", "約 98.0 mL", "約 14.2 mL", "約 27.8 mL"], "ans": 3, "exp": "濃硫酸體積莫耳濃度＝(1000×1.8×0.9 b>降溫時 KNO₃ 大量析出、NaCl 仍留在溶液</b>，可用冷卻結晶＋過濾分離；再結晶純化 KNO₃ 須用隨溫度大幅改變溶解度的溶劑（水），汽油不溶 KNO₃；NaCl 宜用蒸發結晶。"}, {"tid": "solub", "q": "已知 60℃ 時硝酸鉀的溶解度為 110 克/100 克水。下列「硝酸鉀：水」組合在 60℃ 完全混合後，何者為「未飽和溶液」？", "opts": ["140 克 KNO₃：100 克水", "90 克 KNO₃：80 克水", "75 克 KNO₃：50 克水", "50 克 KNO₃：50 克水"], "ans": 3, "exp": "60℃ 每 100 克水可溶 110 克。B：50 克水飽和需 110×0.5＝55 克，僅放 50 克(<55)→<b>未飽和</b>。A 需 110、C 需 88、D 需 55 克，放入量都超過 → 皆飽和（有未溶固體）。"}, {"tid": "solub", "q": "在 50℃ 配好一杯硝酸鉀飽和溶液後，緩慢降溫到 20℃，且無晶種、無擾動，發現沒有固體析出。此時 20℃ 的溶液最可能為下列何者？", "opts": ["未飽和溶液", "膠體溶液", "過飽和溶液", "飽和溶液"], "ans": 2, "exp": "降溫後溶解度下降，溶液所含溶質已超過該溫度的飽和量卻未析出，屬<b>過飽和溶液</b>（不穩定，受擾動或加晶種即析出）。"}, {"tid": "acid", "q": "已知 25℃ 時 Kw＝1.0×10⁻¹⁴，80℃ 時 Kw＝25×10⁻¹⁴。則 80℃ 純水的氫離子濃度約為 25℃ 純水的多少倍？", "opts": ["7 倍", "12 倍", "25 倍", "5 倍"], "ans": 3, "exp": "純水 [H⁺]＝√Kw。25℃：√(1.0×10⁻¹⁴)＝10⁻⁷；80℃：√(25×10⁻¹⁴)＝5×10⁻⁷。比值＝<b>5 倍</b>。"}, {"tid": "acid", "q": "下列何者為「酸性水溶液」的性質（25℃）？", "opts": ["pH 值小於 7", "以紅色石蕊試紙檢驗會變藍色", "以酚酞檢驗呈紅色", "pH＞pOH"], "ans": 0, "exp": "酸性溶液 25℃ 時 <b>pH＜7</b>、[H⁺]＞[OH⁻]、pH＜pOH；使藍色石蕊變紅、使酚酞保持無色（鹼性才使酚酞變紅）。"}, {"tid": "acid", "q": "下列水溶液中，何者「酸性最強」？", "opts": ["pH＝4 的磷酸", "pH＝2 的檸檬汁", "pH＝9 的氨水", "pH＝3 的鹽酸"], "ans": 1, "exp": "pH 愈小、[H⁺]愈大、酸性愈強。pH＝2 的 [H⁺]＝10⁻² M 最高，故<b>檸檬汁酸性最強</b>；pH＝9 為鹼性。"}, {"tid": "acid", "q": "下列有關 Kw 與 pH 的敘述，何者「錯誤」？", "opts": ["任何溫度下，pH＝−log[H⁺]", "對任何酸性水溶液，[H⁺]＞[OH⁻]", "任何溫度下，Kw＝[H⁺][OH⁻]", "任何溫度下，純水的 pH 一定等於 7"], "ans": 3, "exp": "純水恆有 [H⁺]＝[OH⁻]（中性），但 Kw 隨溫度改變，故純水 pH 僅在 25℃ 等於 7；高溫時 Kw 變大，純水 pH＜7 但<b>仍為中性</b>。其餘三項皆正確。"}, {"tid": "acid", "q": "〔112學測〕市售牛乳的 pH 為 6.6，乳酪凝聚始於 pH 5.3。試問牛乳的氫離子濃度需改變多少，乳酪才開始凝聚？（log2＝0.30）", "opts": ["增加約 13%", "增加約 20 倍", "減少約 10%", "減少約 10 倍"], "ans": 1, "exp": "pH 由 6.6 降到 5.3，ΔpH＝1.3，[H⁺] 變為原來的 10^1.3 倍。10^1.3＝10×10^0.3＝10×2＝<b>20 倍</b>（[H⁺]增加約20倍）。pH 下降代表酸性增強、[H⁺]上升。"}, {"tid": "acid", "q": "〔結合114學測〕關於阿瑞尼斯酸鹼與電解質解離，下列(甲)~(丁)敘述：(甲)NH₃ 溶於水可解離出 OH⁻ 為鹼；(乙)HCl 與 KOH 溶於水皆完全解離，為強電解質；(丙)HF 溶於水會完全解離；(丁)C₂H₅OH 溶於水會解離出 H⁺ 為酸。正確的有哪些？", "opts": ["甲、乙、丙", "只有乙", "甲、乙、丁", "甲、乙"], "ans": 3, "exp": "(甲)正確：NH₃ 溶於水生成 NH₄⁺＋OH⁻，是阿瑞尼斯鹼。(乙)正確：HCl 強酸、KOH 強鹼，水中<b>完全解離</b>為強電解質。(丙)錯：HF 為<b>弱酸</b>僅部分解離。(丁)錯：乙醇為<b>中性非電解質</b>，不解離出 H⁺。故正確為甲、乙。"}, {"tid": "acid", "q": "25℃ 下，將 0.1 M、45 mL 鹽酸與 0.1 M、55 mL 氫氧化鈉混合（HCl＋NaOH→NaCl＋H₂O，體積具加成性），混合後溶液的 pH 值為多少？", "opts": ["2", "1", "12", "13"], "ans": 2, "exp": "HCl＝0.1×0.045＝0.0045 mol；NaOH＝0.1×0.055＝0.0055 mol。NaOH 過量 0.001 mol，總體積 0.1 L → [OH⁻]＝0.001/0.1＝10⁻² M → pOH＝2 → <b>pH＝12</b>。"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
</html>
