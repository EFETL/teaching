<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f2744;--gold:#e8a000;--teal:#0a7ea4;--green:#15803d;--red:#b91c1c;--bg:#f0f4f9;--border:#dde3ed}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}
header h1{font-size:1.4rem;font-weight:800}
header p{margin-top:5px;font-size:.82rem;opacity:.88}
.back{display:inline-block;margin-top:10px;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 14px;font-size:.78rem;text-decoration:none}
#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}
.si span.val{font-weight:700;font-size:.95rem}
#ptbar{height:5px;background:rgba(255,255,255,.2);width:160px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}
.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.q-hd h2{font-size:.92rem;font-weight:700;color:var(--navy)}
.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}
</style>

<script>
const TOPICS=[{"id": "conc", "icon": "🧪", "name": "溶液與濃度"}, {"id": "solub", "icon": "🌡️", "name": "溶解度"}, {"id": "acid", "icon": "⚗️", "name": "酸鹼反應"}];
const NOTES={};
const QDB=[{"tid": "conc", "q": "將15克食鹽完全溶於135克水中，所得溶液的重量百分濃度為何？", "opts": ["9%", "11.1%", "15%", "10%"], "ans": 3, "exp": "重量%=溶質÷溶液×100%，分母為溶液總重(溶質+溶劑)=15+135=150克。(P.44)<b>15÷150×100%=10%</b>。若誤把分母當成水的重量135，會算成15÷135=11.1%(誘答)。"}, {"tid": "conc", "q": "取2克NaOH(莫耳質量40)溶於水配成200mL溶液，其體積莫耳濃度為何？", "opts": ["0.05M", "0.5M", "0.25M", "0.1M"], "ans": 2, "exp": "先求mol：2÷40=0.05mol。體積200mL=0.2L。(P.45)<b>M=0.05÷0.2=0.25M</b>。若忘記換成升、用0.05÷200會錯。"}, {"tid": "conc", "q": "濃硫酸重量%為98%、比重1.8，H2SO4莫耳質量98，此濃硫酸的體積莫耳濃度約為何？", "opts": ["36M", "9M", "1.8M", "18M"], "ans": 3, "exp": "濃溶液M=(1000×比重×重量%)÷莫耳質量。(P.46)<b>(1000×1.8×0.98)÷98=18M</b>。"}, {"tid": "conc", "q": "將0.2M的鹽酸100mL與0.1M的鹽酸400mL混合(體積具加成性)，混合後濃度為何？", "opts": ["0.15M", "0.06M", "0.12M", "0.3M"], "ans": 2, "exp": "各溶液mol相加：0.2×0.1=0.02mol、0.1×0.4=0.04mol，共0.06mol。總體積=0.1+0.4=0.5L。(P.47)<b>0.06÷0.5=0.12M</b>。"}, {"tid": "conc", "q": "欲將12M的鹽酸稀釋成3M，需取12M鹽酸50mL加水稀釋至多少mL？", "opts": ["150mL", "600mL", "200mL", "100mL"], "ans": 2, "exp": "稀釋公式M1V1=M2V2。(P.47)12×50=3×V2，<b>V2=600÷3=200mL</b>。"}, {"tid": "conc", "q": "某飲料含糖量為500ppm，密度視為1g/mL，則每100mL飲料中含糖多少毫克？", "opts": ["500mg", "0.5mg", "5mg", "50mg"], "ans": 3, "exp": "1ppm≈1mg/L，500ppm=500mg/L。密度1，100mL=100g=0.1L。(P.45)<b>500mg/L×0.1L=50mg</b>。或每mL含0.5mg，100mL=50mg。"}, {"tid": "conc", "q": "將9克葡萄糖(莫耳質量180)溶於水配成500mL水溶液，其體積莫耳濃度為何？", "opts": ["0.1M", "0.18M", "0.2M", "0.05M"], "ans": 0, "exp": "mol=9÷180=0.05mol。體積0.5L。(P.45)<b>M=0.05÷0.5=0.1M</b>。"}, {"tid": "conc", "q": "40克NaOH(莫耳質量40)溶於水配成2L溶液，再取其中100mL，此100mL中含NaOH幾莫耳？", "opts": ["0.05mol", "0.5mol", "0.02mol", "0.1mol"], "ans": 0, "exp": "原液M=(40÷40)÷2=0.5M。取100mL=0.1L。(P.45)<b>mol=0.5×0.1=0.05mol</b>。"}, {"tid": "conc", "q": "將KNO3(莫耳質量101)配成0.5M水溶液400mL，需取KNO3多少克？", "opts": ["40.4克", "5.05克", "10.1克", "20.2克"], "ans": 3, "exp": "mol=0.5×0.4=0.2mol。質量=mol×莫耳質量。(P.45)<b>0.2×101=20.2克</b>。"}, {"tid": "conc", "q": "將25克NaCl溶於75克水中，所得溶液重量百分濃度為何？", "opts": ["25%", "30%", "33.3%", "20%"], "ans": 0, "exp": "溶液總重=25+75=100克。(P.44)<b>25÷100×100%=25%</b>。若用25÷75=33.3%則是把分母誤當水重。"}, {"tid": "conc", "q": "濃度18M的硫酸，取10mL稀釋至600mL，稀釋後濃度約為何？", "opts": ["1.8M", "3M", "0.5M", "0.3M"], "ans": 3, "exp": "M1V1=M2V2。(P.47)18×10=M2×600，<b>M2=180÷600=0.3M</b>。"}, {"tid": "conc", "q": "某溶液100mL含NaCl 5.85克(莫耳質量58.5)，其體積莫耳濃度為何？", "opts": ["1M", "2M", "0.5M", "0.1M"], "ans": 0, "exp": "mol=5.85÷58.5=0.1mol。體積0.1L。(P.45)<b>M=0.1÷0.1=1M</b>。"}, {"tid": "conc", "q": "工業用氨水重量%為25%、比重0.9，NH3莫耳質量17，此氨水體積莫耳濃度約為何？", "opts": ["11.9M", "13.2M", "6.6M", "25M"], "ans": 1, "exp": "M=(1000×比重×重量%)÷莫耳質量。(P.46)<b>(1000×0.9×0.25)÷17≈13.2M</b>。"}, {"tid": "conc", "q": "將0.3M的KNO3溶液200mL與純水300mL混合(體積加成)，混合後濃度為何？", "opts": ["0.06M", "0.18M", "0.15M", "0.12M"], "ans": 3, "exp": "KNO3的mol=0.3×0.2=0.06mol，加水後mol不變。總體積0.2+0.3=0.5L。(P.47)<b>0.06÷0.5=0.12M</b>。"}, {"tid": "conc", "q": "某重量%為36%、比重1.18的濃鹽酸，HCl莫耳質量36.5，其體積莫耳濃度約為何？", "opts": ["11.6M", "23.3M", "10.6M", "3.6M"], "ans": 0, "exp": "M=(1000×比重×重量%)÷莫耳質量。(P.46)<b>(1000×1.18×0.36)÷36.5≈11.6M</b>。"}, {"tid": "conc", "q": "將0.4M的H2SO4 50mL與0.1M的H2SO4 150mL混合(體積加成)，混合後濃度為何？", "opts": ["0.25M", "0.15M", "0.2M", "0.175M"], "ans": 3, "exp": "mol相加：0.4×0.05=0.02、0.1×0.15=0.015，共0.035mol。總體積0.05+0.15=0.2L。(P.47)<b>0.035÷0.2=0.175M</b>。"}, {"tid": "conc", "q": "100克重量%為20%的食鹽水中，含食鹽多少克？又含水多少克？", "opts": ["鹽16克、水84克", "鹽20克、水100克", "鹽20克、水80克", "鹽25克、水75克"], "ans": 2, "exp": "重量%以溶液為分母。(P.44)鹽=100×20%=20克，水=溶液−溶質=100−20=<b>80克</b>。"}, {"tid": "solub", "q": "某鹽在20°C的溶解度為30(g/100g水)，則在20°C時150克水最多可溶解此鹽多少克？", "opts": ["30克", "60克", "45克", "20克"], "ans": 2, "exp": "溶解度=每100克水可溶最大克數，依水量比例。(P.49)<b>30×(150/100)=45克</b>。"}, {"tid": "solub", "q": "某鹽溶解度為40(g/100g水)時，其飽和溶液的重量百分濃度為何？", "opts": ["28.6%", "71.4%", "60%", "40%"], "ans": 0, "exp": "飽和重量%=溶解度÷(溶解度+100)×100%。(P.50)<b>40÷140×100%≈28.6%</b>。分母是飽和溶液重(溶質+100水)。"}, {"tid": "solub", "q": "KNO3在60°C溶解度為110、20°C為32(g/100g水)。將60°C含100克水的飽和KNO3溶液冷卻到20°C，析出KNO3多少克？", "opts": ["110克", "142克", "78克", "32克"], "ans": 2, "exp": "60°C含100克水溶110克，降至20°C只能溶32克。(P.51)析出=110−32=<b>78克</b>。"}, {"tid": "solub", "q": "某鹽40°C溶解度為64(g/100g水)，取40°C飽和溶液164克，蒸乾後可得固體多少克？", "opts": ["100克", "39克", "82克", "64克"], "ans": 3, "exp": "40°C飽和溶液每164克中含溶質64克、水100克。(P.50)取164克剛好是這個比例，蒸乾得溶質<b>64克</b>。"}, {"tid": "solub", "q": "某鹽20°C溶解度為25(g/100g水)。取此鹽30克加入20°C水100克中充分攪拌，最多溶解多少克？剩下未溶多少克？", "opts": ["溶25克、剩5克", "溶20克、剩10克", "溶30克、剩0克", "溶25克、剩30克"], "ans": 0, "exp": "100克水最多溶25克(達飽和)。(P.49)加入30克只能溶<b>25克</b>，剩30−25=5克未溶沉底。"}, {"tid": "solub", "q": "取某飽和溶液120克，蒸乾後得固體溶質20克，則此溫度下該鹽的溶解度為何？", "opts": ["16.7", "25", "20", "24"], "ans": 2, "exp": "揮發法：溶質=20克，水=溶液−溶質=120−20=100克。溶解度=溶質÷水×100。(P.52)<b>20÷100×100=20</b>。"}, {"tid": "solub", "q": "某鹽溶解度為60(g/100g水)，欲配製此溫度的飽和溶液320克，需鹽與水各多少克？", "opts": ["鹽60克、水260克", "鹽160克、水160克", "鹽100克、水220克", "鹽120克、水200克"], "ans": 3, "exp": "飽和比例：溶質60：水100：溶液160。320克是160的2倍。(P.50)鹽=60×2=<b>120克</b>，水=100×2=200克。"}, {"tid": "solub", "q": "NaCl在各溫度溶解度幾乎不變，約36(g/100g水)。將含200克水的NaCl飽和溶液蒸發掉50克水(溫度不變)，析出NaCl多少克？", "opts": ["9克", "72克", "36克", "18克"], "ans": 3, "exp": "NaCl溶解度不隨溫度變，析出靠蒸發水。蒸發50克水，少溶的量=36×(50/100)=<b>18克</b>。(P.51)"}, {"tid": "solub", "q": "某鹽溶解度38.5(g/100g水)，其飽和溶液重量百分濃度約為何？", "opts": ["27.8%", "72.2%", "38.5%", "26.0%"], "ans": 0, "exp": "飽和重量%=溶解度÷(溶解度+100)×100%。(P.50)<b>38.5÷138.5×100%≈27.8%</b>。"}, {"tid": "solub", "q": "KNO3在40°C溶解度64、26°C溶解度40(g/100g水)。取40°C含50克水的飽和溶液冷卻到26°C，析出KNO3多少克？", "opts": ["12克", "32克", "24克", "64克"], "ans": 0, "exp": "先按50克水比例：40°C可溶64×0.5=32克，26°C可溶40×0.5=20克。(P.51)析出=32−20=<b>12克</b>。"}, {"tid": "solub", "q": "取某鹽飽和溶液250克，已知此溫度溶解度為25(g/100g水)，此飽和溶液中含溶質多少克？", "opts": ["62.5克", "100克", "25克", "50克"], "ans": 3, "exp": "飽和比例溶質25：水100：溶液125。250克是125的2倍。(P.50)溶質=25×2=<b>50克</b>。"}, {"tid": "solub", "q": "某鹽60°C溶解度110、20°C溶解度32(g/100g水)。將60°C含200克水的飽和溶液冷卻到20°C，析出多少克？", "opts": ["78克", "156克", "220克", "110克"], "ans": 1, "exp": "按200克水比例：60°C溶110×2=220克，20°C溶32×2=64克。(P.51)析出=220−64=<b>156克</b>。"}, {"tid": "solub", "q": "氣體溶解度的變化趨勢，下列敘述何者正確？", "opts": ["溫度升高溶解度變小、壓力增大溶解度變大", "溫度與壓力都不影響氣體溶解度", "溫度升高且壓力增大都使溶解度變大", "溫度升高溶解度變大、壓力增大溶解度變小"], "ans": 0, "exp": "氣體溶於水通常放熱，升溫使氣體逸出、溶解度變小；加壓使更多氣體溶入、溶解度變大(亨利定律)。(P.53)故正確為<b>升溫變小、加壓變大</b>。汽水開瓶氣泡冒出即此理。"}, {"tid": "solub", "q": "某鹽20°C溶解度為20(g/100g水)。將40克此鹽加入20°C的60克水中，最多溶解多少克？", "opts": ["20克", "40克", "12克", "24克"], "ans": 2, "exp": "60克水最多溶=20×(60/100)=12克。(P.49)加入40克遠超過，只溶<b>12克</b>，其餘28克未溶。"}, {"tid": "solub", "q": "已知某鹽飽和溶液的重量百分濃度為20%，則此溫度下該鹽的溶解度為何？", "opts": ["80", "25", "16.7", "20"], "ans": 1, "exp": "設溶解度S，飽和重量%=S÷(S+100)=0.2。(P.50)S=0.2S+20，0.8S=20，<b>S=25</b>。即每100克水溶25克。"}, {"tid": "solub", "q": "某固體溶解度隨溫度升高而增大，這代表此固體溶解於水時為何種熱反應？", "opts": ["無法判斷", "吸熱反應", "放熱反應", "不吸熱也不放熱"], "ans": 1, "exp": "升溫使溶解度增大，依勒沙特列原理升溫有利吸熱方向，故溶解過程為<b>吸熱反應</b>。(P.53)多數固體鹽屬此類；Ce2(SO4)3則相反為放熱。"}, {"tid": "solub", "q": "取100克水，加入某鹽至飽和共溶130克，蒸發掉一半水(50克)後再回到原溫度，析出溶質多少克？", "opts": ["30克", "65克", "15克", "13克"], "ans": 2, "exp": "100克水溶30克(溶解度30)。蒸發50克水後只剩50克水，可溶30×0.5=15克。(P.51)析出=30−15=<b>15克</b>。註：溶液130克中溶質30克。"}, {"tid": "acid", "q": "25°C下某水溶液[H+]=1×10⁻³M，其pH值為何？", "opts": ["−3", "3", "10", "11"], "ans": 1, "exp": "pH=−log[H+]=−log(10⁻³)。(P.55)<b>pH=3</b>。此為酸性溶液。"}, {"tid": "acid", "q": "25°C下某溶液[OH⁻]=1×10⁻²M，其pH值為何？", "opts": ["2", "12", "10", "7"], "ans": 1, "exp": "pOH=−log(10⁻²)=2。25°C時pH+pOH=14。(P.56)<b>pH=14−2=12</b>。為鹼性。"}, {"tid": "acid", "q": "25°C下0.01M的鹽酸(完全解離)，其pH值為何？", "opts": ["1", "2", "12", "0.01"], "ans": 1, "exp": "HCl完全解離，[H+]=0.01=10⁻²M。(P.55)<b>pH=−log(10⁻²)=2</b>。"}, {"tid": "acid", "q": "25°C下0.005M的H2SO4(視為完全解離出2個H+)，其[H+]為何？", "opts": ["0.02M", "0.01M", "0.005M", "0.0025M"], "ans": 1, "exp": "H2SO4每分子解離2個H+，[H+]=0.005×2=<b>0.01M</b>。(P.57)故pH=2。"}, {"tid": "acid", "q": "25°C下0.1M的NaOH溶液(完全解離)，其pH值為何？", "opts": ["1", "12", "11", "13"], "ans": 3, "exp": "[OH⁻]=0.1=10⁻¹M，pOH=1。25°C pH+pOH=14。(P.56)<b>pH=14−1=13</b>。"}, {"tid": "acid", "q": "已知log2=0.30。25°C下[H+]=2×10⁻⁴M的溶液，其pH值約為何？", "opts": ["3.7", "4.0", "3.3", "4.3"], "ans": 0, "exp": "pH=−log(2×10⁻⁴)=−(log2+log10⁻⁴)=−(0.30−4)=4−0.30。(P.55)<b>pH≈3.7</b>。"}, {"tid": "acid", "q": "25°C下某溶液pH=5，另一溶液pH=3，則pH=3溶液的[H+]是pH=5溶液的幾倍？", "opts": ["1000倍", "10倍", "2倍", "100倍"], "ans": 3, "exp": "pH每差1，[H+]差10倍。pH由5變3差2，[H+]差10²=<b>100倍</b>。(P.55)pH愈小酸性愈強。"}, {"tid": "acid", "q": "25°C下將pH=3的鹽酸稀釋10倍，稀釋後的pH值為何？", "opts": ["2", "4", "3", "7"], "ans": 1, "exp": "稀酸[H+]除以稀釋倍率：10⁻³÷10=10⁻⁴。(P.56)<b>pH=4</b>。稀釋使酸性變弱，但稀酸pH不超過7。"}, {"tid": "acid", "q": "25°C下0.1M HCl共45mL與0.1M NaOH共55mL混合(體積加成)，混合後溶液的pH值為何？", "opts": ["12", "2", "11", "7"], "ans": 0, "exp": "HCl=0.1×0.045=0.0045mol、NaOH=0.1×0.055=0.0055mol。NaOH過量0.001mol，總體積0.1L。[OH⁻]=0.001÷0.1=0.01=10⁻²，pOH=2。(P.57)<b>pH=12</b>。"}, {"tid": "acid", "q": "25°C下0.2M HCl 100mL與0.2M NaOH 100mL完全混合(等濃等體積)，混合後pH值為何？", "opts": ["2", "7", "13", "1"], "ans": 1, "exp": "HCl與NaOH各0.02mol，恰好完全中和生成NaCl與水。(P.57)強酸強鹼等量中和，溶液呈中性，25°C時<b>pH=7</b>。"}, {"tid": "acid", "q": "已知純水在60°C時Kw=10×10⁻¹⁴。則60°C純水的[H+]為何？", "opts": ["10⁻¹⁴M", "10×10⁻⁷M", "10⁻⁷M", "√10×10⁻⁷M"], "ans": 3, "exp": "純水中[H+]=[OH⁻]=√Kw。Kw=10×10⁻¹⁴=10⁻¹³。(P.55)<b>[H+]=√(10⁻¹³)=√10×10⁻⁷M</b>，大於10⁻⁷，故60°C純水[H+]較高(但仍中性)。"}, {"tid": "acid", "q": "已知log3=0.48。25°C下[OH⁻]=3×10⁻³M的溶液，其pH值約為何？", "opts": ["11.0", "11.5", "12.0", "2.5"], "ans": 1, "exp": "pOH=−log(3×10⁻³)=−(0.48−3)=3−0.48=2.52。(P.56)25°C時pH=14−2.52≈<b>11.5</b>。"}, {"tid": "acid", "q": "25°C下將0.01M NaOH溶液稀釋100倍，稀釋後的pH值最接近下列何者？", "opts": ["10", "7", "12", "8"], "ans": 0, "exp": "原[OH⁻]=10⁻²，稀釋100倍→10⁻⁴，pOH=4，pH=14−4=10。(P.56)稀鹼pH隨稀釋下降但不會低於7，<b>pH≈10</b>仍合理為鹼性。"}, {"tid": "acid", "q": "25°C下0.1M HCl 30mL與0.1M NaOH 20mL混合(體積加成)，混合後pH值最接近何者？", "opts": ["7", "12", "1", "2"], "ans": 3, "exp": "HCl=0.1×0.03=0.003mol、NaOH=0.1×0.02=0.002mol。HCl過量0.001mol，總體積0.05L。[H+]=0.001÷0.05=0.02M，pH=−log0.02≈1.7，最接近<b>2</b>。(P.57)"}, {"tid": "acid", "q": "關於純水的Kw，下列敘述何者正確？", "opts": ["Kw=[H+]+[OH⁻]", "Kw固定為10⁻¹⁴，不隨溫度改變", "溫度升高時Kw變大，因水的解離為吸熱反應", "升溫時純水變為酸性，pH小於7且不中性"], "ans": 2, "exp": "水的解離為吸熱，升溫Kw增大(0°C 0.13×10⁻¹⁴、60°C 10×10⁻¹⁴)。(P.55)Kw=[H+][OH⁻]為乘積非加總。升溫純水[H+]雖升高但仍等於[OH⁻]，<b>維持中性</b>，只是pH<7。故僅選項1正確。"}, {"tid": "conc", "q": "取重量%為10%的糖水200克與重量%為30%的糖水300克混合，混合後重量百分濃度為何？", "opts": ["18%", "20%", "22%", "25%"], "ans": 2, "exp": "各溶液糖重相加：200×10%=20克、300×30%=90克，共110克糖。總溶液重=200+300=500克。(P.44)<b>110÷500×100%=22%</b>。"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
