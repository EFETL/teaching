<script>
const TOPICS=[{"id": "mol", "icon": "🧪", "name": "生命的化學組成"}, {"id": "cell", "icon": "🔬", "name": "細胞構造與運輸"}, {"id": "enz", "icon": "⚙️", "name": "酵素"}, {"id": "fate", "icon": "🌱", "name": "細胞分化與命運"}];
const NOTES={};
const QDB=[{"tid": "mol", "q": "糖尿病患者注射的胰島素若用基因工程讓酵母菌或細菌大量生產（如103學測情境）。下列關於胰島素本質與生產的敘述，何者正確？", "opts": ["胰島素是蛋白質，由胺基酸以肽鍵連接，含氮", "胰島素是多醣，由葡萄糖聚合而成", "胰島素是脂質，可直接被細胞膜溶解吸收", "胰島素是核酸，含磷不含氮"], "ans": 0, "exp": "胰島素是<b>蛋白質類激素</b>，單體為<b>胺基酸</b>，以<b>肽鍵</b>連接，組成元素含C、H、O、<b>N</b>（部分含S）。利用基因工程把人類胰島素基因送入酵母菌或細菌，讓其轉錄轉譯出胰島素，本質仍是蛋白質。核酸含P、多醣由葡萄糖組成，皆非胰島素。"}, {"tid": "mol", "q": "葡萄糖（C6H12O6）與半乳糖（C6H12O6）的分子式完全相同但結構排列不同。關於這兩者的關係，下列何者正確？", "opts": ["兩者互為同分異構物，化學性質與生理角色可不同", "兩者分子式不同，無法比較", "兩者是同一種分子，只是名稱不同", "半乳糖是雙醣，葡萄糖是單醣"], "ans": 0, "exp": "葡萄糖與半乳糖分子式都是C6H12O6，但原子<b>排列方式不同</b>，互為<b>同分異構物</b>。同分異構物分子式相同但結構（性質）可不同，兩者皆為六碳單醣，並非同一種分子，也都不是雙醣。"}, {"tid": "mol", "q": "關於水在生物體內角色的敘述，下列何者「錯誤」？", "opts": ["水比熱大，有助於生物體維持體溫穩定", "水在細胞內可自行解離而直接提供細胞所需能量", "水是良好的溶劑，協助物質運輸", "水分子具極性，分子間可形成氫鍵"], "ans": 1, "exp": "水分子具<b>極性</b>、能形成<b>氫鍵</b>，比熱大有助恆溫，且為良好溶劑助運輸，這些都正確。但細胞的能量來源是<b>ATP水解</b>等過程，水「自行解離直接供能」是錯誤觀念，故選此項為錯誤敘述。"}, {"tid": "mol", "q": "下列(甲)三酸甘油酯　(乙)磷脂　(丙)纖維素　(丁)膽固醇，何者屬於脂質？", "opts": ["甲丙丁", "甲乙丙", "甲乙丁", "乙丙丁"], "ans": 2, "exp": "脂質包括<b>三酸甘油酯（儲能）、磷脂（膜主成分，兩親性）、固醇（如膽固醇、性激素）</b>，故甲乙丁皆為脂質。<b>纖維素（丙）是多醣</b>，由葡萄糖聚合，屬醣類而非脂質，故正確組合為甲乙丁。"}, {"tid": "mol", "q": "關於核酸的敘述，下列何者「錯誤」？", "opts": ["核酸組成元素含硫（S）但不含磷（P）", "核酸的單體是核苷酸", "DNA以去氧核糖為糖，通常為雙股", "RNA以核糖為糖，通常為單股"], "ans": 0, "exp": "核酸單體為<b>核苷酸</b>，DNA為去氧核糖雙股、RNA為核糖單股，這些都正確。核酸組成元素為C、H、O、N、<b>P</b>，<b>含磷不含硫</b>；含硫的是某些蛋白質。第四項敘述相反，故為錯誤。"}, {"tid": "mol", "q": "下列關於雙醣的敘述，何者正確？", "opts": ["蔗糖由一分子葡萄糖與一分子果糖組成", "麥芽糖由葡萄糖與半乳糖組成", "蔗糖是單醣，不需水解即可被吸收", "所有雙醣都含氮元素"], "ans": 0, "exp": "<b>蔗糖＝葡萄糖＋果糖</b>，正確。<b>麥芽糖＝葡萄糖＋葡萄糖</b>（非半乳糖）；蔗糖是雙醣，需<b>水解</b>成單醣才被吸收；醣類組成元素為C、H、O，<b>不含氮</b>，故其餘三項皆錯。"}, {"tid": "mol", "q": "關於生物體內聚合物的形成與分解，下列敘述何者正確？", "opts": ["蛋白質水解成胺基酸時會釋出水分子", "脫水與水解是完全相同的反應", "將胺基酸聚合成蛋白質需要脫去水分子（脫水）", "澱粉水解成葡萄糖不需要加水"], "ans": 2, "exp": "單體聚合成大分子（如胺基酸→蛋白質）需<b>脫去水（脫水縮合）</b>，正確。大分子分解成單體則需<b>加水（水解）</b>，故蛋白質水解、澱粉水解都需加水，不是釋出或不需水；脫水與水解方向相反，並不相同。"}, {"tid": "mol", "q": "下列關於儲存性多醣的敘述，何者正確？", "opts": ["動物以肝醣、植物以澱粉作為葡萄糖的儲存形式", "纖維素是動物主要的能量儲存物質", "澱粉與肝醣都含有大量氮原子", "肝醣的單體是胺基酸"], "ans": 0, "exp": "<b>動物以肝醣、植物以澱粉</b>儲存葡萄糖，正確。纖維素是植物細胞壁成分，並非動物儲能物質；肝醣與澱粉的單體都是<b>葡萄糖</b>，組成元素為C、H、O，<b>不含氮</b>，故其餘三項皆錯。"}, {"tid": "mol", "q": "蛋白質在生物體內有多種功能。下列(甲)催化反應的酵素　(乙)抵抗病原的抗體　(丙)運送氧氣的血紅素　(丁)構成細胞壁的纖維素，何者本質為蛋白質？", "opts": ["甲乙丙", "甲丙丁", "甲乙丁", "乙丙丁"], "ans": 0, "exp": "<b>酵素（甲）、抗體（乙）、血紅素（丙）</b>本質都是蛋白質；部分激素（如胰島素）也是蛋白質。<b>纖維素（丁）是多醣</b>，構成植物細胞壁，並非蛋白質，故正確組合為甲乙丙。"}, {"tid": "mol", "q": "關於脂質性質的敘述，下列何者正確？", "opts": ["三酸甘油酯主要功能是攜帶遺傳訊息", "磷脂具親水端與疏水端，是細胞膜的主要成分", "固醇類（如膽固醇）的單體是核苷酸", "脂質普遍易溶於水"], "ans": 1, "exp": "<b>磷脂</b>一端親水、一端疏水（兩親性），能在水中排成雙層，是<b>細胞膜主成分</b>，正確。脂質普遍<b>不溶於水</b>；膽固醇不是核苷酸聚合物；三酸甘油酯主要功能是<b>儲能</b>，遺傳訊息由核酸攜帶，故其餘皆錯。"}, {"tid": "mol", "q": "下列關於四大有機分子組成元素的敘述，何者正確？", "opts": ["蛋白質不含氮，只含C、H、O", "醣類與脂質都只含C、H、O", "核酸不含磷，只含C、H、O、N", "脂質一定含有大量氮與磷"], "ans": 1, "exp": "<b>醣類與脂質</b>的主要組成元素都是<b>C、H、O</b>，正確。蛋白質含C、H、O、<b>N</b>（部分含S）；核酸含C、H、O、N、<b>P</b>；脂質通常不含大量氮（磷脂含少量磷），故其餘三項皆錯。"}, {"tid": "mol", "q": "利用纖維素水解成葡萄糖後再發酵，可製造酒精（103學測情境）。關於此過程的化學基礎，下列敘述何者正確？", "opts": ["纖維素是核酸，水解後得到核苷酸", "纖維素是蛋白質，需先變性才能利用", "纖維素是多醣，水解後得到葡萄糖，可供發酵", "纖維素是脂質，水解後得到胺基酸"], "ans": 2, "exp": "纖維素是由<b>葡萄糖</b>聚合而成的<b>多醣</b>，經<b>水解</b>後可得到葡萄糖；葡萄糖再經微生物<b>發酵</b>可產生酒精。故纖維素不是脂質、蛋白質或核酸，水解產物為葡萄糖，第二項正確。"}, {"tid": "cell", "q": "關於海拉細胞（HeLa，源自子宮頸癌的癌細胞）能在實驗室中無限分裂的原因，下列敘述何者最恰當？", "opts": ["癌細胞端粒酶活性高，端粒不會因分裂而縮短到停止分裂", "癌細胞不需要ATP即可分裂", "癌細胞缺乏細胞核，不受基因調控", "癌細胞的DNA已被RNA取代"], "ans": 0, "exp": "正常體細胞分裂約20~50次（海佛烈克極限），因<b>端粒隨複製縮短</b>到太短而停止分裂、衰老。癌細胞（如海拉細胞）<b>端粒酶活性高</b>，能補回端粒，使端粒不縮短，因而可無限分裂。癌細胞仍有細胞核、DNA，分裂也需要ATP。"}, {"tid": "cell", "q": "胰島素由胰島細胞合成後分泌到血液中。其在細胞內的製造與分泌路徑，下列順序何者正確？", "opts": ["平滑內質網→葉綠體→細胞壁→胞吞", "高基氏體→核糖體→粒線體→簡單擴散", "核糖體→粗糙內質網→高基氏體→囊泡→胞吐", "溶體→粒線體→細胞核→胞吐"], "ans": 2, "exp": "胰島素是蛋白質，先在<b>核糖體</b>合成，送入<b>粗糙內質網</b>加工，再到<b>高基氏體</b>修飾（切割形成A、B鏈），打包成<b>囊泡</b>，最後以<b>胞吐</b>分泌到細胞外。其餘選項的胞器順序或運輸方式皆不符蛋白質分泌路徑。"}, {"tid": "cell", "q": "研究人員想找出同時含有DNA、RNA、蛋白質與磷脂質，且能自行製造部分蛋白質的胞器。下列何者符合？", "opts": ["核糖體與高基氏體", "粒線體與葉綠體", "細胞壁與液泡", "溶體與中心粒"], "ans": 1, "exp": "<b>粒線體與葉綠體</b>都有雙層膜（含磷脂質）、自身的<b>DNA與RNA</b>、以及自己的核糖體可製造部分蛋白質，故同時具備DNA、RNA、蛋白質與磷脂質。溶體、核糖體、細胞壁等不具自身DNA，不符合條件。"}, {"tid": "cell", "q": "葡萄糖進入紅血球時，需要膜上特定運輸蛋白協助，由高濃度往低濃度移動，過程不消耗ATP。此運輸方式為何？", "opts": ["胞吞作用", "簡單擴散", "促進性擴散", "主動運輸"], "ans": 2, "exp": "葡萄糖是水溶性分子，無法直接穿過磷脂雙層，需藉<b>運輸蛋白</b>協助；又是<b>順濃度梯度（高→低）且不耗ATP</b>，屬<b>促進性擴散</b>。簡單擴散不需蛋白（如O2、CO2）；主動運輸逆梯度耗ATP；胞吞用於大分子，皆不符。"}, {"tid": "cell", "q": "關於植物細胞壁的敘述，下列何者正確？", "opts": ["細胞壁能精確控制每種物質進出，與細胞膜功能相同", "細胞壁主成分是磷脂質，屬半透膜", "細胞壁主成分是纖維素，可讓多數物質通過（接近全透）", "所有植物細胞都具有次生細胞壁"], "ans": 2, "exp": "植物細胞壁主成分是<b>纖維素</b>（多醣），結構疏鬆，多數物質可通過，性質接近<b>全透</b>，並非半透膜。控制物質進出的是<b>細胞膜（半透膜）</b>。並非所有植物細胞都有次生細胞壁，故只有第二項正確。"}, {"tid": "cell", "q": "關於動物細胞與植物細胞構造比較，下列敘述何者「錯誤」？", "opts": ["動物細胞具有葉綠體可行光合作用", "動物細胞通常有中心粒，植物細胞一般沒有", "植物細胞與動物細胞都有粒線體", "植物細胞有細胞壁與葉綠體，動物細胞沒有"], "ans": 0, "exp": "植物細胞具<b>細胞壁與葉綠體</b>，動物細胞沒有；動物細胞通常有<b>中心粒</b>，植物細胞一般沒有；兩者都有<b>粒線體</b>。<b>動物細胞沒有葉綠體</b>，不能行光合作用，故第四項敘述錯誤。"}, {"tid": "cell", "q": "植物根部細胞能將土壤中濃度較低的無機鹽逆濃度梯度吸收進細胞內。此過程需要哪些條件？", "opts": ["僅靠滲透作用即可完成", "不需能量，也不需運輸蛋白", "需消耗ATP並透過運輸蛋白（主動運輸）", "屬於簡單擴散，分子直接穿過磷脂雙層"], "ans": 2, "exp": "由<b>低濃度往高濃度（逆梯度）</b>運輸物質屬<b>主動運輸</b>，需<b>消耗ATP</b>並透過膜上<b>運輸蛋白</b>。滲透只針對水的被動移動；簡單擴散與促進性擴散都是順梯度、不耗能，無法逆梯度吸收，故第三項正確。"}, {"tid": "cell", "q": "細胞膜的「流體鑲嵌模型」描述細胞膜的構造。下列關於細胞膜組成與性質的敘述，何者「錯誤」？", "opts": ["細胞膜是全透膜，任何大小物質都能自由通過", "細胞膜是半透膜，能選擇性讓物質通過", "膜上有膽固醇與用於辨識的醣類", "主要由磷脂雙層構成，其中鑲嵌蛋白質"], "ans": 0, "exp": "細胞膜為<b>磷脂雙層</b>鑲嵌蛋白質，含<b>膽固醇</b>與<b>醣類（辨識）</b>，且為<b>半透膜</b>，能選擇性讓物質通過。它<b>不是</b>全透膜，並非任何物質都能自由通過（全透的是細胞壁），故第四項錯誤。"}, {"tid": "cell", "q": "O2與CO2能直接穿過細胞膜進出細胞，且由高濃度往低濃度移動、不需運輸蛋白也不耗ATP。這種運輸方式為何？", "opts": ["胞吐作用", "主動運輸", "簡單擴散", "促進性擴散"], "ans": 2, "exp": "O2、CO2等小分子或脂溶性物質可<b>直接穿過磷脂雙層</b>，順濃度梯度移動，<b>不需運輸蛋白、不耗ATP</b>，屬<b>簡單擴散</b>。促進性擴散需運輸蛋白；主動運輸逆梯度耗能；胞吐用於大分子分泌，皆不符。"}, {"tid": "cell", "q": "分泌大量消化酵素（蛋白質）的腺體細胞，最可能特別發達的胞器組合為何？", "opts": ["粗糙內質網與高基氏體", "中心粒與液泡", "只有溶體", "葉綠體與細胞壁"], "ans": 0, "exp": "消化酵素是蛋白質，需大量在<b>核糖體＋粗糙內質網</b>合成、由<b>高基氏體</b>修飾打包後分泌，故分泌旺盛的腺體細胞這兩種胞器特別發達。葉綠體、細胞壁屬植物；中心粒與液泡、單一溶體都不符合蛋白質大量分泌的需求。"}, {"tid": "cell", "q": "關於溶體（溶小體，lysosome）的功能，下列敘述何者正確？", "opts": ["含多種水解酶，可分解老舊胞器或胞吞的物質", "是細胞合成蛋白質的主要場所", "負責製造ATP供能", "負責光合作用製造養分"], "ans": 0, "exp": "<b>溶體</b>內含多種<b>水解酶</b>，可分解細胞胞吞進來的物質或老舊、損壞的胞器（細胞內的「消化系統」）。光合作用在葉綠體、蛋白質合成在核糖體、製造ATP主要在粒線體，皆非溶體功能，故第四項正確。"}, {"tid": "cell", "q": "糖尿病患者注射胰島素後，胰島素需作用在肝、肌肉等標靶細胞，才能促進這些細胞攝取血糖。胰島素能專一作用在這些細胞，最關鍵的原因為何？", "opts": ["胰島素在血液中自行轉變成葡萄糖", "這些細胞膜上具有可與胰島素結合的受體（受器）", "這些細胞沒有細胞膜，胰島素可自由進入", "胰島素能溶解所有細胞的細胞膜"], "ans": 1, "exp": "激素具<b>專一性</b>，只能作用在膜上具有對應<b>受體（受器）</b>的<b>標靶細胞</b>。肝、肌肉細胞膜上有<b>胰島素受體</b>，胰島素與其結合後才引發攝取血糖的反應。胰島素是蛋白質，不會溶解細胞膜或在血中變成葡萄糖，故第二項正確。"}, {"tid": "cell", "q": "關於物質運輸，下列(甲)滲透　(乙)促進性擴散　(丙)簡單擴散　(丁)鈉鉀幫浦，何者「不需」消耗ATP？", "opts": ["甲乙丁", "甲乙丙", "甲丙丁", "乙丙丁"], "ans": 1, "exp": "<b>滲透（水）、促進性擴散、簡單擴散</b>都是<b>被動運輸</b>，順濃度梯度、<b>不耗ATP</b>（甲乙丙）。<b>鈉鉀幫浦（丁）</b>是<b>主動運輸</b>，逆濃度梯度、<b>需消耗ATP</b>，故不需耗能的是甲乙丙。"}, {"tid": "enz", "q": "胃蛋白酶最適pH約為2。某人因胃食道逆流大量服用制酸劑（鹼性），使胃內pH由2升高到6（111學測情境）。最可能的直接結果為何？", "opts": ["胃蛋白酶活性下降，蛋白質分解變慢", "胃蛋白酶數量大量增加", "胃蛋白酶被永久轉變成澱粉酶", "胃蛋白酶活性提高，蛋白質分解加快"], "ans": 0, "exp": "酵素在<b>最適pH</b>活性最高，偏離最適pH會使蛋白質結構改變、活性下降。胃蛋白酶最適pH約2，制酸劑使pH升到6，<b>遠離最適值</b>，活性下降、蛋白質分解變慢。酵素不會因pH改變而變成另一種酶，也不會數量增加。"}, {"tid": "enz", "q": "市售一款廚房油汙清潔劑標示「鹼性、常溫使用、含脂肪分解酶」（107學測情境）。製造商在選酵素時，最應挑選哪一種特性的脂肪分解酶？", "opts": ["只能分解澱粉的酶", "最適pH約2、需高溫的酶", "只在60℃以上才有活性的酶", "最適pH偏鹼、在常溫下仍有高活性的酶"], "ans": 3, "exp": "清潔劑使用條件是<b>鹼性、常溫</b>，要在這個環境發揮作用，就要選在<b>偏鹼pH且常溫下活性仍高</b>的脂肪分解酶。最適pH約2或需高溫者，在此鹼性常溫環境活性低；分解澱粉的酶無法分解油汙（脂肪），皆不適用。"}, {"tid": "enz", "q": "酵素能加速化學反應。關於酵素催化的原理，下列敘述何者正確？", "opts": ["酵素改變反應達平衡後的最終生成物種類", "酵素在反應後會被消耗，不能重複使用", "酵素降低反應的活化能，但不改變反應物與生成物的能量差", "酵素提供反應所需的全部能量"], "ans": 2, "exp": "酵素是催化劑，作用是<b>降低活化能</b>，讓反應更容易發生，但<b>不改變反應物與生成物之間的能量差</b>，也不提供能量。酵素反應前後本身不變，可<b>重複使用</b>，也不改變最終生成物種類，故只有第一項正確。"}, {"tid": "enz", "q": "某酵素催化反應，當受質濃度逐漸增加、酵素量固定時，反應速率的變化最可能為何？", "opts": ["受質濃度上升反應速率反而下降", "受質濃度與反應速率無關", "反應速率先隨受質濃度上升，達到飽和後趨於最大值（Vmax）不再上升", "反應速率隨受質濃度持續無限上升"], "ans": 2, "exp": "酵素量固定時，受質濃度上升初期反應速率隨之增加；但當酵素的<b>活性位被受質占滿（飽和）</b>後，再增加受質也來不及處理，速率達到<b>最大值Vmax</b>不再上升。故並非無限上升，也非下降或無關。"}, {"tid": "enz", "q": "許多酵素催化時需要輔因子（cofactor）協助。下列關於輔因子的敘述，何者「錯誤」？", "opts": ["輔因子可以是無機金屬離子，如鋅、鎂、鐵", "輔因子協助反應後通常可重複使用", "有機的輔因子（如NAD、來自維生素者）又稱為輔酶", "所有酵素都必須有輔因子才能作用"], "ans": 3, "exp": "輔因子可為無機金屬離子（鋅、鎂、鐵）或有機分子，有機者稱<b>輔酶</b>（如NAD、FAD、許多來自維生素），且可重複使用，這些都正確。但<b>並非所有酵素都需要輔因子</b>，有些酵素單靠蛋白質本身即可作用，故第三項錯誤。"}, {"tid": "enz", "q": "重金屬如鎘、汞、鉛進入人體後常造成中毒，部分原因與其影響酵素有關。下列推論何者最合理？", "opts": ["重金屬只影響DNA，不影響酵素", "重金屬可抑制酵素活性，干擾正常代謝反應", "重金屬可增強所有酵素活性，使代謝過快而中毒", "重金屬能取代酵素成為更好的催化劑"], "ans": 1, "exp": "鎘、汞、鉛等重金屬會<b>抑制酵素活性</b>（常與酵素結合改變其結構），使依賴這些酵素的代謝反應受阻，因而造成中毒。它們不是更好的催化劑，也不會增強所有酵素活性，故第二項最合理。"}, {"tid": "enz", "q": "人體唾液澱粉酶最適pH約7、胰蛋白酶最適pH約8、胃蛋白酶最適pH約2。食物從口腔經胃到小腸，下列推論何者正確？", "opts": ["胃蛋白酶適合在胃的強酸環境中作用，胰蛋白酶適合在小腸偏鹼環境作用", "唾液澱粉酶進入強酸的胃後活性反而升高", "三種酶都在pH 2時活性最高", "胃蛋白酶在小腸偏鹼環境中活性最高"], "ans": 0, "exp": "每種酶都有自己的<b>最適pH</b>。胃內強酸（約pH2）適合<b>胃蛋白酶</b>，小腸偏鹼（約pH8）適合<b>胰蛋白酶</b>。唾液澱粉酶最適pH約7，進入強酸胃中活性會下降而非升高；胃蛋白酶到偏鹼的小腸活性低，故第三項正確。"}, {"tid": "enz", "q": "少數RNA分子本身具有催化能力（核糖酶）。關於酵素本質的敘述，下列何者正確？", "opts": ["酵素都是脂質", "酵素都是無機鹽類", "絕大多數酵素是蛋白質，但少數RNA也具催化能力", "所有酵素都必定是DNA"], "ans": 2, "exp": "<b>絕大多數酵素是蛋白質</b>，但科學家也發現少數<b>RNA</b>具催化能力，稱為<b>核糖酶（ribozyme）</b>。酵素並非DNA、脂質或無機鹽類，故第二項正確。這也說明「酵素一定是蛋白質」並非完全正確。"}, {"tid": "enz", "q": "細胞內許多需要能量的合成反應（如把小分子組裝成大分子），常與ATP水解偶合進行。其原理為何？", "opts": ["ATP合成時放出能量，提供需能反應", "需能反應會放出能量供ATP水解", "ATP水解時放出能量，用以驅動需能反應", "ATP本身不參與能量轉換"], "ans": 2, "exp": "<b>ATP水解</b>（ATP→ADP+Pi）會<b>放出能量</b>，細胞把這個放能反應與需要能量的合成反應<b>偶合</b>，用ATP水解的能量去驅動需能反應進行。並非ATP合成放能，也不是需能反應供ATP水解，故第三項正確。"}, {"tid": "enz", "q": "研究人員測試某酵素在不同溫度下的活性，發現活性隨溫度上升而增加，但超過某溫度後活性急遽下降甚至消失。最合理的解釋為何？", "opts": ["酵素活性與溫度完全無關", "溫度過高使酵素變成DNA", "溫度過高使酵素變性（結構破壞），失去催化能力", "溫度越高酵素活性必定越高，無上限"], "ans": 2, "exp": "酵素活性隨溫度上升而增加，但超過<b>最適溫度</b>後，過高的溫度會破壞酵素的立體結構，使酵素<b>變性</b>而失去催化能力，活性急遽下降。並非無上限上升，也與溫度有關，酵素更不會變成DNA，故第一項正確。"}, {"tid": "enz", "q": "關於酵素「專一性」的敘述，下列何者最正確？", "opts": ["酵素的活性位通常只與特定形狀的受質結合，催化特定反應", "一種酵素可以催化任何反應", "酵素催化時活性位與受質都會永久損壞", "受質結合後酵素被消耗，無法再使用"], "ans": 0, "exp": "酵素具<b>專一性</b>：其<b>活性位</b>通常只與形狀相符的特定<b>受質</b>結合（鎖鑰／誘導契合），催化特定反應。受質結合時酵素結構可暫時改變，但反應後<b>酵素恢復原狀、可重複使用</b>，並非永久損壞或被消耗，故第二項正確。"}, {"tid": "enz", "q": "甲、乙兩試管放入等量同種澱粉酶與澱粉，甲管放在37℃、乙管放在5℃，其餘條件相同。一段時間後比較澱粉分解情形，最可能的結果為何？", "opts": ["甲管分解較快，因接近人體酵素的最適溫度", "乙管酵素已被低溫破壞，永久失效", "乙管分解較快，因低溫使酵素更穩定有效", "兩管分解速率完全相同"], "ans": 0, "exp": "人體澱粉酶最適溫度接近<b>體溫37℃</b>。甲管37℃接近最適溫，酵素活性高、<b>分解較快</b>；乙管5℃溫度低、分子運動慢、活性低，分解較慢，但低溫通常只是<b>暫時抑制</b>而非永久破壞（高溫才會變性失效），故第一項正確。"}, {"tid": "enz", "q": "小明設計實驗探討pH對某蛋白質分解酶活性的影響，他在多支試管中放入等量酵素與受質，分別調到不同pH，置於相同溫度下反應。此實驗中，下列何者為「操作變因（自變項）」？", "opts": ["受質的量", "pH值", "酵素的種類", "反應溫度"], "ans": 1, "exp": "實驗要探討「pH對活性的影響」，刻意改變、用來比較的就是<b>操作變因（自變項）：pH值</b>。酵素種類、反應溫度、受質的量在各管都<b>相同</b>，屬於要保持一致的<b>控制變因</b>，故操作變因為pH值。"}, {"tid": "fate", "q": "複製羊「桃莉」是以體細胞核移植技術產生（103學測）：取一隻羊的體細胞核，植入另一隻去核卵細胞中發育而成。關於桃莉的敘述，下列何者正確？", "opts": ["桃莉的細胞核基因與提供體細胞核的羊相同，屬無性生殖", "桃莉是有性生殖的產物，基因來自父母雙方", "桃莉的基因與提供卵細胞的羊完全相同", "桃莉證明已分化的體細胞核已喪失大部分基因"], "ans": 0, "exp": "體細胞核移植屬<b>無性生殖</b>，未經精卵結合。桃莉的<b>細胞核基因</b>來自提供體細胞核的羊，故與該羊基因相同。此實驗也證明已分化的體細胞核仍<b>保有完整基因</b>（Gurdon核移植精神），並非喪失基因；卵細胞只提供細胞質環境，非主要核基因來源。"}, {"tid": "fate", "q": "人體的神經細胞和皮膚細胞外形、功能差異很大，但都由同一受精卵分裂分化而來。關於兩者的比較，下列敘述何者正確？", "opts": ["神經細胞沒有細胞核所以不能再分化", "兩者的DNA序列不同，所以長得不一樣", "兩者DNA序列相同，因基因選擇性表現不同而形成不同細胞", "皮膚細胞已喪失神經相關基因"], "ans": 2, "exp": "細胞分化是同一套<b>DNA序列相同</b>的基因，因<b>選擇性表現</b>（不同細胞表現不同基因，產生不同的RNA與蛋白質）而形成構造功能各異的細胞。皮膚細胞並未喪失神經基因，只是沒表現；神經細胞仍有細胞核。"}, {"tid": "fate", "q": "蝌蚪變成青蛙時尾巴會逐漸消失；人類胚胎發育時手指間的蹼也會消失。這類現象屬於哪種過程，特徵為何？", "opts": ["細胞凋亡，受基因調控、細胞萎縮、不引起發炎", "細胞壞死，伴隨腫脹、膜破裂與發炎", "主動運輸，需消耗大量ATP把細胞推走", "促進性擴散，細胞自行滲出體外"], "ans": 0, "exp": "尾巴與指間蹼消失是<b>細胞凋亡（程序性死亡）</b>，由<b>基因調控</b>，細胞萎縮、膜仍完整形成膜泡、DNA規律斷裂，<b>不引起發炎</b>。壞死才是意外傷害導致腫脹、膜破裂與發炎，兩者不同。"}, {"tid": "fate", "q": "依細胞分化潛能由高到低排序，下列何者正確？", "opts": ["造血幹細胞 > 受精卵 > 胚胎幹細胞", "胚胎幹細胞 > 受精卵 > 已分化細胞", "受精卵 > 胚胎幹細胞 > 造血幹細胞 > 已分化細胞", "已分化細胞 > 胚胎幹細胞 > 受精卵"], "ans": 2, "exp": "分化潛能由高到低為：<b>受精卵（全能）> 胚胎幹細胞（多能）> 成體/造血幹細胞 > 已分化細胞</b>。受精卵可發育成完整個體潛能最高，已分化細胞潛能最低，故第三項排序正確。"}, {"tid": "fate", "q": "造血幹細胞移植可用來治療某些血液疾病。關於成體（造血）幹細胞的敘述，下列何者正確？", "opts": ["它的分化潛能比已分化細胞低", "它的分化潛能等同受精卵，可發育成完整個體", "它具有分裂並分化成多種血球的能力", "它完全不會分裂，只能維持原狀"], "ans": 2, "exp": "造血幹細胞屬<b>成體幹細胞</b>，能分裂並分化成紅血球、白血球、血小板等多種血球，分化潛能<b>高於已分化細胞</b>，但<b>低於受精卵與胚胎幹細胞</b>，無法發育成完整個體，故第四項正確。"}, {"tid": "fate", "q": "科學家以核移植實驗（如Gurdon將已分化細胞的細胞核移入去核卵中，能發育成新個體）。此實驗最主要證明了什麼？", "opts": ["只有受精卵的細胞核才含完整基因", "已分化細胞的細胞核在分化過程中已遺失大部分基因", "已分化細胞的細胞核仍保有發育成完整個體所需的全部基因", "卵細胞質不含任何發育所需物質"], "ans": 2, "exp": "Gurdon核移植實驗中，已分化細胞核移入去核卵後能發育成完整個體，證明<b>已分化細胞的細胞核仍保有完整的全套基因</b>，分化只是基因選擇性表現的結果，而非遺失基因。卵細胞質提供發育環境，故其餘選項皆錯。"}, {"tid": "fate", "q": "正常人體皮膚的成纖維細胞在培養皿中分裂約20~50次後便會停止分裂並衰老（海佛烈克極限）。下列關於其機制的敘述何者最恰當？", "opts": ["每次DNA複製端粒會縮短，端粒過短時細胞停止分裂", "體細胞端粒酶活性極高，端粒越分裂越長", "停止分裂是因為細胞核完全消失", "細胞每分裂一次就增加一條染色體"], "ans": 0, "exp": "正常體細胞<b>端粒酶活性低</b>，染色體末端的<b>端粒</b>會隨每次DNA複製而<b>縮短</b>，當端粒短到一定程度，細胞便<b>停止分裂、衰老</b>，這就是海佛烈克極限。端粒不是越分裂越長，染色體數也不會增加，細胞核也未消失。"}, {"tid": "fate", "q": "植物的分生組織（如根尖、莖頂）細胞可以發育成整株完整植物，這顯示植物已分化體系中仍保留高分化潛能的細胞。此特性最接近下列何者？", "opts": ["細胞凋亡", "端粒酶完全缺乏", "具有全能性（可長成完整個體）", "失去細胞核"], "ans": 2, "exp": "植物<b>分生組織</b>的細胞具<b>全能性</b>，在適當條件下可發育成完整植株（組織培養即利用此特性）。這與細胞凋亡、缺乏端粒酶或失去細胞核無關，故第二項正確。"}, {"tid": "fate", "q": "胚胎幹細胞具有「多能性」，被視為再生醫療的潛在來源，但其應用同時伴隨倫理爭議。關於胚胎幹細胞的敘述，下列何者正確？", "opts": ["其分化潛能低於已分化的成體細胞", "具多能性，可分化成多種類型的細胞", "與受精卵相同，每個都已是一個完整個體", "完全沒有醫療應用的可能"], "ans": 1, "exp": "胚胎幹細胞具<b>多能性</b>，能分化成體內多種類型細胞，分化潛能<b>高於成體細胞與已分化細胞</b>，具再生醫療潛力。其取得涉及胚胎，故有倫理爭議，但並非沒有醫療可能；它本身不等同於完整個體，故第二項正確。"}, {"tid": "fate", "q": "比較細胞「凋亡」與「壞死」，下列敘述何者正確？", "opts": ["壞死是受基因調控的程序性死亡，不引起發炎", "凋亡與壞死過程完全相同，無法區分", "凋亡時細胞萎縮、膜保持完整、不引起發炎；壞死時細胞腫脹、膜破裂、引起發炎", "凋亡是意外傷害造成，會引起發炎"], "ans": 2, "exp": "<b>凋亡</b>是受基因調控的程序性死亡，細胞<b>萎縮、膜完整、形成膜泡、不發炎</b>；<b>壞死</b>是意外傷害造成，細胞<b>腫脹、膜破裂、引起發炎</b>。第三項正確描述兩者差異，第一、二項把兩者特性對調，故錯。"}, {"tid": "fate", "q": "關於端粒酶的敘述，下列(甲)生殖細胞　(乙)幹細胞　(丙)癌細胞（如海拉細胞）　(丁)一般已分化的體細胞，何者通常具有較高的端粒酶活性？", "opts": ["甲乙丁", "甲丙丁", "甲乙丙", "乙丙丁"], "ans": 2, "exp": "<b>生殖細胞、幹細胞、癌細胞</b>（甲乙丙）通常端粒酶活性高，能維持端粒長度而持續分裂；<b>一般已分化的體細胞（丁）</b>端粒酶活性低，端粒會隨分裂縮短而衰老。故端粒酶活性高的是甲乙丙。"}, {"tid": "fate", "q": "下列關於細胞分化的敘述，何者「錯誤」？", "opts": ["細胞一旦分化，其細胞核就會立即遺失大半基因", "分化後不同細胞所表現（活化）的基因可能不同", "細胞分化程度越高，分化潛能通常越低", "同一個體不同種類的細胞，其DNA序列基本相同"], "ans": 0, "exp": "分化是同一套DNA因<b>基因選擇性表現</b>，不同細胞表現的基因不同，但<b>DNA序列基本相同</b>；分化程度越高、潛能通常越低，這些都正確。分化<b>並非遺失基因</b>（核移植已證明保有完整基因），故第四項錯誤。"}];
let curTopic=TOPICS.find(t=>QDB.some(q=>q.tid===t.id)).id;
const TOTAL=QDB.length;
const answered={};
const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  if(!cnt)return;
  const b=document.createElement("button");
  b.className="ttab"+(t.id===curTopic?" on":"");b.id="tab-"+t.id;
  b.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px">${cnt}</span>`;
  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
