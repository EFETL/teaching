<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px}
header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#6c4ab6 100%);color:#fff;padding:20px 18px 16px;text-align:center}

#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 14px;font-size:.8rem;flex-wrap:wrap}

.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ttab{flex:0 0 auto;padding:11px 13px;font-size:.78rem;font-weight:700;background:none;border:none;cursor:pointer;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}

#main{max-width:860px;margin:0 auto;padding:16px 14px 60px}
.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:#6b7280;font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}
.q-hd{display:flex;align-items:center;gap:9px;margin:6px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--border)}

.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}

.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}

.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.4}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}
.rbtn{display:block;width:fit-content;margin:24px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}

.concept{background:#fff;border:1.5px solid #dde3ed;border-radius:10px;padding:12px 16px;margin:14px 0}
.concept h3{color:#0f2744;font-size:1rem;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #eef0f5}
table.tbl{border-collapse:collapse;width:100%;margin:10px 0;font-size:.82rem;line-height:1.5}
table.tbl th,table.tbl td{border:1px solid #c9d4e2;padding:6px 9px;text-align:left;vertical-align:top}
table.tbl th{background:#0f2744;color:#fff;font-weight:700;white-space:nowrap}
table.tbl tr:nth-child(even) td{background:#f5f9ff}
.eg{background:#fffbe8;border-left:4px solid #e8a000;border-radius:0 8px 8px 0;padding:9px 13px;margin:10px 0;font-size:.84rem;line-height:1.7;color:#4a3b00}
.eg b{color:#0f2744}
.map-txt{font-family:ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;background:#0f2744;color:#e8f0fc;border-radius:8px;padding:10px 12px;font-size:.76rem;line-height:1.65;margin:10px 0;overflow-x:auto}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.76rem;font-weight:700;color:#fff;line-height:1.6}
.tag.g{background:#15803d}.tag.r{background:#b91c1c}.tag.b{background:#0a7ea4}.tag.y{background:#b8860b}
.concept p{margin:6px 0;font-size:.86rem;line-height:1.7}
</style>

<script>
const TOPICS=[{"id": "mol", "icon": "🧪", "name": "生命的化學組成"}, {"id": "cell", "icon": "🔬", "name": "細胞構造與運輸"}, {"id": "enz", "icon": "⚙️", "name": "酵素"}, {"id": "fate", "icon": "🌱", "name": "細胞分化與命運"}];
const NOTES={"mol": "<div class=\"concept\"><h3>① 生物體的四大有機分子（看組成元素就能分辨）</h3><table class=\"tbl\"><tr><th>分子</th><th>單體（小分子）</th><th>組成元素</th><th>主要功能/例子</th></tr><tr><td>醣類</td><td>單醣（葡萄糖等）</td><td>C、H、O</td><td>供能、儲存（澱粉/肝醣）、結構（纖維素）</td></tr><tr><td>脂質</td><td>甘油＋脂肪酸</td><td>C、H、O</td><td>儲能（三酸甘油酯）、膜（磷脂）、激素（固醇）</td></tr><tr><td>蛋白質</td><td>胺基酸（20種）</td><td>C、H、O、<b>N</b>（±S）</td><td>酵素、抗體、運輸（血紅素）、結構</td></tr><tr><td>核酸</td><td>核苷酸</td><td>C、H、O、N、<b>P</b></td><td>DNA（遺傳）、RNA</td></tr></table><p>📌 <b>口訣</b>：只有蛋白質含 <b>N</b>（部分含 S）；只有核酸含 <b>P</b>。醣與脂只含 C、H、O。</p></div><svg viewBox=\"0 0 480 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:460px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"240\" y=\"24\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">單體 ⇄ 聚合物：脫水縮合 / 水解</text>\n<circle cx=\"120\" cy=\"75\" r=\"22\" fill=\"#cfe3f7\" stroke=\"#0a7ea4\" stroke-width=\"2\"/>\n<text x=\"120\" y=\"80\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0f2744\">單體</text>\n<circle cx=\"200\" cy=\"75\" r=\"22\" fill=\"#cfe3f7\" stroke=\"#0a7ea4\" stroke-width=\"2\"/>\n<text x=\"200\" y=\"80\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0f2744\">單體</text>\n<text x=\"300\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" fill=\"#0f2744\">→</text>\n<circle cx=\"372\" cy=\"75\" r=\"22\" fill=\"#bfe6c8\" stroke=\"#15803d\" stroke-width=\"2\"/>\n<circle cx=\"416\" cy=\"75\" r=\"22\" fill=\"#bfe6c8\" stroke=\"#15803d\" stroke-width=\"2\"/>\n<line x1=\"394\" y1=\"75\" x2=\"394\" y2=\"75\" stroke=\"#15803d\"/>\n<text x=\"240\" y=\"135\" text-anchor=\"middle\" font-size=\"13\" fill=\"#b91c1c\" font-weight=\"700\">脫水縮合：相連時失去 1 分子 H₂O ▼</text>\n<text x=\"240\" y=\"175\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0a7ea4\" font-weight=\"700\">▲ 水解：加 1 分子 H₂O 把鍵切斷</text>\n<ellipse cx=\"300\" cy=\"155\" rx=\"20\" ry=\"14\" fill=\"#d6ebff\" stroke=\"#0a7ea4\" stroke-width=\"1.5\"/>\n<text x=\"300\" y=\"159\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0a7ea4\">H₂O</text>\n</svg><div class=\"concept\"><h3>② 醣類三層級＆同分異構物</h3><table class=\"tbl\"><tr><th>層級</th><th>例子</th><th>備註</th></tr><tr><td>單醣</td><td>葡萄糖、果糖、半乳糖（六碳）；核糖、去氧核糖（五碳）</td><td>葡萄糖/果糖/半乳糖分子式同為 C₆H₁₂O₆，結構不同 → <b>同分異構物</b>；實驗式皆 CH₂O</td></tr><tr><td>雙醣</td><td>蔗糖＝葡萄糖+果糖；麥芽糖＝葡萄糖×2</td><td>形成時脫水</td></tr><tr><td>多醣</td><td>澱粉、肝醣（儲存葡萄糖）；纖維素（植物細胞壁）</td><td>聚合物</td></tr></table></div><svg viewBox=\"0 0 460 195\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:440px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"230\" y=\"24\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">水是極性分子，分子間形成「氫鍵」</text>\n<g>\n<circle cx=\"120\" cy=\"95\" r=\"26\" fill=\"#d22\" opacity=\"0.85\"/><text x=\"120\" y=\"100\" text-anchor=\"middle\" font-size=\"14\" fill=\"#fff\">O</text>\n<text x=\"120\" y=\"70\" text-anchor=\"middle\" font-size=\"12\" fill=\"#b91c1c\">δ−</text>\n<circle cx=\"95\" cy=\"130\" r=\"14\" fill=\"#eee\" stroke=\"#888\"/><text x=\"95\" y=\"134\" text-anchor=\"middle\" font-size=\"11\">H</text>\n<circle cx=\"150\" cy=\"128\" r=\"14\" fill=\"#eee\" stroke=\"#888\"/><text x=\"150\" y=\"132\" text-anchor=\"middle\" font-size=\"11\">H</text>\n<text x=\"150\" y=\"152\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0a7ea4\">δ+</text>\n</g>\n<g>\n<circle cx=\"320\" cy=\"95\" r=\"26\" fill=\"#d22\" opacity=\"0.85\"/><text x=\"320\" y=\"100\" text-anchor=\"middle\" font-size=\"14\" fill=\"#fff\">O</text>\n<circle cx=\"295\" cy=\"130\" r=\"14\" fill=\"#eee\" stroke=\"#888\"/><text x=\"295\" y=\"134\" text-anchor=\"middle\" font-size=\"11\">H</text>\n<circle cx=\"350\" cy=\"128\" r=\"14\" fill=\"#eee\" stroke=\"#888\"/><text x=\"350\" y=\"132\" text-anchor=\"middle\" font-size=\"11\">H</text>\n</g>\n<line x1=\"150\" y1=\"128\" x2=\"294\" y2=\"100\" stroke=\"#e8a000\" stroke-width=\"2.5\" stroke-dasharray=\"5,4\"/>\n<text x=\"225\" y=\"105\" text-anchor=\"middle\" font-size=\"11\" fill=\"#e8a000\" font-weight=\"700\">氫鍵</text>\n<text x=\"230\" y=\"178\" text-anchor=\"middle\" font-size=\"11.5\" fill=\"#555\">比熱大→協助恆溫；良好溶劑→協助運輸（但不溶纖維素）</text>\n</svg><div class=\"concept\"><h3>③ 水的功能（學測常考）</h3><p>極性分子、分子間可形成<b>氫鍵</b>；<b>比熱大</b>→協助維持體溫；<b>良好溶劑</b>→協助體內物質運輸；參與水解與脫水反應。</p><div class=\"eg\">⚠️ <b>常見陷阱</b>：「水解離可提供生物體能量」是<b>錯</b>的；水也<b>不能溶解纖維素</b>。</div><p>📌 <b>學測對照</b>：104（核酸：單體核苷酸、含 C/H/O/N/P、有 DNA 與 RNA 兩種、非皆雙股）、106（葡萄糖與半乳糖互為同分異構物、實驗式相同）、105（DNA、血紅素含 N）。</p></div>", "cell": "<div class=\"concept\"><h3>① 重要胞器與功能</h3><table class=\"tbl\"><tr><th>胞器</th><th>功能</th><th>膜</th></tr><tr><td>細胞核（核仁）</td><td>儲存 DNA；核仁製造核糖體次單元</td><td>雙層膜（核孔）</td></tr><tr><td>核糖體</td><td>合成蛋白質</td><td>無膜</td></tr><tr><td>粗糙內質網</td><td>附核糖體；摺疊、運輸蛋白質</td><td>單層膜</td></tr><tr><td>平滑內質網</td><td>合成脂質</td><td>單層膜</td></tr><tr><td>高基氏體</td><td>修飾、包裝、分泌蛋白質</td><td>單層膜</td></tr><tr><td>粒線體</td><td>有氧呼吸製造 ATP；含自身 DNA/RNA/核糖體</td><td>雙層膜</td></tr><tr><td>葉綠體</td><td>光合作用；含自身 DNA</td><td>雙層膜</td></tr></table><p>📌 同時含「DNA＋RNA＋蛋白質＋磷脂質」的胞器＝<b>粒線體、葉綠體</b>（雙層膜＋自身核糖體）。學測 109。</p></div><div class=\"concept\"><h3>② 動物 vs 植物細胞</h3><table class=\"tbl\"><tr><th>構造</th><th>動物</th><th>植物</th></tr><tr><td>細胞壁（纖維素，全透性、非半透膜）</td><td>✗</td><td>✓</td></tr><tr><td>葉綠體、大液胞</td><td>✗</td><td>✓</td></tr><tr><td>中心粒</td><td>✓</td><td>✗</td></tr><tr><td>核糖體、細胞膜</td><td>✓</td><td>✓</td></tr></table><div class=\"eg\">🧱 <b>細胞壁</b>：主成分纖維素；屬<b>全透性</b>（不是半透膜）；初生壁薄、次生壁厚；<b>並非所有植物細胞都有次生細胞壁</b>。</div></div><svg viewBox=\"0 0 540 185\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:520px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"270\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">細胞膜：流體鑲嵌模型</text>\n<text x=\"270\" y=\"40\" text-anchor=\"middle\" font-size=\"11\" fill=\"#666\">細胞外</text>\n<text x=\"270\" y=\"172\" text-anchor=\"middle\" font-size=\"11\" fill=\"#666\">細胞內</text>\n<!-- bilayer heads -->\n<g fill=\"#e8a000\"><circle cx=\"30\" cy=\"60\" r=\"9\"/><circle cx=\"66\" cy=\"60\" r=\"9\"/><circle cx=\"102\" cy=\"60\" r=\"9\"/><circle cx=\"138\" cy=\"60\" r=\"9\"/><circle cx=\"174\" cy=\"60\" r=\"9\"/><circle cx=\"210\" cy=\"60\" r=\"9\"/><circle cx=\"246\" cy=\"60\" r=\"9\"/><circle cx=\"282\" cy=\"60\" r=\"9\"/><circle cx=\"318\" cy=\"60\" r=\"9\"/><circle cx=\"354\" cy=\"60\" r=\"9\"/><circle cx=\"390\" cy=\"60\" r=\"9\"/><circle cx=\"426\" cy=\"60\" r=\"9\"/><circle cx=\"462\" cy=\"60\" r=\"9\"/><circle cx=\"498\" cy=\"60\" r=\"9\"/><circle cx=\"534\" cy=\"60\" r=\"9\"/><circle cx=\"30\" cy=\"120\" r=\"9\"/><circle cx=\"66\" cy=\"120\" r=\"9\"/><circle cx=\"102\" cy=\"120\" r=\"9\"/><circle cx=\"138\" cy=\"120\" r=\"9\"/><circle cx=\"174\" cy=\"120\" r=\"9\"/><circle cx=\"210\" cy=\"120\" r=\"9\"/><circle cx=\"246\" cy=\"120\" r=\"9\"/><circle cx=\"282\" cy=\"120\" r=\"9\"/><circle cx=\"318\" cy=\"120\" r=\"9\"/><circle cx=\"354\" cy=\"120\" r=\"9\"/><circle cx=\"390\" cy=\"120\" r=\"9\"/><circle cx=\"426\" cy=\"120\" r=\"9\"/><circle cx=\"462\" cy=\"120\" r=\"9\"/><circle cx=\"498\" cy=\"120\" r=\"9\"/><circle cx=\"534\" cy=\"120\" r=\"9\"/></g>\n<g stroke=\"#c98f00\" stroke-width=\"2\"><line x1=\"30\" y1=\"69\" x2=\"30\" y2=\"90\"/><line x1=\"30\" y1=\"111\" x2=\"30\" y2=\"90\"/><line x1=\"66\" y1=\"69\" x2=\"66\" y2=\"90\"/><line x1=\"66\" y1=\"111\" x2=\"66\" y2=\"90\"/><line x1=\"102\" y1=\"69\" x2=\"102\" y2=\"90\"/><line x1=\"102\" y1=\"111\" x2=\"102\" y2=\"90\"/><line x1=\"138\" y1=\"69\" x2=\"138\" y2=\"90\"/><line x1=\"138\" y1=\"111\" x2=\"138\" y2=\"90\"/><line x1=\"174\" y1=\"69\" x2=\"174\" y2=\"90\"/><line x1=\"174\" y1=\"111\" x2=\"174\" y2=\"90\"/><line x1=\"210\" y1=\"69\" x2=\"210\" y2=\"90\"/><line x1=\"210\" y1=\"111\" x2=\"210\" y2=\"90\"/><line x1=\"246\" y1=\"69\" x2=\"246\" y2=\"90\"/><line x1=\"246\" y1=\"111\" x2=\"246\" y2=\"90\"/><line x1=\"282\" y1=\"69\" x2=\"282\" y2=\"90\"/><line x1=\"282\" y1=\"111\" x2=\"282\" y2=\"90\"/><line x1=\"318\" y1=\"69\" x2=\"318\" y2=\"90\"/><line x1=\"318\" y1=\"111\" x2=\"318\" y2=\"90\"/><line x1=\"354\" y1=\"69\" x2=\"354\" y2=\"90\"/><line x1=\"354\" y1=\"111\" x2=\"354\" y2=\"90\"/><line x1=\"390\" y1=\"69\" x2=\"390\" y2=\"90\"/><line x1=\"390\" y1=\"111\" x2=\"390\" y2=\"90\"/><line x1=\"426\" y1=\"69\" x2=\"426\" y2=\"90\"/><line x1=\"426\" y1=\"111\" x2=\"426\" y2=\"90\"/><line x1=\"462\" y1=\"69\" x2=\"462\" y2=\"90\"/><line x1=\"462\" y1=\"111\" x2=\"462\" y2=\"90\"/><line x1=\"498\" y1=\"69\" x2=\"498\" y2=\"90\"/><line x1=\"498\" y1=\"111\" x2=\"498\" y2=\"90\"/><line x1=\"534\" y1=\"69\" x2=\"534\" y2=\"90\"/><line x1=\"534\" y1=\"111\" x2=\"534\" y2=\"90\"/></g>\n<!-- transmembrane protein -->\n<rect x=\"150\" y=\"48\" width=\"34\" height=\"84\" rx=\"10\" fill=\"#6c4ab6\" opacity=\"0.85\"/>\n<text x=\"167\" y=\"95\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\">蛋白質</text>\n<rect x=\"330\" y=\"48\" width=\"30\" height=\"84\" rx=\"10\" fill=\"#0a7ea4\" opacity=\"0.85\"/>\n<!-- glycoprotein sugar chain -->\n<circle cx=\"250\" cy=\"44\" r=\"6\" fill=\"#15803d\"/><circle cx=\"262\" cy=\"36\" r=\"6\" fill=\"#15803d\"/><circle cx=\"240\" cy=\"34\" r=\"6\" fill=\"#15803d\"/>\n<text x=\"252\" y=\"20\" text-anchor=\"middle\" font-size=\"9\" fill=\"#15803d\">醣類(辨識)</text>\n<!-- cholesterol -->\n<rect x=\"95\" y=\"78\" width=\"9\" height=\"24\" rx=\"3\" fill=\"#b91c1c\"/><text x=\"100\" y=\"150\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b91c1c\">膽固醇</text>\n<text x=\"455\" y=\"64\" text-anchor=\"middle\" font-size=\"10\" fill=\"#c98f00\">親水頭</text>\n<text x=\"455\" y=\"92\" text-anchor=\"middle\" font-size=\"10\" fill=\"#c98f00\">疏水尾</text>\n</svg><div class=\"concept\"><h3>③ 細胞膜＝流體鑲嵌模型</h3><p><b>磷脂雙層</b>（親水頭朝外、疏水尾相對朝內）＋<b>鑲嵌蛋白質</b>（嵌入或貫穿）＋膽固醇＋醣類（糖蛋白/糖脂作辨識標記）。具<b>選擇性通透（半透膜）</b>。</p></div><svg viewBox=\"0 0 540 185\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:520px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"270\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">物質進出細胞的三種方式</text>\n<rect x=\"20\" y=\"55\" width=\"500\" height=\"22\" fill=\"#ffe9b8\"/>\n<rect x=\"20\" y=\"103\" width=\"500\" height=\"22\" fill=\"#ffe9b8\"/>\n<text x=\"535\" y=\"98\" font-size=\"9\" fill=\"#999\"></text>\n<!-- simple diffusion -->\n<circle cx=\"110\" cy=\"40\" r=\"7\" fill=\"#0a7ea4\"/>\n<line x1=\"110\" y1=\"47\" x2=\"110\" y2=\"138\" stroke=\"#0a7ea4\" stroke-width=\"2\" marker-end=\"url(#ar)\"/>\n<text x=\"110\" y=\"158\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#0a7ea4\">簡單擴散</text>\n<text x=\"110\" y=\"172\" text-anchor=\"middle\" font-size=\"9\" fill=\"#666\">O₂·CO₂·脂溶性</text>\n<!-- facilitated -->\n<rect x=\"255\" y=\"50\" width=\"18\" height=\"80\" rx=\"6\" fill=\"#6c4ab6\"/><rect x=\"287\" y=\"50\" width=\"18\" height=\"80\" rx=\"6\" fill=\"#6c4ab6\"/>\n<circle cx=\"280\" cy=\"40\" r=\"7\" fill=\"#15803d\"/>\n<line x1=\"280\" y1=\"47\" x2=\"280\" y2=\"138\" stroke=\"#15803d\" stroke-width=\"2\" marker-end=\"url(#ar)\"/>\n<text x=\"280\" y=\"158\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#15803d\">促進性擴散</text>\n<text x=\"280\" y=\"172\" text-anchor=\"middle\" font-size=\"9\" fill=\"#666\">葡萄糖·離子(蛋白)</text>\n<!-- active -->\n<rect x=\"430\" y=\"50\" width=\"20\" height=\"80\" rx=\"6\" fill=\"#b91c1c\"/>\n<circle cx=\"440\" cy=\"138\" r=\"7\" fill=\"#b91c1c\"/>\n<line x1=\"440\" y1=\"130\" x2=\"440\" y2=\"48\" stroke=\"#b91c1c\" stroke-width=\"2\" marker-end=\"url(#ar)\"/>\n<text x=\"470\" y=\"60\" font-size=\"10\" fill=\"#b91c1c\" font-weight=\"700\">ATP</text>\n<text x=\"440\" y=\"158\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#b91c1c\">主動運輸</text>\n<text x=\"440\" y=\"172\" text-anchor=\"middle\" font-size=\"9\" fill=\"#666\">逆濃度·耗ATP</text>\n<defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L8,4 L0,8 z\" fill=\"#444\"/></marker></defs>\n<text x=\"30\" y=\"68\" font-size=\"9\" fill=\"#b8860b\">─ 細胞膜 ─</text>\n</svg><div class=\"concept\"><h3>④ 物質進出細胞</h3><table class=\"tbl\"><tr><th>方式</th><th>耗 ATP?</th><th>需運輸蛋白?</th><th>例子</th></tr><tr><td>簡單擴散</td><td>否</td><td>否</td><td>O₂、CO₂、脂溶性（酒精、脂肪酸）</td></tr><tr><td>促進性擴散</td><td>否</td><td><b>是</b></td><td>葡萄糖、離子</td></tr><tr><td>滲透</td><td>否</td><td>水通道/否</td><td>水</td></tr><tr><td><b>主動運輸</b></td><td><b>是</b></td><td>是</td><td>鈉鉀幫浦、根吸無機鹽、腎小管再吸收葡萄糖、甲狀腺吸碘</td></tr><tr><td>胞吞/胞吐</td><td>是</td><td>—</td><td>白血球吞噬、分泌蛋白胞吐</td></tr></table><p>📌 <b>學測對照</b>：106（水滲透、O₂簡單擴散為對；酒精「主動運輸」、澱粉「由運輸蛋白進入」為錯）、110（不耗 ATP 又不需運輸蛋白＝簡單擴散/滲透）。</p></div><svg viewBox=\"0 0 590 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:560px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"290\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">胰島素的製造與分泌路徑</text>\n<rect x=\"15\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#0f2744\" opacity=\"0.9\"/><text x=\"56\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">細胞核</text><text x=\"56\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">基因→轉錄mRNA</text><rect x=\"110\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#0a7ea4\" opacity=\"0.9\"/><text x=\"151\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">核糖體</text><text x=\"151\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">轉譯出胜肽</text><rect x=\"205\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#6c4ab6\" opacity=\"0.9\"/><text x=\"246\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">粗糙內質網</text><text x=\"246\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">摺疊·運輸</text><rect x=\"300\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#e8a000\" opacity=\"0.9\"/><text x=\"341\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">高基氏體</text><text x=\"341\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">修飾·切割</text><rect x=\"395\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#15803d\" opacity=\"0.9\"/><text x=\"436\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">囊泡</text><text x=\"436\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">沿微管運送</text><rect x=\"490\" y=\"50\" width=\"82\" height=\"58\" rx=\"9\" fill=\"#b91c1c\" opacity=\"0.9\"/><text x=\"531\" y=\"73\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">胞吐</text><text x=\"531\" y=\"92\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">送出細胞外</text><text x=\"102\" y=\"83\" text-anchor=\"middle\" font-size=\"16\" fill=\"#555\">→</text><text x=\"197\" y=\"83\" text-anchor=\"middle\" font-size=\"16\" fill=\"#555\">→</text><text x=\"292\" y=\"83\" text-anchor=\"middle\" font-size=\"16\" fill=\"#555\">→</text><text x=\"387\" y=\"83\" text-anchor=\"middle\" font-size=\"16\" fill=\"#555\">→</text><text x=\"482\" y=\"83\" text-anchor=\"middle\" font-size=\"16\" fill=\"#555\">→</text>\n<text x=\"290\" y=\"135\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#666\">標靶（肝、肌肉）細胞膜上具「胰島素受體」才能接受刺激</text>\n</svg><div class=\"concept\"><h3>⑤ 胰島素的製造（膜系統合作範例）</h3><p class=\"map-txt\">基因 →(轉錄)→ mRNA →(核糖體轉譯)→ 胜肽鏈\n→ 粗糙內質網（摺疊）→ 高基氏體（修飾、切出 A/B 鏈經雙硫鍵結合）\n→ 囊泡（沿微管運送）→ 胞吐 送出細胞外</p><p>標靶（肝、肌肉）細胞膜上具<b>胰島素受體</b>才能接受刺激。</p></div>", "enz": "<div class=\"concept\"><h3>① 酵素是什麼</h3><p>酵素＝具催化能力的<b>蛋白質</b>（少數 RNA 也具催化活性，稱<b>核糖酶</b>）。特性：<span class=\"tag g\">降低活化能</span> <span class=\"tag b\">加速反應</span> <span class=\"tag y\">反應前後本身不變、可重複使用</span> <span class=\"tag r\">具專一性</span>。</p><p><b>活性位（active site）</b>位在<b>酵素分子上</b>（不是受質上）；受質與活性位結合後結構會改變，酵素本身不變。</p></div><svg viewBox=\"0 0 440 245\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:430px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"220\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">酵素降低「活化能」，不改變淨能量變化</text>\n<line x1=\"55\" y1=\"40\" x2=\"55\" y2=\"210\" stroke=\"#333\"/><line x1=\"55\" y1=\"210\" x2=\"410\" y2=\"210\" stroke=\"#333\"/>\n<text x=\"20\" y=\"125\" font-size=\"11\" fill=\"#333\" transform=\"rotate(-90 20,125)\">能量</text>\n<text x=\"230\" y=\"232\" text-anchor=\"middle\" font-size=\"11\" fill=\"#333\">反應進程 →</text>\n<path d=\"M70,120 C150,120 175,55 225,55 C275,55 305,170 400,170\" fill=\"none\" stroke=\"#b91c1c\" stroke-width=\"2.5\"/>\n<path d=\"M70,120 C150,120 190,95 225,95 C262,95 300,170 400,170\" fill=\"none\" stroke=\"#15803d\" stroke-width=\"2.5\"/>\n<line x1=\"70\" y1=\"120\" x2=\"225\" y2=\"120\" stroke=\"#bbb\" stroke-dasharray=\"3,3\"/>\n<line x1=\"225\" y1=\"55\" x2=\"225\" y2=\"120\" stroke=\"#b91c1c\" stroke-dasharray=\"4,3\"/>\n<line x1=\"245\" y1=\"95\" x2=\"245\" y2=\"120\" stroke=\"#15803d\" stroke-dasharray=\"4,3\"/>\n<text x=\"150\" y=\"48\" font-size=\"10.5\" fill=\"#b91c1c\" font-weight=\"700\">無酶：活化能高</text>\n<text x=\"250\" y=\"118\" font-size=\"10.5\" fill=\"#15803d\" font-weight=\"700\">有酶：活化能低</text>\n<text x=\"78\" y=\"113\" font-size=\"10\" fill=\"#444\">反應物</text>\n<text x=\"360\" y=\"165\" font-size=\"10\" fill=\"#444\">生成物</text>\n<line x1=\"70\" y1=\"120\" x2=\"400\" y2=\"170\" stroke=\"none\"/>\n<text x=\"415\" y=\"148\" font-size=\"10\" fill=\"#e8a000\" font-weight=\"700\">ΔH</text>\n<line x1=\"405\" y1=\"120\" x2=\"405\" y2=\"170\" stroke=\"#e8a000\" stroke-width=\"1.5\"/>\n</svg><div class=\"concept\"><h3>② 活化能與淨能量變化</h3><p>酵素只<b>降低活化能（Ea）</b>，<b>不改變</b>反應物與生成物的能量差（淨能量變化 ΔH）。放熱反應反應物能量高於生成物。</p><div class=\"eg\">🔗 <b>能量偶合</b>：ATP 水解（ATP→ADP＋Pi）放能，可驅動需能的合成反應。</div></div><svg viewBox=\"0 0 490 210\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:480px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"245\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">溫度與 pH 對酵素活性的影響</text>\n<!-- temperature bell -->\n<line x1=\"45\" y1=\"45\" x2=\"45\" y2=\"180\" stroke=\"#333\"/><line x1=\"45\" y1=\"180\" x2=\"225\" y2=\"180\" stroke=\"#333\"/>\n<text x=\"135\" y=\"198\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#333\">溫度 (℃)</text>\n<text x=\"20\" y=\"115\" font-size=\"10\" fill=\"#333\" transform=\"rotate(-90 20,115)\">活性</text>\n<path d=\"M55,180 C95,178 120,60 135,60 C150,60 165,120 190,178\" fill=\"none\" stroke=\"#b91c1c\" stroke-width=\"2.5\"/>\n<line x1=\"135\" y1=\"60\" x2=\"135\" y2=\"180\" stroke=\"#999\" stroke-dasharray=\"4,3\"/>\n<text x=\"135\" y=\"50\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#b91c1c\">最適溫度(~37)</text>\n<text x=\"150\" y=\"172\" font-size=\"8.5\" fill=\"#888\">過高→變性</text>\n<!-- pH multi -->\n<line x1=\"275\" y1=\"45\" x2=\"275\" y2=\"180\" stroke=\"#333\"/><line x1=\"275\" y1=\"180\" x2=\"470\" y2=\"180\" stroke=\"#333\"/>\n<text x=\"375\" y=\"198\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#333\">pH</text>\n<path d=\"M283,180 C300,178 308,80 318,80 C328,80 336,178 352,180\" fill=\"none\" stroke=\"#e8a000\" stroke-width=\"2.2\"/>\n<path d=\"M330,180 C348,178 356,70 368,70 C380,70 388,178 405,180\" fill=\"none\" stroke=\"#15803d\" stroke-width=\"2.2\"/>\n<path d=\"M388,180 C404,178 412,90 422,90 C432,90 440,178 458,180\" fill=\"none\" stroke=\"#0a7ea4\" stroke-width=\"2.2\"/>\n<text x=\"312\" y=\"76\" font-size=\"8\" fill=\"#e8a000\">胃蛋白酶~2</text>\n<text x=\"360\" y=\"64\" font-size=\"8\" fill=\"#15803d\">唾液澱粉酶~7</text>\n<text x=\"418\" y=\"86\" font-size=\"8\" fill=\"#0a7ea4\">胰蛋白酶~8</text>\n</svg><div class=\"concept\"><h3>③ 影響酵素活性的因素</h3><table class=\"tbl\"><tr><th>因素</th><th>影響</th></tr><tr><td>溫度</td><td>先隨升溫加快；過<b>最適溫度</b>後蛋白質<b>變性</b>，活性急降（人體約 37℃）→ 先升後降曲線</td></tr><tr><td>pH</td><td>各酶最適 pH 不同：胃蛋白酶~2、唾液澱粉酶~7、胰蛋白酶~8</td></tr><tr><td>受質濃度</td><td>上升→速率上升，酵素飽和後達最大速率 Vmax</td></tr><tr><td>酵素濃度</td><td>濃度越高速率越快</td></tr></table></div><svg viewBox=\"0 0 420 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:420px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"210\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">受質濃度 — 反應速率（米氏動力學）</text>\n<line x1=\"55\" y1=\"40\" x2=\"55\" y2=\"205\" stroke=\"#333\"/><line x1=\"55\" y1=\"205\" x2=\"395\" y2=\"205\" stroke=\"#333\"/>\n<text x=\"22\" y=\"125\" font-size=\"11\" fill=\"#333\" transform=\"rotate(-90 22,125)\">反應速率</text>\n<text x=\"225\" y=\"228\" text-anchor=\"middle\" font-size=\"11\" fill=\"#333\">受質濃度 (mM)</text>\n<path d=\"M55,205 C120,150 180,85 250,70 C310,60 360,58 390,57\" fill=\"none\" stroke=\"#0a7ea4\" stroke-width=\"2.8\"/>\n<line x1=\"55\" y1=\"57\" x2=\"390\" y2=\"57\" stroke=\"#b91c1c\" stroke-dasharray=\"5,4\"/>\n<text x=\"300\" y=\"50\" font-size=\"11\" fill=\"#b91c1c\" font-weight=\"700\">最大反應速率 Vmax</text>\n<line x1=\"55\" y1=\"131\" x2=\"200\" y2=\"131\" stroke=\"#999\" stroke-dasharray=\"4,3\"/>\n<line x1=\"200\" y1=\"131\" x2=\"200\" y2=\"205\" stroke=\"#999\" stroke-dasharray=\"4,3\"/>\n<text x=\"60\" y=\"127\" font-size=\"10\" fill=\"#555\">½Vmax</text>\n<text x=\"200\" y=\"220\" text-anchor=\"middle\" font-size=\"10\" fill=\"#555\">1</text>\n<text x=\"300\" y=\"220\" text-anchor=\"middle\" font-size=\"10\" fill=\"#555\">2</text>\n<line x1=\"300\" y1=\"60\" x2=\"300\" y2=\"205\" stroke=\"#ddd\" stroke-dasharray=\"2,3\"/>\n<text x=\"210\" y=\"120\" font-size=\"9.5\" fill=\"#0a7ea4\">↑受質濃度↑速率，飽和後趨於 Vmax</text>\n</svg><div class=\"concept\"><h3>④ 輔因子（cofactor）</h3><table class=\"tbl\"><tr><th>類型</th><th>例子</th><th>重點</th></tr><tr><td>無機</td><td>金屬離子（Zn²⁺、Mg²⁺、Fe²⁺）</td><td>鎘、汞、鉛等重金屬會<b>抑制</b>酶</td></tr><tr><td>有機（＝輔酶）</td><td>NAD⁺/NADH、FAD、維生素衍生物</td><td>有機輔因子又稱<b>輔酶</b></td></tr></table><p>📌 並非所有酶都需要輔因子；輔因子與輔酶皆可<b>重複使用</b>。</p><p>📌 <b>學測對照</b>：111（酵素是胺基酸聚合物、服大量制酸劑降胃蛋白酶活性、最適非 pH7.4、溫度非越高越強）、107（脂肪酵素隨溫度/pH 變化）、102 指考（受質濃度-反應速率）、91 學測（片段活性交集）。</p></div>", "fate": "<div class=\"concept\"><h3>① 細胞分化的本質</h3><p>同一受精卵分裂來的細胞具<b>相同 DNA</b>，因<b>基因選擇性表現</b>而分化成不同功能細胞。所以同一人的神經細胞與皮膚細胞 <b>DNA 序列相同</b>，但所表現的 RNA／蛋白質種類不同。</p></div><svg viewBox=\"0 0 560 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:540px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"270\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">分化潛能：由大到小</text>\n<rect x=\"20\" y=\"45\" width=\"118\" height=\"50\" rx=\"10\" fill=\"#0f2744\" opacity=\"0.9\"/><text x=\"79\" y=\"66\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">受精卵</text><text x=\"79\" y=\"83\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">全能性·成完整個體</text><rect x=\"152\" y=\"45\" width=\"118\" height=\"50\" rx=\"10\" fill=\"#0a7ea4\" opacity=\"0.9\"/><text x=\"211\" y=\"66\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">胚胎幹細胞</text><text x=\"211\" y=\"83\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">多能性·各種體細胞</text><rect x=\"284\" y=\"45\" width=\"118\" height=\"50\" rx=\"10\" fill=\"#15803d\" opacity=\"0.9\"/><text x=\"343\" y=\"66\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">成體幹細胞</text><text x=\"343\" y=\"83\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">如造血幹細胞</text><rect x=\"416\" y=\"45\" width=\"118\" height=\"50\" rx=\"10\" fill=\"#e8a000\" opacity=\"0.9\"/><text x=\"475\" y=\"66\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">已分化細胞</text><text x=\"475\" y=\"83\" text-anchor=\"middle\" font-size=\"9\" fill=\"#eef\">神經/皮膚/紅血球</text><text x=\"144\" y=\"74\" text-anchor=\"middle\" font-size=\"18\" fill=\"#555\">›</text><text x=\"276\" y=\"74\" text-anchor=\"middle\" font-size=\"18\" fill=\"#555\">›</text><text x=\"408\" y=\"74\" text-anchor=\"middle\" font-size=\"18\" fill=\"#555\">›</text>\n<rect x=\"20\" y=\"115\" width=\"510\" height=\"16\" rx=\"8\" fill=\"url(#gp)\"/>\n<defs><linearGradient id=\"gp\" x1=\"0\" x2=\"1\"><stop offset=\"0\" stop-color=\"#0f2744\"/><stop offset=\"1\" stop-color=\"#e8a000\"/></linearGradient></defs>\n<text x=\"30\" y=\"127\" font-size=\"9.5\" fill=\"#fff\">分化潛能高</text><text x=\"470\" y=\"127\" font-size=\"9.5\" fill=\"#fff\">分化潛能低</text>\n</svg><div class=\"concept\"><h3>② 幹細胞與分化潛能</h3><table class=\"tbl\"><tr><th>細胞</th><th>潛能</th><th>能力</th></tr><tr><td>受精卵</td><td>全能性</td><td>可發育成完整個體</td></tr><tr><td>胚胎幹細胞</td><td>多能性</td><td>可分化成各種體細胞，但不能單獨成個體</td></tr><tr><td>成體幹細胞（如造血幹細胞）</td><td>多潛能</td><td>分化能力有限</td></tr><tr><td>已分化成熟細胞</td><td>最低</td><td>一般不再分化</td></tr></table><div class=\"eg\">🐸 <b>核移植實驗（Gurdon, 1962）</b>：把蛙已分化腸細胞的核移入去核卵 → 可發育成完整個體 → 證明已分化細胞核仍保有發育成完整個體所需的<b>全部基因</b>。植物分生組織細胞具全能性。</div></div><svg viewBox=\"0 0 500 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:500px;display:block;margin:12px auto;background:#fbfcfe;border:1px solid #dde3ed;border-radius:10px\">\n<text x=\"250\" y=\"22\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#0f2744\">端粒：每次複製就變短 → 衰老</text>\n<rect x=\"60\" y=\"60\" width=\"70\" height=\"16\" rx=\"6\" fill=\"#0a7ea4\"/><rect x=\"50\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><rect x=\"130\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><text x=\"75\" y=\"98\" text-anchor=\"middle\" font-size=\"10\" fill=\"#555\">第1次分裂</text><rect x=\"210\" y=\"60\" width=\"62\" height=\"16\" rx=\"6\" fill=\"#0a7ea4\"/><rect x=\"200\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><rect x=\"272\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><text x=\"225\" y=\"98\" text-anchor=\"middle\" font-size=\"10\" fill=\"#555\">第20次分裂</text><rect x=\"360\" y=\"60\" width=\"54\" height=\"16\" rx=\"6\" fill=\"#0a7ea4\"/><rect x=\"350\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><rect x=\"414\" y=\"60\" width=\"10\" height=\"16\" rx=\"3\" fill=\"#b91c1c\"/><text x=\"375\" y=\"98\" text-anchor=\"middle\" font-size=\"10\" fill=\"#555\">第40+次分裂</text><text x=\"135\" y=\"72\" text-anchor=\"middle\" font-size=\"16\" fill=\"#999\">→</text><text x=\"285\" y=\"72\" text-anchor=\"middle\" font-size=\"16\" fill=\"#999\">→</text>\n<text x=\"75\" y=\"118\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b91c1c\">端粒長</text>\n<text x=\"375\" y=\"118\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b91c1c\">端粒過短→停止分裂</text>\n<text x=\"250\" y=\"145\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#15803d\">幹細胞·生殖細胞·癌細胞(海拉)端粒酶活性高 → 可持續分裂</text>\n</svg><div class=\"concept\"><h3>③ 細胞衰老與端粒</h3><p>DNA 每次複製，染色體末端<b>端粒</b>會逐漸縮短；端粒過短時細胞停止分裂、衰老（體細胞約分裂 20～50 次，海佛烈克極限）。<b>端粒酶</b>活性高者（幹細胞、生殖細胞、<b>癌細胞如海拉細胞</b>）端粒不縮短，可持續分裂。</p></div><div class=\"concept\"><h3>④ 細胞凋亡 vs 細胞壞死</h3><table class=\"tbl\"><tr><th></th><th>細胞凋亡（apoptosis）</th><th>細胞壞死（necrosis）</th></tr><tr><td>起因</td><td>基因調控的<b>程序性死亡</b>（正常生理）</td><td>外傷/缺氧/毒素等<b>意外</b></td></tr><tr><td>細胞體積</td><td>萎縮變小</td><td>腫脹脹大</td></tr><tr><td>細胞膜</td><td>完整、形成膜泡</td><td>破裂、內容物外漏</td></tr><tr><td>DNA</td><td>規律斷裂成片段</td><td>隨機降解</td></tr><tr><td>發炎</td><td>不引起</td><td>引起發炎</td></tr><tr><td>例子</td><td>蝌蚪變態尾巴消失、胚胎手指間蹼消失</td><td>燙傷、梗塞壞死</td></tr></table><p>📌 <b>學測對照</b>：109（專一性 T/B 細胞增生並分化）、110（分生組織細胞具分化能力）、103（複製羊桃莉＝體細胞核移植、無性生殖）。</p></div>"};
const QDB=[{"tid": "mol", "q": "下列哪一類生物大分子的組成元素中「同時含有氮(N)與磷(P)」？", "opts": ["醣類", "脂質", "蛋白質", "核酸"], "ans": 3, "exp": "<b>核酸</b>的單體是核苷酸（含氮鹼基＋五碳醣＋磷酸），所以含 C、H、O、N、<b>P</b>。蛋白質含 N 但不含 P；醣與脂只含 C、H、O。"}, {"tid": "mol", "q": "〔104學測改寫〕關於核酸的敘述：(甲)單體是核苷酸；(乙)RNA 是真核生物的遺傳物質；(丙)核酸由 C、H、O、N、P 組成；(丁)核酸分子皆為雙股螺旋。哪些正確？", "opts": ["甲、丙", "甲、乙", "乙、丁", "甲、乙、丙"], "ans": 0, "exp": "(甲)對：核酸單體＝核苷酸。(丙)對：含 C、H、O、N、P，不含 S。(乙)錯：遺傳物質是 <b>DNA</b>。(丁)錯：RNA 通常為<b>單股</b>。故甲、丙正確。"}, {"tid": "mol", "q": "〔106學測改寫〕葡萄糖、半乳糖（分子量皆 180）與核糖（分子量 150）皆由 C、H、O 組成。下列敘述何者正確？", "opts": ["葡萄糖與半乳糖為同素異形體", "葡萄糖與半乳糖互為同分異構物", "核糖是六碳醣", "三者分子量相同"], "ans": 1, "exp": "葡萄糖與半乳糖分子式同為 C₆H₁₂O₆ 但結構不同，互為<b>同分異構物</b>。同素異形體是指同一元素的不同單質（如氧氣與臭氧）。核糖是<b>五碳醣</b>。"}, {"tid": "mol", "q": "關於脂質的敘述，下列何者正確？", "opts": ["脂質易溶於水", "三酸甘油酯由甘油與 3 個脂肪酸組成，可儲存能量", "固醇類分子含大量氮元素", "磷脂不參與細胞膜的構成"], "ans": 1, "exp": "<b>三酸甘油酯（中性脂）</b>＝甘油＋3 脂肪酸，是主要的儲能脂質。脂質<b>不溶於水</b>；固醇類（膽固醇、性激素）只含 C、H、O；<b>磷脂</b>是細胞膜的主要成分。"}, {"tid": "mol", "q": "當胺基酸聚合形成蛋白質時，下列敘述何者正確？", "opts": ["每形成一個肽鍵需吸收一分子水", "單體之間以肽鍵相連，每連接一次脫去一分子水", "蛋白質的單體是核苷酸", "聚合過程不涉及共價鍵"], "ans": 1, "exp": "單體聚合成大分子是<b>脫水縮合</b>：每形成一個鍵就失去一分子 H₂O。水解才是<b>加水</b>把鍵切斷。蛋白質單體是<b>胺基酸</b>，以肽鍵（共價鍵）相連。"}, {"tid": "mol", "q": "關於水在生物體中的功能，下列何者「錯誤」？", "opts": ["水為極性分子，分子間可形成氫鍵", "水的比熱大，可協助生物體維持體溫", "水可溶解纖維素，故能在纖維素構造中運輸物質", "水可協助生物體內的物質運輸"], "ans": 2, "exp": "水<b>不能溶解纖維素</b>，此為常見陷阱。水確為極性分子、可形成氫鍵、比熱大協助恆溫、是良好溶劑協助運輸。另：「水解離可提供能量」也是錯的。"}, {"tid": "cell", "q": "下列胞器與功能的配對，何者正確？", "opts": ["核糖體—合成脂質", "平滑內質網—合成蛋白質", "高基氏體—修飾、包裝、分泌蛋白質", "溶體—進行光合作用"], "ans": 2, "exp": "<b>高基氏體</b>負責修飾、包裝、分泌蛋白質。核糖體合成<b>蛋白質</b>；<b>平滑</b>內質網合成脂質、<b>粗糙</b>內質網運輸蛋白質；溶體含水解酶（光合在葉綠體）。"}, {"tid": "cell", "q": "〔109學測改寫〕下列何種構造「同時」具有 DNA、RNA、蛋白質及磷脂質？", "opts": ["核糖體", "中心粒", "核仁", "粒線體"], "ans": 3, "exp": "<b>粒線體</b>（與葉綠體）為<b>雙層膜</b>胞器，含自身的 DNA、RNA、核糖體（蛋白質）與膜上的磷脂質，四者兼具。核糖體無膜（無磷脂質）；核仁無膜。"}, {"tid": "cell", "q": "〔107學測改寫〕關於粒線體與葉綠體，下列何者正確？", "opts": ["兩者各自具有 DNA，可製造本身所需的部分蛋白質", "葡萄糖的分解（糖解）在粒線體內進行", "葉綠體為植物獨有，粒線體為動物獨有", "粒線體可產生 ATP，葉綠體則不能"], "ans": 0, "exp": "粒線體與葉綠體都含<b>自身 DNA</b>，可製造部分自需蛋白質。糖解在<b>細胞質</b>進行；植物細胞兩者皆有；葉綠體在光合中<b>也會產生 ATP</b>。"}, {"tid": "cell", "q": "關於細胞膜的流體鑲嵌模型，下列何者正確？", "opts": ["由磷脂雙層構成，親水頭朝外、疏水尾相對朝內", "膜上完全不含蛋白質", "細胞膜完全不通透任何物質", "膜外側不含任何醣類"], "ans": 0, "exp": "流體鑲嵌模型＝<b>磷脂雙層</b>（親水頭朝水、疏水尾相對）＋鑲嵌蛋白質（可貫穿）＋膽固醇＋醣類（作辨識標記）。細胞膜具<b>選擇性通透</b>（半透膜）。"}, {"tid": "cell", "q": "〔106學測改寫〕下列物質進入細胞的方式：(甲)水以滲透進入根細胞；(乙)氧以簡單擴散進入肺泡細胞；(丙)酒精以主動運輸通過細胞膜；(丁)澱粉由運輸蛋白進入塊莖細胞。哪些正確？", "opts": ["丙、丁", "乙、丁", "甲、乙", "甲、丙"], "ans": 2, "exp": "(甲)(乙)正確。(丙)錯：酒精為脂溶性，走<b>簡單擴散</b>，不需耗能。(丁)錯：澱粉是大分子，不能直接由運輸蛋白進入細胞。故甲、乙。"}, {"tid": "cell", "q": "〔110學測改寫〕下列何種運輸「不需細胞膜上的運輸蛋白，也不消耗 ATP」？", "opts": ["植物根部細胞自土壤吸收無機鹽", "氧氣在肺泡與肺泡細胞間的交換", "白血球對細菌的吞噬", "腎小管管壁細胞對葡萄糖的再吸收"], "ans": 1, "exp": "氧氣交換屬<b>簡單擴散</b>，順濃度梯度、不需蛋白也不耗 ATP。吸收無機鹽、再吸收葡萄糖屬<b>主動運輸</b>（耗 ATP）；吞噬屬胞吞（耗能）。"}, {"tid": "cell", "q": "胰島素在細胞內合成並分泌到細胞外，正確的先後順序為何？", "opts": ["高基氏體 → 核糖體 → 粗糙內質網 → 囊泡 → 胞吐", "核糖體 → 粗糙內質網 → 高基氏體 → 囊泡 → 胞吐", "粗糙內質網 → 核糖體 → 高基氏體 → 胞吐", "核糖體 → 高基氏體 → 粗糙內質網 → 囊泡"], "ans": 1, "exp": "基因轉錄出 mRNA→<b>核糖體</b>轉譯→<b>粗糙內質網</b>摺疊→<b>高基氏體</b>修飾切割→<b>囊泡</b>沿微管運送→<b>胞吐</b>送出。蛋白質分泌路徑的固定順序。"}, {"tid": "enz", "q": "關於酵素的本質與作用，下列何者正確？", "opts": ["酵素提高活化能以加速反應", "酵素反應後即被消耗，無法再使用", "酵素主成分為蛋白質，少數 RNA 也具催化活性", "酵素會改變反應物與生成物之間的能量差"], "ans": 2, "exp": "酵素主成分是<b>蛋白質</b>，少數 RNA 也具催化能力（核糖酶）。酵素<b>降低</b>活化能、反應前後本身不變可<b>重複使用</b>、不改變反應物與生成物的能量差（ΔH）。"}, {"tid": "enz", "q": "酵素催化生化反應時，與受質結合的「活性位」位於何處？", "opts": ["受質分子上", "酵素分子上", "輔酶分子上", "細胞膜上"], "ans": 1, "exp": "<b>活性位（active site）</b>位在<b>酵素分子</b>上，受質與之結合並被催化；催化過程中受質結構會改變，酵素本身不變。"}, {"tid": "enz", "q": "在反應中加入適量酵素後，反應的「活化能」與「淨能量變化(ΔH)」會如何改變？", "opts": ["活化能升高，ΔH 不變", "活化能降低，ΔH 不變", "活化能降低，ΔH 也變小", "兩者皆不改變"], "ans": 1, "exp": "酵素只<b>降低活化能</b>，使反應更易發生；但反應物與生成物的能量差（<b>ΔH 淨能量變化</b>）由物質本身決定，<b>不因加酶而改變</b>。"}, {"tid": "enz", "q": "下列何者最適合描述「一般酵素活性與溫度的關係」？", "opts": ["溫度越高，活性越強", "活性先隨溫度上升，超過最適溫度後因蛋白質變性而急降", "活性與溫度完全無關", "活性在高溫時最高且維持穩定"], "ans": 1, "exp": "酵素是蛋白質，活性隨溫度上升而加快，但<b>超過最適溫度</b>後蛋白質<b>變性</b>，活性急遽下降，呈<b>先升後降</b>的單峰曲線（人體酶最適約 37℃）。"}, {"tid": "enz", "q": "〔102指考改寫〕某酶以反應速率對受質濃度作圖：達最大反應速率一半時受質濃度為 1 mM，達最大反應速率時為 2 mM。加入某化學物質後曲線向右移（最大反應速率不變，但需更高受質濃度才能達到）。此物質的作用最可能為何？", "opts": ["使酵素變性而完全失活", "為輔酶，可提高最大反應速率", "抑制酵素活性，使達同樣速率需更高受質濃度", "與受質結合形成沉澱"], "ans": 2, "exp": "曲線<b>右移</b>而最大反應速率不變，代表需要<b>更高受質濃度</b>才能達到原速率，是典型的（競爭性）<b>抑制</b>作用；若使酵素變性則最大速率會下降，不符。"}, {"tid": "enz", "q": "〔111學測改寫〕胃蛋白酶可將蛋白質分解為小片段。下列敘述：(甲)酵素通常是胺基酸的聚合物；(乙)胃蛋白酶在 pH＝7.4 時活性最佳；(丙)溫度越高胃蛋白酶催化能力越強；(丁)食用大量制酸劑會降低胃蛋白酶的催化能力。哪些正確？", "opts": ["甲、丁", "甲、乙", "乙、丙", "丙、丁"], "ans": 0, "exp": "(甲)對：酵素是蛋白質＝胺基酸聚合物。(丁)對：制酸劑使胃內 pH 升高，遠離胃蛋白酶最適 pH(~2)，活性下降。(乙)錯：胃蛋白酶最適為酸性；(丙)錯：過高溫會變性。"}, {"tid": "enz", "q": "關於酵素的輔因子：(甲)所有酵素都必須有輔因子才能作用；(乙)有機的輔因子又稱輔酶；(丙)一種輔因子可協助多種酵素；(丁)輔因子使用後即分解、不可重複使用。哪些正確？", "opts": ["乙、丙", "甲、乙", "丙、丁", "甲、丁"], "ans": 0, "exp": "(乙)(丙)正確：有機輔因子＝<b>輔酶</b>（如 NADH）；一種輔因子可協助多種酶。(甲)錯：並非所有酶都需要輔因子；(丁)錯：輔因子與輔酶皆可<b>重複使用</b>。"}, {"tid": "fate", "q": "同一個人身上的神經細胞與皮膚細胞，其細胞內部何種物質相同？", "opts": ["所表現的蛋白質種類", "DNA 序列", "mRNA 種類", "細胞的形態與功能"], "ans": 1, "exp": "由同一受精卵分裂而來，故<b>DNA 序列相同</b>；但因<b>基因選擇性表現</b>，不同細胞表現的 mRNA／蛋白質種類不同，形態功能也不同。"}, {"tid": "fate", "q": "下列細胞依「分化潛能由大到小」排列，何者正確？", "opts": ["神經細胞 > 造血幹細胞 > 胚胎幹細胞 > 受精卵", "受精卵 > 胚胎幹細胞 > 造血幹細胞 > 神經細胞", "造血幹細胞 > 受精卵 > 神經細胞 > 胚胎幹細胞", "四者分化潛能完全相同"], "ans": 1, "exp": "分化潛能：<b>受精卵</b>（全能性）＞<b>胚胎幹細胞</b>（多能性）＞<b>成體/造血幹細胞</b>（潛能有限）＞<b>已分化的神經細胞</b>（最低）。"}, {"tid": "fate", "q": "下列何種細胞因「端粒酶活性高、端粒不縮短」而能持續分裂、不易衰老？", "opts": ["成熟的神經元", "海拉（癌）細胞", "老化的皮膚細胞", "成熟的紅血球"], "ans": 1, "exp": "<b>海拉細胞（HeLa，癌細胞）</b>端粒酶活性高，端粒不縮短而可無限分裂；幹細胞、生殖細胞亦然。一般體細胞端粒隨複製縮短，分裂約 20～50 次後衰老。"}, {"tid": "fate", "q": "關於細胞凋亡（apoptosis），下列何者正確？", "opts": ["為受基因調控的程序性死亡，如蝌蚪變態時尾巴消失", "細胞腫脹、細胞膜破裂並引起發炎", "主要因外傷或缺氧等意外造成", "DNA 被隨機降解"], "ans": 0, "exp": "<b>細胞凋亡</b>是受基因調控的<b>程序性死亡</b>，屬正常生理（如蝌蚪尾、胚胎指間蹼消失）；細胞萎縮、膜完整成膜泡、DNA 規律斷裂、<b>不引起發炎</b>。腫脹破裂發炎的是<b>細胞壞死</b>。"}, {"tid": "fate", "q": "將蛙的「已分化腸細胞核」移植到去核的卵中，竟能發育成完整個體。此實驗結果說明？", "opts": ["已分化細胞的細胞核仍保有發育成完整個體所需的全部基因", "分化會使細胞永久失去部分基因", "卵的細胞質中不含任何遺傳物質", "腸細胞的細胞核已不含 DNA"], "ans": 0, "exp": "Gurdon（1962）核移植實驗顯示：已分化細胞的<b>細胞核仍含完整基因</b>，分化只是基因<b>選擇性表現</b>、並未遺失基因，故能重新發育成完整個體。"}];

  b.onclick=()=>switchTopic(t.id);ttabs.appendChild(b);
});
function switchTopic(id){curTopic=id;document.querySelectorAll(".ttab").forEach(x=>x.classList.remove("on"));document.getElementById("tab-"+id).classList.add("on");render();window.scrollTo(0,0);}
function render(){
  const t=TOPICS.find(x=>x.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let h="";
  if(NOTES&&NOTES[curTopic]){
    h+=`<div class="note-box"><div class="note-hd" onclick="toggleNote(this)"><span style="font-size:1.2rem">${t.icon}</span><h2>${t.name}｜重點筆記（點此展開）</h2><span class="arr">▼</span></div><div class="note-body">${NOTES[curTopic]}</div></div>`;
  }
  h+=`<div class="q-hd"><h2>${t.icon} ${t.name}</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const o=q.opts.map((op,oi)=>`<div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})"><span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${op}</span></div>`).join("");
    h+=`<div class="qcard"><div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div><div class="opts">${o}</div><div class="exp" id="exp_${aid}">${q.exp}</div></div>`;
  });
  h+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=h;
  qs.forEach((q,i)=>{const aid=curTopic+"_"+i;if(answered[aid])applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);});
}
function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}
function pick(aid,sel,ans){if(answered[aid])return;const c=sel===ans;answered[aid]={sel,correct:c};applyResult(aid,sel,c,ans);updateScore();}
function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{const o=document.getElementById("opt_"+aid+"_"+i);if(!o)return;o.classList.add("done");
    if(i===sel&&correct)o.classList.add("ok");else if(i===sel&&!correct)o.classList.add("ng");else if(i===ans&&!correct)o.classList.add("ok");else o.classList.add("fade");});
  const e=document.getElementById("exp_"+aid);if(e)e.classList.add("show");
}
function resetTopic(){QDB.filter(q=>q.tid===curTopic).forEach((_,i)=>delete answered[curTopic+"_"+i]);render();updateScore();}
function updateScore(){const a=Object.values(answered),d=a.length,ok=a.filter(x=>x.correct).length;
  document.getElementById("s-done").textContent=d;document.getElementById("s-ok").textContent=ok;document.getElementById("s-ng").textContent=d-ok;
  document.getElementById("s-pct").textContent=d>0?Math.round(ok/d*100)+"%":"—";document.getElementById("ptfill").style.width=(d/TOTAL*100)+"%";}
render();
</script>
</body>
</html>
