<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國一歷史第二冊｜期末複習與模擬考卷</title>
<style>
:root{--pri:#2563eb;--prid:#1e40af;--sec:#f59e0b;--bg:#f8f7f2;--card:#fff;--txt:#1f2937;--muted:#6b7280;--border:#e5e7eb;--ok:#16a34a;--err:#dc2626;--acc:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;font-size:17px;line-height:1.8;background:var(--bg);color:var(--txt);min-height:100vh}
.site-header{background:var(--pri);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.back-btn{background:#fff;color:var(--pri);border:none;padding:7px 14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.2s}
.back-btn:hover{background:#dbeafe}
.site-title{font-size:18px;font-weight:700}
.container{max-width:920px;margin:0 auto;padding:24px 16px}
.section{display:none}.section.active{display:block}
#home{display:block}
.home-intro{background:var(--pri);color:#fff;border-radius:16px;padding:24px 28px;margin-bottom:28px}
.home-intro h1{font-size:22px;margin-bottom:6px}
.home-intro p{font-size:16px;opacity:.9}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:28px}
.home-card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:.2s;text-align:center}
.home-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 18px rgba(37,99,235,.15)}
.home-card.ht{border-top:4px solid var(--sec)}
.home-card.ex{border-top:4px solid var(--pri)}
.card-icon{font-size:36px;margin-bottom:10px}
.card-title{font-size:17px;font-weight:700;margin-bottom:6px}
.card-desc{font-size:15px;color:var(--muted)}
.to-home{background:var(--muted);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:16px;cursor:pointer;margin-bottom:20px;display:inline-flex;align-items:center;gap:5px}
.to-home:hover{background:#4b5563}
.page-title{font-size:21px;font-weight:700;margin-bottom:6px}
.page-sub{font-size:15px;color:var(--muted);margin-bottom:20px}
/* handout */
.ht-section{background:var(--card);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid var(--sec)}
.ht-sec-title{font-size:18px;font-weight:700;color:var(--pri);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.fill-text{font-size:17px;line-height:2.4}
.blank{display:inline-block;border-bottom:2px solid #9ca3af;min-width:2.5em;text-align:center;margin:0 3px;color:#6b7280;cursor:pointer;transition:.2s;padding:2px 8px;border-radius:6px;background:#f3f4f6;font-weight:700;user-select:none}
.blank:hover{background:#dbeafe;border-color:var(--pri);color:var(--pri)}
.blank.show{color:var(--ok);font-weight:700;border-color:var(--ok);background:#dcfce7}
.reveal-btn{background:var(--sec);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:14px;font-weight:700;transition:.2s}
.reveal-btn:hover{filter:brightness(.9)}
.hide-btn{background:#6b7280;color:#fff;border:none;padding:6px 16px;border-radius:8px;font-size:15px;cursor:pointer;margin-top:8px;margin-left:8px}
table{width:100%;border-collapse:collapse;margin:14px 0;font-size:16px}
th,td{border:1px solid var(--border);padding:9px 13px;text-align:center}
th{background:var(--pri);color:#fff}
tr:nth-child(even){background:#f9fafb}
/* exam */
.exam-header{background:var(--pri);color:#fff;padding:20px 24px;border-radius:12px;margin-bottom:20px}
.exam-header h2{font-size:19px;margin-bottom:4px}
.exam-header p{font-size:15px;opacity:.85}
.topic-group-box{background:#eff6ff;border:2px solid #bfdbfe;border-radius:10px;padding:14px 18px;margin:20px 0 12px;font-size:16px}
.topic-group-box strong{color:var(--pri);display:block;font-size:17px;margin-bottom:6px}
.q-card{background:var(--card);border-radius:12px;padding:22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-num{font-size:15px;color:var(--muted);margin-bottom:6px}
.q-text{font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.8}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{background:#f9fafb;border:2px solid var(--border);border-radius:10px;padding:11px 15px;font-size:17px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:9px;transition:.2s}
.opt-btn:hover:not(:disabled){border-color:var(--pri);background:#eff6ff}
.opt-btn.selected{border-color:var(--pri);background:#dbeafe}
.opt-btn.correct{border-color:var(--ok);background:#dcfce7;color:var(--ok);font-weight:700}
.opt-btn.wrong{border-color:var(--err);background:#fee2e2;color:var(--err)}
.opt-btn:disabled{cursor:default}
.opt-letter{font-weight:700;min-width:22px}
.analysis-btn{background:var(--acc);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:700;display:none}
.analysis-btn:hover{filter:brightness(.9)}
.analysis-box{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:14px;margin-top:10px;font-size:16px;color:#5b21b6;display:none;line-height:1.8}
.score-btn{background:var(--sec);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin:24px auto;display:block;transition:.2s}
.score-btn:hover{filter:brightness(.9)}
.score-box{background:var(--pri);color:#fff;border-radius:16px;padding:28px;text-align:center;margin:20px 0;display:none}
.score-num{font-size:60px;font-weight:700;margin:12px 0}
.score-grade{font-size:22px;margin-bottom:8px}
.score-detail{font-size:16px;opacity:.85}
@media(max-width:600px){.home-grid{grid-template-columns:1fr}.q-card{padding:16px}}
</style>
</head>

    {q:'5. 土地改革後，自耕農比例從 56% 大幅提升至約多少？',opts:['65%','75%','85%','95%'],ans:2,exp:'土地改革三步驟實施後，自耕農比例大幅提升至約 85%，大批佃農成為自耕農。'},
    {q:'6. 民國四十年代政府推行「進口替代」政策，主要目標為何？',opts:['大量出口賺取外匯','發展輕工業取代進口品，減少外匯支出','引進外資建設重工業','推動高科技產業'],ans:1,exp:'進口替代以農業培養工業，扶植紡織等民生工業，減少進口依賴。'},
    {q:'7. 民國五十五年（1966），政府在哪個城市設立台灣第一個加工出口區？',opts:['台北','台中','高雄','基隆'],ans:2,exp:'1966 年政府在高雄楠梓設立台灣第一個加工出口區，生產輕工業品大量出口賺取外匯。'},
    {q:'8. 民國五十年代加工出口區中，女工最可能從事哪種工作？',opts:['操作煉製石油的機器','研發製作晶圓半導體','操作縫紉機生產衣服','監控核能發電廠'],ans:2,exp:'出口導向時期，加工出口區主要生產紡織、電子等勞力密集輕工業品，女工多從事縫紉等工作。'},
    {q:'9. 民國六十年代，蔣經國推動「十大建設」的主要背景為何？',opts:['韓戰爆發，需要軍事建設','退出聯合國，需提振民心','石油危機（能源危機）衝擊，需改善投資環境','土地改革完成，轉向工業'],ans:2,exp:'1973 年石油危機使台灣經濟受到嚴重衝擊，蔣經國推動十大建設以改善基礎設施、提振投資信心。'},
    {q:'10. 十大建設中比例最高的建設類型為何？',opts:['能源類','工業類','交通類','農業類'],ans:2,exp:'十大建設中交通建設占最大比例，包含中山高速公路、北迴鐵路、鐵路電氣化、台中港、蘇澳港、桃園機場。'},
    {q:'11. 台灣第一條高速公路是哪一條？其南北端點為何？',opts:['福爾摩沙高速公路，台北至台南','中山高速公路，基隆至高雄','中部橫貫公路，台中至花蓮','南迴公路，台南至台東'],ans:1,exp:'中山高速公路（縱貫公路）是台灣第一條高速公路，起點基隆、終點高雄，是十大建設最重要的交通項目。'},
    {q:'12. 下列何者「不屬於」十大建設的項目？',opts:['中山高速公路','北迴鐵路','南迴鐵路','鐵路電氣化'],ans:2,exp:'南迴鐵路並非十大建設項目，是後來（民國 80 年代）才完成的。十大建設沒有南迴鐵路。'},
    {q:'13. 民國七十年代，政府成立哪個園區，推動高科技產業升級？',opts:['加工出口區','工業區','新竹科學工業園區','南港軟體園區'],ans:2,exp:'民國 69 年（1980 年）政府成立新竹科學工業園區，吸引半導體等高科技企業進駐，推動產業升級。'},
    {q:'14. 台積電被稱為「台灣護國神山」，主要因為掌握了什麼關鍵技術？',opts:['石油提煉','高端晶圓（半導體）製造','航空技術','農業生技'],ans:1,exp:'台積電在高端晶圓製造有極高的全球市占率，掌握半導體關鍵技術，被稱為台灣護國神山。'},
    {q:'15. 台灣的經濟發展歷程，按時間先後順序排列正確的是？（甲）進口替代（乙）出口導向（丙）十大建設（丁）產業升級',opts:['甲→乙→丙→丁','乙→甲→丙→丁','丙→乙→甲→丁','甲→丙→乙→丁'],ans:0,exp:'台灣經濟發展：進口替代（40 年代）→ 出口導向（50 年代）→ 十大建設（60 年代）→ 產業升級（70-80 年代）。'},
    {q:'16. 台灣曾有「製傘王國」、「電扇王國」等世界第一稱號，與哪個時代的政策有關？',opts:['進口替代','出口導向','十大建設','自由化國際化'],ans:1,exp:'民國 50 年代出口導向時期，台灣大量出口傘、電扇、自行車、毛衣等輕工業品，創下多項世界第一。'},
    {q:'17. 民國六十三年（1974），台灣經濟成長率大幅下降，主因為何？',opts:['八二三炮戰','美麗島事件','國際石油危機','退出聯合國'],ans:2,exp:'1973 年第一次石油危機衝擊全球，造成台灣 1974 年（民國 63 年）經濟成長率驟降。'},
    {q:'18. 政府推動土地改革後，地主資金的去向對台灣有何影響？',opts:['資金流往海外','引導地主轉向工業投資，帶動工業化','政府沒收地主所有財產','地主購買農業機械提升農業效率'],ans:1,exp:'政府以實物土地債券和國家股票補償地主，引導其資金轉投工業，是台灣工業化的重要推手。'},
    {q:'19. 民國四十至五十四年間，美援對台灣飲食文化有何影響？',opts:['台灣人全面放棄米食','美國過剩的麵粉大量輸台，造成飲食西化（麵食、麵包盛行）','農業因此蕭條','台灣成為小麥出口國'],ans:1,exp:'美援期間，美國將過剩的麵粉輸送來台，讓台灣出現飲食西化現象，麵食、麵包大量出現在餐桌上。'},
    {q:'20. 台灣在何時、以何名義加入 APEC（亞太經濟合作會議）？',opts:['民國 80 年，以中華台北','民國 91 年，以台灣','民國 68 年，以中華民國','民國 76 年，以中國台灣'],ans:0,exp:'台灣於 1991 年（民國 80 年）以「中華台北」名義加入 APEC，推動自由化與國際化。'},
    {q:'21. 台灣在民國九十一年（2002 年）加入哪個全球性經濟組織？',opts:['聯合國','APEC','世界貿易組織（WTO）','亞洲開發銀行'],ans:2,exp:'台灣於 2002 年以「台澎金馬個別關稅領域」名義加入 WTO，推動貿易自由化。'},
    {q:'22. 台灣加入 WTO 後，哪個產業受到最大衝擊？',opts:['科技業','農業','服務業','製造業'],ans:1,exp:'加入 WTO 後台灣必須開放農產品進口，稻米等農產品面臨外國廉價農產競爭，農業衝擊最大。'},
    {q:'23. 「台灣錢，淹腳目」形容的是哪個時代的台灣？',opts:['日治時期','光復初期（1940 年代）','1970–80 年代台灣經濟起飛後','2000 年代後'],ans:2,exp:'「台灣錢，淹腳目」形容 1970-80 年代台灣經濟蓬勃發展，許多產業都創造豐厚財富。'},
    {q:'24. 民國 38 年至 40 年代初，政府推行「四萬換一元」幣制改革，發行新台幣，主要目的為何？',opts:['推動土地改革','穩定幣值，解決通貨膨脹問題','吸引外資','促進出口'],ans:1,exp:'1949 年政府實施貨幣改革，以 4 萬舊台幣換 1 元新台幣，旨在穩定幣值、抑制惡性通膨。'},
    {q:'25. 經濟快速發展帶來的最主要社會問題為何？',opts:['語言歧視','城鄉差距擴大','政治獨裁','外交孤立'],ans:1,exp:'經濟發展帶動都市化，農村人口大量移入城市，導致城鄉差距擴大是最直接的社會問題。'},
    {q:'26. 台灣產業升級的主要原因為何？',opts:['希望透過外銷賺取外匯，升級工業原料','基本工資調漲，發展高科技產業提高利潤','為了拓展全球市場加入國際貿易組織','因政策是出口導向，以台積電吸引外商'],ans:1,exp:'基本工資調漲後，勞力密集的輕工業利潤降低，政府積極推動高科技產業以提升附加價值。'},
    {q:'27. 新竹科學工業園區的成立，主要推動哪類產業？',opts:['紡織業','石化業','半導體與電子科技業','農業'],ans:2,exp:'新竹科學工業園區吸引台積電、聯電等半導體企業進駐，成為台灣高科技產業的搖籃。'},
    {q:'28. 以下政策按時間先後排列正確的是？（甲）建立加工出口區（乙）成立新竹科學園區（丙）推行十大建設（丁）進行土地改革',opts:['丁甲丙乙','乙甲丙丁','丙甲丁乙','甲乙丙丁'],ans:0,exp:'時序：土地改革（1949-1953）→ 加工出口區（1966）→ 十大建設（1970 年代）→ 新竹科學園區（1980）。'},
    // 題組一 Q29-32 土地改革統計表
    {group:'【題組一】閱讀以下統計資料後，回答 29–32 題。\n台灣農戶比例統計：\n年份 | 自耕農 | 半自耕農 | 佃農\n1951 | 38% | 25% | 37%\n1953 | 55% | 24% | 21%\n1955 | 59% | 23% | 18%\n1961 | 65% | 21% | 14%',
     q:'29. 此表格反映的是政府哪一項政策的成果？',opts:['十大建設','出口導向','土地改革','產業升級'],ans:2,exp:'自耕農持續增加、佃農大量減少，是土地改革政策（三七五減租、公地放領、耕者有其田）的成果。'},
    {q:'30. 1953 年後自耕農大幅增加，最主要是哪兩項政策的功效？',opts:['三七五減租與公地放領','公地放領與耕者有其田','進口替代與出口導向','三七五減租與耕者有其田'],ans:1,exp:'1951 年公地放領與 1953 年耕者有其田的實施，使大批佃農取得自有土地，自耕農大幅增加。'},
    {q:'31. 佃農收益持續增加（如稻穀收益從民國 37 年 1947 公斤增至 55 年 7525 公斤），反映的是哪項政策？',opts:['十大建設','土地改革','出口導向','產業升級'],ans:1,exp:'土地改革後農民取得自有土地，不再需要繳交高額地租，實質收益大幅提升。'},
    {q:'32. 土地改革對台灣工業化的間接貢獻為何？',opts:['農業產值下降，工業自然填補缺口','政府將農民稅收全部投入工業','地主資金引導轉向工業投資，帶動工業化','農民移入城市成為工業勞動力'],ans:2,exp:'政府補償地主時發放實物債券和國家股票，引導地主資金轉投工業，是台灣工業化的重要推手。'},
    // 題組二 Q33-36 農工業外銷比例
    {group:'【題組二】閱讀以下台灣農工業外銷比例統計，回答 33–36 題。\n年份 | 農業產品 | 工業產品\n1962 年 | 49% | 51%\n1973 年 | 17% | 83%',
     q:'33. 上表最明顯反映了 1962 年至 1973 年間台灣哪項變化？',opts:['農業大幅成長','工業產品出口比例大幅提升','農工業均衡發展','外銷額整體下降'],ans:1,exp:'工業產品出口從 51% 大幅上升至 83%，農業從 49% 降至 17%，顯示台灣工業化的快速成長。'},
    {q:'34. 造成此變化的最主要經濟措施為何？',opts:['土地改革','成立新竹科技園區','實施出口導向政策','加入 WTO'],ans:2,exp:'民國 50 年代的出口導向政策，帶動工業品大量出口，使工業在外銷中的比例大幅提升。'},
    {q:'35. 1973 年後如果繼續統計，工業產品比例大致維持高檔，其中民國七十年代後高科技產品崛起，與哪項政策最有關？',opts:['出口導向','進口替代','新竹科學工業園區成立（產業升級）','十大建設'],ans:2,exp:'民國 69 年新竹科學工業園區成立，推動半導體等高科技產業，是台灣出口結構升級的關鍵。'},
    {q:'36. 下列有關台灣農業政策的敘述，何者正確？',opts:['土地改革後農業完全被工業取代','美援期間農業與工業同等重要，比重相同','進口替代時期的核心是「以農業培養工業」','加工出口區設立後農業立即消失'],ans:2,exp:'進口替代時期的核心策略是「以農業培養工業」，用農業收益扶植輕工業，不是立即取代農業。'},
    // 題組三 Q37-40 台積電新聞
    {group:'【題組三】閱讀以下新聞後，回答 37–40 題。\n「AI 教父輝達（NVIDIA）創辦人黃仁勳宣布，輝達台灣總部將落腳台北北投、士林一帶，此消息讓台灣半導體高科技業等極為期待。回顧台灣某一時期，經濟政策朝向發展技術、資本密集且具有高附加價值的高科技產業，為帶動高科技業發展，政府推動了重要措施。」',
     q:'37. 文中所述政府推動的「重要措施」最可能為何？',opts:['推動土地改革','設置加工出口區','成立新竹科學工業園區（產業升級）','實施十大建設'],ans:2,exp:'台灣發展高科技產業的關鍵措施是成立新竹科學工業園區，吸引台積電等半導體企業。'},
    {q:'38. 台灣護國神山台積電的崛起，與哪個產業升級政策關係最密切？',opts:['土地改革','出口導向','新竹科學工業園區帶動的半導體產業升級','十大建設的交通建設'],ans:2,exp:'台積電在 1987 年成立於新竹科學園區，是政府推動高科技產業升級的代表性成就。'},
    {q:'39. 新竹科學工業園區的成立時間約在何時？',opts:['民國 50 年代（出口導向時期）','民國 60 年代（十大建設時期）','民國 70 年代（產業升級時期）','民國 80 年代（自由化時期）'],ans:2,exp:'新竹科學工業園區成立於民國 69 年（1980 年），是產業升級時期的代表性措施。'},
    {q:'40. 從「製傘王國」到「半導體王國」，台灣最主要的政策推手為何？',opts:['土地改革','三七五減租','產業升級政策（成立科學園區）','加工出口區政策'],ans:2,exp:'台灣從勞力密集的輕工業轉型為資本與技術密集的半導體產業，靠的是產業升級政策的推動。'},
  ]
},
{
  id:'ex-3', title:'模擬考卷三：社會文化綜合篇', icon:'🎭', desc:'國語運動・文學・原住民運動・綜合（40 題・100 分）',
  qs:[
    {q:'1. 政府遷台後大力推行「國語運動」，主要目的是清除哪種語言的影響？',opts:['英語','日語','閩南語','客語'],ans:1,exp:'政府推行「國語運動」以消除日治時期日語在台灣日常生活中的影響力。'},
    {q:'2. 「說國語運動」推廣的「國語」是指哪種語言？',opts:['閩南語','客語','北京話（普通話）','英語'],ans:2,exp:'政府推廣的「國語」是北京話（普通話），藉以強化人民對中華文化的認同。'},
    {q:'3. 路名從「大政町、本町」改為「中山路、民權路」，最能反映哪個歷史背景？',opts:['日本接收台灣','光復後政權轉移，消除日治影響','解嚴後推動多元文化','加入聯合國後改名'],ans:1,exp:'光復後政府更改日治時期的路名，是政權轉移後破除舊政權影響的具體表現。'},
    {q:'4. 民國四十至六十年代，美軍駐台帶入的「美援文化」，對台灣有哪些影響？',opts:['引進日本流行文化','帶來美國流行文化（搖滾樂、牛仔褲、英文老歌）','推廣台灣傳統文化','傳入客家文化'],ans:1,exp:'美援時期美軍駐台，帶入搖滾樂、牛仔褲、英文老歌等美國流行文化，深刻影響台灣社會。'},
    {q:'5. 「反共文學」的主要特色為何？',opts:['描述小人物的困境','讚揚原住民文化','以文字表達思念故土、對抗共產主義的情感','批評政府土地政策'],ans:2,exp:'反共文學盛行於民國 40 年代，主要描寫思念故土、立志反共的情感，是政府文化政策的產物。'},
    {q:'6. 民國六十年代興起「鄉土文學」，哪部作品是代表作？',opts:['蔣中正《中國的命運》','黃春明《兒子的大玩偶》','胡適《文學改良芻議》','余光中《鄉愁》'],ans:1,exp:'黃春明的《兒子的大玩偶》是鄉土文學的代表作，以寫實主義描寫台灣底層小人物的生活困境。'},
    {q:'7. 「鄉土文學」興起的背景，不包含下列何者？',opts:['台灣退出聯合國','城鄉差距擴大','少子化的衝擊','美台斷交帶來的認同危機'],ans:2,exp:'鄉土文學興起與退出聯合國、美台斷交、城鄉差距有關；少子化是近年才有的現象，與鄉土文學無關。'},
    {q:'8. 台灣文化的演變順序，下列何者正確？（甲）多元文化　（乙）反共文學　（丙）美援流行文化　（丁）鄉土文學',opts:['乙丙丁甲','丙乙丁甲','甲乙丙丁','丁乙甲丙'],ans:0,exp:'文化演變：反共文學（40 年代）→ 美援文化（40-60 年代）→ 鄉土文學（60-70 年代）→ 多元文化（80 年代後）'},
    {q:'9. 民國八十三年（1994），原住民族正名完成後，官方稱呼改為何？',opts:['山地族群','原住民（後再改稱原住民族）','邊疆民族','土著族'],ans:1,exp:'民國 83 年政府正式將「山地同胞」正名為「原住民」，後再更名為「原住民族」。'},
    {q:'10. 正名前，原住民族的官方稱呼為何？',opts:['南島民族','山地同胞','土著族','邊疆民族'],ans:1,exp:'正名前官方稱呼為「山地同胞」，民國 83 年（1994 年）正式正名為「原住民」。'},
    {q:'11. 原住民族運動中「還我土地運動」的主要訴求為何？',opts:['爭取獨立建國','抗議土地被強佔或限縮，要求土地正義','要求恢復日本統治','爭取加入聯合國'],ans:1,exp:'還我土地運動是原住民族抗議祖靈地被開發、保留地被限縮的社會運動，訴求土地正義。'},
    {q:'12. 原住民族「母語運動」的目標為何？',opts:['推廣北京話','恢復與保存原住民族傳統語言','引進英語教學','提倡日語教育'],ans:1,exp:'母語運動致力於復振原住民族傳統語言，促使學校開設族語課程、政府保護原住民族語言。'},
    {q:'13. 現今台灣社會的多元族群包含哪些？（甲）閩南（乙）客家（丙）原住民族（丁）外省籍（戊）新住民',opts:['甲乙丙','甲乙丙丁','甲乙丙丁戊','丙丁戊'],ans:2,exp:'現今台灣有五大族群：閩南、客家、外省籍（隨政府遷台）、原住民族、及近年移入的新住民。'},
    {q:'14. 「新住民」帶給台灣的主要貢獻為何？',opts:['是台灣唯一的文化主體','帶來東南亞等地的多元文化，豐富台灣文化內涵','以取代原住民文化為目標','是台灣最早的定居族群'],ans:1,exp:'新住民主要來自東南亞和其他地區，帶來各自的飲食、節慶、語言等文化，豐富台灣多元文化。'},
    {q:'15. 新北市中和每年舉辦「潑水節」，反映了台灣哪種社會現象？',opts:['原住民文化復振','新住民帶來東南亞文化','政府推廣反共文化','日本文化的影響'],ans:1,exp:'潑水節是東南亞（泰國等地）的傳統節日，在新北市中和出現，反映了新住民帶入不同地區文化的現象。'},
    {q:'16. ICRT 電台的前身為何？',opts:['日治時期廣播電台','美軍在台電台（美台軍事合作時代）','國共內戰宣傳台','聯合國廣播台'],ans:1,exp:'ICRT 前身為「美軍在台電台」，反映韓戰後美台緊密的軍事合作，美援時期美軍駐台的時代背景。'},
    {q:'17. 台灣各時代流行音樂的先後順序為何？（甲）原住民八部合音　（乙）反共歌曲　（丙）英文老歌　（丁）校園民歌',opts:['乙丙丁甲','甲乙丙丁','丙乙丁甲','乙丁甲丙'],ans:0,exp:'順序：反共歌曲（40 年代）→ 英文老歌（美援 40-60 年代）→ 校園民歌（鄉土 60-70 年代）→ 原住民八部合音（多元文化 80 年代後）。'},
    {q:'18. 「校園民歌」的興起與哪個文化運動最相關？',opts:['反共文學','美援文化','鄉土運動（鄉土文學）','多元文化運動'],ans:2,exp:'校園民歌興起於民國 60-70 年代，與鄉土運動密切相關，強調回歸本土、關懷台灣土地情感。'},
    {q:'19. 台灣新電影《兒子的大玩偶》上映前遭遇「削蘋果事件」，指的是什麼？',opts:['電影中蘋果場景被剪掉','官方施壓要求刪除片中呈現社會黑暗面的畫面','導演自行剪掉部分場景','演員糾紛導致部分場景重拍'],ans:1,exp:'《兒子的大玩偶》電影片段中呈現台北違建林立等有礙政府形象的畫面，遭官方施壓要求刪減，稱為「削蘋果事件」。'},
    {q:'20. 台灣多元文化的建立，主要是在哪個轉捩點之後？',opts:['二二八事件後','韓戰結束後','解嚴（民國 76 年）之後','加入 WTO 後'],ans:2,exp:'民國 76 年（1987 年）解嚴後，人民得以更自由表達自身文化，原住民族、客語等文化逐漸受到重視。'},
    {q:'21. 《兒子的大玩偶》的文學風格被稱為哪種文學？',opts:['古典文學','反共文學','鄉土文學','大眾文學'],ans:2,exp:'《兒子的大玩偶》以寫實主義描寫台灣社會小人物的困境，是鄉土文學的代表作品。'},
    {q:'22. 1950 年代台灣人主食出現麵食、麵包等飲食西化現象，最可能的原因為何？',opts:['日治時期政府將米大量送往日本','台灣物資被運往大陸支援國共內戰','三七五減租引發農民不滿','美援輸入大量麵粉，引發飲食西化'],ans:3,exp:'美援期間美國將過剩的麵粉輸送來台，使台灣出現麵食、麵包等飲食西化現象。'},
    {q:'23. 1949 年「四萬換一元」幣制改革，主要解決什麼問題？',opts:['促進出口','穩定幣值、解決惡性通貨膨脹','吸引外資','推動農業現代化'],ans:1,exp:'國共內戰期間台灣發生嚴重通貨膨脹，1949 年政府以 4 萬舊台幣換 1 新台幣，穩定幣值。'},
    {q:'24. 台灣原住民族在民國 77、78、82 年走上台北街頭示威，此運動稱為？',opts:['母語運動','正名運動','還我土地運動','多元文化運動'],ans:2,exp:'民國 77、78、82 年原住民族多次上街示威，以「還我土地」為主要訴求，稱為「還我土地運動」。'},
    {q:'25. 《姓名條例》修正草案允許原住民族使用原住民族文字單列名字，展現哪項運動的成果？',opts:['母語運動','正名運動','還我土地運動','多元文化運動'],ans:1,exp:'允許原住民族以原住民族文字單列名字，是正名運動長期訴求的重要成果。'},
    {q:'26. 民國 85 年（1996 年），政府成立哪個機構維護原住民族權益？',opts:['原住民族語言研究院','行政院原住民族委員會（原民會）','原住民族土地局','少數民族文化部'],ans:1,exp:'民國 85 年政府成立「行政院原住民族委員會」（原民會），專責維護原住民族的各項權益。'},
    {q:'27. 戰後台灣初期，原住民族登記戶籍時被強制登記漢名，此現象反映哪種政策？',opts:['土地改革','語言與文化同化政策','土地正義運動','農業現代化政策'],ans:1,exp:'戰後政府推行語言與文化同化政策，強制原住民族登記漢名、說國語，壓縮原住民族文化空間。'},
    {q:'28. 台灣加入 WTO 後，曾發生「白米炸彈客」楊儒門事件，他的訴求主要是反對什麼？',opts:['科技業壟斷','加入 WTO 後進口稻米傾銷，使台灣農民生計受損','政府推行土地改革','城鄉差距擴大'],ans:1,exp:'楊儒門認為台灣加入 WTO 後，零關稅進口稻米傾銷台灣，使農民面臨嚴重衝擊，以激進方式為農民發聲。'},
    // 題組一 Q29-32 台灣電影發展
    {group:'【題組一】閱讀以下資料後，回答 29–32 題。\n「民國 40 年代，台灣電影配合政府反共政策，幾乎都是官方意識形態的宣傳工具。民國 50 年代，電影開啟『健康寫實』風格，呈現人性的光輝。民國 70 年代初期，受香港電影新浪潮影響，進入『台灣新電影』時期。新電影初期代表作《兒子的大玩偶》在正式上映前，因電影片段中呈現台北違建林立等有礙政府形象的畫面，遭官方施壓要求刪減，此事件後來被稱為『削蘋果事件』。」',
     q:'29. 「新電影」出現之前，台灣電影最可能「不允許」播映哪種劇情？',opts:['中日戰爭期間國軍英勇抵抗','國軍將領英勇犧牲陣亡','男女主角談戀愛','主角因二二八事件遭軍警處決'],ans:3,exp:'戒嚴時期官方管控媒體，二二八事件是政治禁忌，描述主角因此遭處決的劇情不允許播映。'},
    {q:'30. 「台灣新電影」發展之初，最可能以下列何者作為電影題材？',opts:['宣揚反共精神','將美國流行文化作為劇情主軸','關注農民、工人等小人物生活中的困頓','重視原住民文化，發揚原住民族傳說'],ans:2,exp:'新電影融入鄉土文學題材，關注市井小民的生活困境，以寫實為主，有意識地挑戰官方政治禁忌。'},
    {q:'31. 「削蘋果事件」中，電影為何遭到官方施壓？',opts:['電影包含日語對話','呈現台北違建等有礙政府形象的畫面','電影資金來自中共','演員公開反政府言論'],ans:1,exp:'《兒子的大玩偶》電影片段中出現台北違建林立的畫面，有礙政府形象，因此遭官方施壓要求刪減。'},
    {q:'32. 最後是誰聲援《兒子的大玩偶》電影，使其逃過被刪剪的命運？',opts:['政府官員','影視記者楊士琪等人','美國好萊塢公司','中共方面'],ans:1,exp:'影視記者楊士琪等人積極聲援，才使《兒子的大玩偶》逃過被刪剪的命運，完整上映。'},
    // 題組二 Q33-36 原住民正名新聞
    {group:'【題組二】閱讀以下新聞後，回答 33–36 題。\n「世界棒球 12 強台灣好手吉力吉撈‧鞏冠（Giljegiljaw Kungkuan）在日本轉播時出現不同拼音方式引發熱議。原民青年陣線發文說明，希望原住民族選手和命名文化能被正確認識。立法院三讀通過《姓名條例》修正草案，增訂原住民族可使用原住民族文字、單列名字，不必侷限中文姓名。」',
     q:'33. 《姓名條例》修正草案的通過，主要展現了哪項原住民社會運動的成果？',opts:['母語運動','正名運動','還我土地運動','多元文化運動'],ans:1,exp:'允許原住民族以族語文字單列名字，正是正名運動長期爭取「恢復原住民族名稱尊嚴」的具體成果。'},
    {q:'34. 原民青年陣線等團體能夠積極發聲爭取權益，主要因為哪個歷史轉折？',opts:['中美建交後','退出聯合國後','能源危機下','政府宣布解除戒嚴，人民得以表達自身意見'],ans:3,exp:'民國 76 年（1987 年）解嚴後，人民的言論自由大幅增加，原住民族等族群得以積極發聲。'},
    {q:'35. 原住民族正名前，官方對原住民族的稱呼為何？',opts:['南島民族','山地同胞','土著族','原民族群'],ans:1,exp:'正名前官方稱「山地同胞」，民國 83 年正式正名為「原住民」，後再更名為「原住民族」。'},
    {q:'36. 原住民族文化復振包含哪幾項主要運動？（甲）還我土地運動（乙）正名運動（丙）母語運動（丁）白米炸彈運動',opts:['甲乙丙','乙丙丁','甲乙丁','甲丙丁'],ans:0,exp:'原住民族三大社會運動為：還我土地運動、正名運動、母語運動。白米炸彈是楊儒門為農民發聲的事件。'},
    // 題組三 Q37-40 台灣多元文化綜合
    {group:'【題組三】閱讀以下短文後，回答 37–40 題。\n「台灣從單元式的反共救國思想，到迎接美國西方文化，直至重新反省自我內涵的鄉土運動，最終變成包羅萬象的多元流行世界。台灣從來就不是一成不變的地方，他充滿著文化的底蘊。」',
     q:'37. 「反共救國思想」對應的是哪個時代的台灣文化？',opts:['民國 40 年代','民國 60 年代','民國 70 年代','民國 80 年代後'],ans:0,exp:'民國 40 年代是反共文學盛行的年代，政府以文化作為對抗共產主義的工具。'},
    {q:'38. 「迎接美國西方文化」最主要的歷史背景為何？',opts:['台灣加入 WTO','韓戰後美軍駐台與美援時代的到來','台灣退出聯合國','台灣解嚴'],ans:1,exp:'美援時期（民國 40-54 年）美軍駐台，帶入大量美國流行文化，是台灣「迎接西方文化」的主要背景。'},
    {q:'39. 「重新反省自我內涵的鄉土運動」，其代表文學作品為何？',opts:['余光中《鄉愁》（反共文學）','黃春明《兒子的大玩偶》（鄉土文學）','胡適《文學改良芻議》（新文學）','蔣中正《中國的命運》（反共著作）'],ans:1,exp:'《兒子的大玩偶》是鄉土文學的代表作，關注台灣農工社會底層小人物的生活，是重新反省本土認同的代表。'},
    {q:'40. 現今台灣能夠成為「包羅萬象的多元流行世界」，最主要的外在條件為何？',opts:['政府強制推廣外來文化','解嚴後加上網路資訊的發達','反中親美政策的實施','美軍持續駐台'],ans:1,exp:'解嚴後言論自由擴大，加上網路資訊的普及，使台灣能自由接觸並融合全球多元文化。'},
  ]
},
// ── 考卷四 ──────────────────────────────────────────────────
{
  id:'ex-4', title:'模擬考卷四：政治外交篇（第二回）', icon:'🌏', desc:'外交三階段・兩岸機構・台灣關係法（40 題・100 分）',
  qs:[
    {q:'1. 美援帶來的「美援文化」，下列哪項描述最恰當？',opts:['促進台灣傳統農業技術進步','使台灣民眾接觸英文老歌、牛仔褲、搖滾樂等美國流行文化','主要影響台灣政治制度的民主化','促使台灣脫離聯合國'],ans:1,exp:'美援期間，美軍帶入英文老歌、牛仔褲、搖滾樂、可口可樂等美國流行文化，稱為「美援文化」。'},
    {q:'2. 民國 43 年《中美共同防禦條約》的主要目的為何？',opts:['解決韓戰問題','美台建立正式邦交','將台灣納入西太平洋反共防禦體系','確立台灣加入聯合國'],ans:2,exp:'《中美共同防禦條約》使台灣納入美國在西太平洋的反共防禦體系，是鞏固外交的重要成果。'},
    {q:'3. 下列事件，哪個發生最早？',opts:['台灣退出聯合國','辜汪會談','韓戰爆發','大三通'],ans:2,exp:'韓戰爆發（民 39/1950）→ 退出聯合國（民 60/1971）→ 辜汪會談（民 82/1993）→ 大三通（民 97/2008）。'},
    {q:'4. 「莊敬自強，處變不驚」是哪位領導人在退出聯合國後發表的？',opts:['蔣中正','蔣經國','李登輝','馬英九'],ans:0,exp:'1971 年（民 60）中華民國退出聯合國後，蔣中正以「莊敬自強，處變不驚」安撫國人情緒。'},
    {q:'5. 「務實外交」的特徵是什麼？',opts:['積極爭取友邦正式邦交','不堅持為中國唯一合法政府，強調兩岸分裂分治','退出國際組織以示抗議','堅持聯合國席位不放棄'],ans:1,exp:'務實外交（李登輝後）不再堅持中華民國是代表中國唯一合法政府，改以中華台北名義參與國際。'},
    {q:'6. 美援期間（民 40–54 年），美國每年約提供多少援助？',opts:['5000 萬美元','1 億美元','5 億美元','15 億美元'],ans:1,exp:'美援期間每年約 1 億美元，整個美援期間總計約 15 億美元，涵蓋軍事、農業、教育等。'},
    {q:'7. 解除戒嚴並開放赴陸探親是哪一年？',opts:['民國 60 年','民國 68 年','民國 76 年','民國 82 年'],ans:2,exp:'民國 76 年（1987 年）政府解除戒嚴，並隨後開放民眾赴大陸探親，結束近 40 年兩岸隔絕。'},
    {q:'8. 台灣以「中華台北」名義加入 APEC 是在哪年？',opts:['民國 68 年','民國 76 年','民國 80 年','民國 91 年'],ans:2,exp:'民國 80 年（1991），台灣以「中華台北」名義加入 APEC（亞太經濟合作組織）。'},
    {q:'9. 關於台灣「海基會」與中共「海協會」，下列敘述何者正確？',opts:['兩者皆為官方機構','兩者皆為半官方機構','海基會是官方，海協會是半官方','海基會是半官方，海協會是官方'],ans:1,exp:'海基會（台灣）與海協會（中共）皆為半官方機構，是兩岸實際交流對話的管道。'},
    {q:'10. 《台灣關係法》設立的「AIT」，其功能相當於什麼？',opts:['美國大使館的替代機構','美軍駐台基地','台美貿易公司','美國官方軍事援助機構'],ans:0,exp:'AIT 是非官方機構，但功能實際相當於大使館，處理台美間實質事務，包含簽證、商務等。'},
    {q:'11. 外交三階段的正確分期，下列何者正確？',opts:['鞏固（民 40–60 年代初）→ 彈性（退聯後）→ 務實（李登輝後）','彈性（民 40s）→ 鞏固（民 50s）→ 務實（民 60s）','務實（民 40s）→ 鞏固（民 60s）→ 彈性（民 80s）','彈性（退聯後）→ 鞏固（民 40s）→ 務實（民 80s）'],ans:0,exp:'外交三階段：鞏固（民 40 至 60 年代初）→ 彈性（退出聯合國民 60 後）→ 務實（李登輝民 80 年代後）。'},
    {q:'12. 辜汪會談中，代表台灣出席的人物及機構為何？',opts:['辜振甫代表陸委會','汪道涵代表海基會','辜振甫代表海基會','辜振甫代表國台辦'],ans:2,exp:'辜汪會談中，台灣由海基會辜振甫出席，對應中共海協會汪道涵。'},
    {q:'13. 有關兩岸三時期政策配對，下列何者「正確」？',opts:['台灣「反攻大陸」對應中共「和平統戰」','台灣「三不政策」對應中共「一國兩制」','台灣「三民主義統一中國」對應中共「武力解放台灣」','台灣「大三通」對應中共「武力解放台灣」'],ans:1,exp:'「三不政策」（台灣蔣經國）↔「一國兩制」（中共鄧小平）是同一時期的對應立場。'},
    {q:'14. 下列有關退出聯合國的敘述，何者正確？',opts:['是中華民國自行宣布退出的','是聯合國安理會投票通過驅逐的','是聯合國大會通過第 2758 號決議的結果','是美台斷交後被迫退出的'],ans:2,exp:'1971 年聯合國大會通過第 2758 號決議，中共取代中華民國在聯合國的席位，我方稱「排我納匪案」。'},
    {q:'15. 韓戰爆發後，美國介入台海的直接行動是什麼？',opts:['直接出兵保衛台灣','提供核武協防台灣','派第七艦隊巡防台灣海峽','廢除對台灣的禁運政策'],ans:2,exp:'1950 年韓戰爆發後，美國總統杜魯門下令第七艦隊巡防台灣海峽，阻止共軍渡海攻台。'},
    {q:'16. 下列關於古寧頭戰役的敘述，何者正確？',opts:['發生於民國四十七年','地點在澎湖','共軍在此役擊退台灣守軍','此役穩定台海局勢，共軍無法順利渡海'],ans:3,exp:'民國 38 年（1949）古寧頭戰役，台灣守軍成功擊退共軍，穩定台海局勢，是保衛台灣的關鍵一役。'},
    {q:'17. 台灣加入 WTO 時，哪個產業受到的衝擊最大？',opts:['服務業','科技業','農業','製造業'],ans:2,exp:'民國 91 年（2002）台灣加入 WTO 後，因農產品開放進口，農業受到最大衝擊。'},
    {q:'18. 台灣以「中華台北」的名義參加哪些國際組織？',opts:['聯合國、APEC','APEC、WTO','WTO、WHO','聯合國、WHO'],ans:1,exp:'台灣以「中華台北」名義加入 APEC（民 80/1991）和 WTO（民 91/2002），是務實外交的具體成果。'},
    {q:'19. 「八二三炮戰」後，炮彈彈殼被用於製作什麼特產？',opts:['金門高粱酒','金門菜刀','金門陶瓷','馬祖特產'],ans:1,exp:'八二三炮戰後，數以萬計的炮彈彈殼被鍛造成菜刀，成為金門著名特產。'},
    {q:'20. 下列何者屬於「彈性外交」時期的具體做法？',opts:['積極爭取友邦正式承認','以「中華台北」名義參與奧運','中美簽訂共同防禦條約','堅持自身為中國唯一合法代表'],ans:1,exp:'彈性外交不堅持名稱，以「中華台北」名義參與國際賽事是其典型做法。'},
    {q:'21. 《中美共同防禦條約》廢止後，是由哪部法律取而代之？',opts:['太平洋安全法','台灣安全法','台灣關係法','共同防禦保護法'],ans:2,exp:'1979 年美台斷交後，中美共同防禦條約廢止，美國以《台灣關係法》取而代之，維持非官方往來。'},
    {q:'22. 下列何者不屬於《台灣關係法》的規定？',opts:['提供防禦性武器給台灣','設立 AIT 維持非官方往來','關切以非和平方式解決台灣問題','承諾美軍直接介入台海衝突'],ans:3,exp:'台灣關係法三大重點：提供防禦性武器、設立 AIT、關切非和平解決台灣問題，沒有承諾直接出兵。'},
    {q:'23. 有關兩岸機構的官方/半官方屬性，下列配對何者正確？',opts:['陸委會（半官方）↔ 國台辦（官方）','陸委會（官方）↔ 國台辦（官方）','海基會（官方）↔ 海協會（半官方）','陸委會（官方）↔ 海協會（官方）'],ans:1,exp:'陸委會（台灣官方）↔ 國台辦（中共官方）；海基會（台灣半官方）↔ 海協會（中共半官方）。'},
    {q:'24. 民國 68 年，美國與我國斷交的背景原因為何？',opts:['越戰結束，美國調整亞洲政策','美國與中共建交，轉向承認中華人民共和國','台灣退出聯合國','韓戰導致美國改變外交方向'],ans:1,exp:'1979 年美國正式與中共建交，依「一個中國政策」，同時宣布與中華民國斷交。'},
    {q:'25. 李登輝的「務實外交」，哪項主張不再堅持？',opts:['中華民國是民主國家','中華民國是代表中國的唯一合法政府','兩岸是分裂分治的政治實體','台灣有權以中華台北參與國際組織'],ans:1,exp:'務實外交放棄「中華民國是代表中國唯一合法政府」的主張，改強調兩岸是分裂分治的對等政治實體。'},
    {q:'26. 蔣經國的「三不政策」，是針對哪方提出的主張做出回應？',opts:['美國《台灣關係法》','中共「一國兩制」','聯合國 2758 號決議','日本終戰聲明'],ans:1,exp:'蔣經國三不政策是針對鄧小平「一國兩制」提出的強硬回應，拒絕在該前提下討論統一問題。'},
    {q:'27. 辜汪會談的歷史意義為何？',opts:['兩岸正式宣布停止敵對狀態','兩岸首次達成政治統一協議','兩岸半官方機構首次正式對話協商','台灣正式接受一國兩制'],ans:2,exp:'1993 年辜汪會談是兩岸自 1949 年分治以來，半官方機構首次正式對話，具有重大歷史意義。'},
    {q:'28. 下列關於「鞏固外交」時期，何者正確？',opts:['台灣已接受分裂分治的現實','以實質利益取代正式邦交','積極爭取友邦，堅持是中國唯一合法政府','以非官方關係維持國際往來'],ans:2,exp:'鞏固外交時期（民 40–60 年代初），台灣積極爭取友邦承認，堅持中華民國是代表中國的唯一合法政府。'},
    {group:'【題組一】以下是台灣外交大事時間軸，回答 29–32 題。\n（甲）民國 43 年：《中美共同防禦條約》\n（乙）民國 60 年：退出聯合國\n（丙）民國 68 年：美台斷交 →《台灣關係法》\n（丁）民國 82 年：辜汪會談',
     q:'29. 上述（甲）事件屬於哪個外交階段？',opts:['彈性外交','務實外交','鞏固外交','零和外交'],ans:2,exp:'中美共同防禦條約（民 43）在「鞏固外交」時期，積極爭取美國認可、納入西太平洋防禦體系。'},
    {q:'30. （乙）退出聯合國後，我國改採什麼外交策略？',opts:['鞏固外交，積極爭取更多邦交','彈性外交，不堅持唯一合法政府','務實外交，改以中華台北名義','閉關自守，不再參與國際事務'],ans:1,exp:'退出聯合國後改採「彈性外交」，不堅持名稱、以實質關係取代正式邦交。'},
    {q:'31. （丙）《台灣關係法》與（甲）《中美共同防禦條約》最大差異為何？',opts:['台灣關係法提供更多軍事援助','台灣關係法是美台正式邦交的象徵','台灣關係法是非官方性質的往來架構','台灣關係法涵蓋更廣的安全保障'],ans:2,exp:'中美共同防禦條約是正式官方軍事同盟；台灣關係法是美台斷交後非官方往來的法律架構。'},
    {q:'32. （丁）辜汪會談代表什麼意義？',opts:['兩岸完成統一的第一步','兩岸官方機構首次對話','兩岸半官方正式對話的開端','中華民國接受一個中國原則'],ans:2,exp:'辜汪會談是兩岸半官方機構（海基會、海協會）的首次正式對話，開啟兩岸交流新頁。'},
    {group:'【題組二】閱讀下列報導，回答 33–36 題。\n「民國七十六年，政府宣布解除長達三十八年的戒嚴令，並隨後開放人民前往大陸探親。此後，兩岸民間往來逐漸增多，但官方仍維持不接觸、不談判的立場。」',
     q:'33. 「長達三十八年的戒嚴令」是從哪年開始實施的？',opts:['民國 30 年','民國 38 年','民國 43 年','民國 50 年'],ans:1,exp:'戒嚴令從民國 38 年（1949）實施，至民國 76 年（1987）解除，共長達 38 年。'},
    {q:'34. 「不接觸、不談判」指的是哪個政策？',opts:['彈性外交','三不政策','務實外交','一國兩制'],ans:1,exp:'「不接觸、不談判、不妥協」即蔣經國提出的「三不政策」，是回應中共一國兩制的立場。'},
    {q:'35. 開放探親後，兩岸下一個重大交流里程碑是什麼？',opts:['聯合國 2758 號決議','大三通','辜汪會談','台灣關係法'],ans:2,exp:'開放探親（民 76/1987）後，下一個重大里程碑是民國 82 年（1993）的辜汪會談。'},
    {q:'36. 解除戒嚴、開放探親時，台灣的最高領導人是誰？',opts:['蔣中正','蔣經國','李登輝','陳水扁'],ans:1,exp:'民國 76 年（1987）解除戒嚴時，蔣經國仍在任，他開放探親政策打開兩岸民間往來的大門。'},
    {group:'【題組三】以下是說明台灣外交轉變的資料，回答 37–40 題。\n「（A）積極爭取友邦，堅持唯一合法政府 →（B）維持實質關係，不堅持名稱 →（C）強調兩岸分裂分治，以務實角度參與國際」',
     q:'37. （A）的外交政策稱為？',opts:['務實外交','彈性外交','鞏固外交','積極外交'],ans:2,exp:'「積極爭取友邦、堅持唯一合法政府」是「鞏固外交」的特徵，主要在民國 40 至 60 年代初。'},
    {q:'38. （B）到（C）的轉變，主因是哪個重大因素的推動？',opts:['韓戰爆發','美台斷交','李登輝執政','辜汪會談成功'],ans:2,exp:'彈性外交到務實外交的轉型，主要因李登輝執政（民 80 年代後），不再堅持代表全中國。'},
    {q:'39. 台灣以「中華台北」名義參與奧運，反映的是哪種外交策略？',opts:['鞏固外交','彈性外交','務實外交','鞏固與務實的結合'],ans:1,exp:'「中華台北」起源於彈性外交時期，不堅持名稱、以實質參與為主，是彈性外交的代表做法。'},
    {q:'40. 下列哪項是（C）務實外交的具體表現？',opts:['美台簽訂共同防禦條約','以中華台北參與 APEC、WTO','堅持中華民國為中國唯一合法政府','辜汪會談在新加坡舉行'],ans:1,exp:'以「中華台北」名義加入 APEC（民 80）和 WTO（民 91）是務實外交的具體成果。'},
  ]
},

{
  id:'ex-5', title:'模擬考卷五：經濟發展篇（第二回）', icon:'📈', desc:'土地改革・四大階段・十大建設・護國神山（40 題・100 分）',
  qs:[
    {q:'1. 台灣「三七五減租」中，「三七五」代表什麼含義？',opts:['地租不超過租約總年限的 37.5%','每甲地租金不超過 375 元','地租不超過全年農產品總收穫量的 37.5%','每年農產品的 37.5% 需繳交稅金'],ans:2,exp:'三七五減租規定地租上限為全年農產品總收穫量的 37.5%，大幅減輕佃農的租金負擔。'},
    {q:'2. 「公地放領」中的「公地」，主要是指哪種土地？',opts:['原住民保留地','原日本政府持有的公有耕地','台灣光復前的私人農地','政府新開墾的荒地'],ans:1,exp:'公地放領是將原日本政府（台灣總督府）持有的公有耕地，以低廉價格售給農民。'},
    {q:'3. 「耕者有其田」強制地主釋出超額土地，釋出的「超額」標準為何？',opts:['超過 1 甲的水田','超過 3 甲的水田','超過 5 甲的水田','超過 10 甲的水田'],ans:1,exp:'耕者有其田規定地主只能保留 3 甲（水田）自耕地，超出部分由政府徵購後售給佃農。'},
    {q:'4. 土地改革後，地主的資金如何被引導再利用？',opts:['轉投資工業（如水泥、造紙等企業）','存入銀行領取利息','購買政府公債','轉向農業機械化投資'],ans:0,exp:'政府以四大公司（台灣水泥、台灣紙業、台灣農林、台灣工礦）股票補償地主，引導資金轉向工業。'},
    {q:'5. 台灣四大經濟發展階段中，「出口導向」的主要手段是什麼？',opts:['大量進口原物料以降低成本','發展勞力密集產業，大量出口換取外匯','引進外資建設重工業','推動農業技術現代化'],ans:1,exp:'出口導向時期（民 50 年代）以勞力密集輕工業（紡織、電子等）為主，大量出口賺取外匯。'},
    {q:'6. 民國 55 年設立「高雄加工出口區」，其功能定位為何？',opts:['進口日本工業設備的轉口港','專門生產農業加工品出口','吸引外資、集中生產出口輕工業品','提供重工業原料的加工基地'],ans:2,exp:'高雄加工出口區吸引外資和勞力密集製造業，集中生產紡織、電子等輕工業品出口，是出口導向的核心。'},
    {q:'7. 「進口替代」政策的核心邏輯是什麼？',opts:['多進口外國商品，減少自製','發展本國工業，生產過去需要進口的商品','以農產品換取工業品的進口','引進外資替代本土資本'],ans:1,exp:'進口替代是以本國工業產品取代進口品，目的在減少外匯支出、扶植本土工業。'},
    {q:'8. 十大建設中，「鐵路電氣化」主要改善了什麼問題？',opts:['增加鐵路運輸速度與能源效率','連接東西部的橫斷道路','提供農村用電','為核電廠提供電力'],ans:0,exp:'鐵路電氣化是十大建設的交通類項目，提升列車速度與運輸效率，減少對石油的依賴。'},
    {q:'9. 新竹科學工業園區成立後，最代表性的高科技產業是什麼？',opts:['石化工業','半導體（晶圓）製造','汽車製造','重型機械'],ans:1,exp:'新竹科學工業園區（民 69/1980）成為半導體產業聚落，催生台積電等世界級晶圓製造企業。'},
    {q:'10. 台灣在十大建設之後，主要轉型發展何種產業？',opts:['農業機械化','重化工業','高科技（半導體、電子）產業','觀光旅遊業'],ans:2,exp:'民 70–80 年代（產業升級階段），台灣從勞力密集轉向高科技產業，新竹科學工業園區是核心。'},
    {q:'11. 台中港屬於十大建設的哪一類項目？',opts:['農業類','工業類','交通類','能源類'],ans:2,exp:'台中港是十大建設的交通類項目，是台灣中部最重要的貿易港，開發促進中部地區發展。'},
    {q:'12. 民國四十年代，台灣以什麼策略推動工業化初期？',opts:['以工業培養農業','以農業培養工業','完全依賴美援推動工業','引進日本資金建設工業'],ans:1,exp:'進口替代時期以「以農業培養工業」為策略，農業生產外匯與糧食，支撐初期工業化。'},
    {q:'13. 高雄加工出口區的設立，對台灣人口有何影響？',opts:['大量農村人口移往城市工廠工作','農業勞動力需求大幅增加','工業區提供大量高科技工作機會','促使婦女離開職場照顧家庭'],ans:0,exp:'加工出口區設立後，農村人口大量移往城市（尤其高雄），形成台灣的城鄉人口移動潮。'},
    {q:'14. 「產業升級」階段，台灣政府的主要策略為何？',opts:['增加農業出口','降低工業稅率吸引外資','從事高科技、高附加價值產業，取代勞力密集工業','擴大加工出口區規模'],ans:2,exp:'產業升級階段（民 70–80 年代），政府推動從勞力密集轉型為技術/資本密集的高科技產業。'},
    {q:'15. 台灣土地改革三步驟中，哪一步驟直接將土地所有權轉移給農民？',opts:['三七五減租（降低地租）','公地放領（公有地出售）','耕者有其田（強制地主釋地）','農地重劃'],ans:2,exp:'「耕者有其田」是最直接的土地所有權轉移，強制地主釋出超額土地由政府買下再售給農民。'},
    {q:'16. 石油危機（民 63/1974）與十大建設的關係為何？',opts:['阻止了十大建設的推動','使十大建設更顯必要，以改善基礎建設','十大建設被縮減為五大建設','石油危機促使台灣立即加入 OPEC'],ans:1,exp:'1973 年石油危機後，蔣經國推動十大建設，改善基礎建設、降低對石油依賴，以因應未來能源衝擊。'},
    {q:'17. 台灣的「出口導向」時期，最主要的出口商品類型是什麼？',opts:['高科技電子零件','農產品（米、糖）','紡織品、電扇、雨傘等勞力密集輕工業品','鋼鐵、造船等重工業品'],ans:2,exp:'出口導向時期（民 50 年代），台灣出口主力是紡織品、電扇、雨傘、自行車等勞力密集輕工業品。'},
    {q:'18. 台積電在全球的主要貢獻為何？',opts:['生產最多石化原料','提供全球最大比重的高端晶圓代工','製造最多汽車零件','是全球最大的農業技術公司'],ans:1,exp:'台積電是全球最大的晶圓代工廠，在高端半導體製造有極高的全球市占率，被稱為台灣護國神山。'},
    {q:'19. 關於台灣土地改革「三步驟」的正確時間順序，何者正確？',opts:['耕者有其田（民 38）→ 三七五減租（民 40）→ 公地放領（民 42）','三七五減租（民 38）→ 公地放領（民 40）→ 耕者有其田（民 42）','公地放領（民 38）→ 三七五減租（民 40）→ 耕者有其田（民 42）','三七五減租（民 38）→ 耕者有其田（民 40）→ 公地放領（民 42）'],ans:1,exp:'土地改革：三七五減租（民 38/1949）→ 公地放領（民 40/1951）→ 耕者有其田（民 42/1953）。'},
    {q:'20. 1980 年代台灣「產業升級」最具代表性的設施是？',opts:['高雄加工出口區','中山高速公路','新竹科學工業園區','桃園國際機場'],ans:2,exp:'民國 69 年（1980）設立的新竹科學工業園區，是台灣高科技產業升級的核心基地。'},
    {q:'21. 下列哪一項不屬於十大建設的「工業類」項目？',opts:['大煉鋼廠','大造船廠','石化工業區','中山高速公路'],ans:3,exp:'中山高速公路是十大建設的「交通類」項目；工業類為大煉鋼廠、大造船廠、石化工業區、核能發電廠。'},
    {q:'22. 加入 WTO 後，台灣的哪種產業反而面臨較大競爭衝擊？',opts:['半導體業','服務業','農業','資訊科技業'],ans:2,exp:'加入 WTO 後，台灣農業面臨外國農產品進口競爭，因成本與規模劣勢而受到最大衝擊。'},
    {q:'23. 下列哪個說法正確描述「進口替代」策略的侷限性？',opts:['國內市場有限，無法持續擴大生產規模','進口替代會增加外匯支出','進口替代需要大量高科技人才','進口替代會讓農業衰退'],ans:0,exp:'進口替代受限於台灣國內市場規模太小，很快就到達瓶頸，因此民 50 年代轉向出口導向策略。'},
    {q:'24. 「核能發電廠」是十大建設的哪一類項目？',opts:['交通類','工業類','農業類','能源類'],ans:1,exp:'核能發電廠屬於十大建設的工業類項目，另外的工業類還有大煉鋼廠、大造船廠、石化工業區。'},
    {q:'25. 有關「以農業培養工業」的具體做法，下列何者正確？',opts:['將農業盈餘轉為工業投資資本','農民直接去工廠工作','引進農業技術來支持工業生產','農業合作社轉型為工廠'],ans:0,exp:'進口替代時期，農業外匯（米、糖出口）和農民稅負，成為支持工業化初期發展的資金來源。'},
    {q:'26. 「台灣製傘王國」和「電扇王國」的時代，對應台灣哪個經濟發展階段？',opts:['進口替代','出口導向','十大建設','產業升級'],ans:1,exp:'民 50 年代出口導向時期，台灣在雨傘、電扇、自行車等輕工業品出口量創世界第一，有各種「王國」稱號。'},
    {q:'27. 蔣經國推動十大建設，最主要的建設類別為何？',opts:['能源類（核電廠、石化）','工業類（鋼鐵、造船）','交通類（高速公路、鐵路、港口、機場）','農業類（水利、灌溉）'],ans:2,exp:'十大建設六項交通類：中山高速公路、北迴鐵路、鐵路電氣化、桃園國際機場、台中港、蘇澳港，比例最高。'},
    {q:'28. 北迴鐵路在台灣交通史上的意義為何？',opts:['是台灣第一條高速公路','連接花蓮與台東的東部幹線','打通西部與東部花蓮的鐵路連結','提供南北高速鐵路服務'],ans:2,exp:'北迴鐵路連接宜蘭和花蓮，打通西部台北與東部花蓮的鐵路幹線，是十大建設中重要的交通建設。'},
    {group:'【題組一】以下是台灣農業結構統計，回答 29–32 題。\n「1940 年代初：自耕農比例約 56%，佃農比例約 44%。\n 1950 年代初土地改革後：自耕農比例約 85%，佃農比例大幅下降。」',
     q:'29. 造成上述自耕農比例大幅提升的主要原因為何？',opts:['農業機械化使生產效率提高','土地改革三步驟（三七五減租、公地放領、耕者有其田）','美援帶來大量農業補助','大量農民移民海外'],ans:1,exp:'土地改革三步驟使大批佃農轉為自耕農，自耕農比例從 56% 提升至約 85%。'},
    {q:'30. 土地改革後「佃農比例大幅下降」，哪步驟直接賦予農民土地所有權？',opts:['三七五減租','公地放領','耕者有其田','農地重劃'],ans:2,exp:'耕者有其田是最直接轉移土地所有權的政策，強制地主釋地，使佃農成為自耕農。'},
    {q:'31. 地主在「耕者有其田」後，資金被引導投入哪個領域？',opts:['農業合作社','土地開發','工業投資（如四大公司股票）','購買政府公債'],ans:2,exp:'政府以台灣水泥、造紙、農林、工礦等四大公司股票補償地主，引導農業資本流向工業部門。'},
    {q:'32. 土地改革的整體效果，對台灣社會最重要的影響為何？',opts:['提升農業出口量','增加政府稅收','縮小貧富差距、穩定農村社會','吸引大量外資進入農業'],ans:2,exp:'土地改革使農民獲得土地，縮小農村的貧富差距，穩定社會秩序，為工業化奠定安定基礎。'},
    {group:'【題組二】台灣經濟發展歷程圖，回答 33–36 題。\n「[40 年代] 農業輔助工業 → [50 年代] 大量出口賺外匯 → [60 年代] 改善基礎建設 → [70–80 年代] 高科技產業崛起」',
     q:'33. [40 年代] 的策略對應下列哪個政策名稱？',opts:['出口導向','進口替代','十大建設','產業升級'],ans:1,exp:'40 年代「農業輔助工業」正是進口替代策略，以農業外匯支持本土工業發展，取代進口品。'},
    {q:'34. [50 年代]「大量出口賺外匯」，最重要的政府政策措施為何？',opts:['設立新竹科學工業園區','推動十大建設','設立高雄加工出口區','實施三七五減租'],ans:2,exp:'民 55 年設立高雄加工出口區，集中勞力密集工業大量出口，是出口導向時期最重要的政策工具。'},
    {q:'35. [60 年代]「改善基礎建設」的背景，是哪個國際事件？',opts:['韓戰爆發','台灣退出聯合國','石油危機','美台斷交'],ans:2,exp:'1973 年石油危機衝擊台灣經濟，蔣經國推動十大建設，改善基礎建設以因應能源衝擊。'},
    {q:'36. [70–80 年代]「高科技產業崛起」最具代表性的設施是？',opts:['高雄加工出口區','台中港','新竹科學工業園區','中山高速公路'],ans:2,exp:'民 69 年（1980）成立的新竹科學工業園區是高科技產業升級的核心，台積電等知名企業在此誕生。'},
    {group:'【題組三】閱讀以下說明，回答 37–40 題。\n「台灣積體電路製造公司（台積電）成立於 1987 年，位於新竹科學工業園區，是全球最大的晶圓代工廠，掌握全球高端晶片製造的關鍵技術，被稱為『台灣護國神山』。」',
     q:'37. 台積電所在的「新竹科學工業園區」成立於何時？',opts:['民國 60 年（1971）','民國 68 年（1979）','民國 69 年（1980）','民國 80 年（1991）'],ans:2,exp:'新竹科學工業園區成立於民國 69 年（1980），是台灣高科技產業的搖籃。'},
    {q:'38. 台積電代表的是台灣哪個經濟發展階段的成果？',opts:['進口替代','出口導向','十大建設','產業升級'],ans:3,exp:'台積電是產業升級階段（民 70–80 年代）的代表，從勞力密集轉向技術密集的高科技製造。'},
    {q:'39. 被稱為「台灣護國神山」的台積電，其重要性主要在於？',opts:['提供大量農業就業機會','掌握全球高端晶圓（半導體）製造技術','是全球最大的石化公司','主導全球鋼鐵市場'],ans:1,exp:'台積電掌握高端晶圓代工技術，全球高端晶片幾乎都需仰賴台積電製造，戰略地位極為重要。'},
    {q:'40. 從「高雄加工出口區」到「新竹科學工業園區」的轉變，說明台灣經濟的什麼趨勢？',opts:['從農業社會轉向工業社會','從勞力密集轉向技術密集的高科技產業','從內需市場轉向出口導向','從重工業轉向輕工業'],ans:1,exp:'這個轉變正是台灣「產業升級」的縮影：從 50 年代加工出口（勞力密集）到 80 年代高科技（技術密集）。'},
  ]
},

{
  id:'ex-6', title:'模擬考卷六：社會文化篇（第二回）', icon:'🎨', desc:'文學演變・原住民運動・多元族群・美援文化（40 題・100 分）',
  qs:[
    {q:'1. 台灣戰後推行「國語運動」的目的為何？',opts:['消滅原住民族語言','推廣北京話（普通話）作為全國共同語言，強化國家認同','學習英語以接軌國際社會','保存各族群的母語文化'],ans:1,exp:'國語運動推廣北京話（普通話）為全國通用語言，強化中華民國的國家認同，同時限制其他語言使用。'},
    {q:'2. 戰後台灣的文學發展，「反共文學」主要盛行於何時？',opts:['民國三十年代（二戰期間）','民國四十年代（遷台初期）','民國六十至七十年代','民國八十年代後'],ans:1,exp:'反共文學盛行於遷台初期（民 40 年代），內容歌頌反共、批判共產主義，是政治宣傳的重要工具。'},
    {q:'3. 「鄉土文學」的興起，主要反映什麼社會現象？',opts:['都市化繁榮帶來的樂觀氛圍','退出聯合國、城鄉差距下，對台灣本土的關懷與認同','美援文化的深入影響','台灣加入 WTO 後的經濟轉型'],ans:1,exp:'鄉土文學（民 60–70 年代）背景：退出聯合國（1971）、美台斷交（1979）、城鄉差距擴大，作家轉向關注台灣本土庶民生活。'},
    {q:'4. 黃春明的作品《兒子的大玩偶》，屬於哪個文學流派？',opts:['反共文學','鄉土文學','現代主義文學','科幻文學'],ans:1,exp:'黃春明是鄉土文學代表作家，《兒子的大玩偶》以寫實手法描寫台灣底層勞工生活，是鄉土文學名作。'},
    {q:'5. 台灣原住民族「正名運動」的目標為何？',opts:['爭取原住民族自治區','爭取官方正式承認「原住民族」的名稱','爭取恢復傳統山林土地','爭取以母語教學取代國語教育'],ans:1,exp:'正名運動爭取官方承認「原住民族」名稱，民國 83 年（1994）憲法修正正式採用「原住民族」一詞。'},
    {q:'6. 原住民族「還我土地運動」的核心訴求是什麼？',opts:['爭取原住民族政府代表名額','要求歸還被占用的傳統領域與土地','爭取政府補助傳統祭典','爭取母語教學'],ans:1,exp:'還我土地運動核心訴求是土地正義，要求政府歸還被占用的傳統領域，政府後來增編原住民保留地。'},
    {q:'7. 「原住民族委員會（原民會）」是在哪一年成立的？',opts:['民國 76 年','民國 83 年','民國 85 年','民國 91 年'],ans:2,exp:'民國 85 年（1996）成立原住民族委員會，是正名運動後政府承認原住民族主體地位的具體制度建立。'},
    {q:'8. 在台灣正式正名「原住民族」之前，官方使用的稱呼依演變順序為何？',opts:['山地人 → 高砂族 → 原住民','山地同胞 → 原住民 → 原住民族','番族 → 高砂族 → 原住民族','原住民 → 原住民族 → 高砂族'],ans:1,exp:'稱呼演變：山地同胞（沿用）→ 原住民（民間先改口）→ 原住民族（民 83 憲法正式承認）。'},
    {q:'9. 台灣「母語運動」的具體成果包含哪些？',opts:['廢除國語運動、全面恢復閩南語教學','學校開設族語課程','政府文件改用各族語言書寫','原住民族語取代普通話成為官方語言'],ans:1,exp:'母語運動推動學校開設族語課程，讓原住民族學生有機會學習自己的母語，保存族群文化。'},
    {q:'10. 台灣「美援文化」的影響，主要反映在哪個層面？',opts:['台灣政治制度的民主化','農業技術的現代化','生活習慣與流行文化（英文老歌、可口可樂、牛仔褲）','台灣文學創作方向'],ans:2,exp:'美援文化影響台灣人的日常生活，帶入英文老歌、可口可樂、牛仔褲、麵粉等，改變飲食與流行文化。'},
    {q:'11. 台灣戰後文學演變的正確順序為何？',opts:['反共文學 → 鄉土文學 → 美援文化 → 多元文化','美援文化 → 反共文學 → 鄉土文學 → 多元文化','反共文學 → 美援文化 → 鄉土文學 → 多元文化','鄉土文學 → 反共文學 → 美援文化 → 多元文化'],ans:2,exp:'文化脈絡：反共文學（40 年代）→ 美援文化（40–60 年代）→ 鄉土文學（60–70 年代）→ 多元文化（80 年代後）。'},
    {q:'12. 台灣戰後「多元文化」的形成，主要因為哪些群體的融合？',opts:['台灣原住民族與日本移民','閩南、客家、外省籍、原住民族、新住民','台灣人與美國人的文化交流','台灣移民到東南亞的回流'],ans:1,exp:'台灣五大族群：閩南、客家、外省籍、原住民族、新住民，各族群文化融合形成台灣多元文化社會。'},

// ── RENDER ─────────────────────────────────────────────────
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){ showSection('home'); }

function toHomeBtn(){
  return '<button class="to-home" onclick="goHome()">← 返回講義考卷選單</button>';
}

// Build home grid
function buildHome(){
  const htG=document.getElementById('ht-grid');
  const exG=document.getElementById('ex-grid');
  HT.forEach(h=>{
    htG.innerHTML+=`<div class="home-card ht" onclick="showSection('${h.id}')">
      <div class="card-icon">${h.icon}</div>
      <div class="card-title">${h.title}</div>
      <div class="card-desc">${h.desc}</div>
    </div>`;
  });
  EX.forEach(e=>{
    exG.innerHTML+=`<div class="home-card ex" onclick="showSection('${e.id}')">
      <div class="card-icon">${e.icon}</div>
      <div class="card-title">${e.title}</div>
      <div class="card-desc">${e.desc}</div>
    </div>`;
  });
}

// Build handouts
function parseFill(html){
  return html.replace(/<b>\{([^}]+)\}<\/b>/g,(m,ans)=>{
    const w=Math.max(2.5,ans.length*1.1);
    return `<span class="blank" data-ans="${ans}" style="min-width:${w}em" onclick="toggleBlank(this)">？</span>`;
  }).replace(/\{([^}]+)\}/g,(m,ans)=>{
    const w=Math.max(2.5,ans.length*1.1);
    return `<span class="blank" data-ans="${ans}" style="min-width:${w}em" onclick="toggleBlank(this)">？</span>`;
  });
}
function toggleBlank(el){
  if(el.classList.contains('show')){
    el.textContent='？';
    el.classList.remove('show');
  } else {
    el.textContent=el.dataset.ans;
    el.classList.add('show');
  }
}

function buildHandouts(){
  HT.forEach(h=>{
    const el=document.getElementById(h.id);
    let html=toHomeBtn();
    html+=`<div class="page-title">${h.icon} ${h.title}</div>`;
    html+=`<div class="page-sub">${h.desc}</div>`;
    h.secs.forEach((sec,si)=>{
      html+=`<div class="ht-section" id="${h.id}-sec-${si}">`;
      html+=`<div class="ht-sec-title">${sec.t}</div>`;
      sec.blocks.forEach(b=>{
        if(b.type==='fill'){
          html+=`<div class="fill-text">${parseFill(b.html)}</div>`;
        } else if(b.type==='text'){
          html+=`<div style="margin:8px 0;font-size:16px;color:#4b5563;">${b.html}</div>`;
        } else if(b.type==='table'){
          html+='<div style="overflow-x:auto"><table><thead><tr>';
          b.headers.forEach(hd=>{ html+=`<th>${parseFill(hd)}</th>`; });
          html+='</tr></thead><tbody>';
          b.rows.forEach(row=>{
            html+='<tr>';
            row.forEach(cell=>{ html+=`<td>${parseFill(cell)}</td>`; });
            html+='</tr>';
          });
          html+='</tbody></table></div>';
        }
      });
      html+=`<button class="reveal-btn" onclick="revealSec('${h.id}-sec-${si}')">👁️ 顯示答案</button>`;
      html+=`<button class="hide-btn" onclick="hideSec('${h.id}-sec-${si}')">隱藏</button>`;
      html+='</div>';
    });
    el.innerHTML=html;
  });
}

function revealSec(secId){
  document.querySelectorAll(`#${secId} .blank`).forEach(b=>{
    b.textContent=b.dataset.ans;
    b.classList.add('show');
  });
}
function hideSec(secId){
  document.querySelectorAll(`#${secId} .blank`).forEach(b=>{
    b.textContent='？';
    b.classList.remove('show');
  });
}

// Build exams
function buildExams(){
  EX.forEach(ex=>{
    const el=document.getElementById(ex.id);
    let html=toHomeBtn();
    html+=`<div class="exam-header"><h2>${ex.icon} ${ex.title}</h2><p>${ex.desc}</p></div>`;
    let score=[]; // will hold per-Q correctness
    let groupShown=false;
    let lastGroup='';
    ex.qs.forEach((q,qi)=>{
      // topic group header
      if(q.group && q.group!==lastGroup){
        html+=`<div class="topic-group-box"><strong>📖 題組說明</strong><pre style="white-space:pre-wrap;font-size:16px;font-family:inherit">${q.group}</pre></div>`;
        lastGroup=q.group;
      }
      const qid=`${ex.id}-q${qi}`;
      html+=`<div class="q-card" id="${qid}">`;
      html+=`<div class="q-num">第 ${qi+1} 題（2.5 分）</div>`;
      html+=`<div class="q-text">${q.q}</div>`;
      html+=`<div class="options" id="${qid}-opts">`;
      q.opts.forEach((opt,oi)=>{
        html+=`<button class="opt-btn" id="${qid}-o${oi}" onclick="selectOpt('${ex.id}',${qi},${oi})">`+
              `<span class="opt-letter">${'ABCD'[oi]}</span><span>${opt}</span></button>`;
      });
      html+=`</div>`;
      html+=`<button class="analysis-btn" id="${qid}-abtn" onclick="showAnalysis('${qid}')">💡 查看解析</button>`;
      html+=`<div class="analysis-box" id="${qid}-abox">✏️ 解析：${q.exp}</div>`;
      html+='</div>';
    });
    html+=`<button class="score-btn" onclick="calcScore('${ex.id}',${ex.qs.length})">📊 查看成績</button>`;
    html+=`<div class="score-box" id="${ex.id}-score"></div>`;
    el.innerHTML=html;
  });
}

const STATE={};
function selectOpt(exId,qi,oi){
  const ex=EX.find(e=>e.id===exId);
  const q=ex.qs[qi];
  const qid=`${exId}-q${qi}`;
  // disable all options
  for(let i=0;i<q.opts.length;i++){
    const btn=document.getElementById(`${qid}-o${i}`);
    btn.disabled=true;
    btn.classList.remove('selected');
    if(i===q.ans) btn.classList.add('correct');
    else if(i===oi && i!==q.ans) btn.classList.add('wrong');
  }
  if(!STATE[exId]) STATE[exId]={};
  STATE[exId][qi]=(oi===q.ans);
  // show analysis button
  document.getElementById(`${qid}-abtn`).style.display='inline-block';
}

function showAnalysis(qid){
  const box=document.getElementById(`${qid}-abox`);
  const btn=document.getElementById(`${qid}-abtn`);
  if(box.style.display==='block'){
    box.style.display='none';
    btn.textContent='💡 查看解析';
  } else {
    box.style.display='block';
    btn.textContent='🔼 收合解析';
  }
}

function calcScore(exId,total){
  const s=STATE[exId]||{};
  let correct=0;
  for(let i=0;i<total;i++){ if(s[i]) correct++; }
  const score=Math.round(correct*2.5);
  const pct=Math.round(correct/total*100);
  let grade='';
  if(score>=90) grade='🏆 優秀！';
  else if(score>=75) grade='👍 良好！';
  else if(score>=60) grade='📚 及格，繼續加油！';
  else grade='💪 需要多加複習！';
  const el=document.getElementById(`${exId}-score`);
  el.style.display='block';
  el.innerHTML=`<div class="score-grade">${grade}</div>
    <div class="score-num">${score} 分</div>
    <div class="score-detail">答對 ${correct} / ${total} 題 ｜ 正確率 ${pct}%</div>
    <p style="margin-top:12px;font-size:15px;opacity:.8">未作答的題目不計分。建議先完成所有題目後再查看成績。</p>`;
  el.scrollIntoView({behavior:'smooth'});
}

buildHandouts();
buildExams();
