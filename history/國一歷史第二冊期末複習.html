<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國一歷史第二冊｜期末複習與模擬考卷</title>
<style>
:root{--pri:#2563eb;--prid:#1e40af;--sec:#f59e0b;--bg:#f8f7f2;--card:#fff;--txt:#1f2937;--muted:#6b7280;--border:#e5e7eb;--ok:#16a34a;--err:#dc2626;--acc:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;font-size:17px;line-height:1.8;background:var(--bg);color:var(--txt);min-height:100vh}
.site-header{background:var(--pri);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.back-btn{background:#fff;color:var(--pri);border:none;padding:7px 14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.2s}
.back-btn:hover{background:#dbeafe}
.site-title{font-size:18px;font-weight:700}
.container{max-width:920px;margin:0 auto;padding:24px 16px}
.section{display:none}.section.active{display:block}
#home{display:block}
.home-intro{background:var(--pri);color:#fff;border-radius:16px;padding:24px 28px;margin-bottom:28px}
.home-intro h1{font-size:22px;margin-bottom:6px}
.home-intro p{font-size:16px;opacity:.9}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:28px}
.home-card{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:.2s;text-align:center}
.home-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 18px rgba(37,99,235,.15)}
.home-card.ht{border-top:4px solid var(--sec)}
.home-card.ex{border-top:4px solid var(--pri)}
.card-icon{font-size:36px;margin-bottom:10px}
.card-title{font-size:17px;font-weight:700;margin-bottom:6px}
.card-desc{font-size:15px;color:var(--muted)}
.to-home{background:var(--muted);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:16px;cursor:pointer;margin-bottom:20px;display:inline-flex;align-items:center;gap:5px}
.to-home:hover{background:#4b5563}
.page-title{font-size:21px;font-weight:700;margin-bottom:6px}
.page-sub{font-size:15px;color:var(--muted);margin-bottom:20px}
/* handout */
.ht-section{background:var(--card);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid var(--sec)}
.ht-sec-title{font-size:18px;font-weight:700;color:var(--pri);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.fill-text{font-size:17px;line-height:2.4}
.blank{display:inline-block;border-bottom:2px solid #9ca3af;min-width:2.5em;text-align:center;margin:0 3px;color:#6b7280;cursor:pointer;transition:.2s;padding:2px 8px;border-radius:6px;background:#f3f4f6;font-weight:700;user-select:none}
.blank:hover{background:#dbeafe;border-color:var(--pri);color:var(--pri)}
.blank.show{color:var(--ok);font-weight:700;border-color:var(--ok);background:#dcfce7}
.reveal-btn{background:var(--sec);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:14px;font-weight:700;transition:.2s}
.reveal-btn:hover{filter:brightness(.9)}
.hide-btn{background:#6b7280;color:#fff;border:none;padding:6px 16px;border-radius:8px;font-size:15px;cursor:pointer;margin-top:8px;margin-left:8px}
table{width:100%;border-collapse:collapse;margin:14px 0;font-size:16px}
th,td{border:1px solid var(--border);padding:9px 13px;text-align:center}
th{background:var(--pri);color:#fff}
tr:nth-child(even){background:#f9fafb}
/* exam */
.exam-header{background:var(--pri);color:#fff;padding:20px 24px;border-radius:12px;margin-bottom:20px}
.exam-header h2{font-size:19px;margin-bottom:4px}
.exam-header p{font-size:15px;opacity:.85}
.topic-group-box{background:#eff6ff;border:2px solid #bfdbfe;border-radius:10px;padding:14px 18px;margin:20px 0 12px;font-size:16px}
.topic-group-box strong{color:var(--pri);display:block;font-size:17px;margin-bottom:6px}
.q-card{background:var(--card);border-radius:12px;padding:22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-num{font-size:15px;color:var(--muted);margin-bottom:6px}
.q-text{font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.8}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{background:#f9fafb;border:2px solid var(--border);border-radius:10px;padding:11px 15px;font-size:17px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:9px;transition:.2s}
.opt-btn:hover:not(:disabled){border-color:var(--pri);background:#eff6ff}
.opt-btn.selected{border-color:var(--pri);background:#dbeafe}
.opt-btn.correct{border-color:var(--ok);background:#dcfce7;color:var(--ok);font-weight:700}
.opt-btn.wrong{border-color:var(--err);background:#fee2e2;color:var(--err)}
.opt-btn:disabled{cursor:default}
.opt-letter{font-weight:700;min-width:22px}
.analysis-btn{background:var(--acc);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:700;display:none}
.analysis-btn:hover{filter:brightness(.9)}
.analysis-box{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:14px;margin-top:10px;font-size:16px;color:#5b21b6;display:none;line-height:1.8}
.score-btn{background:var(--sec);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin:24px auto;display:block;transition:.2s}
.score-btn:hover{filter:brightness(.9)}
.score-box{background:var(--pri);color:#fff;border-radius:16px;padding:28px;text-align:center;margin:20px 0;display:none}
.score-num{font-size:60px;font-weight:700;margin:12px 0}
.score-grade{font-size:22px;margin-bottom:8px}
.score-detail{font-size:16px;opacity:.85}
@media(max-width:600px){.home-grid{grid-template-columns:1fr}.q-card{padding:16px}}
</style>
</head>
<body>
<header class="site-header">
  <a class="back-btn" href="https://teaching.efetl.com/history/">← 返回主選單</a>

<div class="container">

      <h1>📚 國一歷史第二冊 期末複習與模擬考卷</h1>

    {q:'5. 土地改革後，自耕農比例從 56% 大幅提升至約多少？',opts:['65%','75%','85%','95%'],ans:2,exp:'土地改革三步驟實施後，自耕農比例大幅提升至約 85%，大批佃農成為自耕農。'},
    {q:'6. 民國四十年代政府推行「進口替代」政策，主要目標為何？',opts:['大量出口賺取外匯','發展輕工業取代進口品，減少外匯支出','引進外資建設重工業','推動高科技產業'],ans:1,exp:'進口替代以農業培養工業，扶植紡織等民生工業，減少進口依賴。'},
    {q:'7. 民國五十五年（1966），政府在哪個城市設立台灣第一個加工出口區？',opts:['台北','台中','高雄','基隆'],ans:2,exp:'1966 年政府在高雄楠梓設立台灣第一個加工出口區，生產輕工業品大量出口賺取外匯。'},
    {q:'8. 民國五十年代加工出口區中，女工最可能從事哪種工作？',opts:['操作煉製石油的機器','研發製作晶圓半導體','操作縫紉機生產衣服','監控核能發電廠'],ans:2,exp:'出口導向時期，加工出口區主要生產紡織、電子等勞力密集輕工業品，女工多從事縫紉等工作。'},
    {q:'9. 民國六十年代，蔣經國推動「十大建設」的主要背景為何？',opts:['韓戰爆發，需要軍事建設','退出聯合國，需提振民心','石油危機（能源危機）衝擊，需改善投資環境','土地改革完成，轉向工業'],ans:2,exp:'1973 年石油危機使台灣經濟受到嚴重衝擊，蔣經國推動十大建設以改善基礎設施、提振投資信心。'},
    {q:'10. 十大建設中比例最高的建設類型為何？',opts:['能源類','工業類','交通類','農業類'],ans:2,exp:'十大建設中交通建設占最大比例，包含中山高速公路、北迴鐵路、鐵路電氣化、台中港、蘇澳港、桃園機場。'},
    {q:'11. 台灣第一條高速公路是哪一條？其南北端點為何？',opts:['福爾摩沙高速公路，台北至台南','中山高速公路，基隆至高雄','中部橫貫公路，台中至花蓮','南迴公路，台南至台東'],ans:1,exp:'中山高速公路（縱貫公路）是台灣第一條高速公路，起點基隆、終點高雄，是十大建設最重要的交通項目。'},
    {q:'12. 下列何者「不屬於」十大建設的項目？',opts:['中山高速公路','北迴鐵路','南迴鐵路','鐵路電氣化'],ans:2,exp:'南迴鐵路並非十大建設項目，是後來（民國 80 年代）才完成的。十大建設沒有南迴鐵路。'},
    {q:'13. 民國七十年代，政府成立哪個園區，推動高科技產業升級？',opts:['加工出口區','工業區','新竹科學工業園區','南港軟體園區'],ans:2,exp:'民國 69 年（1980 年）政府成立新竹科學工業園區，吸引半導體等高科技企業進駐，推動產業升級。'},
    {q:'14. 台積電被稱為「台灣護國神山」，主要因為掌握了什麼關鍵技術？',opts:['石油提煉','高端晶圓（半導體）製造','航空技術','農業生技'],ans:1,exp:'台積電在高端晶圓製造有極高的全球市占率，掌握半導體關鍵技術，被稱為台灣護國神山。'},
    {q:'15. 台灣的經濟發展歷程，按時間先後順序排列正確的是？（甲）進口替代（乙）出口導向（丙）十大建設（丁）產業升級',opts:['甲→乙→丙→丁','乙→甲→丙→丁','丙→乙→甲→丁','甲→丙→乙→丁'],ans:0,exp:'台灣經濟發展：進口替代（40 年代）→ 出口導向（50 年代）→ 十大建設（60 年代）→ 產業升級（70-80 年代）。'},
    {q:'16. 台灣曾有「製傘王國」、「電扇王國」等世界第一稱號，與哪個時代的政策有關？',opts:['進口替代','出口導向','十大建設','自由化國際化'],ans:1,exp:'民國 50 年代出口導向時期，台灣大量出口傘、電扇、自行車、毛衣等輕工業品，創下多項世界第一。'},
    {q:'17. 民國六十三年（1974），台灣經濟成長率大幅下降，主因為何？',opts:['八二三炮戰','美麗島事件','國際石油危機','退出聯合國'],ans:2,exp:'1973 年第一次石油危機衝擊全球，造成台灣 1974 年（民國 63 年）經濟成長率驟降。'},
    {q:'18. 政府推動土地改革後，地主資金的去向對台灣有何影響？',opts:['資金流往海外','引導地主轉向工業投資，帶動工業化','政府沒收地主所有財產','地主購買農業機械提升農業效率'],ans:1,exp:'政府以實物土地債券和國家股票補償地主，引導其資金轉投工業，是台灣工業化的重要推手。'},
    {q:'19. 民國四十至五十四年間，美援對台灣飲食文化有何影響？',opts:['台灣人全面放棄米食','美國過剩的麵粉大量輸台，造成飲食西化（麵食、麵包盛行）','農業因此蕭條','台灣成為小麥出口國'],ans:1,exp:'美援期間，美國將過剩的麵粉輸送來台，讓台灣出現飲食西化現象，麵食、麵包大量出現在餐桌上。'},
    {q:'20. 台灣在何時、以何名義加入 APEC（亞太經濟合作會議）？',opts:['民國 80 年，以中華台北','民國 91 年，以台灣','民國 68 年，以中華民國','民國 76 年，以中國台灣'],ans:0,exp:'台灣於 1991 年（民國 80 年）以「中華台北」名義加入 APEC，推動自由化與國際化。'},
    {q:'21. 台灣在民國九十一年（2002 年）加入哪個全球性經濟組織？',opts:['聯合國','APEC','世界貿易組織（WTO）','亞洲開發銀行'],ans:2,exp:'台灣於 2002 年以「台澎金馬個別關稅領域」名義加入 WTO，推動貿易自由化。'},
    {q:'22. 台灣加入 WTO 後，哪個產業受到最大衝擊？',opts:['科技業','農業','服務業','製造業'],ans:1,exp:'加入 WTO 後台灣必須開放農產品進口，稻米等農產品面臨外國廉價農產競爭，農業衝擊最大。'},
    {q:'23. 「台灣錢，淹腳目」形容的是哪個時代的台灣？',opts:['日治時期','光復初期（1940 年代）','1970–80 年代台灣經濟起飛後','2000 年代後'],ans:2,exp:'「台灣錢，淹腳目」形容 1970-80 年代台灣經濟蓬勃發展，許多產業都創造豐厚財富。'},
    {q:'24. 民國 38 年至 40 年代初，政府推行「四萬換一元」幣制改革，發行新台幣，主要目的為何？',opts:['推動土地改革','穩定幣值，解決通貨膨脹問題','吸引外資','促進出口'],ans:1,exp:'1949 年政府實施貨幣改革，以 4 萬舊台幣換 1 元新台幣，旨在穩定幣值、抑制惡性通膨。'},
    {q:'25. 經濟快速發展帶來的最主要社會問題為何？',opts:['語言歧視','城鄉差距擴大','政治獨裁','外交孤立'],ans:1,exp:'經濟發展帶動都市化，農村人口大量移入城市，導致城鄉差距擴大是最直接的社會問題。'},
    {q:'26. 台灣產業升級的主要原因為何？',opts:['希望透過外銷賺取外匯，升級工業原料','基本工資調漲，發展高科技產業提高利潤','為了拓展全球市場加入國際貿易組織','因政策是出口導向，以台積電吸引外商'],ans:1,exp:'基本工資調漲後，勞力密集的輕工業利潤降低，政府積極推動高科技產業以提升附加價值。'},
    {q:'27. 新竹科學工業園區的成立，主要推動哪類產業？',opts:['紡織業','石化業','半導體與電子科技業','農業'],ans:2,exp:'新竹科學工業園區吸引台積電、聯電等半導體企業進駐，成為台灣高科技產業的搖籃。'},
    {q:'28. 以下政策按時間先後排列正確的是？（甲）建立加工出口區（乙）成立新竹科學園區（丙）推行十大建設（丁）進行土地改革',opts:['丁甲丙乙','乙甲丙丁','丙甲丁乙','甲乙丙丁'],ans:0,exp:'時序：土地改革（1949-1953）→ 加工出口區（1966）→ 十大建設（1970 年代）→ 新竹科學園區（1980）。'},
    // 題組一 Q29-32 土地改革統計表
    {group:'【題組一】閱讀以下統計資料後，回答 29–32 題。\n台灣農戶比例統計：\n年份 | 自耕農 | 半自耕農 | 佃農\n1951 | 38% | 25% | 37%\n1953 | 55% | 24% | 21%\n1955 | 59% | 23% | 18%\n1961 | 65% | 21% | 14%',
     q:'29. 此表格反映的是政府哪一項政策的成果？',opts:['十大建設','出口導向','土地改革','產業升級'],ans:2,exp:'自耕農持續增加、佃農大量減少，是土地改革政策（三七五減租、公地放領、耕者有其田）的成果。'},
    {q:'30. 1953 年後自耕農大幅增加，最主要是哪兩項政策的功效？',opts:['三七五減租與公地放領','公地放領與耕者有其田','進口替代與出口導向','三七五減租與耕者有其田'],ans:1,exp:'1951 年公地放領與 1953 年耕者有其田的實施，使大批佃農取得自有土地，自耕農大幅增加。'},
    {q:'31. 佃農收益持續增加（如稻穀收益從民國 37 年 1947 公斤增至 55 年 7525 公斤），反映的是哪項政策？',opts:['十大建設','土地改革','出口導向','產業升級'],ans:1,exp:'土地改革後農民取得自有土地，不再需要繳交高額地租，實質收益大幅提升。'},
    {q:'32. 土地改革對台灣工業化的間接貢獻為何？',opts:['農業產值下降，工業自然填補缺口','政府將農民稅收全部投入工業','地主資金引導轉向工業投資，帶動工業化','農民移入城市成為工業勞動力'],ans:2,exp:'政府補償地主時發放實物債券和國家股票，引導地主資金轉投工業，是台灣工業化的重要推手。'},
    // 題組二 Q33-36 農工業外銷比例
    {group:'【題組二】閱讀以下台灣農工業外銷比例統計，回答 33–36 題。\n年份 | 農業產品 | 工業產品\n1962 年 | 49% | 51%\n1973 年 | 17% | 83%',
     q:'33. 上表最明顯反映了 1962 年至 1973 年間台灣哪項變化？',opts:['農業大幅成長','工業產品出口比例大幅提升','農工業均衡發展','外銷額整體下降'],ans:1,exp:'工業產品出口從 51% 大幅上升至 83%，農業從 49% 降至 17%，顯示台灣工業化的快速成長。'},
    {q:'34. 造成此變化的最主要經濟措施為何？',opts:['土地改革','成立新竹科技園區','實施出口導向政策','加入 WTO'],ans:2,exp:'民國 50 年代的出口導向政策，帶動工業品大量出口，使工業在外銷中的比例大幅提升。'},
    {q:'35. 1973 年後如果繼續統計，工業產品比例大致維持高檔，其中民國七十年代後高科技產品崛起，與哪項政策最有關？',opts:['出口導向','進口替代','新竹科學工業園區成立（產業升級）','十大建設'],ans:2,exp:'民國 69 年新竹科學工業園區成立，推動半導體等高科技產業，是台灣出口結構升級的關鍵。'},
    {q:'36. 下列有關台灣農業政策的敘述，何者正確？',opts:['土地改革後農業完全被工業取代','美援期間農業與工業同等重要，比重相同','進口替代時期的核心是「以農業培養工業」','加工出口區設立後農業立即消失'],ans:2,exp:'進口替代時期的核心策略是「以農業培養工業」，用農業收益扶植輕工業，不是立即取代農業。'},
    // 題組三 Q37-40 台積電新聞
    {group:'【題組三】閱讀以下新聞後，回答 37–40 題。\n「AI 教父輝達（NVIDIA）創辦人黃仁勳宣布，輝達台灣總部將落腳台北北投、士林一帶，此消息讓台灣半導體高科技業等極為期待。回顧台灣某一時期，經濟政策朝向發展技術、資本密集且具有高附加價值的高科技產業，為帶動高科技業發展，政府推動了重要措施。」',
     q:'37. 文中所述政府推動的「重要措施」最可能為何？',opts:['推動土地改革','設置加工出口區','成立新竹科學工業園區（產業升級）','實施十大建設'],ans:2,exp:'台灣發展高科技產業的關鍵措施是成立新竹科學工業園區，吸引台積電等半導體企業。'},
    {q:'38. 台灣護國神山台積電的崛起，與哪個產業升級政策關係最密切？',opts:['土地改革','出口導向','新竹科學工業園區帶動的半導體產業升級','十大建設的交通建設'],ans:2,exp:'台積電在 1987 年成立於新竹科學園區，是政府推動高科技產業升級的代表性成就。'},
    {q:'39. 新竹科學工業園區的成立時間約在何時？',opts:['民國 50 年代（出口導向時期）','民國 60 年代（十大建設時期）','民國 70 年代（產業升級時期）','民國 80 年代（自由化時期）'],ans:2,exp:'新竹科學工業園區成立於民國 69 年（1980 年），是產業升級時期的代表性措施。'},
    {q:'40. 從「製傘王國」到「半導體王國」，台灣最主要的政策推手為何？',opts:['土地改革','三七五減租','產業升級政策（成立科學園區）','加工出口區政策'],ans:2,exp:'台灣從勞力密集的輕工業轉型為資本與技術密集的半導體產業，靠的是產業升級政策的推動。'},
  ]
},
{
  id:'ex-3', title:'模擬考卷三：社會文化綜合篇', icon:'🎭', desc:'國語運動・文學・原住民運動・綜合（40 題・100 分）',
  qs:[
    {q:'1. 政府遷台後大力推行「國語運動」，主要目的是清除哪種語言的影響？',opts:['英語','日語','閩南語','客語'],ans:1,exp:'政府推行「國語運動」以消除日治時期日語在台灣日常生活中的影響力。'},
    {q:'2. 「說國語運動」推廣的「國語」是指哪種語言？',opts:['閩南語','客語','北京話（普通話）','英語'],ans:2,exp:'政府推廣的「國語」是北京話（普通話），藉以強化人民對中華文化的認同。'},
    {q:'3. 路名從「大政町、本町」改為「中山路、民權路」，最能反映哪個歷史背景？',opts:['日本接收台灣','光復後政權轉移，消除日治影響','解嚴後推動多元文化','加入聯合國後改名'],ans:1,exp:'光復後政府更改日治時期的路名，是政權轉移後破除舊政權影響的具體表現。'},
    {q:'4. 民國四十至六十年代，美軍駐台帶入的「美援文化」，對台灣有哪些影響？',opts:['引進日本流行文化','帶來美國流行文化（搖滾樂、牛仔褲、英文老歌）','推廣台灣傳統文化','傳入客家文化'],ans:1,exp:'美援時期美軍駐台，帶入搖滾樂、牛仔褲、英文老歌等美國流行文化，深刻影響台灣社會。'},
    {q:'5. 「反共文學」的主要特色為何？',opts:['描述小人物的困境','讚揚原住民文化','以文字表達思念故土、對抗共產主義的情感','批評政府土地政策'],ans:2,exp:'反共文學盛行於民國 40 年代，主要描寫思念故土、立志反共的情感，是政府文化政策的產物。'},
    {q:'6. 民國六十年代興起「鄉土文學」，哪部作品是代表作？',opts:['蔣中正《中國的命運》','黃春明《兒子的大玩偶》','胡適《文學改良芻議》','余光中《鄉愁》'],ans:1,exp:'黃春明的《兒子的大玩偶》是鄉土文學的代表作，以寫實主義描寫台灣底層小人物的生活困境。'},
    {q:'7. 「鄉土文學」興起的背景，不包含下列何者？',opts:['台灣退出聯合國','城鄉差距擴大','少子化的衝擊','美台斷交帶來的認同危機'],ans:2,exp:'鄉土文學興起與退出聯合國、美台斷交、城鄉差距有關；少子化是近年才有的現象，與鄉土文學無關。'},
    {q:'8. 台灣文化的演變順序，下列何者正確？（甲）多元文化　（乙）反共文學　（丙）美援流行文化　（丁）鄉土文學',opts:['乙丙丁甲','丙乙丁甲','甲乙丙丁','丁乙甲丙'],ans:0,exp:'文化演變：反共文學（40 年代）→ 美援文化（40-60 年代）→ 鄉土文學（60-70 年代）→ 多元文化（80 年代後）'},
    {q:'9. 民國八十三年（1994），原住民族正名完成後，官方稱呼改為何？',opts:['山地族群','原住民（後再改稱原住民族）','邊疆民族','土著族'],ans:1,exp:'民國 83 年政府正式將「山地同胞」正名為「原住民」，後再更名為「原住民族」。'},

// ── RENDER ─────────────────────────────────────────────────
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){ showSection('home'); }

function toHomeBtn(){
  return '<button class="to-home" onclick="goHome()">← 返回講義考卷選單</button>';
}

// Build home grid
function buildHome(){
  const htG=document.getElementById('ht-grid');
  const exG=document.getElementById('ex-grid');
  HT.forEach(h=>{
    htG.innerHTML+=`<div class="home-card ht" onclick="showSection('${h.id}')">
      <div class="card-icon">${h.icon}</div>
      <div class="card-title">${h.title}</div>
      <div class="card-desc">${h.desc}</div>
    </div>`;
  });
  EX.forEach(e=>{
    exG.innerHTML+=`<div class="home-card ex" onclick="showSection('${e.id}')">
      <div class="card-icon">${e.icon}</div>
      <div class="card-title">${e.title}</div>
      <div class="card-desc">${e.desc}</div>
    </div>`;
  });
}

// Build handouts
function parseFill(html){
  return html.replace(/<b>\{([^}]+)\}<\/b>/g,(m,ans)=>{
    const w=Math.max(2.5,ans.length*1.1);
    return `<span class="blank" data-ans="${ans}" style="min-width:${w}em" onclick="toggleBlank(this)">？</span>`;
  }).replace(/\{([^}]+)\}/g,(m,ans)=>{
    const w=Math.max(2.5,ans.length*1.1);
    return `<span class="blank" data-ans="${ans}" style="min-width:${w}em" onclick="toggleBlank(this)">？</span>`;
  });
}
function toggleBlank(el){
  if(el.classList.contains('show')){
    el.textContent='？';
    el.classList.remove('show');
  } else {
    el.textContent=el.dataset.ans;
    el.classList.add('show');
  }
}

function buildHandouts(){
  HT.forEach(h=>{
    const el=document.getElementById(h.id);
    let html=toHomeBtn();
    html+=`<div class="page-title">${h.icon} ${h.title}</div>`;
    html+=`<div class="page-sub">${h.desc}</div>`;
    h.secs.forEach((sec,si)=>{
      html+=`<div class="ht-section" id="${h.id}-sec-${si}">`;
      html+=`<div class="ht-sec-title">${sec.t}</div>`;
      sec.blocks.forEach(b=>{
        if(b.type==='fill'){
          html+=`<div class="fill-text">${parseFill(b.html)}</div>`;
        } else if(b.type==='text'){
          html+=`<div style="margin:8px 0;font-size:16px;color:#4b5563;">${b.html}</div>`;
        } else if(b.type==='table'){
          html+='<div style="overflow-x:auto"><table><thead><tr>';
          b.headers.forEach(hd=>{ html+=`<th>${parseFill(hd)}</th>`; });
          html+='</tr></thead><tbody>';
          b.rows.forEach(row=>{
            html+='<tr>';
            row.forEach(cell=>{ html+=`<td>${parseFill(cell)}</td>`; });
            html+='</tr>';
          });
          html+='</tbody></table></div>';
        }
      });
      html+=`<button class="reveal-btn" onclick="revealSec('${h.id}-sec-${si}')">👁️ 顯示答案</button>`;
      html+=`<button class="hide-btn" onclick="hideSec('${h.id}-sec-${si}')">隱藏</button>`;
      html+='</div>';
    });
    el.innerHTML=html;
  });
}

function revealSec(secId){
  document.querySelectorAll(`#${secId} .blank`).forEach(b=>{
    b.textContent=b.dataset.ans;
    b.classList.add('show');
  });
}
function hideSec(secId){
  document.querySelectorAll(`#${secId} .blank`).forEach(b=>{
    b.textContent='？';
    b.classList.remove('show');
  });
}

// Build exams
function buildExams(){
  EX.forEach(ex=>{
    const el=document.getElementById(ex.id);
    let html=toHomeBtn();
    html+=`<div class="exam-header"><h2>${ex.icon} ${ex.title}</h2><p>${ex.desc}</p></div>`;
    let score=[]; // will hold per-Q correctness
    let groupShown=false;
    let lastGroup='';
    ex.qs.forEach((q,qi)=>{
      // topic group header
      if(q.group && q.group!==lastGroup){
        html+=`<div class="topic-group-box"><strong>📖 題組說明</strong><pre style="white-space:pre-wrap;font-size:16px;font-family:inherit">${q.group}</pre></div>`;
        lastGroup=q.group;
      }
      const qid=`${ex.id}-q${qi}`;
      html+=`<div class="q-card" id="${qid}">`;
      html+=`<div class="q-num">第 ${qi+1} 題（2.5 分）</div>`;
      html+=`<div class="q-text">${q.q}</div>`;
      html+=`<div class="options" id="${qid}-opts">`;
      q.opts.forEach((opt,oi)=>{
        html+=`<button class="opt-btn" id="${qid}-o${oi}" onclick="selectOpt('${ex.id}',${qi},${oi})">`+
              `<span class="opt-letter">${'ABCD'[oi]}</span><span>${opt}</span></button>`;
      });
      html+=`</div>`;
      html+=`<button class="analysis-btn" id="${qid}-abtn" onclick="showAnalysis('${qid}')">💡 查看解析</button>`;
      html+=`<div class="analysis-box" id="${qid}-abox">✏️ 解析：${q.exp}</div>`;
      html+='</div>';
    });
    html+=`<button class="score-btn" onclick="calcScore('${ex.id}',${ex.qs.length})">📊 查看成績</button>`;
    html+=`<div class="score-box" id="${ex.id}-score"></div>`;
    el.innerHTML=html;
  });
}

const STATE={};
function selectOpt(exId,qi,oi){
  const ex=EX.find(e=>e.id===exId);
  const q=ex.qs[qi];
  const qid=`${exId}-q${qi}`;
  // disable all options
  for(let i=0;i<q.opts.length;i++){
    const btn=document.getElementById(`${qid}-o${i}`);
    btn.disabled=true;
    btn.classList.remove('selected');
    if(i===q.ans) btn.classList.add('correct');
    else if(i===oi && i!==q.ans) btn.classList.add('wrong');
  }
  if(!STATE[exId]) STATE[exId]={};
  STATE[exId][qi]=(oi===q.ans);
  // show analysis button
  document.getElementById(`${qid}-abtn`).style.display='inline-block';
}

function showAnalysis(qid){
  const box=document.getElementById(`${qid}-abox`);
  const btn=document.getElementById(`${qid}-abtn`);
  if(box.style.display==='block'){
    box.style.display='none';
    btn.textContent='💡 查看解析';
  } else {
    box.style.display='block';
    btn.textContent='🔼 收合解析';
  }
}

function calcScore(exId,total){
  const s=STATE[exId]||{};
  let correct=0;
  for(let i=0;i<total;i++){ if(s[i]) correct++; }
  const score=Math.round(correct*2.5);
  const pct=Math.round(correct/total*100);
  let grade='';
  if(score>=90) grade='🏆 優秀！';
  else if(score>=75) grade='👍 良好！';
  else if(score>=60) grade='📚 及格，繼續加油！';
  else grade='💪 需要多加複習！';
  const el=document.getElementById(`${exId}-score`);
  el.style.display='block';
  el.innerHTML=`<div class="score-grade">${grade}</div>
    <div class="score-num">${score} 分</div>
    <div class="score-detail">答對 ${correct} / ${total} 題 ｜ 正確率 ${pct}%</div>
    <p style="margin-top:12px;font-size:15px;opacity:.8">未作答的題目不計分。建議先完成所有題目後再查看成績。</p>`;
  el.scrollIntoView({behavior:'smooth'});
}

buildHandouts();
buildExams();
