<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2744;--gold:#e8a000;--teal:#0a7ea4;
  --green:#15803d;--red:#b91c1c;--bg:#f0f4f9;
  --card:#fff;--border:#dde3ed;--text:#1a1a2e;--muted:#6b7280;
}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);font-size:15px}

header{background:linear-gradient(135deg,#0f2744 0%,#1e4080 60%,#0a7ea4 100%);color:#fff;padding:22px 18px 18px;text-align:center}
header h1{font-size:1.5rem;font-weight:800}
header p{margin-top:5px;font-size:.85rem;opacity:.85}
.hbadges{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hbadge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:2px 11px;font-size:.75rem}

#sbar{background:#0f2744;color:#fff;display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 14px;font-size:.82rem;flex-wrap:wrap}
.si span.val{font-weight:700;font-size:.95rem}
#ptbar{height:5px;background:rgba(255,255,255,.2);width:180px;border-radius:3px;overflow:hidden}
#ptfill{height:100%;background:var(--gold);width:0%;transition:width .3s}

.ttabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);-webkit-overflow-scrolling:touch}
.ttabs::-webkit-scrollbar{height:3px}
.ttab{flex:0 0 auto;padding:12px 14px;font-size:.8rem;font-weight:700;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
.ttab.on{color:var(--navy);border-bottom-color:var(--gold)}
.ttab:hover{background:#f5f7fb}

#main{max-width:860px;margin:0 auto;padding:18px 14px 60px}

.note-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden}
.note-hd{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.note-hd h2{font-size:.95rem;font-weight:700;color:var(--navy);flex:1}
.note-hd .arr{color:var(--muted);font-size:.72rem;transition:.2s}
.note-hd.open .arr{transform:rotate(180deg)}
.note-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.note-body.open{display:block}

.concept{margin-top:13px}
.concept h3{font-size:.85rem;font-weight:700;color:var(--teal);margin-bottom:5px}
.concept p,.concept li{font-size:.82rem;line-height:1.8;color:#333}
.concept ul{padding-left:16px;margin-top:3px}
.eg{background:#fdf6e3;border-left:3px solid var(--gold);padding:7px 11px;border-radius:0 6px 6px 0;font-size:.8rem;color:#5a3e00;margin-top:5px;line-height:1.7}
.tbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:.8rem}
.tbl th{background:var(--navy);color:#fff;padding:6px 9px;text-align:left}
.tbl td{padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:nth-child(even) td{background:#f5f7fb}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:700;margin:1px}
.tag.g{background:#dcfce7;color:#166534}
.tag.r{background:#fee2e2;color:#991b1b}
.tag.b{background:#dbeafe;color:#1e40af}
.tag.y{background:#fef9c3;color:#854d0e}

.q-hd{display:flex;align-items:center;gap:9px;margin:22px 0 10px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.q-hd h2{font-size:.92rem;font-weight:700;color:var(--navy)}
.q-cnt{background:var(--navy);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px}

.qcard{background:#fff;border:1.5px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.qcard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.qhd{padding:13px 15px 9px;display:flex;gap:9px;align-items:flex-start}
.qnum{background:var(--navy);color:#fff;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qtxt{font-size:.88rem;line-height:1.75;flex:1}
.opts{padding:0 15px 5px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;margin-bottom:6px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;line-height:1.5;transition:.13s;user-select:none}
.opt:hover:not(.done){border-color:var(--teal);background:#f0f9ff}
.ol{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;margin-top:1px}
.opt.ok{border-color:var(--green)!important;background:#f0fdf4}
.opt.ok .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng{border-color:var(--red)!important;background:#fff5f5}
.opt.ng .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.fade{opacity:.35}
.exp{display:none;margin:3px 15px 13px;padding:10px 13px;background:#fffbe8;border-left:4px solid var(--gold);border-radius:0 7px 7px 0;font-size:.81rem;line-height:1.75;color:#4a3b00}
.exp.show{display:block}
.exp b{color:var(--navy)}

.rbtn{display:block;width:fit-content;margin:26px auto 0;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:.86rem;cursor:pointer;font-family:inherit}
.rbtn:hover{background:#1a3a6e}
</style>
</head>

/* ENGINE */
let curTopic="env";
const TOTAL=QDB.length;
const answered={};

const ttabs=document.getElementById("ttabs");
TOPICS.forEach(t=>{
  const cnt=QDB.filter(q=>q.tid===t.id).length;
  const btn=document.createElement("button");
  btn.className="ttab"+(t.id===curTopic?" on":"");
  btn.id="tab-"+t.id;
  btn.innerHTML=`${t.icon} ${t.name} <span style="background:#0f2744;color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px;margin-left:3px">${cnt}</span>`;
  btn.onclick=()=>switchTopic(t.id);
  ttabs.appendChild(btn);
});

function switchTopic(id){
  curTopic=id;
  document.querySelectorAll(".ttab").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+id).classList.add("on");
  render();
  window.scrollTo(0,0);
}

function render(){
  const topic=TOPICS.find(t=>t.id===curTopic);
  const qs=QDB.filter(q=>q.tid===curTopic);
  let html=`
  <div class="note-box">
    <div class="note-hd" onclick="toggleNote(this)">
      <span style="font-size:1.2rem">${topic.icon}</span>
      <h2>${topic.name}｜重點整理（點此展開）</h2>
      <span class="arr">▼</span>
    </div>
    <div class="note-body">${NOTES[curTopic]||"<p>整理中…</p>"}</div>
  </div>
  <div class="q-hd"><h2>${topic.icon} 練習題</h2><span class="q-cnt">${qs.length} 題</span></div>`;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    const optsHtml=q.opts.map((o,oi)=>`
      <div class="opt" id="opt_${aid}_${oi}" onclick="pick('${aid}',${oi},${q.ans})">
        <span class="ol" id="ol_${aid}_${oi}">${"ABCD"[oi]}</span><span>${o}</span>
      </div>`).join("");
    html+=`
    <div class="qcard">
      <div class="qhd"><span class="qnum">Q${i+1}</span><span class="qtxt">${q.q}</span></div>
      <div class="opts">${optsHtml}</div>
      <div class="exp" id="exp_${aid}">${q.exp}</div>
    </div>`;
  });
  html+=`<button class="rbtn" onclick="resetTopic()">🔄 重置本主題</button>`;
  document.getElementById("main").innerHTML=html;
  qs.forEach((q,i)=>{
    const aid=curTopic+"_"+i;
    if(answered[aid]) applyResult(aid,answered[aid].sel,answered[aid].correct,q.ans);
  });
}

function toggleNote(hd){hd.classList.toggle("open");hd.nextElementSibling.classList.toggle("open");}

function pick(aid,sel,ans){
  if(answered[aid])return;
  const correct=sel===ans;
  answered[aid]={sel,correct};
  applyResult(aid,sel,correct,ans);
  updateScore();
}

function applyResult(aid,sel,correct,ans){
  [0,1,2,3].forEach(i=>{
    const opt=document.getElementById("opt_"+aid+"_"+i);
    if(!opt)return;
    opt.classList.add("done");
    if(i===sel&&correct)opt.classList.add("ok");
    else if(i===sel&&!correct)opt.classList.add("ng");
    else if(i===ans&&!correct)opt.classList.add("ok");
    else opt.classList.add("fade");
  });
  const exp=document.getElementById("exp_"+aid);
  if(exp)exp.classList.add("show");
}

function resetTopic(){
  const qs=QDB.filter(q=>q.tid===curTopic);
  qs.forEach((_,i)=>delete answered[curTopic+"_"+i]);
  render();updateScore();
}

function updateScore(){
  const all=Object.values(answered);
  const done=all.length;
  const ok=all.filter(a=>a.correct).length;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-ok").textContent=ok;
  document.getElementById("s-ng").textContent=done-ok;
  document.getElementById("s-pct").textContent=done>0?Math.round(ok/done*100)+"%":"—";
  document.getElementById("ptfill").style.width=(done/TOTAL*100)+"%";
}

render();
</script>
